name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            preset: macos
          - os: windows-latest
            preset: windows
          - os: ubuntu-latest
            preset: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Cache build directories
        uses: actions/cache@v5
        with:
          path: |
            core/build-${{ matrix.preset }}
            tools/build
          key: ${{ runner.os }}-build-v3-${{ hashFiles('core/**/*.h', 'core/**/*.cpp', 'core/**/*.mm') }}
          restore-keys: |
            ${{ runner.os }}-build-v3-

      # Linux: Install dependencies using shared script
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          chmod +x tools/install_dependencies_linux.sh
          ./tools/install_dependencies_linux.sh -y

      # Windows: Setup MSVC environment (provides cl.exe, ninja, etc. in PATH)
      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build trusscli
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            sed -i '' 's/read -r -p/#read -r -p/g' tools/build_mac.command
            sed -i '' 's/open /#open /g' tools/build_mac.command
            ./tools/build_mac.command
          elif [ "$RUNNER_OS" == "Linux" ]; then
            chmod +x tools/build_linux.sh
            sed -i 's/read -r -p/#read -r -p/g' tools/build_linux.sh
            sed -i 's|\"$SCRIPT_DIR/trusscli\"|#&|g' tools/build_linux.sh
            ./tools/build_linux.sh
          elif [ "$RUNNER_OS" == "Windows" ]; then
            ./tools/build_win.bat
            echo "Searching for trusscli.exe..."
            find . -name trusscli.exe
          fi

      - name: Build examples
        shell: bash
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          chmod +x examples/build_all.py
          if [[ "$COMMIT_MSG" == *"[full]"* ]]; then
             echo "Running full build (triggered by [full] in commit message)..."
             ./examples/build_all.py --verbose
          else
             echo "Running quick build (AllFeaturesExample only)..."
             ./examples/build_all.py --test-only --verbose
          fi

  build-android:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Cache Android build
        uses: actions/cache@v5
        with:
          path: |
            core/build-android
            tools/build
          key: android-build-v3-${{ hashFiles('core/**/*.h', 'core/**/*.cpp') }}
          restore-keys: android-build-v3-

      - name: Install Linux dependencies (for trusscli)
        run: |
          chmod +x tools/install_dependencies_linux.sh
          ./tools/install_dependencies_linux.sh -y

      - name: Build trusscli
        run: |
          chmod +x tools/build_linux.sh
          sed -i 's/read -r -p/#read -r -p/g' tools/build_linux.sh
          sed -i 's|\"$SCRIPT_DIR/trusscli\"|#&|g' tools/build_linux.sh
          ./tools/build_linux.sh

      - name: Build AllFeaturesExample (Android)
        run: |
          PG=tools/bin/trusscli
          EXAMPLE=examples/tests/AllFeaturesExample

          # Update project with Android preset
          $PG update -p $EXAMPLE --android

          # Configure and build
          cd $EXAMPLE
          mkdir -p build-android && cd build-android
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build . -- -j$(nproc)

  build-web:
    timeout-minutes: 120
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Cache build directories
        uses: actions/cache@v5
        with:
          path: |
            core/build-web
            tools/build
          key: web-build-v3-${{ hashFiles('core/**/*.h', 'core/**/*.cpp') }}
          restore-keys: |
            web-build-v3-

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Install Linux dependencies (for trusscli)
        run: |
          chmod +x tools/install_dependencies_linux.sh
          ./tools/install_dependencies_linux.sh -y

      - name: Build trusscli
        run: |
          chmod +x tools/build_linux.sh
          sed -i 's/read -r -p/#read -r -p/g' tools/build_linux.sh
          sed -i 's|\"$SCRIPT_DIR/trusscli\"|#&|g' tools/build_linux.sh
          ./tools/build_linux.sh

      - name: Build examples (Web)
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          chmod +x examples/build_all.py
          if [[ "$COMMIT_MSG" == *"[full]"* ]]; then
             echo "Running full build (triggered by [full] in commit message)..."
             ./examples/build_all.py --web-only --verbose
          else
             echo "Running quick build (AllFeaturesExample only)..."
             ./examples/build_all.py --web-only --test-only --verbose
          fi
