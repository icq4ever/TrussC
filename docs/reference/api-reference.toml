["XmlNode"]
keywords = ["xml", "node", "element", "pugixml", "tag"]
description.en = "Alias for pugi::xml_node. A single element/node within an XML document, returned by Xml::root() and Xml::child(); see the pugixml documentation for node query and manipulation methods."
description.ja = "pugi::xml_node のエイリアス。XMLドキュメント内の単一の要素/ノードで、Xml::root() と Xml::child() が返す。ノードの問い合わせ・操作メソッドは pugixml のドキュメントを参照"
description.ko = "pugi::xml_node의 별칭. XML 문서 내 단일 요소/노드로, Xml::root()와 Xml::child()가 반환. 노드 질의 및 조작 메서드는 pugixml 문서 참조"

["XmlParseResult"]
keywords = ["xml", "parse", "result", "error", "status"]
description.en = "Alias for pugi::xml_parse_result. Result of an XML parse operation, carrying success status, error description and offset."
