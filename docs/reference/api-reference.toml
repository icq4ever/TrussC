keywords = ["mix", "channel", "routing", "downmix", "mono", "audio", "stereo"]

["Mod"]
keywords = ["component", "behavior", "module", "addmod", "attach", "plugin"]
description.en = "Attachable behavior base class for Node. Subclass it, override the lifecycle and input hooks, and attach with node->addMod<T>(). Lifecycle: setup() on attach, then each frame earlyUpdate() -> Node::update() -> update() -> draw(), and onDestroy() on removal. Override isExclusive() to allow only one instance per Node, and canAttachTo() to restrict attachment."
description.ja = "Node にアタッチできる振る舞いの基底クラス。サブクラス化してライフサイクルと入力フックをオーバーライドし、node->addMod<T>() でアタッチする。ライフサイクル: アタッチ時に setup()、以降毎フレーム earlyUpdate() -> Node::update() -> update() -> draw()、削除時に onDestroy()。isExclusive() をオーバーライドすると Node ごとに1インスタンスのみ許可、canAttachTo() でアタッチ先を制限できる"
description.ko = "Node에 부착 가능한 동작 기반 클래스. 서브클래싱하여 라이프사이클과 입력 훅을 오버라이드하고 node->addMod<T>()로 부착. 라이프사이클: 부착 시 setup(), 이후 매 프레임 earlyUpdate() -> Node::update() -> update() -> draw(), 제거 시 onDestroy(). isExclusive()를 오버라이드하면 Node당 한 인스턴스만 허용, canAttachTo()로 부착 대상을 제한"

["Mod::canAttachTo"]
description.en = "Override to restrict which Node types this Mod can attach to. Return false to reject attachment. Default true. (protected, virtual)"
description.ja = "オーバーライド: この Mod がアタッチできる Node 型を制限する。アタッチを拒否するには false を返す。デフォルトは true。（protected, virtual）"
description.ko = "오버라이드: 이 Mod가 부착 가능한 Node 타입을 제한. 부착을 거부하려면 false 반환. 기본값 true. (protected, virtual)"

["Mod::draw"]
description.en = "Override: called during the draw phase, after Node::draw(). (protected, virtual)"
description.ja = "オーバーライド: 描画フェーズ中、Node::draw() の後に呼ばれる。（protected, virtual）"
description.ko = "오버라이드: 그리기 단계 중 Node::draw() 후에 호출됨. (protected, virtual)"

["Mod::earlyUpdate"]
description.en = "Override: called every frame BEFORE Node::update(). Use for applying transforms, tweens, physics. (protected, virtual)"
description.ja = "オーバーライド: 毎フレーム Node::update() の前に呼ばれる。トランスフォーム・トゥイーン・物理の適用に使う。（protected, virtual）"
description.ko = "오버라이드: 매 프레임 Node::update() 전에 호출됨. 트랜스폼, 트윈, 물리 적용에 사용. (protected, virtual)"

["Mod::getOwner"]
description.en = "Get the owner Node this Mod is attached to."
description.ja = "この Mod がアタッチされている所有 Node を取得"
description.ko = "이 Mod가 부착된 소유 Node를 얻음"

["Mod::hitTest"]
description.en = "Override: screen-space pointer picking (NOT physics collision). Define a hit shape in the node's LOCAL space; if the node's own test OR any mod's returns true, the node is the hit. (protected, virtual)"
description.ja = "オーバーライド: スクリーン空間のポインタピッキング（物理衝突ではない）。ノードのローカル空間でヒット形状を定義する。ノード自身のテストかいずれかの mod が true を返せば、そのノードがヒット扱いになる。（protected, virtual）"
description.ko = "오버라이드: 화면 공간 포인터 피킹(물리 충돌이 아님). 노드의 로컬 공간에서 히트 형상을 정의. 노드 자신의 테스트나 어느 mod라도 true를 반환하면 해당 노드가 히트됨. (protected, virtual)"

["Mod::isExclusive"]
description.en = "Override to return true if only one instance of this Mod type may be attached per Node (e.g. LayoutMod). Default false. (protected, virtual)"
description.ja = "オーバーライド: この Mod 型を Node ごとに1インスタンスのみアタッチ可能とする場合は true を返す（例: LayoutMod）。デフォルトは false。（protected, virtual）"
description.ko = "오버라이드: 이 Mod 타입을 Node당 한 인스턴스만 부착 가능하게 하려면 true 반환(예: LayoutMod). 기본값 false. (protected, virtual)"

["Mod::onDestroy"]
description.en = "Override: called when the Mod is removed or the Node is destroyed. (protected, virtual)"
description.ja = "オーバーライド: Mod が削除されたか Node が破棄されたときに呼ばれる。（protected, virtual）"
description.ko = "오버라이드: Mod가 제거되거나 Node가 파괴될 때 호출됨. (protected, virtual)"

["Mod::onKeyPress"]
description.en = "Override: key press (broadcast to mods on every node). Return true to consume. (protected, virtual)"
description.ja = "オーバーライド: キー押下（すべてのノードの mod にブロードキャストされる）。消費するには true を返す。（protected, virtual）"
description.ko = "오버라이드: 키 누름(모든 노드의 mod에 브로드캐스트됨). 소비하려면 true 반환. (protected, virtual)"

["Mod::onKeyRelease"]
description.en = "Override: key release (broadcast to mods on every node). Return true to consume. (protected, virtual)"
description.ja = "オーバーライド: キー解放（すべてのノードの mod にブロードキャストされる）。消費するには true を返す。（protected, virtual）"
description.ko = "오버라이드: 키 놓음(모든 노드의 mod에 브로드캐스트됨). 소비하려면 true 반환. (protected, virtual)"

["Mod::onMouseDrag"]
description.en = "Override: mouse drag on the hit node. Return true to consume. (protected, virtual)"
description.ja = "オーバーライド: ヒットしたノード上でのマウスドラッグ。消費するには true を返す。（protected, virtual）"
description.ko = "오버라이드: 히트된 노드에서의 마우스 드래그. 소비하려면 true 반환. (protected, virtual)"

["Mod::onMouseEnter"]
description.en = "Override: pointer entered the owner node. (protected, virtual)"
description.ja = "オーバーライド: ポインタが所有ノードに入った。（protected, virtual）"
description.ko = "오버라이드: 포인터가 소유 노드에 진입함. (protected, virtual)"

["Mod::onMouseLeave"]
description.en = "Override: pointer left the owner node. (protected, virtual)"
description.ja = "オーバーライド: ポインタが所有ノードから離れた。（protected, virtual）"
description.ko = "오버라이드: 포인터가 소유 노드에서 벗어남. (protected, virtual)"

["Mod::onMouseMove"]
description.en = "Override: mouse move over the hit node. Return true to consume. (protected, virtual)"
description.ja = "オーバーライド: ヒットしたノード上でのマウス移動。消費するには true を返す。（protected, virtual）"
description.ko = "오버라이드: 히트된 노드 위에서의 마우스 이동. 소비하려면 true 반환. (protected, virtual)"

["Mod::onMousePress"]
description.en = "Override: mouse press on the hit node. Return true to consume the event (counts as the node consuming it). (protected, virtual)"
description.ja = "オーバーライド: ヒットしたノード上でのマウス押下。イベントを消費するには true を返す（ノードが消費したものとして扱われる）。（protected, virtual）"
description.ko = "오버라이드: 히트된 노드에서의 마우스 누름. 이벤트를 소비하려면 true 반환(노드가 소비한 것으로 간주). (protected, virtual)"

["Mod::onMouseRelease"]
description.en = "Override: mouse release on the hit node. Return true to consume. (protected, virtual)"
description.ja = "オーバーライド: ヒットしたノード上でのマウス解放。消費するには true を返す。（protected, virtual）"
description.ko = "오버라이드: 히트된 노드에서의 마우스 놓음. 소비하려면 true 반환. (protected, virtual)"

["Mod::onMouseScroll"]
description.en = "Override: mouse scroll over the hit node. Return true to consume. (protected, virtual)"
