["PlayingSound"]
keywords = ["voice", "playback handle", "mixer voice", "instance", "sound instance"]
description.en = "A single live mixer voice returned by AudioEngine::play(). Its fields are the real-time playback state the audio thread reads each callback (volume / pan / speed / loop / playing / paused / mixMode / position) plus the channel routing snapshots. Most fields are atomics so the UI thread can mutate them while the audio thread plays; set them directly."
description.ja = "AudioEngine::play() が返す 1 本のライブミキサーボイス。フィールドは audio thread が各コールバックで読む再生状態 (volume / pan / speed / loop / playing / paused / mixMode / 位置) とチャンネルルーティングのスナップショット。大半は atomic なので UI thread から再生中に書き換えられる。直接設定する"
description.ko = "AudioEngine::play()가 반환하는 하나의 라이브 믹서 보이스. 필드는 오디오 스레드가 콜백마다 읽는 재생 상태 (volume / pan / speed / loop / playing / paused / mixMode / 위치) 와 채널 라우팅 스냅샷. 대부분 atomic이라 UI 스레드에서 재생 중에 변경 가능. 직접 설정한다"

["PlayingSound::channelGains"]
description.en = "Atomically-swappable per-output-channel gain multipliers. Entries beyond .size() default to 1.0. Orthogonal to channelMap / mixMode."
description.ja = "出力チャンネルごとのゲイン乗数 (atomic 差し替え可)。.size() を超える要素は 1.0。channelMap / mixMode と直交"
description.ko = "출력 채널별 게인 배수 (atomic 교체 가능). .size()를 넘는 항목은 1.0. channelMap / mixMode와 직교"

["PlayingSound::channelMap"]
description.en = "Atomically-swappable per-output-channel source routing. Null means follow mixMode; non-null map is the source of truth. UI thread installs new versions, audio thread reads each callback."
description.ja = "出力チャンネルごとのソースルーティング (atomic 差し替え可)。null なら mixMode に従い、非 null のマップが真実。UI thread が新版を入れ、audio thread が各コールバックで読む"
description.ko = "출력 채널별 소스 라우팅 (atomic 교체 가능). null이면 mixMode를 따르고, non-null 맵이 기준. UI 스레드가 새 버전을 넣고 오디오 스레드가 콜백마다 읽음"

["PlayingSound::loop"]
description.en = "Loop the voice when it reaches the end. Atomic."
description.ja = "末尾に達したらループ再生する。atomic"
description.ko = "끝에 도달하면 반복 재생. atomic"

["PlayingSound::mixMode"]
description.en = "Channel mix policy when no explicit channelMap is set (Auto / DownmixMono). Stored as an atomic int holding the MixMode value."
description.ja = "明示的な channelMap が無いときのチャンネルミックス方針 (Auto / DownmixMono)。MixMode 値を保持する atomic int で格納"
description.ko = "명시적 channelMap이 없을 때의 채널 믹스 정책 (Auto / DownmixMono). MixMode 값을 가지는 atomic int로 저장"

["PlayingSound::pan"]
description.en = "Stereo pan (-1.0 left, 0.0 center, 1.0 right). Atomic."
description.ja = "ステレオパン (-1.0 左, 0.0 中央, 1.0 右)。atomic"
description.ko = "스테레오 팬 (-1.0 왼쪽, 0.0 중앙, 1.0 오른쪽). atomic"

["PlayingSound::paused"]
description.en = "True while paused (still a live voice, but not advancing). Atomic."
description.ja = "一時停止中 true (ボイスは生きているが進まない)。atomic"
description.ko = "일시정지 중 true (보이스는 살아있지만 진행하지 않음). atomic"

["PlayingSound::playing"]
description.en = "True while this voice is active in the mixer. Atomic."
description.ja = "ミキサーでこのボイスがアクティブな間 true。atomic"
description.ko = "믹서에서 이 보이스가 활성인 동안 true. atomic"

["PlayingSound::positionF"]
description.en = "Floating-point playback cursor in source samples; advances by speed * rateRatio each output frame."
description.ja = "ソースサンプル単位の浮動小数点再生カーソル。各出力フレームで speed * rateRatio ずつ進む"
description.ko = "소스 샘플 단위의 부동소수점 재생 커서. 각 출력 프레임마다 speed * rateRatio 만큼 진행"

["PlayingSound::rateRatio"]
description.en = "Source-to-engine sample-rate ratio (buffer sampleRate / engine sampleRate), set when queued so the voice plays at correct pitch regardless of engine rate."
description.ja = "ソース対エンジンのサンプルレート比 (buffer sampleRate / engine sampleRate)。キュー時に設定され、エンジンレートに依らず正しいピッチで再生される"
description.ko = "소스 대 엔진 샘플레이트 비율 (buffer sampleRate / engine sampleRate). 큐 등록 시 설정되어 엔진 레이트와 무관하게 올바른 피치로 재생"

["PlayingSound::speed"]
description.en = "Playback speed (0.5 half, 1.0 normal, 2.0 double). Atomic."
description.ja = "再生速度 (0.5 半分, 1.0 標準, 2.0 倍)。atomic"
description.ko = "재생 속도 (0.5 절반, 1.0 일반, 2.0 두 배). atomic"

["PlayingSound::volume"]
