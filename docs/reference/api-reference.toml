["Xml::root"]
description.en = "Get the document's root element node."
description.ja = "ドキュメントのルート要素ノードを取得"
description.ko = "문서의 루트 요소 노드를 얻음"

["Xml::save"]
description.en = "Save the document to a file. Relative paths are resolved via getDataPath. indent sets the per-level indentation string. Returns true on success."
description.ja = "ドキュメントをファイルに保存する。相対パスは getDataPath で解決される。indent は各レベルのインデント文字列を設定する。成功時に true を返す"
description.ko = "문서를 파일에 저장. 상대 경로는 getDataPath로 해석됨. indent는 레벨별 들여쓰기 문자열을 설정. 성공 시 true 반환"

["Xml::toString"]
description.en = "Serialize the document to an XML string. indent sets the per-level indentation string."
description.ja = "ドキュメントをXML文字列にシリアライズする。indent は各レベルのインデント文字列を設定する"
description.ko = "문서를 XML 문자열로 직렬화. indent는 레벨별 들여쓰기 문자열을 설정"

["XmlAttribute"]
keywords = ["xml", "attribute", "property", "pugixml", "name value"]
description.en = "Alias for pugi::xml_attribute. A name/value attribute on an XmlNode; see the pugixml documentation for its API."
description.ja = "pugi::xml_attribute のエイリアス。XmlNode 上の名前/値の属性。APIは pugixml のドキュメントを参照"
description.ko = "pugi::xml_attribute의 별칭. XmlNode의 이름/값 속성. API는 pugixml 문서 참조"

["XmlDocument"]
keywords = ["xml", "document", "pugixml", "root", "tree"]
description.en = "Alias for pugi::xml_document. The owning XML document type underlying the Xml wrapper; see the pugixml documentation for its full API."
description.ja = "pugi::xml_document のエイリアス。Xml ラッパーの基盤となる、所有権を持つXMLドキュメント型。完全なAPIは pugixml のドキュメントを参照"
