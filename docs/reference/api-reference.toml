["Xml"]
keywords = ["xml", "document", "parse", "pugixml", "markup"]
description.en = "XML document wrapper around pugixml. Loads, saves and queries XML; node-level access is via XmlNode returned from root() and child()."
description.ja = "pugixml をラップしたXMLドキュメント。XMLの読み込み・保存・問い合わせを行う。ノード単位のアクセスは root() と child() が返す XmlNode 経由"
description.ko = "pugixml을 감싼 XML 문서. XML 로드, 저장, 질의 수행. 노드 단위 접근은 root()와 child()가 반환하는 XmlNode를 통함"

["Xml::addDeclaration"]
description.en = "Prepend an XML declaration (<?xml ...?>) with the given version and encoding."
description.ja = "指定したバージョンとエンコーディングでXML宣言（<?xml ...?>）を先頭に追加"
