["Thread"]
keywords = ["thread", "background", "worker", "async", "concurrent", "ofthread"]
description.en = "Base class for background threads (ofThread compatible). Subclass it, override the protected pure-virtual threadedFunction() with a while (isThreadRunning()) { ... } loop, then control it with startThread()/stopThread()/waitForThread(). A protected mutex dataMutex_ is available for sharing data."
description.ja = "バックグラウンドスレッドの基底クラス（ofThread 互換）。サブクラス化して protected の純粋仮想 threadedFunction() を while (isThreadRunning()) { ... } ループでオーバーライドし、startThread()/stopThread()/waitForThread() で制御する。データ共有用に protected の mutex dataMutex_ が利用できる"
description.ko = "백그라운드 스레드의 기반 클래스(ofThread 호환). 서브클래싱하여 protected 순수 가상 threadedFunction()을 while (isThreadRunning()) { ... } 루프로 오버라이드한 뒤 startThread()/stopThread()/waitForThread()로 제어. 데이터 공유용 protected mutex dataMutex_가 제공됨"

["Thread::getMainThreadId"]
description.en = "Get the main thread ID, recording the current thread's ID on the first call."
description.ja = "メインスレッドIDを取得する。初回呼び出し時に現在のスレッドのIDを記録する"
description.ko = "메인 스레드 ID를 얻음. 첫 호출 시 현재 스레드의 ID를 기록"

["Thread::getThreadId"]
description.en = "Get the underlying thread's ID."
description.ja = "内部スレッドのIDを取得"
description.ko = "내부 스레드의 ID를 얻음"

["Thread::isCurrentThreadTheMainThread"]
description.en = "Whether the current thread is the main thread. The main thread ID must be recorded first (call getMainThreadId() from the main thread)."
description.ja = "現在のスレッドがメインスレッドかどうか。先にメインスレッドIDを記録しておく必要がある（メインスレッドから getMainThreadId() を呼ぶ）"
description.ko = "현재 스레드가 메인 스레드인지 여부. 먼저 메인 스레드 ID를 기록해 두어야 함(메인 스레드에서 getMainThreadId() 호출)"

["Thread::isThreadRunning"]
description.en = "Whether the thread is currently running."
description.ja = "スレッドが現在実行中かどうか"
description.ko = "스레드가 현재 실행 중인지 여부"

["Thread::sleep"]
description.en = "Pause the current thread for the given number of milliseconds."
description.ja = "現在のスレッドを指定したミリ秒数だけ一時停止する"
description.ko = "현재 스레드를 지정한 밀리초만큼 일시 정지"

["Thread::startThread"]
description.en = "Start the background thread (runs threadedFunction). No-op if already running."
description.ja = "バックグラウンドスレッドを開始する（threadedFunction を実行）。すでに実行中なら何もしない"
description.ko = "백그라운드 스레드 시작(threadedFunction 실행). 이미 실행 중이면 아무것도 하지 않음"

["Thread::stopThread"]
description.en = "Send the stop signal: isThreadRunning() returns false inside threadedFunction so a while-loop can exit. Does not block."
description.ja = "停止シグナルを送る: threadedFunction 内で isThreadRunning() が false を返すようになり、while ループが抜けられる。ブロックしない"
description.ko = "정지 신호 전송: threadedFunction 내부에서 isThreadRunning()이 false를 반환하여 while 루프가 빠져나갈 수 있음. 블로킹하지 않음"

["Thread::threadedFunction"]
description.en = "Override this with the work to run on the thread; recommended pattern is while (isThreadRunning()) { ... }. (protected, pure virtual)"
description.ja = "スレッド上で実行する処理でこれをオーバーライドする。推奨パターンは while (isThreadRunning()) { ... }。（protected, pure virtual）"
description.ko = "스레드에서 실행할 작업으로 이를 오버라이드. 권장 패턴은 while (isThreadRunning()) { ... }. (protected, pure virtual)"

["Thread::waitForThread"]
description.en = "Wait (join) for the thread to finish. If callStopThread is true (default), calls stopThread() first."
description.ja = "スレッドの終了を待つ（join）。callStopThread が true（デフォルト）なら先に stopThread() を呼ぶ"
description.ko = "스레드 종료를 대기(join). callStopThread가 true(기본값)이면 먼저 stopThread()를 호출"

["Thread::yield"]
description.en = "Yield execution to other threads."
description.ja = "実行を他のスレッドに譲る"
description.ko = "실행을 다른 스레드에 양보"

["ThreadChannel::clear"]
description.en = "Clear the queue, discarding all pending values."
description.ja = "キューをクリアし、保留中のすべての値を破棄する"
description.ko = "큐를 비우고 대기 중인 모든 값을 폐기"

["ThreadChannel::close"]
description.en = "Close the channel, waking all waiting threads. After closing, send/receive return false."
description.ja = "チャンネルを閉じ、待機中のすべてのスレッドを起こす。閉じた後は send/receive が false を返す"
description.ko = "채널을 닫고 대기 중인 모든 스레드를 깨움. 닫은 후에는 send/receive가 false 반환"

["ThreadChannel::empty"]
description.en = "Whether the queue is empty (approximate)."
description.ja = "キューが空かどうか（概算）"
description.ko = "큐가 비어 있는지 여부(근사값)"

["ThreadChannel::isClosed"]
description.en = "Whether the channel has been closed."
description.ja = "チャンネルが閉じられているかどうか"
description.ko = "채널이 닫혔는지 여부"

["ThreadChannel::receive"]
description.en = "Receive a value (blocking): waits until data arrives, writing it into value. Returns false if the channel is closed."
description.ja = "値を受け取る（ブロッキング）: データが到着するまで待ち、value に書き込む。チャンネルが閉じていれば false を返す"
description.ko = "값을 받음(블로킹): 데이터가 도착할 때까지 대기하여 value에 씀. 채널이 닫혀 있으면 false 반환"

["ThreadChannel::send"]
description.en = "Send a value onto the queue (copy or move overload). Returns false if the channel is closed (with the move overload the value is invalidated even on failure)."
