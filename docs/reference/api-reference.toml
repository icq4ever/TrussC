description.en = "Playback device name; empty = system default. Use AudioEngine::listDevices() to enumerate."
description.ja = "再生デバイス名、空 = システム既定。列挙には AudioEngine::listDevices() を使う"
description.ko = "재생 디바이스 이름, 비어 있으면 시스템 기본값. 열거에는 AudioEngine::listDevices() 사용"

