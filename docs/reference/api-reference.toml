description.en = "Configuration passed to AudioEngine::init() to override engine defaults (sample rate, channels, buffer size, polyphony, device). Empty deviceName selects the system default playback device."
description.ja = "AudioEngine::init() に渡してエンジンのデフォルト (サンプルレート、チャンネル、バッファサイズ、ポリフォニー、デバイス) を上書きする設定。deviceName が空ならシステム既定の再生デバイスを選択する"
description.ko = "AudioEngine::init() 에 전달하여 엔진 기본값 (샘플레이트, 채널, 버퍼 크기, 폴리포니, 디바이스) 을 오버라이드하는 설정. deviceName 이 비어 있으면 시스템 기본 재생 디바이스를 선택"

["AudioSettings::bufferSize"]
description.en = "Requested device buffer size in frames; 0 = let miniaudio choose"
