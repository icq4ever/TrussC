["Xml::empty"]
description.en = "Return true if the document has no content."
description.ja = "ドキュメントに内容がなければ true を返す"
description.ko = "문서에 내용이 없으면 true 반환"

["Xml::load"]
description.en = "Load an XML document from a file. Relative paths are resolved via getDataPath. Returns true on success."
