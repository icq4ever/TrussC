description.en = "Append a new root element with the given name and return it."
description.ja = "指定した名前で新しいルート要素を追加して返す"
description.ko = "지정한 이름으로 새 루트 요소를 추가하고 반환"

["Xml::child"]
description.en = "Find a direct child node of the document by name."
description.ja = "名前でドキュメントの直接の子ノードを検索"
