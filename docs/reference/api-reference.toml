["Node::callAfter"]
category = "timers"
keywords = ["timer", "delay", "timeout", "schedule", "later"]
description.en = "Run callback once after delay seconds. Fired from the update loop (frame-quantized). Returns a timer id."
description.ja = "delay秒後にcallbackを1回実行。更新ループから発火（フレーム単位）。タイマーidを返す"
description.ko = "delay초 후 callback을 한 번 실행. 업데이트 루프에서 발생(프레임 단위). 타이머 id를 반환"

["Node::callAfterAsync"]
category = "timers"
keywords = ["timer", "delay", "thread", "precise", "background"]
description.en = "Like callAfter, but fired by a precise background scheduler thread (no frame jitter). The callback runs OFF the main thread: guard shared state with a mutex, never draw from it, and don't cancel while holding that mutex. Native only (uses a real thread). Returns a timer id."
description.ja = "callAfterの精密版。バックグラウンドのスケジューラスレッドが正確な時刻に発火（フレームジッタなし）。コールバックはメインスレッド外で走る：共有状態はmutexで保護、描画は禁止、そのmutexを保持したままcancelしない。ネイティブ専用（実スレッド使用）。タイマーidを返す"
description.ko = "callAfter의 정밀 버전. 백그라운드 스케줄러 스레드가 정확한 시각에 실행(프레임 지터 없음). 콜백은 메인 스레드 밖에서 실행됨: 공유 상태는 mutex로 보호, 그리기 금지, 해당 mutex를 들고 cancel하지 말 것. 네이티브 전용(실제 스레드 사용). 타이머 id를 반환"

["Node::callEvery"]
category = "timers"
keywords = ["timer", "interval", "repeat", "schedule", "periodic"]
description.en = "Run callback repeatedly every interval seconds. Fired from the update loop (frame-quantized). Returns a timer id."
description.ja = "interval秒ごとにcallbackを繰り返し実行。更新ループから発火（フレーム単位）。タイマーidを返す"
description.ko = "interval초마다 callback을 반복 실행. 업데이트 루프에서 발생(프레임 단위). 타이머 id를 반환"

["Node::callEveryAsync"]
category = "timers"
keywords = ["timer", "interval", "clock", "scheduler", "background"]
description.en = "Like callEvery, but fired by a precise background scheduler thread with no drift (reschedules at absolute times). Ideal for sequencer clocks and LED/MIDI output timing. Same threading rules as callAfterAsync. Native only. Returns a timer id."
description.ja = "callEveryの精密版。バックグラウンドのスケジューラスレッドがドリフトなく発火（絶対時刻で再スケジュール）。シーケンサのクロックやLED/MIDI出力のタイミングに最適。スレッドの注意点はcallAfterAsyncと同じ。ネイティブ専用。タイマーidを返す"
description.ko = "callEvery의 정밀 버전. 백그라운드 스케줄러 스레드가 드리프트 없이 실행(절대 시각으로 재예약). 시퀀서 클럭이나 LED/MIDI 출력 타이밍에 적합. 스레드 주의사항은 callAfterAsync와 동일. 네이티브 전용. 타이머 id를 반환"

["Node::cancelAllAsyncTimers"]
