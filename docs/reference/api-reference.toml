description.ko = "오버라이드: 히트된 노드 위에서의 마우스 스크롤. 소비하려면 true 반환. (protected, virtual)"

["Mod::removeSelf"]
description.en = "Remove this Mod from its owner (no need to name its own type). Safe to call from inside the Mod's own update/draw/event handler; destruction is deferred until the current dispatch finishes. (protected)"
description.ja = "この Mod を所有者から削除する（自身の型名を指定する必要はない）。Mod 自身の update/draw/イベントハンドラ内から呼んでも安全で、破棄は現在のディスパッチ完了まで遅延される。（protected）"
description.ko = "이 Mod를 소유자에서 제거(자신의 타입명을 지정할 필요 없음). Mod 자신의 update/draw/이벤트 핸들러 내부에서 호출해도 안전하며, 파괴는 현재 디스패치가 끝날 때까지 지연됨. (protected)"

["Mod::setup"]
description.en = "Override: called once when the Mod is attached to the Node. (protected, virtual)"
description.ja = "オーバーライド: Mod が Node にアタッチされたときに一度だけ呼ばれる。（protected, virtual）"
description.ko = "오버라이드: Mod가 Node에 부착될 때 한 번 호출됨. (protected, virtual)"

["Mod::update"]
description.en = "Override: called every frame AFTER Node::update(). Use for reactions to node state changes. (protected, virtual)"
description.ja = "オーバーライド: 毎フレーム Node::update() の後に呼ばれる。ノードの状態変化への反応に使う。（protected, virtual）"
description.ko = "오버라이드: 매 프레임 Node::update() 후에 호출됨. 노드 상태 변화에 대한 반응에 사용. (protected, virtual)"

