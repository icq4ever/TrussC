description.ko = "스레드 간 단방향 통신용 스레드 안전 FIFO 큐(ofThreadChannel 호환), template<typename T>. Producer-Consumer 패턴: 워커 스레드가 값을 send()하고 다른 스레드가 receive()함. 양방향 통신에는 채널 두 개를 사용"

