["Path::reverseWinding"]
description.en = "Reverse the winding direction (vertex order) of all subpaths, or of one subpath. Under drawFill's non-zero winding rule, reversing a subpath toggles it between filling and cutting — e.g. build a circle contour, then reverseWinding(i) it into a hole punch. Reversing ALL subpaths leaves the render unchanged (only relative direction matters) — handy for imported outlines using the opposite convention."
description.ja = "subpath の巻き方向 (頂点順) を反転。引数なしで全 subpath、index 指定で 1 つだけ。drawFill の non-zero winding rule では反転で塗り ↔ 穴が切り替わる — 円の contour を作って reverseWinding(i) すれば穴パンチになる。全部反転しても描画結果は不変 (相対方向のみ意味を持つ) なので、逆巻き慣習のインポートデータの修正にも使える。"
description.ko = "subpath의 감김 방향 (정점 순서)을 반전. 인수 없이 전체, index 지정으로 하나만. drawFill의 non-zero winding rule에서는 반전으로 채움 ↔ 구멍이 전환됨. 전체 반전은 렌더 결과 불변 (상대 방향만 의미) — 반대 규약의 임포트 데이터 수정에도 사용."

