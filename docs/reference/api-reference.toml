["MicInput"]
keywords = ["microphone", "mic", "audio input", "capture", "recording input"]
description.en = "Microphone capture (miniaudio). Opens an input device and exposes the latest samples through a ring buffer. Use the global getMicInput() to access the shared instance, then start() it; getMicAnalysisBuffer() is a convenience wrapper over getBuffer()."
description.ja = "マイク入力 (miniaudio)。入力デバイスを開き、最新サンプルをリングバッファ経由で公開する。共有インスタンスはグローバルの getMicInput() で取得し、start() する。getMicAnalysisBuffer() は getBuffer() の簡易ラッパー"
description.ko = "마이크 입력 (miniaudio). 입력 디바이스를 열고 최신 샘플을 링 버퍼를 통해 노출한다. 공유 인스턴스는 전역 getMicInput() 으로 접근한 뒤 start() 한다. getMicAnalysisBuffer() 는 getBuffer() 의 편의 래퍼"

["MicInput::getBuffer"]
description.en = "Copy the latest captured samples into outBuffer. numSamples is capped at the ring buffer size (4096). Returns the number of samples written."
description.ja = "最新のキャプチャサンプルを outBuffer にコピー。numSamples はリングバッファサイズ (4096) に制限される。書き込んだサンプル数を返す"
description.ko = "최신 캡처 샘플을 outBuffer 에 복사. numSamples 는 링 버퍼 크기 (4096) 로 제한됨. 기록한 샘플 수를 반환"

["MicInput::getSampleRate"]
