["Shader::setUniform"]
category = "graphics_shader"
keywords = ["parameter", "variable", "value", "param", "input"]
description.en = "Set uniform variable by slot (vector overloads send arrays; Vec3 array is padded to Vec4 per std140)"
description.ja = "スロット番号でUniform変数を設定 (vector版は配列送信、Vec3配列はstd140に合わせて内部でVec4にパディング)"
description.ko = "슬롯별로 유니폼 변수를 설정 (vector 오버로드는 배열 전송, Vec3 배열은 std140에 맞춰 내부적으로 Vec4로 패딩)"

["Sound"]
category = "sound"
keywords = ["audio", "player", "sample", "sfx", "music", "clip"]
of = ["ofSoundPlayer"]
description.en = "Create a sound player"
description.ja = "サウンドプレイヤーを作成"
description.ko = "사운드 플레이어를 생성"
of_category = "audio-types"

["Sound::clearChannelGains"]
category = "sound"
keywords = ["reset", "channel", "gain", "uniform", "default"]
description.en = "Clear per-channel gains (back to uniform 1.0)."
description.ja = "ChannelGains を解除して uniform 1.0 に戻す"
description.ko = "채널 게인을 해제하고 uniform 1.0으로 복귀"

["Sound::clearChannelMap"]
category = "sound"
keywords = ["reset", "routing", "channel", "mapping", "default"]
description.en = "Clear the explicit channel map; routing falls back to setMixMode rules."
description.ja = "ChannelMap を解除して MixMode ルールに戻す"
description.ko = "채널 맵을 해제하고 MixMode 규칙으로 복귀"

["Sound::getChannelGains"]
description.en = "Current per-output-channel gain multipliers snapshot, or null if none set."
description.ja = "現在の出力チャンネルごとのゲイン乗数のスナップショット。未設定なら null"
description.ko = "현재 출력 채널별 게인 배수 스냅샷. 미설정이면 null"

["Sound::getChannelMap"]
description.en = "Current per-output-channel source routing snapshot, or null if mixMode rules apply."
description.ja = "現在の出力チャンネルごとのソースルーティングのスナップショット。mixMode 規則が適用される場合は null"
description.ko = "현재 출력 채널별 소스 라우팅 스냅샷. mixMode 규칙이 적용되면 null"

["Sound::getDuration"]
category = "sound"
keywords = ["length", "total time", "seconds", "runtime"]
description.en = "Get total duration of the loaded sound in seconds"
description.ja = "読み込まれたサウンドの全体長を秒で取得"
description.ko = "로드된 사운드의 전체 길이를 초로 가져옴"

["Sound::getMixMode"]
description.en = "Current channel mix policy (Auto / DownmixMono). Overridden when a non-empty channel map is set."
description.ja = "現在のチャンネルミックス方針 (Auto / DownmixMono)。空でないチャンネルマップがあると上書きされる"
description.ko = "현재 채널 믹스 정책 (Auto / DownmixMono). 비어 있지 않은 채널 맵이 있으면 덮어쓰여짐"

["Sound::getPan"]
category = "sound"
keywords = ["stereo", "balance", "left right", "audio"]
description.en = "Get current pan value"
description.ja = "現在の pan を取得"
description.ko = "현재 pan을 가져옴"

["Sound::getPosition"]
category = "sound"
keywords = ["progress", "playhead", "normalized", "seek"]
description.en = "Get current playback position in seconds"
description.ja = "現在の再生位置を秒で取得"
description.ko = "현재 재생 위치를 초로 가져옴"

["Sound::getSpeed"]
category = "sound"
keywords = ["rate", "tempo", "playback rate"]
description.en = "Get current playback speed"
description.ja = "現在の再生速度を取得"
description.ko = "현재 재생 속도를 가져옴"

["Sound::getVolume"]
category = "sound"
keywords = ["audio", "loudness", "gain", "level"]
description.en = "Get current volume"
description.ja = "現在の音量を取得"
description.ko = "현재 음량을 가져옴"

["Sound::isLoaded"]
category = "sound"
keywords = ["ready", "loaded", "available", "valid"]
description.en = "True after a successful load() / loadStream() / loadTestTone()"
description.ja = "load() / loadStream() / loadTestTone() に成功していれば true"
description.ko = "load() / loadStream() / loadTestTone()이 성공했으면 true"

["Sound::isLoop"]
category = "sound"
keywords = ["repeat", "loop", "cycle"]
description.en = "True if looping is enabled"
description.ja = "ループ再生が有効なら true"
description.ko = "반복 재생이 활성화되어 있으면 true"

["Sound::isPaused"]
category = "sound"
keywords = ["paused", "frozen", "held", "status"]
description.en = "True while paused"
description.ja = "一時停止中なら true"
description.ko = "일시 정지 중이면 true"

["Sound::isPlaying"]
category = "sound"
keywords = ["playing", "active", "running", "status"]
description.en = "True while playing (false if stopped, paused, or never played)"
description.ja = "再生中なら true (停止/一時停止/未再生なら false)"
description.ko = "재생 중이면 true (정지/일시정지/미재생이면 false)"

["Sound::isStreaming"]
category = "sound"
keywords = ["streaming", "stream", "mode", "check"]
description.en = "True if this Sound was loaded via loadStream() (vs eager load())"
description.ja = "loadStream() で読み込んでいれば true"
description.ko = "loadStream()으로 로드되었으면 true"

["Sound::load"]
category = "sound"
keywords = ["open", "read", "file"]
description.en = "Load sound file. Format auto-detected by extension: .wav .mp3 .ogg .flac .aac .m4a"
description.ja = "サウンドファイルを読み込む。拡張子で自動判別: .wav .mp3 .ogg .flac .aac .m4a"
description.ko = "사운드 파일을 로드. 확장자로 자동 판별: .wav .mp3 .ogg .flac .aac .m4a"

["Sound::loadFromBuffer"]
description.en = "Load PCM directly from a pre-generated SoundBuffer (e.g. from ChipSound or a procedural waveform), copying it or adopting the shared_ptr."
description.ja = "事前生成した SoundBuffer (ChipSound や手続き的波形など) から PCM を直接読み込む。コピーするか shared_ptr を採用"
description.ko = "미리 생성한 SoundBuffer (ChipSound나 절차적 파형 등) 에서 PCM을 직접 로드. 복사하거나 shared_ptr를 채택"

["Sound::loadStream"]
category = "sound"
keywords = ["streaming", "disk", "memory", "long", "music", "buffer"]
description.en = "Stream sound from disk (WAV/MP3/FLAC). Best for long files; cuts memory. maxPolyphony = simultaneous play() count."
description.ja = "ディスクからストリーミング再生 (WAV/MP3/FLAC)。長尺ファイル向け、メモリ節約。maxPolyphony は同時再生数"
description.ko = "디스크에서 스트리밍 재생 (WAV/MP3/FLAC). 긴 파일 적합, 메모리 절약. maxPolyphony는 동시 재생 수"

["Sound::loadTestTone"]
description.en = "Load a generated sine test tone (no file needed). Handy for verifying audio output."
description.ja = "生成したサイン波のテストトーンを読み込む (ファイル不要)。オーディオ出力確認に便利"
description.ko = "생성된 사인파 테스트 톤을 로드 (파일 불필요). 오디오 출력 확인에 유용"

["Sound::pause"]
category = "sound"
keywords = ["hold", "suspend", "freeze"]
description.en = "Pause playback (resume() to continue)"
description.ja = "再生を一時停止 (resume() で再開)"
description.ko = "재생을 일시 정지 (resume()로 재개)"

["Sound::play"]
category = "sound"
keywords = ["start", "resume", "go", "playback"]
description.en = "Play sound"
description.ja = "再生"
description.ko = "사운드 재생"

["Sound::resume"]
category = "sound"
keywords = ["continue", "unpause", "restart"]
description.en = "Resume paused playback"
description.ja = "一時停止していた再生を再開"
description.ko = "일시 정지된 재생을 재개"

["Sound::setChannelGains"]
category = "sound"
keywords = ["channel", "gain", "volume", "level", "per channel"]
description.en = "Per-output-channel gain multiplier. Entries beyond .size() default to 1.0. No internal normalization (setVolume is the overall gain)."
description.ja = "出力 ch ごとのゲイン倍率。.size() を超える ch は 1.0、内部正規化なし (setVolume が全体ゲイン)"
description.ko = "출력 채널별 게인 배율. .size()를 넘는 채널은 1.0, 내부 정규화 없음 (setVolume이 전체 게인)"

["Sound::setChannelMap"]
category = "sound"
keywords = ["routing", "channel", "output", "mapping", "surround"]
description.en = "Per-output-channel routing. 1D: each entry is a src ch index (-1 = silent). 2D: each entry lists src ch indices that sum into that output."
description.ja = "出力 ch ごとのルーティング。1D 版は各要素が src ch index (-1=無音)、2D 版は各要素が sum 対象の src ch リスト"
description.ko = "출력 채널별 라우팅. 1D는 각 항목이 src ch 인덱스 (-1=무음), 2D는 각 항목이 합산할 src ch 리스트"

["Sound::setLoop"]
category = "sound"
keywords = ["repeat", "loop", "cycle"]
description.en = "Enable/disable looping"
description.ja = "ループ再生を設定"
description.ko = "반복 재생을 활성/비활성"

["Sound::setMixMode"]
category = "sound"
keywords = ["routing", "downmix", "mono", "channel", "mapping"]
description.en = "Channel routing preset. Auto (default) = mono broadcasts / multi 1:1. DownmixMono = average src to all out ch."
description.ja = "チャンネルルーティング preset。Auto (デフォ)=mono は broadcast / multi は 1:1、DownmixMono=全 src を平均して全 out ch に同じ音"
description.ko = "채널 라우팅 프리셋. Auto=mono는 broadcast / multi는 1:1, DownmixMono=모든 소스를 평균하여 모든 출력 채널로"

["Sound::setPan"]
category = "sound"
keywords = ["stereo", "balance", "left right", "audio"]
description.en = "Set stereo balance (-1.0 left ~ 0 center ~ +1.0 right). On multi-ch devices only affects ch0/ch1."
description.ja = "ステレオバランス (-1.0=L, 0=中央, +1.0=R) を設定。多 ch デバイスでは ch0/ch1 のみに作用"
description.ko = "스테레오 밸런스 (-1.0=좌, 0=중앙, +1.0=우) 설정. 다채널 장치는 ch0/ch1만 적용"

["Sound::setPosition"]
category = "sound"
keywords = ["seek", "jump", "scrub", "playhead", "normalized"]
description.en = "Seek to a specific time in seconds. On streams, costs ~10 ms blackout while the ring refills."
description.ja = "指定秒数にシーク。ストリームでは ring 補充に ~10ms 無音"
description.ko = "지정 시간(초)으로 시크. 스트림은 링 재충전에 ~10ms 무음"

["Sound::setSpeed"]
category = "sound"
keywords = ["rate", "tempo", "fast", "slow", "playback rate"]
description.en = "Playback speed [-10, 10]. Negative = reverse (eager only). Streams clamp to [0, 10]. 0 = freeze."
description.ja = "再生速度 [-10, 10]。負=逆再生 (eager のみ)。stream は [0, 10] にクランプ。0=フリーズ"
description.ko = "재생 속도 [-10, 10]. 음수=역재생 (eager만). 스트림은 [0, 10]으로 클램프. 0=프리즈"

["Sound::setVolume"]
category = "sound"
keywords = ["audio", "loudness", "gain", "level"]
description.en = "Set volume (0.0-1.0)"
description.ja = "音量を設定"
description.ko = "음량을 설정 (0.0-1.0)"

["Sound::stop"]
category = "sound"
keywords = ["halt", "end", "reset", "rewind"]
description.en = "Stop sound"
description.ja = "停止"
description.ko = "사운드 정지"

["SoundBuffer"]
keywords = ["audio buffer", "pcm ram", "sfx", "waveform", "procedural audio"]
description.en = "Eager sound source: the full file decoded into interleaved float PCM held in RAM. Derives from SoundSource (inherits channels / sampleRate / kind() / getDuration()). Also provides waveform generators, an ADSR envelope, and mixing helpers, so it doubles as a procedural-audio scratch buffer. Best for short SFX and zero-latency play / seek / multi-instance."
description.ja = "Eagerなサウンドソース: ファイル全体をinterleaved float PCMにデコードしRAMに保持。SoundSourceから派生(channels / sampleRate / kind() / getDuration()を継承)。波形ジェネレータ、ADSRエンベロープ、ミキシングヘルパーも備え、procedural-audioのスクラッチバッファも兼ねる。短いSFXやゼロレイテンシなplay / seek / マルチインスタンスに最適"
description.ko = "Eager 사운드 소스: 파일 전체를 interleaved float PCM으로 디코딩해 RAM에 보유. SoundSource에서 파생(channels / sampleRate / kind() / getDuration() 상속). 파형 제너레이터, ADSR 엔벨로프, 믹싱 헬퍼도 제공해 procedural-audio 스크래치 버퍼 역할도 겸함. 짧은 SFX와 zero-latency play / seek / 다중 인스턴스에 최적"

["SoundBuffer::applyADSR"]
description.en = "Apply an ADSR amplitude envelope to the buffer in place (attack / decay / release in seconds, sustainLevel 0-1)."
description.ja = "バッファにADSR振幅エンベロープをin-placeで適用(attack / decay / releaseは秒、sustainLevelは0-1)"
description.ko = "버퍼에 ADSR 진폭 엔벨로프를 in-place로 적용(attack / decay / release는 초, sustainLevel은 0-1)"

["SoundBuffer::clip"]
description.en = "Hard-clip all samples into the -1.0 .. 1.0 range."
description.ja = "全サンプルを-1.0 .. 1.0の範囲にhard-clipする"
description.ko = "모든 샘플을 -1.0 .. 1.0 범위로 hard-clip"

["SoundBuffer::createAdtsHeader"]
description.en = "Write a 7-byte ADTS header for one raw AAC frame into header (AAC-in-MOV container helper)."
description.ja = "1つの生AACフレーム用に7バイトのADTSヘッダをheaderに書き込む(AAC-in-MOVコンテナ用ヘルパー)"
description.ko = "하나의 raw AAC 프레임용 7바이트 ADTS 헤더를 header에 기록(AAC-in-MOV 컨테이너 헬퍼)"

["SoundBuffer::generateNoise"]
description.en = "Fill the buffer with mono white noise."
description.ja = "モノwhite noiseでバッファを埋める"
description.ko = "모노 white noise로 버퍼를 채움"

["SoundBuffer::generatePinkNoise"]
description.en = "Fill the buffer with mono pink noise (1/f spectrum, Paul Kellet's method)."
description.ja = "モノpink noise(1/fスペクトル、Paul Kelletの手法)でバッファを埋める"
description.ko = "모노 pink noise(1/f 스펙트럼, Paul Kellet 방식)로 버퍼를 채움"

["SoundBuffer::generateSawtoothWave"]
description.en = "Fill the buffer with a mono sawtooth wave."
description.ja = "モノsawtooth波でバッファを埋める"
description.ko = "모노 sawtooth 파형으로 버퍼를 채움"

["SoundBuffer::generateSilence"]
description.en = "Fill the buffer with silence of the given duration (useful as a base for mixFrom)."
description.ja = "指定した長さの無音でバッファを埋める(mixFromのベースとして便利)"
description.ko = "지정한 길이의 무음으로 버퍼를 채움(mixFrom의 베이스로 유용)"

["SoundBuffer::generateSineWave"]
description.en = "Fill the buffer with a mono sine wave of the given frequency (Hz) and duration (seconds)."
description.ja = "指定した周波数(Hz)と長さ(秒)のモノsine波でバッファを埋める"
description.ko = "지정한 주파수(Hz)와 길이(초)의 모노 sine 파형으로 버퍼를 채움"

["SoundBuffer::generateSquareWave"]
description.en = "Fill the buffer with a mono square wave."
description.ja = "モノsquare波でバッファを埋める"
description.ko = "모노 square 파형으로 버퍼를 채움"

["SoundBuffer::generateTriangleWave"]
description.en = "Fill the buffer with a mono triangle wave."
description.ja = "モノtriangle波でバッファを埋める"
description.ko = "모노 triangle 파형으로 버퍼를 채움"

["SoundBuffer::getAdtsSampleRateIndex"]
description.en = "ADTS sample-rate index for the given rate (AAC-in-MOV container helper)."
description.ja = "指定レートに対するADTSサンプルレートインデックス(AAC-in-MOVコンテナ用ヘルパー)"
description.ko = "지정 레이트에 대한 ADTS 샘플레이트 인덱스(AAC-in-MOV 컨테이너 헬퍼)"

["SoundBuffer::getDuration"]
description.en = "Duration in seconds (numSamples / sampleRate)."
description.ja = "秒単位の長さ(numSamples / sampleRate)"
description.ko = "초 단위 길이(numSamples / sampleRate)"

["SoundBuffer::load"]
description.en = "Decode a file into PCM, auto-detecting format from the extension (.wav .mp3 .ogg .flac .aac .m4a, case-insensitive). Returns false on failure."
description.ja = "拡張子から形式を自動判別してファイルをPCMにデコード(.wav .mp3 .ogg .flac .aac .m4a、大文字小文字を区別しない)。失敗時falseを返す"
description.ko = "확장자로 형식을 자동 판별해 파일을 PCM으로 디코딩(.wav .mp3 .ogg .flac .aac .m4a, 대소문자 무시). 실패 시 false 반환"

["SoundBuffer::loadAac"]
description.en = "Decode an AAC / M4A file into PCM (platform-specific; returns false on unsupported platforms)."
description.ja = "AAC / M4AファイルをPCMにデコード(プラットフォーム依存。非対応プラットフォームではfalseを返す)"
description.ko = "AAC / M4A 파일을 PCM으로 디코딩(플랫폼 의존. 미지원 플랫폼에서는 false 반환)"

["SoundBuffer::loadAacFromMemory"]
description.en = "Decode AAC data from a memory buffer (platform-specific; returns false on unsupported platforms)."
description.ja = "メモリバッファからAACデータをデコード(プラットフォーム依存。非対応プラットフォームではfalseを返す)"
description.ko = "메모리 버퍼에서 AAC 데이터를 디코딩(플랫폼 의존. 미지원 플랫폼에서는 false 반환)"

["SoundBuffer::loadFlac"]
description.en = "Decode a FLAC file into PCM."
description.ja = "FLACファイルをPCMにデコード"
description.ko = "FLAC 파일을 PCM으로 디코딩"

["SoundBuffer::loadFlacFromMemory"]
description.en = "Decode FLAC data from a memory buffer."
description.ja = "メモリバッファからFLACデータをデコード"
description.ko = "메모리 버퍼에서 FLAC 데이터를 디코딩"

["SoundBuffer::loadMp3"]
description.en = "Decode an MP3 file into PCM."
description.ja = "MP3ファイルをPCMにデコード"
description.ko = "MP3 파일을 PCM으로 디코딩"

["SoundBuffer::loadMp3FromMemory"]
description.en = "Decode MP3 data from a memory buffer."
description.ja = "メモリバッファからMP3データをデコード"
description.ko = "메모리 버퍼에서 MP3 데이터를 디코딩"

["SoundBuffer::loadOgg"]
description.en = "Decode an OGG Vorbis file into PCM (via stb_vorbis)."
description.ja = "OGG VorbisファイルをPCMにデコード(stb_vorbis経由)"
description.ko = "OGG Vorbis 파일을 PCM으로 디코딩(stb_vorbis 사용)"

["SoundBuffer::loadOggFromMemory"]
description.en = "Decode OGG Vorbis data from a memory buffer."
description.ja = "メモリバッファからOGG Vorbisデータをデコード"
