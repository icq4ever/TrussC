["AudioEngine"]
keywords = ["mixer", "audio device", "miniaudio", "sound engine", "output"]
description.en = "Singleton miniaudio-based mixer engine. Owns the output device, mixes all playing Sound voices, exposes real-time audioOut / audioIn / audioDeviceChanged events, and an FFT analysis ring buffer. Access via AudioEngine::getInstance(); most apps drive it indirectly through the Sound class and the global initAudio() / shutdownAudio() helpers."
description.ja = "miniaudio ベースのシングルトンミキサーエンジン。出力デバイスを所有し、再生中の全 Sound ボイスをミックスし、リアルタイムの audioOut / audioIn / audioDeviceChanged イベントと FFT 解析リングバッファを公開する。AudioEngine::getInstance() でアクセス。多くのアプリは Sound クラスとグローバルの initAudio() / shutdownAudio() ヘルパー経由で間接的に利用する"
description.ko = "miniaudio 기반 싱글톤 믹서 엔진. 출력 디바이스를 소유하고, 재생 중인 모든 Sound 보이스를 믹스하며, 실시간 audioOut / audioIn / audioDeviceChanged 이벤트와 FFT 분석 링 버퍼를 노출한다. AudioEngine::getInstance() 로 접근. 대부분의 앱은 Sound 클래스와 전역 initAudio() / shutdownAudio() 헬퍼를 통해 간접적으로 사용한다"

["AudioEngine::audioDeviceChanged"]
description.en = "Fires after every successful init() (initial AND re-init). Args carry the resolved device's real name, isDefaultDevice flag, sampleRate, channels, bufferSize, maxPolyphony. Listener runs on the thread that called init() (main), not the audio thread."
description.ja = "成功した init() (初回 / 再 init) 後に発火。args は解決済みデバイス名、isDefaultDevice、sampleRate、channels、bufferSize、maxPolyphony。listener は init() を呼んだスレッド (通常 main) で実行"
description.ko = "성공한 init() (초기 / 재 init) 후 발화. args는 해결된 장치명, isDefaultDevice, sampleRate, channels, bufferSize, maxPolyphony. listener는 init()을 호출한 스레드 (보통 main)에서 실행"

