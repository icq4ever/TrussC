["SoundSource"]
keywords = ["audio source", "pcm", "sample data", "playable", "base sound"]
description.en = "Abstract base for anything Sound::play() can consume. Two concrete subclasses: SoundBuffer (eager, full PCM in RAM) and SoundStream (decoded on demand from disk). Holds the shared channels / sampleRate fields and the kind() / getDuration() interface."
description.ja = "Sound::play()が扱えるものの抽象基底。具象サブクラスは2つ: SoundBuffer(eager、全PCMをRAMに保持)とSoundStream(ディスクからオンデマンドにデコード)。共有のchannels / sampleRateフィールドとkind() / getDuration()インターフェースを保持"
description.ko = "Sound::play()가 다룰 수 있는 것의 추상 기반. 구체 서브클래스 2개: SoundBuffer(eager, 전체 PCM을 RAM에 보유)와 SoundStream(디스크에서 on-demand 디코딩). 공유 channels / sampleRate 필드와 kind() / getDuration() 인터페이스를 보유"

["SoundSource::Kind"]
keywords = ["sound kind", "eager", "stream", "source type", "buffer vs stream"]
description.en = "Source kind tag on SoundSource, letting the mixer dispatch without a per-frame virtual call: Eager (SoundBuffer, full PCM in RAM) vs Stream (SoundStream, decoded on demand)."
description.ja = "SoundSource の種別タグ。ミキサーがフレームごとの仮想呼び出しなしにディスパッチできる: Eager (SoundBuffer、全 PCM を RAM 保持) と Stream (SoundStream、オンデマンドにデコード)"
description.ko = "SoundSource의 종류 태그. 믹서가 프레임마다의 가상 호출 없이 디스패치 가능: Eager (SoundBuffer, 전체 PCM을 RAM 보유) 와 Stream (SoundStream, on-demand 디코딩)"

["SoundSource::channels"]
description.en = "Channel count of the source (1 = mono, 2 = stereo, ...)"
description.ja = "ソースのチャンネル数(1 = mono、2 = stereo、...)"
description.ko = "소스의 채널 수(1 = mono, 2 = stereo, ...)"

["SoundSource::getDuration"]
description.en = "Duration in seconds. numSamples/sampleRate for buffers; the decoded file's duration for streams."
description.ja = "秒単位の長さ。バッファはnumSamples/sampleRate、ストリームはデコードしたファイルの長さ"
description.ko = "초 단위 길이. 버퍼는 numSamples/sampleRate, 스트림은 디코딩된 파일의 길이"

["SoundSource::kind"]
description.en = "Source kind (Eager for SoundBuffer, Stream for SoundStream). Lets the mixer dispatch without a virtual call per frame."
description.ja = "ソースの種別(SoundBufferはEager、SoundStreamはStream)。ミキサーがフレームごとの仮想呼び出しなしにディスパッチできる"
description.ko = "소스 종류(SoundBuffer는 Eager, SoundStream은 Stream). 믹서가 프레임마다의 가상 호출 없이 디스패치 가능"

["SoundSource::sampleRate"]
description.en = "Source sample rate in Hz"
description.ja = "ソースのサンプルレート(Hz)"
description.ko = "소스의 샘플레이트(Hz)"

["SoundStream"]
keywords = ["streaming audio", "bgm", "music stream", "disk audio", "on demand"]
description.en = "Streaming sound source: the file stays open and is decoded on demand into a small per-voice ring buffer instead of full PCM in RAM. Derives from SoundSource (inherits channels / sampleRate / kind() / getDuration()). Best for long files (BGM, podcasts). Trade-offs vs SoundBuffer: setSpeed() is treated as 1.0, setPosition() seeks with a ~10 ms refill, and each polyphony slot costs one open file handle + decoder + ring buffer."
description.ja = "ストリーミングなサウンドソース: ファイルを開いたままにし、全PCMをRAMに置く代わりにvoiceごとの小さなring bufferへオンデマンドにデコードする。SoundSourceから派生(channels / sampleRate / kind() / getDuration()を継承)。長尺ファイル(BGM、ポッドキャスト)に最適。SoundBufferとのトレードオフ: setSpeed()は1.0として扱われ、setPosition()は約10 msのrefillでseekし、polyphonyスロットごとにopenファイルハンドル+デコーダ+ring bufferのコストがかかる"
description.ko = "스트리밍 사운드 소스: 파일을 열어둔 채로, 전체 PCM을 RAM에 두는 대신 voice별 작은 ring buffer로 on-demand 디코딩. SoundSource에서 파생(channels / sampleRate / kind() / getDuration() 상속). 긴 파일(BGM, 팟캐스트)에 최적. SoundBuffer 대비 트레이드오프: setSpeed()는 1.0으로 처리되고, setPosition()은 약 10 ms의 refill로 seek하며, polyphony 슬롯마다 open 파일 핸들 + 디코더 + ring buffer 비용이 듦"

["SoundStream::getDuration"]
description.en = "Decoded file duration in seconds."
description.ja = "デコードしたファイルの秒単位の長さ"
description.ko = "디코딩된 파일의 초 단위 길이"

["SoundStream::getMaxPolyphony"]
description.en = "Number of concurrent decoder slots reserved at loadStream()."
description.ja = "loadStream() 時に予約される同時デコーダースロット数"
description.ko = "loadStream() 시 예약되는 동시 디코더 슬롯 수"

["SoundStream::getPath"]
description.en = "Path the stream was opened from."
description.ja = "ストリームを開いた元のパス"
description.ko = "스트림을 연 원본 경로"

["SoundStream::loadStream"]
description.en = "Open the file, validate format (.wav .mp3 .flac .ogg), and populate channels / sampleRate / duration. maxPolyphony reserves that many concurrent decoder slots. Returns false if the file can't be opened or the format is unsupported."
description.ja = "ファイルを開き、形式(.wav .mp3 .flac .ogg)を検証し、channels / sampleRate / durationを埋める。maxPolyphonyはその数だけ同時デコーダスロットを予約。ファイルが開けないか形式が非対応の場合falseを返す"
description.ko = "파일을 열어 형식(.wav .mp3 .flac .ogg)을 검증하고 channels / sampleRate / duration을 채움. maxPolyphony는 그 수만큼 동시 디코더 슬롯을 예약. 파일을 열 수 없거나 형식이 미지원이면 false 반환"

