      - name: loadJson
        related:
          - Json
          - saveJson
          - parseJson
          - loadTextFile
        keywords: ["json","read","open","load","parse"]
        return: "Json"
        signatures:
          - params: "const string& path"
        description: "Load a JSON file and return it as a Json object. Relative paths are resolved via getDataPath; returns an empty Json on error."
        description_ja: "JSONファイルを読み込みJsonオブジェクトとして返す。相対パスはgetDataPathで解決され、エラー時は空のJsonを返す"
        description_ko: "JSON 파일을 읽어 Json 객체로 반환. 상대 경로는 getDataPath로 해석되며, 오류 시 빈 Json을 반환"
      - name: saveJson
        related:
          - Json
          - loadJson
          - toJsonString
          - saveTextFile
        keywords: ["json","write","save","store","serialize"]
        return: "bool"
        signatures:
          - params: "const Json& j, const string& path, int indent = 2"
        description: "Write a Json object to a file. Relative paths are resolved via getDataPath. indent sets the pretty-print width (negative for compact). Returns true on success."
        description_ja: "Jsonオブジェクトをファイルに書き出す。相対パスはgetDataPathで解決。indentはpretty-print幅を指定(負の値でcompact)。成功時trueを返す"
        description_ko: "Json 객체를 파일로 기록. 상대 경로는 getDataPath로 해석. indent는 pretty-print 폭을 지정(음수면 compact). 성공 시 true 반환"
      - name: loadXml
        related:
          - Xml
          - parseXml
        keywords: ["xml","read","open","load","parse"]
        return: "Xml"
        signatures:
          - params: "const string& path"
        description: "Load an XML file and return it as an Xml object. Relative paths are resolved via getDataPath."
        description_ja: "XMLファイルを読み込みXmlオブジェクトとして返す。相対パスはgetDataPathで解決される"
        description_ko: "XML 파일을 읽어 Xml 객체로 반환. 상대 경로는 getDataPath로 해석됨"
      - name: setDataPathRoot
        related:
          - getDataPathRoot
          - setDataPathToResources
          - getDataPath
        keywords: ["data","root","resource","directory","base"]
        return: "void"
        signatures:
          - params: "const string& path"
        description: "Set the root directory used to resolve relative data paths. A relative path is resolved against the executable directory; an absolute path (starting with /) is used as-is. A trailing slash is added automatically."
        description_ja: "相対データパスの解決に使うルートディレクトリを設定。相対パスは実行ファイルのディレクトリ基準で解決され、絶対パス(/始まり)はそのまま使われる。末尾のスラッシュは自動で付加される"
        description_ko: "상대 데이터 경로 해석에 사용할 루트 디렉터리를 설정. 상대 경로는 실행 파일 디렉터리 기준으로 해석되고, 절대 경로(/로 시작)는 그대로 사용됨. 끝의 슬래시는 자동으로 추가됨"
      - name: getDataPathRoot
        related:
          - setDataPathRoot
          - getDataPath
        keywords: ["data","root","resource","directory","base"]
        return: "string"
        signatures:
          - params: ""
        description: "Get the current data path root (with trailing slash)."
        description_ja: "現在のデータパスルートを取得(末尾スラッシュ付き)"
        description_ko: "현재 데이터 경로 루트를 얻음(끝 슬래시 포함)"
      - name: setDataPathToResources
        related:
          - setDataPathRoot
          - getExecutableDir
