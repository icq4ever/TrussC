        description: "Start live capture (window, or an Fbo for clean GUI-free output); size is taken automatically"
        description_ja: "ライブ録画開始（ウィンドウ、またはGUIなしのクリーン出力はFbo）。サイズは自動取得"
        description_ko: "라이브 녹화 시작 (윈도우, 또는 GUI 없는 클린 출력은 Fbo); 크기는 자동 취득"

