        self: Ray
        const: true
        lua: false
        return: "bool"
        signatures:
          - params: "float& outT, Vec3& outPoint"
        description: "Intersect the Z=0 plane; writes distance and hit point, returns whether it hit"
        description_ja: "Z=0 平面と交差。距離と交点を書き込み、ヒットしたかを返す"
        description_ko: "Z=0 평면과 교차. 거리와 교점을 기록하고 교차 여부를 반환"
      - name: intersectPlane
        self: Ray
        const: true
        lua: false
        return: "bool"
        signatures:
          - params: "const Vec3& planeNormal, float planeD, float& outT, Vec3& outPoint"
        description: "Intersect an arbitrary plane; writes distance and hit point, returns whether it hit"
        description_ja: "任意の平面と交差。距離と交点を書き込み、ヒットしたかを返す"
        description_ko: "임의의 평면과 교차. 거리와 교점을 기록하고 교차 여부를 반환"
