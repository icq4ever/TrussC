        description_ko: "같은 포트에 여러 소켓을 허용 (멀티캐스트 수신, bind 전에 설정)"
      - name: setReceiveBufferSize
        self: UdpSocket
        return: "bool"
        signatures:
          - params: "int size"
        description: "Set the receive buffer size"
        description_ja: "受信バッファサイズを設定"
        description_ko: "수신 버퍼 크기를 설정"
