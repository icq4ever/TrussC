        return: "void"
        signatures:
          - params: "float x1, float y1, float x2, float y2"
          - params: "const Vec2& p1, const Vec2& p2"
        description: "Draw a single stroke segment (thick line with cap/join)"
        description_ja: "単一のストロークを描画（太線、端点/結合スタイル対応）"
        description_ko: "단일 stroke 세그먼트를 그림 (캡/조인이 있는 굵은 선)"

      - name: drawBitmapString
        related:
          - drawBitmapStringHighlight
          - drawString
