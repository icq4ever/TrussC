# =============================================================================
# TrussC API Definition — single source of truth  (DEVELOPER doc; end users
# never read this file). Edit it whenever you add / change / remove a public API
# symbol. One file feeds every generated doc AND is verified against the real
# C++ in CI. Read the whole header before editing.
# =============================================================================
#
# SUPERSEDED by the reference redesign (docs/reference/). This file is now a
# legacy PROSE source: docs/reference/mine.js mines its descriptions/keywords/oF
# notes into docs/reference/api-reference.toml, keyed by symbol-id. The canonical
# artifact is docs/reference/reference-data.json (structure from the C++ AST +
# that prose). See docs/reference/README.md.
#   - FOR_AI_ASSISTANT.md / of-mapping.json / TrussC_vs_openFrameworks.md are now
#     emitted from reference-data.json (reference/emit-forai.js, emit-of.js).
#   - generate-docs.js still builds only the two web-player JS files from here
#     (trussc-api.js, trusssketch-api.js), pending the website's migration.
#   - CI gate: docs/reference/check.js (the signature-probe is retired — the AST
#     is the structure now, so signatures can't drift).
#
# -----------------------------------------------------------------------------
# TOP-LEVEL STRUCTURE
# -----------------------------------------------------------------------------
#   categories: [{ name, name_ja, name_ko, functions: [<symbol>] }]  free funcs, grouped
#   types:      [<type>]    classes/structs (constructor, properties, methods,
#                           static_methods, operators, free_operators)
#   enums:      [<enum>]    enum classes (values, operators)
#   macros:     [<macro>] / constants: [<const>]   preprocessor macros / value constants
#   colors:     [{ group, items: [{name, hex, rgba}] }]  GENERATED from tcColor.h
#                           (scripts/gen-colors.js) — do not hand-edit
#   keywords:   [..]        TrussSketch syntax-highlight word list
#
# -----------------------------------------------------------------------------
# PER-SYMBOL FIELDS
# -----------------------------------------------------------------------------
#   name            required. The BARE real C++ name. Statics live in
#                   types[].static_methods and render as Type::name (e.g. Mat4::identity).
#   self: <Type>    OWNER type => this is a METHOD of <Type>. REQUIRED on every type
#                   method. A no-self entry is a FREE function; if no such free
#                   function actually exists in C++, the probe fails.
#   static_methods  per-type list of STATIC methods (bare name; render as Type::name).
#   const: true     const member function (the probe encodes this in the cast).
#   cppName         the REAL C++ symbol when it differs from `name`. Carry the
#                   NAMESPACE here for non-tc symbols, e.g. "bitmapfont::registerGlyph".
#   return          return type ("" / omit for constructors).
#   signatures: [{ params }]   one entry per overload. `params` is the EXACT typed C++
#                   signature WITH parameter names and defaults
#                   ("const Vec2& v, float t = 0.5f"). It is the ONLY source of
#                   call-arg names (those are DERIVED — there is NO params_simple).
#   operators / free_operators   per-overload result types; see the math types.
#   lua: false      NOT Lua-bindable (template / T& in-out / array-ref param). Lets
#                   the tcxLua generator skip it deterministically.
#   deprecated: { reason, replacement?, url? }   renders a deprecation banner; keep the
#                   old name documented so callers can look up the replacement.
#   platforms: [linux|windows|macos|ios|android|wasm]   restrict; ABSENT = universal
#                   (all platforms incl. web).
#   addon: <name>   symbol belongs to a bundled addon (probe skips it; not core).
#   template: true  a real template => not pointer-castable (probe skips it). Use ONLY
#                   for genuine templates, NEVER to silence a probe error.
#   index: false    exclude from the FOR_AI_ASSISTANT.md C++ index.
#   description / description_ja / description_ko   one line each (en required).
#
#   RETIRED — do NOT reintroduce:
#     params_simple  -> derived from `params` (simpleParams() in generate-docs.js)
#     sketch         -> computed: TrussSketch availability = isWeb && lua!==false
#                       (web-compatible AND Lua-bindable)
#
# -----------------------------------------------------------------------------
# ADDING / CHANGING AN API  (procedure)
# -----------------------------------------------------------------------------
#   1. Implement in C++ first (core/include/...).
#   2. Add/edit ONE entry here:
#        free function -> categories[].functions, NO self
#        type method   -> types[].methods WITH self: <Type>
#        static method -> types[].static_methods WITH self: <Type>, bare name
#        non-tc symbol -> namespace in cppName ("ns::name")
#        params = exact typed signature WITH names + defaults (sourced from the header)
#        lua: false if not Lua-bindable (template / T& / array-ref)
#      DO NOT create a second entry for a symbol that already exists — duplicate
#      entries (we have hit IVec2/IVec3/getAbsolutePath/pushStyle copy-paste dups)
#      double-probe and drift. grep the name first.
#   3. Regenerate:  cd docs/scripts && node generate-docs.js
#   4. Verify (see CI conditions below).
#
# -----------------------------------------------------------------------------
# CI PASS CONDITIONS  (reference-check job in .github/workflows/build.yml)
# -----------------------------------------------------------------------------
#   The gate is now docs/reference/check.js, run against the prose in
#   docs/reference/api-reference.toml (mined from this file). It fails on:
#     * dup    — a symbol-id documented twice (TOML parse error)
#     * orphan — a sidecar key with no matching C++ symbol (renamed/removed)
#   `undocumented` (a public symbol with no prose) is reported but soft.
#   Signatures no longer need a probe: the structure is derived from the clang
#   AST, so a documented signature cannot disagree with the real one.

categories:
  # ==========================================================================
  # Lifecycle
  # ==========================================================================
  - id: lifecycle
    name: "Lifecycle"
    name_ja: "ライフサイクル"
    name_ko: "라이프사이클"
    functions:
      - name: setup
        self: Node
        related:
          - runApp
          - events
        keywords: ["init","start","begin","load","onload","create"]
        return: "void"
        signatures:
          - params: ""
        description: "Called once at start"
        description_ja: "開始時に一度呼ばれる"
        description_ko: "시작 시 한 번 호출됨"

      - name: update
        self: Node
        related:
          - updateGlyph
          - updateLayout
          - draw
          - getDeltaTime
          - getFrameCount
        keywords: ["tick","step","logic","frame","process","advance"]
        return: "void"
        signatures:
          - params: ""
        description: "Called every frame before draw"
        description_ja: "毎フレーム、drawの前に呼ばれる"
        description_ko: "매 프레임 draw 이전에 호출됨"

      - name: draw
        self: Node
        related:
          - drawMesh
          - update
          - clear
          - getFrameRate
        keywords: ["render","paint","display","show","frame"]
        return: "void"
        signatures:
          - params: ""
        description: "Called every frame after update"
        description_ja: "毎フレーム、updateの後に呼ばれる"
        description_ko: "매 프레임 update 이후에 호출됨"

      - name: cleanup
        self: Node
        related:
          - requestExitApp
          - destroy
        keywords: ["exit","shutdown","destroy","dispose","teardown","quit"]
        return: "void"
        signatures:
          - params: ""
        description: "Called once before exit (optional user callback for cleanup)"
        description_ja: "終了前に一度呼ばれる（オプショナルなクリーンアップコールバック）"
        description_ko: "종료 직전 한 번 호출됨 (선택적 정리용 콜백)"

      - name: runApp
        template: true
        related:
          - WindowSettings
          - runHeadlessApp
          - events
        keywords: ["main","start","launch","run","boot","entry"]
        return: "int"
        signatures:
          - params: "const WindowSettings& settings = WindowSettings()"
        description: "Start the application main loop. Called from main()"
        description_ja: "アプリケーションのメインループを開始。main()から呼ぶ"
        description_ko: "어플리케이션 메인 루프 시작. main()에서 호출"

  # ==========================================================================
  # Events
  # ==========================================================================
  - id: events
    name: "Events"
    name_ja: "イベント"
    name_ko: "이벤트"
    functions:
      - name: mousePressed
        self: App
        related:
          - mouseReleased
          - getMousePos
          - getMouseButton
          - isMousePressed
        keywords: ["click","press","mousedown","tap","touch","down"]
        examples:
          - mouseExample
        return: void
        signatures:
          - params: "const MouseEventArgs& e"
          - params: "Vec2 pos, int button"
        description: "Mouse button pressed"
        description_ja: "マウスボタンが押された"
        description_ko: "마우스 버튼이 눌렸을 때"

      - name: mouseReleased
        self: App
        related:
          - mousePressed
          - getMouseButton
        keywords: ["release","mouseup","click","up","lift"]
        examples:
          - mouseExample
        return: void
        signatures:
          - params: "Vec2 pos, int button"
        description: "Mouse button released"
        description_ja: "マウスボタンが離された"
        description_ko: "마우스 버튼이 떼졌을 때"

      - name: mouseMoved
        self: App
        related:
          - mouseDragged
          - getMousePos
        keywords: ["move","hover","motion","pointer","cursor"]
        examples:
          - mouseExample
        return: void
        signatures:
          - params: "Vec2 pos"
        description: "Mouse moved"
        description_ja: "マウスが移動した"
        description_ko: "마우스가 움직였을 때"

      - name: mouseDragged
        self: App
        related:
          - mouseMoved
          - isMousePressed
        keywords: ["drag","swipe","move","pan","pointer"]
        examples:
          - mouseExample
        return: void
        signatures:
          - params: "Vec2 pos, int button"
        description: "Mouse dragged"
        description_ja: "マウスがドラッグされた"
        description_ko: "마우스가 드래그되었을 때"

      - name: keyPressed
        self: App
        related:
          - keyReleased
          - isKeyPressed
          - isShiftPressed
        keywords: ["key","keydown","keyboard","type","input","press"]
        examples:
          - keyboardExample
        return: "void"
        signatures:
          - params: "int key"
        description: "Key pressed. Use KEY_* constants for special keys, or uppercase char literals for printable keys (e.g. key == 'A', key == '1')"
        description_ja: "キーが押された。特殊キーはKEY_*定数、印字可能キーは大文字リテラル（例: key == 'A', key == '1'）で比較"
        description_ko: "키가 눌렸을 때. 특수 키는 KEY_* 상수, 출력 가능한 키는 대문자 리터럴(예: key == 'A', key == '1')로 비교"

      - name: keyReleased
        self: App
        related:
          - keyPressed
          - isKeyPressed
        keywords: ["key","keyup","keyboard","release","up"]
        examples:
          - keyboardExample
        return: "void"
        signatures:
          - params: "int key"
        description: "Key released"
        description_ja: "キーが離された"
        description_ko: "키가 떼졌을 때"

      - name: windowResized
        self: App
        related:
          - getWindowSize
          - setWindowSize
        keywords: ["resize","resized","size","reshape","window"]
        return: "void"
        signatures:
          - params: "int width, int height"
        description: "Window resized"
        description_ja: "ウィンドウがリサイズされた"
        description_ko: "윈도우 크기가 변경되었을 때"

      - name: mouseScrolled
        self: App
        related:
          - mouseMoved
          - mouseDragged
        keywords: ["scroll","wheel","zoom","trackpad","dolly"]
        return: "void"
        signatures:
          - params: "const ScrollEventArgs& e"
          - params: "Vec2 delta"
        description: "Mouse wheel / trackpad scrolled"
        description_ja: "マウスホイール / トラックパッドがスクロールされた"
        description_ko: "마우스 휠 / 트랙패드가 스크롤되었을 때"

      - name: touchPressed
        self: App
        related:
          - touchMoved
          - touchReleased
        keywords: ["touch","finger","tap","down","mobile","ios","android"]
        return: "void"
        signatures:
          - params: "const TouchEventArgs& touch"
        description: "Touch began (Android/iOS, multi-touch)"
        description_ja: "タッチが開始した(Android/iOS、マルチタッチ)"
        description_ko: "터치가 시작됨(Android/iOS, 멀티터치)"

      - name: touchMoved
        self: App
        related:
          - touchPressed
          - touchReleased
        keywords: ["touch","finger","drag","move","mobile","ios","android"]
        return: "void"
        signatures:
          - params: "const TouchEventArgs& touch"
        description: "Touch moved (Android/iOS, multi-touch)"
        description_ja: "タッチが移動した(Android/iOS、マルチタッチ)"
        description_ko: "터치가 이동함(Android/iOS, 멀티터치)"

      - name: touchReleased
        self: App
        related:
          - touchPressed
          - touchMoved
        keywords: ["touch","finger","release","up","mobile","ios","android"]
        return: "void"
        signatures:
          - params: "const TouchEventArgs& touch"
        description: "Touch ended or was cancelled (check touch.cancelled)"
        description_ja: "タッチが終了またはキャンセルされた(touch.cancelled を確認)"
        description_ko: "터치가 끝나거나 취소됨(touch.cancelled 확인)"

      - name: filesDropped
        self: App
        related:
          - filesDropped
        keywords: ["drop","drag and drop","files","dropped"]
        return: "void"
        signatures:
          - params: "const std::vector<std::string>& files"
        description: "Files were dropped onto the window"
        description_ja: "ウィンドウにファイルがドロップされた"
        description_ko: "윈도우에 파일이 드롭됨"

      - name: audioOut
        self: App
        lua: false
        related:
          - AudioOutBuffer
        keywords: ["audio","sound","output","buffer","dsp","synth"]
        return: "void"
        signatures:
          - params: "AudioOutBuffer& buf"
        description: "Fill the audio output buffer (override to synthesize audio)"
        description_ja: "オーディオ出力バッファを満たす(音を合成するにはオーバーライド)"
        description_ko: "오디오 출력 버퍼를 채움(오디오를 합성하려면 오버라이드)"

      - name: setSize
        self: App
        related:
          - getWindowSize
        keywords: ["size","resize","window","dimensions"]
        return: "void"
        signatures:
          - params: "float w, float h"
        description: "Set the app's size"
        description_ja: "アプリのサイズを設定"
        description_ko: "앱 크기를 설정"

      - name: requestExit
        self: App
        related:
          - isExitRequested
          - exit
        keywords: ["exit","quit","close","shutdown","request"]
        return: "void"
        signatures:
          - params: ""
        description: "Request the app to exit"
        description_ja: "アプリの終了を要求"
        description_ko: "앱 종료를 요청"

      - name: isExitRequested
        self: App
        const: true
        related:
          - requestExit
        keywords: ["exit","quit","close","query","requested"]
        return: "bool"
        signatures:
          - params: ""
        description: "Whether an exit has been requested"
        description_ja: "終了が要求されているかどうか"
        description_ko: "종료가 요청되었는지 여부"

      - name: exit
        self: App
        related:
          - requestExit
        keywords: ["exit","quit","cleanup","shutdown","teardown"]
        return: "void"
        signatures:
          - params: ""
        description: "App exit callback (override for cleanup before shutdown)"
        description_ja: "アプリ終了コールバック(終了前のクリーンアップにオーバーライド)"
        description_ko: "앱 종료 콜백(종료 전 정리를 위해 오버라이드)"

  # ==========================================================================
  # Graphics - Color
  # ==========================================================================
  - id: graphics_color
    name: "Graphics - Color"
    name_ja: "グラフィックス - 色"
    name_ko: "그래픽 - 색상"
    functions:
      - name: clear
        related:
          - StrokeMesh
          - setColor
          - setBlendMode
        keywords: ["reset","empty","remove","delete"]
        return: "void"
        signatures:
          - params: ""
          - params: "float gray, float a = 1.0f"
          - params: "float r, float g, float b, float a = 1.0f"
        description: "Clear screen. No args = transparent black (0,0,0,0)"
        description_ja: "画面をクリア。引数なし = 透明黒 (0,0,0,0)"
        description_ko: "화면을 지움. 인자 없음 = 투명한 검정 (0,0,0,0)"
        of_equivalent: "ofClear / ofBackground"
        of_signature_index: 1

      - name: setColor
        related:
          - StrokeMesh
          - getColor
          - setColorHSB
          - setColorOKLCH
          - setColorOKLab
          - fill
          - clear
          - pushStyle
        keywords: ["color","tint","rgba","fill"]
        examples:
          - graphicsExample
          - 3DPrimitivesExample
        return: void
        signatures:
          - params: "float gray, float a = 1.0f"
          - params: "float r, float g, float b, float a = 1.0f"
          - params: "float r, float g, float b, float a"
        description: "Set drawing color (0.0-1.0)"
        description_ja: "描画色を設定 (0.0-1.0)"
        description_ko: "그리기 색상을 설정 (0.0-1.0)"
        of_equivalent: "ofSetColor"
        of_notes: "Range 0-1 instead of 0-255"

      - name: setColorHSB
        related:
          - ColorHSB
          - colorFromHSB
        keywords: ["hsb", "hsv", "hue", "saturation", "brightness", "color"]
        return: void
        signatures:
          - params: "float h, float s, float b, float a = 1.0f"
        description: "Set color from HSB (H: 0-1)"
        description_ja: "HSBで色を設定 (H: 0-1)"
        description_ko: "HSB로 색상을 설정 (H: 0-1)"

      - name: setColorOKLCH
        related:
          - ColorOKLCH
        keywords: ["oklch","perceptual","lightness","chroma","hue"]
        return: void
        signatures:
          - params: "float L, float C, float H, float alpha = 1.0f"
        description: "Set color from OKLCH"
        description_ja: "OKLCHで色を設定"
        description_ko: "OKLCH로 색상을 설정"

      - name: setColorOKLab
        related:
          - ColorOKLab
        keywords: ["oklab","perceptual","lab","lightness"]
        return: void
        signatures:
          - params: "float L, float a_lab, float b_lab, float alpha = 1.0f"
        description: "Set color from OKLab"
        description_ja: "OKLabで色を設定"
        description_ko: "OKLab으로 색상을 설정"

  # ==========================================================================
  # Graphics - Shapes
  # ==========================================================================
      - name: srgbToLinear
        related:
          - setGammaCorrection
        keywords: ["gamma","linear","color space","convert"]
        return: "float"
        signatures:
          - params: "float x"
        description: "Convert a single sRGB channel value to linear RGB"
        description_ja: "単一のsRGBチャンネル値をリニアRGBに変換"
        description_ko: "단일 sRGB 채널 값을 linear RGB로 변환"
      - name: linearToSrgb
        related:
          - setGammaCorrection
        keywords: ["gamma","linear","color space","convert"]
        return: "float"
        signatures:
          - params: "float x"
        description: "Convert a single linear RGB channel value to sRGB"
        description_ja: "単一のリニアRGBチャンネル値をsRGBに変換"
        description_ko: "단일 linear RGB 채널 값을 sRGB로 변환"
  - id: graphics_shapes
    name: "Graphics - Shapes"
    name_ja: "グラフィックス - 図形"
    name_ko: "그래픽 - 도형"
    functions:
      - name: drawRect
        related:
          - drawRectRounded
          - drawRectSquircle
          - Rect
        keywords: ["rectangle","box","square","quad","ofrect"]
        examples:
          - graphicsExample
        return: "void"
        signatures:
          - params: "float x, float y, float w, float h"
          - params: "Vec3 pos, float w, float h"
          - params: "Vec3 pos, Vec2 size"
            description: "Size given as a Vec2 (width, height)."
            description_ja: "サイズを Vec2（幅・高さ）で指定。"
        description: "Draw rectangle"
        description_ja: "矩形を描画"
        description_ko: "사각형 그리기"
        details: |
          Draws an axis-aligned rectangle from the top-left corner.
          Respects the current fill / noFill mode and draw color.
          With a Vec3 position, z is used for placement in 3D mode.
          For rounded corners, see drawRectRounded and drawRectSquircle.
        details_ja: |
          左上を原点に軸並行の矩形を描画する。
          現在の fill / noFill モードと描画色に従う。
          Vec3 で位置を渡すと 3D モードで z が使われる。
          角を丸くしたい場合は drawRectRounded, drawRectSquircle を参照。
        of_equivalent: "ofDrawRectangle"

      - name: drawRectRounded
        related:
          - drawRectSquircle
        keywords: ["rounded","corner","radius","pill","rounded box"]
        return: "void"
        signatures:
          - params: "float x, float y, float w, float h, float radius"
          - params: "Vec3 pos, Vec2 size, float radius"
        description: "Draw rounded rectangle (circular arc corners)"
        description_ja: "角丸矩形を描画（円弧コーナー）"
        description_ko: "둥근 모서리 사각형 그리기 (원호 모서리)"
        of_equivalent: "ofDrawRectRounded"

      - name: drawRectSquircle
        keywords: ["squircle", "rounded", "ios", "superellipse", "smooth corner"]
        return: "void"
        signatures:
          - params: "float x, float y, float w, float h, float radius"
          - params: "Vec3 pos, Vec2 size, float radius"
        description: "Draw squircle rectangle (curvature-continuous corners, iOS-style)"
        description_ja: "スクワークル矩形を描画（曲率連続コーナー、iOS風）"
        description_ko: "스쿼클 사각형 그리기 (곡률 연속 모서리, iOS 스타일)"

      - name: drawCircle
        related:
          - drawEllipse
          - drawArc
        examples:
          - graphicsExample
        keywords: ["circle", "round", "ellipse", "ball", "dot"]
        return: "void"
        signatures:
          - params: "float x, float y, float radius"
          - params: "Vec3 center, float radius"
        description: "Draw circle"
        description_ja: "円を描画"
        description_ko: "원 그리기"
        of_equivalent: "ofDrawCircle"

      - name: drawArc
        related:
          - appendArc
        keywords: ["pie","wedge","sector","partial circle","segment"]
        return: "void"
        signatures:
          - params: "float x, float y, float radius, float angleBegin, float angleEnd"
          - params: "Vec3 center, float radius, float angleBegin, float angleEnd"
        description: "Draw arc (partial circle, angles in radians)"
        description_ja: "円弧を描画（角度はradian）"
        description_ko: "호 그리기 (각도는 radian)"

      - name: drawEllipse
        related:
          - drawCircle
        keywords: ["circle","oval","round","ball","ofellipse"]
        return: "void"
        signatures:
          - params: "float x, float y, float w, float h"
          - params: "Vec3 center, float rx, float ry"
          - params: "Vec3 center, Vec2 radii"
        description: "Draw ellipse"
        description_ja: "楕円を描画"
        description_ko: "타원 그리기"
        of_equivalent: "ofDrawEllipse"

      - name: drawPoint
