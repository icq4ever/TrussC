        self: Serial
        return: "std::vector<SerialDeviceInfo>"
        signatures:
          - params: ""
        description: "List available serial devices"
        description_ja: "利用可能なシリアルデバイスを列挙"
        description_ko: "사용 가능한 시리얼 장치를 나열"
      - name: getDeviceList
        self: Serial
        deprecated:
          reason: "Use listDevices() instead. Will be removed in v1.0.0."
          replacement: listDevices
        related:
          - listDevices
        keywords: ["serial","devices","list","deprecated"]
        return: "std::vector<SerialDeviceInfo>"
        signatures:
          - params: ""
        details: "Kept as a backward-compatible alias; new code should call `listDevices()` (same behavior). Scheduled for removal in v1.0.0."
        description: "Deprecated alias for listDevices()"
        description_ja: "listDevices() の非推奨エイリアス"
        description_ko: "listDevices()의 deprecated 별칭"
      - name: printDevices
        self: Serial
        return: "void"
        signatures:
          - params: ""
        description: "Log all available serial devices"
        description_ja: "利用可能なシリアルデバイスをログ出力"
        description_ko: "사용 가능한 시리얼 장치를 로그로 출력"

