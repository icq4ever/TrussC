        related:
          - isDesktop
          - setImmersiveMode
        keywords: ["phone","ios","android","tablet","handheld"]
        return: bool
        signatures:
          - params: ""
        description: "True on mobile (iOS or Android)"
        description_ja: "モバイル (iOS または Android) で true"
        description_ko: "모바일 (iOS 또는 Android)에서 true"
      - name: isDesktop
