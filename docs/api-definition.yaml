    keywords: ["polyline","shape","contour","outline","vector path","of path"]
    description: "Path/Polyline for lines and curves"
    description_ja: "線と曲線のパス/ポリライン"
    description_ko: "선과 곡선을 위한 경로/폴리라인"
    of_equivalent: "ofPath / ofPolyline"
