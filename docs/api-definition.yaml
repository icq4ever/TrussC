        description_ja: "子ノードを削除（C++のみ）"
        description_ko: "자식 노드를 제거 (C++ 전용)"

      - name: removeAllChildren
        self: Node
        related:
          - removeChild
        keywords: ["clear","remove all","children","tree"]
        return: void
        signatures:
          - params: ""
        description: "Remove all child nodes (C++ only)"
        description_ja: "すべての子ノードを削除（C++のみ）"
        description_ko: "모든 자식 노드를 제거 (C++ 전용)"

      - name: getParent
