        description_ja: "サウンドプレイヤーを作成"
        description_ko: "사운드 플레이어를 생성"

      - name: load
        self: Sound
        keywords: ["open","read","file"]
        return: "bool"
        signatures:
          - params: "const string& path"
        description: "Load sound file. Format auto-detected by extension: .wav .mp3 .ogg .flac .aac .m4a"
        description_ja: "サウンドファイルを読み込む。拡張子で自動判別: .wav .mp3 .ogg .flac .aac .m4a"
        description_ko: "사운드 파일을 로드. 확장자로 자동 판별: .wav .mp3 .ogg .flac .aac .m4a"

      - name: loadStream
        self: Sound
        related:
          - isStreaming
        keywords: ["streaming","disk","memory","long","music","buffer"]
        platforms: [windows, macos, linux, ios, android]
        platformNote: "Streaming audio (Sound::loadStream / SoundStream). On wasm it is unsupported (needs std::thread + on-disk file I/O, neither available in the default browser build); Sound::loadStream() logs a warning and silently falls back to eager load(). So you always get a Sound, but it is never actually streamed on web — branch on isStreaming() / __EMSCRIPTEN__ if it matters."
        platformNote_ja: "ストリーミング再生 (Sound::loadStream / SoundStream)。wasm では非対応 (std::thread + ディスクI/O が必要、ブラウザの既定ビルドにはどちらも無い)。Sound::loadStream() は警告を出して eager load() に静かにフォールバックする。Sound 自体は得られるが web では決してストリームされない — 必要なら isStreaming() / __EMSCRIPTEN__ で分岐する。"
        return: "bool"
        signatures:
          - params: "const string& path, int maxPolyphony = 1"
        description: "Stream sound from disk (WAV/MP3/FLAC). Best for long files; cuts memory. maxPolyphony = simultaneous play() count."
        description_ja: "ディスクからストリーミング再生 (WAV/MP3/FLAC)。長尺ファイル向け、メモリ節約。maxPolyphony は同時再生数"
        description_ko: "디스크에서 스트리밍 재생 (WAV/MP3/FLAC). 긴 파일 적합, 메모리 절약. maxPolyphony는 동시 재생 수"

      - name: isStreaming
        self: Sound
        const: true
        keywords: ["streaming","stream","mode","check"]
        return: "bool"
        signatures:
          - params: ""
        description: "True if this Sound was loaded via loadStream() (vs eager load())"
        description_ja: "loadStream() で読み込んでいれば true"
        description_ko: "loadStream()으로 로드되었으면 true"

      - name: play
        self: Sound
        related:
          - createSound
          - ChipSoundNote
        keywords: ["start","resume","go","playback"]
        return: "void"
        signatures:
          - params: ""
        description: "Play sound"
        description_ja: "再生"
        description_ko: "사운드 재생"

      - name: stop
        self: Sound
        keywords: ["halt","end","reset","rewind"]
        return: "void"
        signatures:
          - params: ""
        description: "Stop sound"
        description_ja: "停止"
        description_ko: "사운드 정지"

      - name: pause
        self: Sound
        related:
          - Tween
        keywords: ["hold","suspend","freeze"]
        return: "void"
        signatures:
          - params: ""
        description: "Pause playback (resume() to continue)"
        description_ja: "再生を一時停止 (resume() で再開)"
        description_ko: "재생을 일시 정지 (resume()로 재개)"

      - name: resume
        self: Sound
        related:
          - Tween
        keywords: ["continue","unpause","restart"]
        return: "void"
        signatures:
          - params: ""
        description: "Resume paused playback"
        description_ja: "一時停止していた再生を再開"
        description_ko: "일시 정지된 재생을 재개"

      - name: isPlaying
        self: Sound
        const: true
        keywords: ["playing","active","running","status"]
        return: "bool"
        signatures:
          - params: ""
        description: "True while playing (false if stopped, paused, or never played)"
        description_ja: "再生中なら true (停止/一時停止/未再生なら false)"
        description_ko: "재생 중이면 true (정지/일시정지/미재생이면 false)"

      - name: isPaused
        self: Sound
        const: true
        keywords: ["paused","frozen","held","status"]
        return: "bool"
        signatures:
          - params: ""
        description: "True while paused"
        description_ja: "一時停止中なら true"
        description_ko: "일시 정지 중이면 true"

      - name: isLoaded
        self: Sound
        const: true
        keywords: ["ready","loaded","available","valid"]
        return: "bool"
        signatures:
          - params: ""
        description: "True after a successful load() / loadStream() / loadTestTone()"
        description_ja: "load() / loadStream() / loadTestTone() に成功していれば true"
        description_ko: "load() / loadStream() / loadTestTone()이 성공했으면 true"

      - name: getPosition
        self: Sound
        const: true
        related:
          - setPosition
        keywords: ["progress","playhead","normalized","seek"]
        return: "float"
        signatures:
          - params: ""
        description: "Get current playback position in seconds"
        description_ja: "現在の再生位置を秒で取得"
        description_ko: "현재 재생 위치를 초로 가져옴"

      - name: setPosition
        self: Sound
        related:
          - getPosition
        keywords: ["seek","jump","scrub","playhead","normalized"]
        return: "void"
        signatures:
          - params: "float seconds"
        description: "Seek to a specific time in seconds. On streams, costs ~10 ms blackout while the ring refills."
        description_ja: "指定秒数にシーク。ストリームでは ring 補充に ~10ms 無音"
        description_ko: "지정 시간(초)으로 시크. 스트림은 링 재충전에 ~10ms 무음"

      - name: getDuration
        self: Sound
        const: true
        keywords: ["length","total time","seconds","runtime"]
        return: "float"
        signatures:
          - params: ""
        description: "Get total duration of the loaded sound in seconds"
        description_ja: "読み込まれたサウンドの全体長を秒で取得"
        description_ko: "로드된 사운드의 전체 길이를 초로 가져옴"

      - name: setVolume
        self: Sound
        related:
          - getVolume
        keywords: ["audio","loudness","gain","level"]
        return: "void"
        signatures:
          - params: "float vol"
        description: "Set volume (0.0-1.0)"
        description_ja: "音量を設定"
        description_ko: "음량을 설정 (0.0-1.0)"

      - name: getVolume
        self: Sound
        const: true
        related:
          - setVolume
        keywords: ["audio","loudness","gain","level"]
        return: "float"
        signatures:
          - params: ""
        description: "Get current volume"
        description_ja: "現在の音量を取得"
        description_ko: "현재 음량을 가져옴"

      - name: setPan
        self: Sound
        related:
          - getPan
          - setPanSensitivity
        keywords: ["stereo","balance","left right","audio"]
        return: "void"
        signatures:
          - params: "float pan"
        description: "Set stereo balance (-1.0 left ~ 0 center ~ +1.0 right). On multi-ch devices only affects ch0/ch1."
        description_ja: "ステレオバランス (-1.0=L, 0=中央, +1.0=R) を設定。多 ch デバイスでは ch0/ch1 のみに作用"
        description_ko: "스테레오 밸런스 (-1.0=좌, 0=중앙, +1.0=우) 설정. 다채널 장치는 ch0/ch1만 적용"

      - name: getPan
        self: Sound
        const: true
        related:
          - setPan
        keywords: ["stereo","balance","left right","audio"]
        return: "float"
        signatures:
          - params: ""
        description: "Get current pan value"
        description_ja: "現在の pan を取得"
        description_ko: "현재 pan을 가져옴"

      - name: setSpeed
        self: Sound
        related:
          - getSpeed
        keywords: ["rate","tempo","fast","slow","playback rate"]
        return: "void"
        signatures:
          - params: "float speed"
        description: "Playback speed [-10, 10]. Negative = reverse (eager only). Streams clamp to [0, 10]. 0 = freeze."
        description_ja: "再生速度 [-10, 10]。負=逆再生 (eager のみ)。stream は [0, 10] にクランプ。0=フリーズ"
        description_ko: "재생 속도 [-10, 10]. 음수=역재생 (eager만). 스트림은 [0, 10]으로 클램프. 0=프리즈"

      - name: getSpeed
        self: Sound
        const: true
        related:
          - setSpeed
        keywords: ["rate","tempo","playback rate"]
        return: "float"
        signatures:
          - params: ""
        description: "Get current playback speed"
        description_ja: "現在の再生速度を取得"
        description_ko: "현재 재생 속도를 가져옴"

      - name: setLoop
        self: Sound
        keywords: ["repeat","loop","cycle"]
        return: "void"
        signatures:
          - params: "bool loop"
        description: "Enable/disable looping"
        description_ja: "ループ再生を設定"
        description_ko: "반복 재생을 활성/비활성"

      - name: isLoop
        self: Sound
        const: true
        keywords: ["repeat","loop","cycle"]
        return: "bool"
        signatures:
          - params: ""
        description: "True if looping is enabled"
        description_ja: "ループ再生が有効なら true"
        description_ko: "반복 재생이 활성화되어 있으면 true"

      - name: setMixMode
        self: Sound
        related:
          - MixMode
          - setChannelMap
          - getChannels
        keywords: ["routing","downmix","mono","channel","mapping"]
        return: "void"
        signatures:
          - params: "MixMode m"
        description: "Channel routing preset. Auto (default) = mono broadcasts / multi 1:1. DownmixMono = average src to all out ch."
        description_ja: "チャンネルルーティング preset。Auto (デフォ)=mono は broadcast / multi は 1:1、DownmixMono=全 src を平均して全 out ch に同じ音"
        description_ko: "채널 라우팅 프리셋. Auto=mono는 broadcast / multi는 1:1, DownmixMono=모든 소스를 평균하여 모든 출력 채널로"

      - name: setChannelMap
        self: Sound
        related:
          - setChannelGains
          - getChannels
        keywords: ["routing","channel","output","mapping","surround"]
        return: "void"
        signatures:
          - params: "const vector<int>& map"
          - params: "vector<vector<int>> map"
        description: "Per-output-channel routing. 1D: each entry is a src ch index (-1 = silent). 2D: each entry lists src ch indices that sum into that output."
        description_ja: "出力 ch ごとのルーティング。1D 版は各要素が src ch index (-1=無音)、2D 版は各要素が sum 対象の src ch リスト"
        description_ko: "출력 채널별 라우팅. 1D는 각 항목이 src ch 인덱스 (-1=무음), 2D는 각 항목이 합산할 src ch 리스트"

      - name: setChannelGains
        self: Sound
        related:
          - setChannelMap
        keywords: ["channel","gain","volume","level","per channel"]
        return: "void"
        signatures:
          - params: "const vector<float>& gains"
        description: "Per-output-channel gain multiplier. Entries beyond .size() default to 1.0. No internal normalization (setVolume is the overall gain)."
        description_ja: "出力 ch ごとのゲイン倍率。.size() を超える ch は 1.0、内部正規化なし (setVolume が全体ゲイン)"
        description_ko: "출력 채널별 게인 배율. .size()를 넘는 채널은 1.0, 내부 정규화 없음 (setVolume이 전체 게인)"

      - name: clearChannelMap
        self: Sound
        keywords: ["reset","routing","channel","mapping","default"]
        return: "void"
        signatures:
          - params: ""
        description: "Clear the explicit channel map; routing falls back to setMixMode rules."
        description_ja: "ChannelMap を解除して MixMode ルールに戻す"
        description_ko: "채널 맵을 해제하고 MixMode 규칙으로 복귀"

      - name: clearChannelGains
        self: Sound
        keywords: ["reset","channel","gain","uniform","default"]
        return: "void"
        signatures:
          - params: ""
        description: "Clear per-channel gains (back to uniform 1.0)."
        description_ja: "ChannelGains を解除して uniform 1.0 に戻す"
        description_ko: "채널 게인을 해제하고 uniform 1.0으로 복귀"

  # ==========================================================================
  # AudioEngine
  # ==========================================================================
# Paste under category id "sound" -> functions:
      - name: setBeepVolume
        related:
          - getBeepVolume
          - beep
        keywords: ["beep","loudness","gain","level","alert"]
        return: "void"
        signatures:
          - params: "float vol"
        description: "Set the output volume for beep() (0.0-1.0)."
        description_ja: "beep()の出力音量を設定(0.0-1.0)"
        description_ko: "beep()의 출력 볼륨을 설정(0.0-1.0)"

      - name: getBeepVolume
        related:
          - setBeepVolume
          - beep
        keywords: ["beep","loudness","gain","level"]
        return: "float"
        signatures:
          - params: ""
        description: "Get the current beep() output volume (0.0-1.0)."
        description_ja: "現在のbeep()出力音量を取得(0.0-1.0)"
        description_ko: "현재 beep() 출력 볼륨을 얻음(0.0-1.0)"
  - id: audioengine
    name: "AudioEngine"
    name_ja: "オーディオエンジン"
    name_ko: "오디오 엔진"
    functions:
      - name: init
        self: AudioEngine
        related:
          - AudioSettings
          - audioDeviceChanged
          - listDevices
          - getSampleRate
        keywords: ["initialize","start","open","device","setup"]
        return: "bool"
        signatures:
          - params: ""
          - params: "const AudioSettings& settings"
        description: "Initialize / re-initialize audio engine. Re-entrant: calling on a running engine stops the device, migrates active voices to new settings, restarts. ~30-100 ms gap; voices keep playback position."
        description_ja: "オーディオエンジンを初期化 / 再初期化。再 init で active な voice を移行しつつデバイス再起動 (~30-100ms 無音)"
        description_ko: "오디오 엔진 초기화 / 재초기화. 재 init 시 활성 voice를 이전하며 장치 재시작 (~30-100ms 무음)"

      - name: shutdown
        self: AudioEngine
        related:
          - shutdownAudio
        keywords: ["close","stop","release","device","deinit"]
        return: "void"
        signatures:
          - params: ""
        description: "Shut down the audio device. Usually called automatically at program exit."
        description_ja: "オーディオデバイスを停止。通常はプログラム終了時に自動呼出"
        description_ko: "오디오 장치를 종료. 일반적으로 프로그램 종료 시 자동 호출"

      - name: getSampleRate
        self: AudioEngine
        const: true
        keywords: ["samplerate","hz","frequency","khz","rate"]
        return: "int"
        signatures:
          - params: ""
        description: "Current engine sample rate (Hz). Returns default (48000) if not yet initialized."
        description_ja: "現在のエンジン sample rate (Hz)。未 init なら default (48000)"
        description_ko: "현재 엔진 sample rate (Hz). 미 init이면 default (48000)"

      - name: getChannels
        self: AudioEngine
        const: true
        keywords: ["channels","stereo","mono","count","output"]
        return: "int"
        signatures:
          - params: ""
        description: "Current engine output channel count"
        description_ja: "現在のエンジン出力 ch 数"
        description_ko: "현재 엔진 출력 채널 수"

      - name: getMaxPolyphony
        self: AudioEngine
        const: true
        keywords: ["polyphony","voices","simultaneous","max","concurrent"]
        return: "int"
        signatures:
          - params: ""
        description: "Max simultaneously-playing Sound voices"
        description_ja: "同時再生可能な Sound voice 数"
        description_ko: "동시 재생 가능한 Sound voice 수"

      - name: getBufferSize
        self: AudioEngine
        const: true
        keywords: ["buffer","frames","latency","block","size"]
        return: "int"
        signatures:
          - params: ""
        description: "Current device buffer size in frames (0 = miniaudio default)"
        description_ja: "現在のデバイス buffer サイズ (frames)、0 は miniaudio おまかせ"
        description_ko: "현재 장치 버퍼 크기 (frames), 0은 miniaudio 기본값"

      - name: isInitialized
        self: AudioEngine
        const: true
        keywords: ["initialized","ready","running","status"]
        return: "bool"
        signatures:
          - params: ""
        description: "True after a successful init()"
        description_ja: "init() に成功していれば true"
        description_ko: "init()이 성공했으면 true"

      - name: audioIn
        self: App
        related:
          - Event
          - AudioInBuffer
          - audioOut
          - getMicInput
          - getMicAnalysisBuffer
        keywords: ["microphone","mic","capture","input","record","callback"]
        return: void
        signatures:
          - params: "const AudioInBuffer & buf"
        description: "Real-time capture callback event (microphone input). RT-safe same as audioOut."
        description_ja: "リアルタイム入力コールバック event (マイク入力)。RT-safe 要件は audioOut と同様"
        description_ko: "실시간 캡처 콜백 이벤트 (마이크 입력). RT-safe 요건은 audioOut과 동일"

  # ==========================================================================
  # ChipSound
  # ==========================================================================
# Paste under category id "audioengine" -> functions:
      - name: initAudio
        related:
          - getInstance
          - shutdownAudio
          - audioOut
        keywords: ["initialize","start","engine","setup","open"]
        return: "void"
        signatures:
          - params: ""
        description: "Initialize the global AudioEngine. Called automatically by Sound::load() / play(), so manual use is only needed to start audio early (e.g. before an audioOut synthesis listener)."
        description_ja: "グローバルなAudioEngineを初期化。Sound::load() / play()から自動的に呼ばれるため、手動使用はオーディオを早期に開始したい場合(例: audioOut合成リスナーの前)のみ必要"
        description_ko: "전역 AudioEngine을 초기화. Sound::load() / play()에서 자동 호출되므로, 수동 사용은 오디오를 일찍 시작하려는 경우(예: audioOut 합성 리스너 이전)에만 필요"

      - name: shutdownAudio
        related:
          - initAudio
        keywords: ["close","stop","engine","release","deinit"]
        return: "void"
        signatures:
          - params: ""
        description: "Shut down the global AudioEngine and close the audio device. Usually unnecessary (runs at program exit)."
        description_ja: "グローバルなAudioEngineをシャットダウンしオーディオデバイスを閉じる。通常は不要(プログラム終了時に実行される)"
        description_ko: "전역 AudioEngine을 종료하고 오디오 장치를 닫음. 보통 불필요(프로그램 종료 시 실행됨)"

      - name: getAudioAnalysisBuffer
        related:
          - fftReal
          - fftMagnitude
          - applyWindow
        keywords: ["fft","spectrum","samples","waveform","visualization","analysis"]
        return: "size_t"
        signatures:
          - params: "float* outBuffer, size_t numSamples"
        description: "Copy the latest mixed output samples (mono, L+R average) into outBuffer for FFT / visualization. numSamples is capped at the analysis buffer size (4096). Returns the number of samples written."
        description_ja: "FFT / 可視化用に最新のミックス出力サンプル(モノ、L+R平均)をoutBufferにコピー。numSamplesは解析バッファサイズ(4096)で上限される。書き込んだサンプル数を返す"
        description_ko: "FFT / 시각화용으로 최신 믹스 출력 샘플(모노, L+R 평균)을 outBuffer에 복사. numSamples는 분석 버퍼 크기(4096)로 제한됨. 기록한 샘플 수를 반환"

      - name: getMicInput
        related:
          - MicInput
          - getMicAnalysisBuffer
          - audioIn
        keywords: ["microphone","mic","capture","input","record"]
        return: "MicInput&"
        signatures:
          - params: ""
        description: "Get the global MicInput singleton (microphone capture). Call start() on it to open the device."
        description_ja: "グローバルなMicInputシングルトン(マイク入力)を取得。start()を呼ぶとデバイスを開く"
        description_ko: "전역 MicInput 싱글턴(마이크 캡처)을 얻음. start()를 호출하면 장치를 엶"

      - name: getMicAnalysisBuffer
        related:
          - getMicInput
          - fftReal
          - fftMagnitude
        keywords: ["microphone","mic","samples","fft","waveform","analysis"]
        return: "size_t"
        signatures:
          - params: "float* outBuffer, size_t numSamples"
        description: "Copy the latest microphone input samples into outBuffer. Convenience wrapper over getMicInput().getBuffer(). numSamples is capped at the mic buffer size (4096). Returns the number of samples written."
        description_ja: "最新のマイク入力サンプルをoutBufferにコピー。getMicInput().getBuffer()の便利ラッパー。numSamplesはマイクバッファサイズ(4096)で上限される。書き込んだサンプル数を返す"
        description_ko: "최신 마이크 입력 샘플을 outBuffer에 복사. getMicInput().getBuffer()의 편의 래퍼. numSamples는 마이크 버퍼 크기(4096)로 제한됨. 기록한 샘플 수를 반환"
  - id: chipsound
    name: "ChipSound"
    name_ja: "チップサウンド"
    name_ko: "칩사운드"
    functions:
