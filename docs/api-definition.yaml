        return: void
        signatures:
          - params: "float radius, int resolution = 16"
          - params: "float x, float y, float z, float radius, int resolution = 16"
          - params: "Vec3 pos, float radius, int resolution = 16"
        description: "Draw 3D sphere (respects fill/noFill)"
        description_ja: "3D球体を描画（fill/noFillに対応）"
        description_ko: "3D 구 그리기 (fill/noFill 적용됨)"
