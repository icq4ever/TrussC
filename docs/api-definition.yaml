      - name: loadDialog
        related:
          - FileDialogResult
          - loadDialogAsync
          - saveDialog
          - loadTextFile
        keywords: ["open","file","picker","browse","dialog","chooser"]
        platforms: [macos, windows, linux]
        platformNote: "Sync file/folder open. iOS no-ops (use loadDialogAsync); Android returns empty result (no JNI Intent yet); Web/WASM logs a warning and returns empty."
        platformNote_ja: "同期のファイル/フォルダ選択。iOS はスタブ（loadDialogAsync を使う）、Android は空の結果を返す（JNI Intent 未実装）、Web/WASM は警告を出して空を返す。"
        return: "FileDialogResult"
        signatures:
          - params: "const string& title = \"\", const string& message = \"\", const string& defaultPath = \"\", bool folderSelection = false"
        description: "Show file open dialog. Returns FileDialogResult with filePath, fileName, success"
        description_ja: "ファイル選択ダイアログを表示。FileDialogResult（filePath, fileName, success）を返す"
        description_ko: "파일 열기 대화상자 표시. filePath, fileName, success가 담긴 FileDialogResult 반환"
        of_equivalent: "ofSystemLoadDialog"

      - name: saveDialog
        related:
          - FileDialogResult
          - saveDialogAsync
          - loadDialog
          - saveTextFile
        keywords: ["save","file","picker","browse","dialog","export"]
        platforms: [macos, windows, linux]
        platformNote: "Sync file save. iOS no-ops (use saveDialogAsync); Android returns empty result (no JNI Intent yet); Web/WASM logs a warning and returns empty."
        platformNote_ja: "同期のファイル保存。iOS はスタブ（saveDialogAsync を使う）、Android は空の結果を返す（JNI Intent 未実装）、Web/WASM は警告を出して空を返す。"
        return: "FileDialogResult"
