    keywords: ["json","data","parse","object","nlohmann","serialize"]
    description: "Alias for nlohmann::json (using Json = nlohmann::json). Used as the in-memory JSON value type by loadJson, saveJson, parseJson and toJsonString. See the nlohmann/json documentation for its full API."
    description_ja: "nlohmann::json のエイリアス（using Json = nlohmann::json）。loadJson、saveJson、parseJson、toJsonString がインメモリのJSON値型として使用する。完全なAPIは nlohmann/json のドキュメントを参照"
    description_ko: "nlohmann::json의 별칭(using Json = nlohmann::json). loadJson, saveJson, parseJson, toJsonString가 인메모리 JSON 값 타입으로 사용. 전체 API는 nlohmann/json 문서 참조"
  - name: Xml
    related:
      - parseXml
      - loadXml
      - XmlNode
      - Json
    keywords: ["xml","document","parse","pugixml","markup"]
    description: "XML document wrapper around pugixml. Loads, saves and queries XML; node-level access is via XmlNode returned from root() and child()."
    description_ja: "pugixml をラップしたXMLドキュメント。XMLの読み込み・保存・問い合わせを行う。ノード単位のアクセスは root() と child() が返す XmlNode 経由"
    description_ko: "pugixml을 감싼 XML 문서. XML 로드, 저장, 질의 수행. 노드 단위 접근은 root()와 child()가 반환하는 XmlNode를 통함"
    constructor:
      signatures:
        - params: ""
    methods:
      - name: load
        self: Xml
        return: "bool"
        signatures:
          - params: "const string& path"
        description: "Load an XML document from a file. Relative paths are resolved via getDataPath. Returns true on success."
        description_ja: "ファイルからXMLドキュメントを読み込む。相対パスは getDataPath で解決される。成功時に true を返す"
        description_ko: "파일에서 XML 문서를 로드. 상대 경로는 getDataPath로 해석됨. 성공 시 true 반환"
      - name: parse
        self: Xml
        return: "bool"
        signatures:
          - params: "const string& str"
        description: "Parse an XML document from a string. Returns true on success."
        description_ja: "文字列からXMLドキュメントをパースする。成功時に true を返す"
        description_ko: "문자열에서 XML 문서를 파싱. 성공 시 true 반환"
      - name: save
        self: Xml
        const: true
        return: "bool"
        signatures:
          - params: "const string& path, const string& indent = \"  \""
        description: "Save the document to a file. Relative paths are resolved via getDataPath. indent sets the per-level indentation string. Returns true on success."
        description_ja: "ドキュメントをファイルに保存する。相対パスは getDataPath で解決される。indent は各レベルのインデント文字列を設定する。成功時に true を返す"
        description_ko: "문서를 파일에 저장. 상대 경로는 getDataPath로 해석됨. indent는 레벨별 들여쓰기 문자열을 설정. 성공 시 true 반환"
      - name: toString
        self: Xml
        const: true
        return: "string"
        signatures:
          - params: "const string& indent = \"  \""
        description: "Serialize the document to an XML string. indent sets the per-level indentation string."
        description_ja: "ドキュメントをXML文字列にシリアライズする。indent は各レベルのインデント文字列を設定する"
        description_ko: "문서를 XML 문자열로 직렬화. indent는 레벨별 들여쓰기 문자열을 설정"
      - name: root
        self: Xml
        return: "XmlNode"
        signatures:
          - params: ""
        description: "Get the document's root element node."
        description_ja: "ドキュメントのルート要素ノードを取得"
        description_ko: "문서의 루트 요소 노드를 얻음"
      - name: addRoot
        self: Xml
        return: "XmlNode"
        signatures:
          - params: "const string& name"
        description: "Append a new root element with the given name and return it."
        description_ja: "指定した名前で新しいルート要素を追加して返す"
        description_ko: "지정한 이름으로 새 루트 요소를 추가하고 반환"
      - name: child
        self: Xml
        return: "XmlNode"
        signatures:
          - params: "const string& name"
        description: "Find a direct child node of the document by name."
        description_ja: "名前でドキュメントの直接の子ノードを検索"
        description_ko: "이름으로 문서의 직접 자식 노드를 찾음"
      - name: document
        self: Xml
        return: "XmlDocument&"
        signatures:
          - params: ""
        description: "Access the underlying pugixml document for advanced operations."
        description_ja: "高度な操作のために内部の pugixml ドキュメントへアクセス"
        description_ko: "고급 작업을 위해 내부 pugixml 문서에 접근"
      - name: empty
        self: Xml
        const: true
        return: "bool"
        signatures:
          - params: ""
        description: "Return true if the document has no content."
        description_ja: "ドキュメントに内容がなければ true を返す"
        description_ko: "문서에 내용이 없으면 true 반환"
      - name: addDeclaration
        self: Xml
        return: "void"
        signatures:
          - params: "const string& version = \"1.0\", const string& encoding = \"UTF-8\""
        description: "Prepend an XML declaration (<?xml ...?>) with the given version and encoding."
        description_ja: "指定したバージョンとエンコーディングでXML宣言（<?xml ...?>）を先頭に追加"
        description_ko: "지정한 버전과 인코딩으로 XML 선언(<?xml ...?>)을 맨 앞에 추가"
  - name: XmlDocument
    related:
      - Xml
      - XmlNode
    keywords: ["xml","document","pugixml","root","tree"]
    description: "Alias for pugi::xml_document. The owning XML document type underlying the Xml wrapper; see the pugixml documentation for its full API."
    description_ja: "pugi::xml_document のエイリアス。Xml ラッパーの基盤となる、所有権を持つXMLドキュメント型。完全なAPIは pugixml のドキュメントを参照"
    description_ko: "pugi::xml_document의 별칭. Xml 래퍼의 기반이 되는 소유 XML 문서 타입. 전체 API는 pugixml 문서 참조"
  - name: XmlNode
    related:
      - Xml
      - XmlAttribute
      - XmlDocument
    keywords: ["xml","node","element","pugixml","tag"]
    description: "Alias for pugi::xml_node. A single element/node within an XML document, returned by Xml::root() and Xml::child(); see the pugixml documentation for node query and manipulation methods."
    description_ja: "pugi::xml_node のエイリアス。XMLドキュメント内の単一の要素/ノードで、Xml::root() と Xml::child() が返す。ノードの問い合わせ・操作メソッドは pugixml のドキュメントを参照"
    description_ko: "pugi::xml_node의 별칭. XML 문서 내 단일 요소/노드로, Xml::root()와 Xml::child()가 반환. 노드 질의 및 조작 메서드는 pugixml 문서 참조"
  - name: XmlAttribute
    related:
      - XmlNode
      - Xml
    keywords: ["xml","attribute","property","pugixml","name value"]
    description: "Alias for pugi::xml_attribute. A name/value attribute on an XmlNode; see the pugixml documentation for its API."
    description_ja: "pugi::xml_attribute のエイリアス。XmlNode 上の名前/値の属性。APIは pugixml のドキュメントを参照"
    description_ko: "pugi::xml_attribute의 별칭. XmlNode의 이름/값 속성. API는 pugixml 문서 참조"
  - name: XmlParseResult
    related:
      - Xml
      - parseXml
    keywords: ["xml","parse","result","error","status"]
    description: "Alias for pugi::xml_parse_result. Result of an XML parse operation, carrying success status, error description and offset."
    description_ja: "pugi::xml_parse_result のエイリアス。XMLパース操作の結果で、成功ステータス・エラー説明・オフセットを保持する"
    description_ko: "pugi::xml_parse_result의 별칭. XML 파싱 작업의 결과로, 성공 상태, 오류 설명, 오프셋을 담음"

  - name: Mod
    related:
      - Node
      - LayoutMod
      - TweenMod
      - addChild
    keywords: ["component","behavior","module","addmod","attach","plugin"]
    description: "Attachable behavior base class for Node. Subclass it, override the lifecycle and input hooks, and attach with node->addMod<T>(). Lifecycle: setup() on attach, then each frame earlyUpdate() -> Node::update() -> update() -> draw(), and onDestroy() on removal. Override isExclusive() to allow only one instance per Node, and canAttachTo() to restrict attachment."
    description_ja: "Node にアタッチできる振る舞いの基底クラス。サブクラス化してライフサイクルと入力フックをオーバーライドし、node->addMod<T>() でアタッチする。ライフサイクル: アタッチ時に setup()、以降毎フレーム earlyUpdate() -> Node::update() -> update() -> draw()、削除時に onDestroy()。isExclusive() をオーバーライドすると Node ごとに1インスタンスのみ許可、canAttachTo() でアタッチ先を制限できる"
    description_ko: "Node에 부착 가능한 동작 기반 클래스. 서브클래싱하여 라이프사이클과 입력 훅을 오버라이드하고 node->addMod<T>()로 부착. 라이프사이클: 부착 시 setup(), 이후 매 프레임 earlyUpdate() -> Node::update() -> update() -> draw(), 제거 시 onDestroy(). isExclusive()를 오버라이드하면 Node당 한 인스턴스만 허용, canAttachTo()로 부착 대상을 제한"
    methods:
      - name: getOwner
        self: Mod
        return: "Node*"
        signatures:
          - params: ""
        description: "Get the owner Node this Mod is attached to."
        description_ja: "この Mod がアタッチされている所有 Node を取得"
        description_ko: "이 Mod가 부착된 소유 Node를 얻음"
      - name: removeSelf
        self: Mod
        return: "void"
        signatures:
          - params: ""
        description: "Remove this Mod from its owner (no need to name its own type). Safe to call from inside the Mod's own update/draw/event handler; destruction is deferred until the current dispatch finishes. (protected)"
        description_ja: "この Mod を所有者から削除する（自身の型名を指定する必要はない）。Mod 自身の update/draw/イベントハンドラ内から呼んでも安全で、破棄は現在のディスパッチ完了まで遅延される。（protected）"
        description_ko: "이 Mod를 소유자에서 제거(자신의 타입명을 지정할 필요 없음). Mod 자신의 update/draw/이벤트 핸들러 내부에서 호출해도 안전하며, 파괴는 현재 디스패치가 끝날 때까지 지연됨. (protected)"
      - name: setup
        self: Mod
        return: "void"
        signatures:
          - params: ""
        description: "Override: called once when the Mod is attached to the Node. (protected, virtual)"
        description_ja: "オーバーライド: Mod が Node にアタッチされたときに一度だけ呼ばれる。（protected, virtual）"
        description_ko: "오버라이드: Mod가 Node에 부착될 때 한 번 호출됨. (protected, virtual)"
      - name: earlyUpdate
        self: Mod
        return: "void"
        signatures:
          - params: ""
        description: "Override: called every frame BEFORE Node::update(). Use for applying transforms, tweens, physics. (protected, virtual)"
        description_ja: "オーバーライド: 毎フレーム Node::update() の前に呼ばれる。トランスフォーム・トゥイーン・物理の適用に使う。（protected, virtual）"
        description_ko: "오버라이드: 매 프레임 Node::update() 전에 호출됨. 트랜스폼, 트윈, 물리 적용에 사용. (protected, virtual)"
      - name: update
        self: Mod
        return: "void"
        signatures:
          - params: ""
        description: "Override: called every frame AFTER Node::update(). Use for reactions to node state changes. (protected, virtual)"
        description_ja: "オーバーライド: 毎フレーム Node::update() の後に呼ばれる。ノードの状態変化への反応に使う。（protected, virtual）"
        description_ko: "오버라이드: 매 프레임 Node::update() 후에 호출됨. 노드 상태 변화에 대한 반응에 사용. (protected, virtual)"
      - name: draw
        self: Mod
        return: "void"
        signatures:
          - params: ""
        description: "Override: called during the draw phase, after Node::draw(). (protected, virtual)"
        description_ja: "オーバーライド: 描画フェーズ中、Node::draw() の後に呼ばれる。（protected, virtual）"
        description_ko: "오버라이드: 그리기 단계 중 Node::draw() 후에 호출됨. (protected, virtual)"
      - name: onDestroy
        self: Mod
        return: "void"
        signatures:
          - params: ""
        description: "Override: called when the Mod is removed or the Node is destroyed. (protected, virtual)"
        description_ja: "オーバーライド: Mod が削除されたか Node が破棄されたときに呼ばれる。（protected, virtual）"
        description_ko: "오버라이드: Mod가 제거되거나 Node가 파괴될 때 호출됨. (protected, virtual)"
      - name: onMousePress
        self: Mod
        return: "bool"
        signatures:
          - params: "const MouseEventArgs& e"
        description: "Override: mouse press on the hit node. Return true to consume the event (counts as the node consuming it). (protected, virtual)"
        description_ja: "オーバーライド: ヒットしたノード上でのマウス押下。イベントを消費するには true を返す（ノードが消費したものとして扱われる）。（protected, virtual）"
        description_ko: "오버라이드: 히트된 노드에서의 마우스 누름. 이벤트를 소비하려면 true 반환(노드가 소비한 것으로 간주). (protected, virtual)"
      - name: onMouseRelease
        self: Mod
        return: "bool"
        signatures:
          - params: "const MouseEventArgs& e"
        description: "Override: mouse release on the hit node. Return true to consume. (protected, virtual)"
        description_ja: "オーバーライド: ヒットしたノード上でのマウス解放。消費するには true を返す。（protected, virtual）"
        description_ko: "오버라이드: 히트된 노드에서의 마우스 놓음. 소비하려면 true 반환. (protected, virtual)"
      - name: onMouseMove
        self: Mod
        return: "bool"
        signatures:
          - params: "const MouseMoveEventArgs& e"
        description: "Override: mouse move over the hit node. Return true to consume. (protected, virtual)"
        description_ja: "オーバーライド: ヒットしたノード上でのマウス移動。消費するには true を返す。（protected, virtual）"
        description_ko: "오버라이드: 히트된 노드 위에서의 마우스 이동. 소비하려면 true 반환. (protected, virtual)"
      - name: onMouseDrag
        self: Mod
        return: "bool"
        signatures:
          - params: "const MouseDragEventArgs& e"
        description: "Override: mouse drag on the hit node. Return true to consume. (protected, virtual)"
        description_ja: "オーバーライド: ヒットしたノード上でのマウスドラッグ。消費するには true を返す。（protected, virtual）"
        description_ko: "오버라이드: 히트된 노드에서의 마우스 드래그. 소비하려면 true 반환. (protected, virtual)"
      - name: onMouseScroll
        self: Mod
        return: "bool"
        signatures:
          - params: "const ScrollEventArgs& e"
        description: "Override: mouse scroll over the hit node. Return true to consume. (protected, virtual)"
        description_ja: "オーバーライド: ヒットしたノード上でのマウススクロール。消費するには true を返す。（protected, virtual）"
        description_ko: "오버라이드: 히트된 노드 위에서의 마우스 스크롤. 소비하려면 true 반환. (protected, virtual)"
      - name: onKeyPress
        self: Mod
        return: "bool"
        signatures:
          - params: "const KeyEventArgs& e"
        description: "Override: key press (broadcast to mods on every node). Return true to consume. (protected, virtual)"
        description_ja: "オーバーライド: キー押下（すべてのノードの mod にブロードキャストされる）。消費するには true を返す。（protected, virtual）"
        description_ko: "오버라이드: 키 누름(모든 노드의 mod에 브로드캐스트됨). 소비하려면 true 반환. (protected, virtual)"
      - name: onKeyRelease
        self: Mod
        return: "bool"
        signatures:
          - params: "const KeyEventArgs& e"
        description: "Override: key release (broadcast to mods on every node). Return true to consume. (protected, virtual)"
        description_ja: "オーバーライド: キー解放（すべてのノードの mod にブロードキャストされる）。消費するには true を返す。（protected, virtual）"
        description_ko: "오버라이드: 키 놓음(모든 노드의 mod에 브로드캐스트됨). 소비하려면 true 반환. (protected, virtual)"
      - name: onMouseEnter
        self: Mod
        return: "void"
        signatures:
          - params: ""
        description: "Override: pointer entered the owner node. (protected, virtual)"
        description_ja: "オーバーライド: ポインタが所有ノードに入った。（protected, virtual）"
        description_ko: "오버라이드: 포인터가 소유 노드에 진입함. (protected, virtual)"
      - name: onMouseLeave
        self: Mod
        return: "void"
        signatures:
          - params: ""
        description: "Override: pointer left the owner node. (protected, virtual)"
        description_ja: "オーバーライド: ポインタが所有ノードから離れた。（protected, virtual）"
        description_ko: "오버라이드: 포인터가 소유 노드에서 벗어남. (protected, virtual)"
      - name: hitTest
        self: Mod
        return: "bool"
        signatures:
          - params: "const Ray& localRay, float& outDistance"
        description: "Override: screen-space pointer picking (NOT physics collision). Define a hit shape in the node's LOCAL space; if the node's own test OR any mod's returns true, the node is the hit. (protected, virtual)"
        description_ja: "オーバーライド: スクリーン空間のポインタピッキング（物理衝突ではない）。ノードのローカル空間でヒット形状を定義する。ノード自身のテストかいずれかの mod が true を返せば、そのノードがヒット扱いになる。（protected, virtual）"
        description_ko: "오버라이드: 화면 공간 포인터 피킹(물리 충돌이 아님). 노드의 로컬 공간에서 히트 형상을 정의. 노드 자신의 테스트나 어느 mod라도 true를 반환하면 해당 노드가 히트됨. (protected, virtual)"
      - name: isExclusive
        self: Mod
        const: true
        return: "bool"
        signatures:
          - params: ""
        description: "Override to return true if only one instance of this Mod type may be attached per Node (e.g. LayoutMod). Default false. (protected, virtual)"
        description_ja: "オーバーライド: この Mod 型を Node ごとに1インスタンスのみアタッチ可能とする場合は true を返す（例: LayoutMod）。デフォルトは false。（protected, virtual）"
        description_ko: "오버라이드: 이 Mod 타입을 Node당 한 인스턴스만 부착 가능하게 하려면 true 반환(예: LayoutMod). 기본값 false. (protected, virtual)"
      - name: canAttachTo
        self: Mod
        return: "bool"
        signatures:
          - params: "Node* node"
        description: "Override to restrict which Node types this Mod can attach to. Return false to reject attachment. Default true. (protected, virtual)"
        description_ja: "オーバーライド: この Mod がアタッチできる Node 型を制限する。アタッチを拒否するには false を返す。デフォルトは true。（protected, virtual）"
        description_ko: "오버라이드: 이 Mod가 부착 가능한 Node 타입을 제한. 부착을 거부하려면 false 반환. 기본값 true. (protected, virtual)"

  - name: RectNodeButton
    related:
      - RectNode
      - Node
      - mousePressed
    keywords: ["button","click","ui","widget","press","control"]
    description: "Simple clickable button node (a RectNode subclass). Set normalColor/hoverColor/pressColor and label; it draws a filled rect that changes color on hover/press and a centered label. Events are enabled on construction. Listen on its inherited mousePressed/mouseReleased events for clicks."
    description_ja: "シンプルなクリック可能ボタンノード（RectNode のサブクラス）。normalColor/hoverColor/pressColor と label を設定すると、ホバー/押下で色が変わる塗りつぶし矩形と中央寄せのラベルを描画する。イベントは生成時に有効化される。クリックは継承した mousePressed/mouseReleased イベントで受け取る"
    description_ko: "간단한 클릭 가능 버튼 노드(RectNode 서브클래스). normalColor/hoverColor/pressColor와 label을 설정하면 호버/누름 시 색이 바뀌는 채워진 사각형과 가운데 정렬 라벨을 그림. 이벤트는 생성 시 활성화됨. 클릭은 상속된 mousePressed/mouseReleased 이벤트로 수신"
    constructor:
      signatures:
        - params: ""
    properties:
      - name: normalColor
        self: RectNodeButton
        type: Color
        description: "Fill color when idle (default dark grey)."
        description_ja: "アイドル時の塗りつぶし色（デフォルトはダークグレー）"
        description_ko: "유휴 상태일 때의 채우기 색상(기본값 진한 회색)"
      - name: hoverColor
        self: RectNodeButton
        type: Color
        description: "Fill color when the pointer is over the button."
        description_ja: "ポインタがボタン上にあるときの塗りつぶし色"
        description_ko: "포인터가 버튼 위에 있을 때의 채우기 색상"
      - name: pressColor
        self: RectNodeButton
        type: Color
        description: "Fill color while pressed."
        description_ja: "押下中の塗りつぶし色"
        description_ko: "눌린 동안의 채우기 색상"
      - name: label
        self: RectNodeButton
        type: string
        description: "Text drawn centered on the button (skipped if empty)."
        description_ja: "ボタンに中央寄せで描画されるテキスト（空なら描画されない）"
        description_ko: "버튼에 가운데 정렬로 그려지는 텍스트(비어 있으면 그리지 않음)"
    methods:
      - name: isPressed
        self: RectNodeButton
        const: true
        return: "bool"
        signatures:
          - params: ""
        description: "Whether the button is currently pressed."
        description_ja: "ボタンが現在押されているかどうか"
        description_ko: "버튼이 현재 눌려 있는지 여부"
      - name: draw
        self: RectNodeButton
        return: "void"
        signatures:
          - params: ""
        description: "Draw the button: fills the rect with the state-dependent color and draws the centered label. (override)"
        description_ja: "ボタンを描画: 状態に応じた色で矩形を塗りつぶし、中央寄せのラベルを描画する。（override）"
        description_ko: "버튼 그리기: 상태에 따른 색으로 사각형을 채우고 가운데 정렬 라벨을 그림. (override)"

  - name: Thread
    related:
      - ThreadChannel
      - isMainThread
    keywords: ["thread","background","worker","async","concurrent","ofthread"]
    description: "Base class for background threads (ofThread compatible). Subclass it, override the protected pure-virtual threadedFunction() with a while (isThreadRunning()) { ... } loop, then control it with startThread()/stopThread()/waitForThread(). A protected mutex dataMutex_ is available for sharing data."
    description_ja: "バックグラウンドスレッドの基底クラス（ofThread 互換）。サブクラス化して protected の純粋仮想 threadedFunction() を while (isThreadRunning()) { ... } ループでオーバーライドし、startThread()/stopThread()/waitForThread() で制御する。データ共有用に protected の mutex dataMutex_ が利用できる"
    description_ko: "백그라운드 스레드의 기반 클래스(ofThread 호환). 서브클래싱하여 protected 순수 가상 threadedFunction()을 while (isThreadRunning()) { ... } 루프로 오버라이드한 뒤 startThread()/stopThread()/waitForThread()로 제어. 데이터 공유용 protected mutex dataMutex_가 제공됨"
    constructor:
      signatures:
        - params: ""
    methods:
      - name: startThread
        self: Thread
        return: "void"
        signatures:
          - params: ""
        description: "Start the background thread (runs threadedFunction). No-op if already running."
        description_ja: "バックグラウンドスレッドを開始する（threadedFunction を実行）。すでに実行中なら何もしない"
        description_ko: "백그라운드 스레드 시작(threadedFunction 실행). 이미 실행 중이면 아무것도 하지 않음"
      - name: stopThread
        self: Thread
        return: "void"
        signatures:
          - params: ""
        description: "Send the stop signal: isThreadRunning() returns false inside threadedFunction so a while-loop can exit. Does not block."
        description_ja: "停止シグナルを送る: threadedFunction 内で isThreadRunning() が false を返すようになり、while ループが抜けられる。ブロックしない"
        description_ko: "정지 신호 전송: threadedFunction 내부에서 isThreadRunning()이 false를 반환하여 while 루프가 빠져나갈 수 있음. 블로킹하지 않음"
      - name: waitForThread
        self: Thread
        return: "void"
        signatures:
          - params: "bool callStopThread = true"
        description: "Wait (join) for the thread to finish. If callStopThread is true (default), calls stopThread() first."
        description_ja: "スレッドの終了を待つ（join）。callStopThread が true（デフォルト）なら先に stopThread() を呼ぶ"
        description_ko: "스레드 종료를 대기(join). callStopThread가 true(기본값)이면 먼저 stopThread()를 호출"
      - name: isThreadRunning
        self: Thread
        const: true
        return: "bool"
        signatures:
          - params: ""
        description: "Whether the thread is currently running."
        description_ja: "スレッドが現在実行中かどうか"
        description_ko: "스레드가 현재 실행 중인지 여부"
      - name: getThreadId
        self: Thread
        const: true
        return: "thread::id"
        signatures:
          - params: ""
        description: "Get the underlying thread's ID."
        description_ja: "内部スレッドのIDを取得"
        description_ko: "내부 스레드의 ID를 얻음"
      - name: threadedFunction
        self: Thread
        return: "void"
        signatures:
          - params: ""
        description: "Override this with the work to run on the thread; recommended pattern is while (isThreadRunning()) { ... }. (protected, pure virtual)"
        description_ja: "スレッド上で実行する処理でこれをオーバーライドする。推奨パターンは while (isThreadRunning()) { ... }。（protected, pure virtual）"
        description_ko: "스레드에서 실행할 작업으로 이를 오버라이드. 권장 패턴은 while (isThreadRunning()) { ... }. (protected, pure virtual)"
    static_methods:
      - name: sleep
        self: Thread
        return: "void"
        signatures:
          - params: "unsigned long milliseconds"
        description: "Pause the current thread for the given number of milliseconds."
        description_ja: "現在のスレッドを指定したミリ秒数だけ一時停止する"
        description_ko: "현재 스레드를 지정한 밀리초만큼 일시 정지"
      - name: yield
        self: Thread
        return: "void"
        signatures:
          - params: ""
        description: "Yield execution to other threads."
        description_ja: "実行を他のスレッドに譲る"
        description_ko: "실행을 다른 스레드에 양보"
      - name: isCurrentThreadTheMainThread
        self: Thread
        return: "bool"
        signatures:
          - params: ""
        description: "Whether the current thread is the main thread. The main thread ID must be recorded first (call getMainThreadId() from the main thread)."
        description_ja: "現在のスレッドがメインスレッドかどうか。先にメインスレッドIDを記録しておく必要がある（メインスレッドから getMainThreadId() を呼ぶ）"
        description_ko: "현재 스레드가 메인 스레드인지 여부. 먼저 메인 스레드 ID를 기록해 두어야 함(메인 스레드에서 getMainThreadId() 호출)"
      - name: getMainThreadId
        self: Thread
        return: "thread::id"
        signatures:
          - params: ""
        description: "Get the main thread ID, recording the current thread's ID on the first call."
        description_ja: "メインスレッドIDを取得する。初回呼び出し時に現在のスレッドのIDを記録する"
        description_ko: "메인 스레드 ID를 얻음. 첫 호출 시 현재 스레드의 ID를 기록"

  - name: ThreadChannel
    related:
      - Thread
    keywords: ["thread","queue","channel","fifo","producer consumer","pipe"]
    description: "Thread-safe FIFO queue for one-way inter-thread communication (ofThreadChannel compatible), template<typename T>. Producer-Consumer pattern: a worker thread send()s values and another thread receive()s them. Use two channels for bidirectional communication."
    description_ja: "スレッド間の一方向通信用のスレッドセーフなFIFOキュー（ofThreadChannel 互換）、template<typename T>。Producer-Consumer パターン: ワーカースレッドが値を send() し、別のスレッドが receive() する。双方向通信には2つのチャンネルを使う"
    description_ko: "스레드 간 단방향 통신용 스레드 안전 FIFO 큐(ofThreadChannel 호환), template<typename T>. Producer-Consumer 패턴: 워커 스레드가 값을 send()하고 다른 스레드가 receive()함. 양방향 통신에는 채널 두 개를 사용"
    constructor:
      signatures:
        - params: ""
    methods:
      - name: send
        self: ThreadChannel
        return: "bool"
        signatures:
          - params: "const T& value"
          - params: "T&& value"
        description: "Send a value onto the queue (copy or move overload). Returns false if the channel is closed (with the move overload the value is invalidated even on failure)."
        description_ja: "キューに値を送る（コピー版またはムーブ版オーバーロード）。チャンネルが閉じていれば false を返す（ムーブ版では失敗時でも値は無効化される）"
        description_ko: "큐에 값을 보냄(복사 또는 이동 오버로드). 채널이 닫혀 있으면 false 반환(이동 오버로드에서는 실패 시에도 값이 무효화됨)"
      - name: receive
        self: ThreadChannel
        return: "bool"
        signatures:
          - params: "T& value"
        description: "Receive a value (blocking): waits until data arrives, writing it into value. Returns false if the channel is closed."
        description_ja: "値を受け取る（ブロッキング）: データが到着するまで待ち、value に書き込む。チャンネルが閉じていれば false を返す"
        description_ko: "값을 받음(블로킹): 데이터가 도착할 때까지 대기하여 value에 씀. 채널이 닫혀 있으면 false 반환"
      - name: tryReceive
        self: ThreadChannel
        return: "bool"
        signatures:
          - params: "T& value"
          - params: "T& value, int64_t timeoutMs"
        description: "Receive a value without blocking, or waiting at most timeoutMs milliseconds (timeout overload). Returns false immediately/after the timeout if no data."
        description_ja: "ブロックせずに値を受け取る、または最大 timeoutMs ミリ秒だけ待つ（タイムアウト版オーバーロード）。データがなければ即座に／タイムアウト後に false を返す"
        description_ko: "블로킹 없이 값을 받거나 최대 timeoutMs 밀리초만 대기(타임아웃 오버로드). 데이터가 없으면 즉시/타임아웃 후 false 반환"
      - name: close
        self: ThreadChannel
        return: "void"
        signatures:
          - params: ""
        description: "Close the channel, waking all waiting threads. After closing, send/receive return false."
        description_ja: "チャンネルを閉じ、待機中のすべてのスレッドを起こす。閉じた後は send/receive が false を返す"
        description_ko: "채널을 닫고 대기 중인 모든 스레드를 깨움. 닫은 후에는 send/receive가 false 반환"
      - name: clear
        self: ThreadChannel
        return: "void"
        signatures:
          - params: ""
        description: "Clear the queue, discarding all pending values."
        description_ja: "キューをクリアし、保留中のすべての値を破棄する"
        description_ko: "큐를 비우고 대기 중인 모든 값을 폐기"
      - name: empty
        self: ThreadChannel
        return: "bool"
        signatures:
          - params: ""
        description: "Whether the queue is empty (approximate)."
        description_ja: "キューが空かどうか（概算）"
        description_ko: "큐가 비어 있는지 여부(근사값)"
      - name: size
        self: ThreadChannel
        return: "size_t"
        signatures:
          - params: ""
        description: "Number of queued values (approximate)."
        description_ja: "キューに入っている値の数（概算）"
        description_ko: "큐에 들어 있는 값의 개수(근사값)"
      - name: isClosed
        self: ThreadChannel
        return: "bool"
        signatures:
          - params: ""
        description: "Whether the channel has been closed."
        description_ja: "チャンネルが閉じられているかどうか"
        description_ko: "채널이 닫혔는지 여부"

  - name: HitResult
    related:
      - Ray
      - Node
    keywords: ["hit","pick","raycast","collision","test","select"]
    description: "Result of a node hit test (this is Node::HitResult). Returned by Node::findHitNode() / findHitNodeFromScreen(); call hit() to check whether anything was hit."
    description_ja: "ノードのヒットテスト結果 (Node::HitResult)。Node::findHitNode() / findHitNodeFromScreen() が返す。何かにヒットしたかは hit() で確認"
    description_ko: "노드 히트 테스트 결과 (Node::HitResult). Node::findHitNode() / findHitNodeFromScreen()가 반환. 무언가에 맞았는지는 hit()으로 확인"
    properties:
      - name: node
        self: HitResult
        type: Node::Ptr
        description: "The hit node (shared_ptr), or null if nothing was hit."
        description_ja: "ヒットしたノード (shared_ptr)、何もヒットしなければ null"
        description_ko: "맞은 노드 (shared_ptr), 아무것도 맞지 않으면 null"
      - name: distance
        self: HitResult
        type: float
        description: "Distance from the ray origin to the hit point."
        description_ja: "レイの原点からヒット点までの距離"
        description_ko: "레이 원점에서 히트 지점까지의 거리"
      - name: localPoint
        self: HitResult
        type: Vec3
        description: "Hit position in the hit node's local coordinates."
        description_ja: "ヒットしたノードのローカル座標でのヒット位置"
        description_ko: "맞은 노드의 로컬 좌표 기준 히트 위치"
    methods:
      - name: hit
        const: true
        self: HitResult
        return: bool
        signatures:
          - params: ""
        description: "Whether a node was hit (node is non-null)."
        description_ja: "ノードがヒットしたか (node が非 null)"
        description_ko: "노드가 맞았는지 (node가 non-null)"

  - name: NodeWeakPtr
    related:
      - Node
      - getRootNode
    keywords: ["weak","pointer","reference","weakptr","node","nonowning"]
    description: "Alias for weak_ptr<Node> (using NodeWeakPtr = weak_ptr<Node>). A non-owning weak reference to a Node; lock() it to obtain a NodePtr if the node still exists."
    description_ja: "weak_ptr<Node> のエイリアス (using NodeWeakPtr = weak_ptr<Node>)。Node への非所有の弱参照。ノードがまだ存在すれば lock() で NodePtr を取得"
    description_ko: "weak_ptr<Node>의 별칭 (using NodeWeakPtr = weak_ptr<Node>). Node에 대한 비소유 약한 참조. 노드가 아직 존재하면 lock()으로 NodePtr를 얻음"

  - name: Location
    related:
      - getLocation
    keywords: ["gps","location","coordinates","geolocation","position","latitude"]
    description: "GPS / WiFi location fix returned by getLocation()"
    description_ja: "getLocation() が返す GPS / WiFi 位置情報"
    description_ko: "getLocation()이 반환하는 GPS / WiFi 위치 정보"
    properties:
      - name: latitude
        self: Location
        type: double
        description: "Latitude in degrees"
        description_ja: "緯度 (度)"
        description_ko: "위도 (도)"
      - name: longitude
        self: Location
        type: double
        description: "Longitude in degrees"
        description_ja: "経度 (度)"
        description_ko: "경도 (도)"
      - name: altitude
        self: Location
        type: double
        description: "Altitude in meters"
        description_ja: "高度 (メートル)"
        description_ko: "고도 (미터)"
      - name: accuracy
        self: Location
        type: float
        description: "Horizontal accuracy in meters; -1 if not available yet"
        description_ja: "水平精度 (メートル)、未取得なら -1"
        description_ko: "수평 정확도 (미터), 아직 없으면 -1"

  - name: FpsSettings
    related:
      - getFpsSettings
      - setFps
      - setIndependentFps
    keywords: ["fps","framerate","vsync","timing","refresh"]
    description: "FPS configuration returned by getFpsSettings(). Rates use VSYNC (-1) and EVENT_DRIVEN (0) sentinels, or a fixed fps"
    description_ja: "getFpsSettings() が返す FPS 設定。レートは VSYNC (-1)、EVENT_DRIVEN (0) のセンチネル、または固定 fps"
    description_ko: "getFpsSettings()가 반환하는 FPS 설정. 레이트는 VSYNC (-1), EVENT_DRIVEN (0) 센티넬 또는 고정 fps"
    properties:
      - name: updateFps
        self: FpsSettings
        type: float
        description: "Target update rate: VSYNC (-1), EVENT_DRIVEN (0), or a fixed fps"
        description_ja: "目標 update レート: VSYNC (-1)、EVENT_DRIVEN (0)、または固定 fps"
        description_ko: "목표 update 레이트: VSYNC (-1), EVENT_DRIVEN (0), 또는 고정 fps"
      - name: drawFps
        self: FpsSettings
        type: float
        description: "Target draw rate: VSYNC (-1), EVENT_DRIVEN (0), or a fixed fps"
        description_ja: "目標 draw レート: VSYNC (-1)、EVENT_DRIVEN (0)、または固定 fps"
        description_ko: "목표 draw 레이트: VSYNC (-1), EVENT_DRIVEN (0), 또는 고정 fps"
      - name: actualVsyncFps
        self: FpsSettings
        type: float
        description: "Actual monitor refresh rate (0 if unknown)"
        description_ja: "実際のモニターのリフレッシュレート (不明なら 0)"
        description_ko: "실제 모니터 리프레시 레이트 (알 수 없으면 0)"
      - name: synced
        self: FpsSettings
        type: bool
        description: "true when update and draw run in sync (1:1)"
        description_ja: "update と draw が同期 (1:1) で動くとき true"
        description_ko: "update와 draw가 동기(1:1)로 실행될 때 true"

  - name: WindowSettings
    related:
      - runApp
      - setWindowSize
      - setWindowTitle
      - HeadlessSettings
    keywords: ["window","config","size","title","fullscreen","startup"]
    description: "Window configuration passed to the app at startup (size, title, DPI, MSAA, fullscreen, decoration, VSync). Setters chain"
    description_ja: "起動時にアプリへ渡すウィンドウ設定 (サイズ、タイトル、DPI、MSAA、フルスクリーン、装飾、VSync)。セッターはチェイン可能"
    description_ko: "시작 시 앱에 전달되는 윈도우 설정 (크기, 제목, DPI, MSAA, 풀스크린, 장식, VSync). 세터는 체인 가능"
    properties:
      - name: width
        self: WindowSettings
        type: int
        description: "Window width (default 1280)"
        description_ja: "ウィンドウ幅 (デフォルト 1280)"
        description_ko: "윈도우 너비 (기본값 1280)"
      - name: height
        self: WindowSettings
        type: int
        description: "Window height (default 720)"
        description_ja: "ウィンドウ高さ (デフォルト 720)"
        description_ko: "윈도우 높이 (기본값 720)"
      - name: title
        self: WindowSettings
        type: string
        description: "Window title (default \"TrussC App\")"
        description_ja: "ウィンドウタイトル (デフォルト \\\"TrussC App\\\")"
        description_ko: "윈도우 제목 (기본값 \\\"TrussC App\\\")"
      - name: highDpi
        self: WindowSettings
        type: bool
        description: "High DPI support for sharp rendering on Retina (default true)"
        description_ja: "Retina でのシャープな描画のための High DPI 対応 (デフォルト true)"
        description_ko: "Retina에서 선명한 렌더링을 위한 High DPI 지원 (기본값 true)"
      - name: pixelPerfect
        self: WindowSettings
        type: bool
        description: "true: coords match framebuffer size; false: coords use logical size (default false)"
        description_ja: "true: 座標が framebuffer サイズに一致、false: 論理サイズを使用 (デフォルト false)"
        description_ko: "true: 좌표가 framebuffer 크기와 일치, false: 논리 크기 사용 (기본값 false)"
      - name: sampleCount
        self: WindowSettings
        type: int
        description: "MSAA sample count (default 4)"
        description_ja: "MSAA サンプル数 (デフォルト 4)"
        description_ko: "MSAA 샘플 수 (기본값 4)"
      - name: fullscreen
        self: WindowSettings
        type: bool
        description: "Start in fullscreen (default false)"
        description_ja: "フルスクリーンで起動 (デフォルト false)"
        description_ko: "풀스크린으로 시작 (기본값 false)"
      - name: decorated
        self: WindowSettings
        type: bool
        description: "false: borderless/chromeless window with no title bar (default true)"
        description_ja: "false: タイトルバーなしのボーダーレス/クロームレスウィンドウ (デフォルト true)"
        description_ko: "false: 제목 표시줄 없는 보더리스/크롬리스 윈도우 (기본값 true)"
      - name: clipboardSize
        self: WindowSettings
        type: int
        description: "Clipboard buffer size in bytes (default 65536)"
        description_ja: "クリップボードバッファのサイズ (バイト、デフォルト 65536)"
        description_ko: "클립보드 버퍼 크기 (바이트, 기본값 65536)"
      - name: swapInterval
        self: WindowSettings
        type: int
        description: "VSync present interval: 1 = on (default), 0 = off, N = every Nth refresh"
        description_ja: "VSync の present 間隔: 1 = on (デフォルト)、0 = off、N = N回ごとのリフレッシュ"
        description_ko: "VSync present 간격: 1 = on (기본값), 0 = off, N = N번째 리프레시마다"
    methods:
      - name: setSize
        self: WindowSettings
        return: "WindowSettings&"
        signatures:
          - params: "int w, int h"
        description: "Set window size (chainable)"
        description_ja: "ウィンドウサイズを設定 (チェイン可能)"
        description_ko: "윈도우 크기 설정 (체인 가능)"
      - name: setTitle
        self: WindowSettings
        return: "WindowSettings&"
        signatures:
          - params: "const string& t"
        description: "Set window title (chainable)"
        description_ja: "ウィンドウタイトルを設定 (チェイン可能)"
        description_ko: "윈도우 제목 설정 (체인 가능)"
      - name: setHighDpi
        self: WindowSettings
        return: "WindowSettings&"
        signatures:
          - params: "bool enabled"
        description: "Enable/disable high DPI support (chainable)"
        description_ja: "High DPI 対応を有効/無効化 (チェイン可能)"
        description_ko: "High DPI 지원 활성화/비활성화 (체인 가능)"
      - name: setPixelPerfect
        self: WindowSettings
        return: "WindowSettings&"
        signatures:
          - params: "bool enabled"
        description: "Set pixel-perfect mode: true = framebuffer-size coords, false = logical-size coords (chainable)"
        description_ja: "ピクセルパーフェクトモードを設定: true = framebuffer サイズ座標、false = 論理サイズ座標 (チェイン可能)"
        description_ko: "픽셀 퍼펙트 모드 설정: true = framebuffer 크기 좌표, false = 논리 크기 좌표 (체인 가능)"
      - name: setSampleCount
        self: WindowSettings
        return: "WindowSettings&"
        signatures:
          - params: "int count"
        description: "Set MSAA sample count (chainable)"
        description_ja: "MSAA サンプル数を設定 (チェイン可能)"
        description_ko: "MSAA 샘플 수 설정 (체인 가능)"
      - name: setFullscreen
        self: WindowSettings
        return: "WindowSettings&"
        signatures:
          - params: "bool enabled"
        description: "Enable/disable fullscreen at startup (chainable)"
        description_ja: "起動時のフルスクリーンを有効/無効化 (チェイン可能)"
        description_ko: "시작 시 풀스크린 활성화/비활성화 (체인 가능)"
      - name: setDecorated
        self: WindowSettings
        return: "WindowSettings&"
        signatures:
          - params: "bool enabled"
        description: "false = borderless/chromeless window that can still take focus and be closed programmatically (chainable)"
        description_ja: "false = フォーカス取得やプログラムからのクローズは可能なボーダーレス/クロームレスウィンドウ (チェイン可能)"
        description_ko: "false = 포커스를 받고 프로그램으로 닫을 수는 있는 보더리스/크롬리스 윈도우 (체인 가능)"
      - name: setClipboardSize
        self: WindowSettings
        return: "WindowSettings&"
        signatures:
          - params: "int size"
        description: "Set clipboard buffer size in bytes (chainable)"
        description_ja: "クリップボードバッファのサイズをバイト単位で設定 (チェイン可能)"
        description_ko: "클립보드 버퍼 크기를 바이트 단위로 설정 (체인 가능)"
      - name: setSwapInterval
        self: WindowSettings
