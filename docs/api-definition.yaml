          - worldToScreen
        keywords: ["transform","matrix","modelview","current"]
        return: "Mat4"
        signatures:
          - params: ""
        description: "Get the current transformation matrix"
        description_ja: "現在の変換行列を取得"
        description_ko: "현재 변환 행렬을 얻음"

      - name: getScale
        related:
          - getMatrix
          - scale
        keywords: ["transform","scale","matrix","zoom"]
        return: "float"
        signatures:
          - params: ""
        description: "Effective uniform scale of the current matrix (max of x/y basis lengths)"
        description_ja: "現在の行列の実効スケール（x/y基底長の最大）"
        description_ko: "현재 행렬의 유효 스케일 (x/y 기저 길이의 최댓값)"

      - name: resetMatrix
        related:
          - setMatrix
        keywords: ["identity","reset","clear transform"]
        return: "void"
        signatures:
          - params: ""
        description: "Reset transformation matrix to identity"
        description_ja: "変換行列をリセット"
        description_ko: "변환 행렬을 단위 행렬로 초기화"

      - name: multMatrix
        related:
          - Mat4
          - setMatrix
          - translate
        keywords: ["transform","matrix","multiply","apply","modelview"]
        return: "void"
        signatures:
          - params: "const Mat4& mat"
        description: "Multiply the current matrix by mat (relative transform, like translate/rotate)"
        description_ja: "現在の行列に mat を掛ける（translate/rotate のような相対変換）"
        description_ko: "현재 행렬에 mat를 곱함 (translate/rotate 같은 상대 변환)"

      - name: setMatrix
        related:
          - Mat4
          - multMatrix
          - resetMatrix
        keywords: ["transform","matrix","modelview","replace","load"]
        return: "void"
        signatures:
          - params: "const Mat4& mat"
        description: "Replace the current matrix with mat (absolute - use with caution, may break camera setup)"
        description_ja: "現在の行列を mat で置き換える（絶対・カメラ設定を壊す可能性があるので注意）"
        description_ko: "현재 행렬을 mat로 대체 (절대 - 카메라 설정을 깨뜨릴 수 있으므로 주의)"

      - name: getCurrentMatrix
        deprecated:
          reason: "Renamed to getMatrix(). Will be removed in v1.0.0."
