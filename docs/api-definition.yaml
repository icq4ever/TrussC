  - name: Tween
    related:
      - pause
      - resume
      - duration
      - ease
      - createTween
      - from
      - to
      - start
    keywords: ["tween","animate","easing","interpolate","transition","motion"]
    description: "Animates a value of type T with easing. Templated over any lerp-able type (float, Vec2, Vec3, Vec4, Color, etc.). Auto-updates each frame via events().update once start() is called; chainable setters configure it"
    description_ja: "型 T の値をイージング付きでアニメーション。lerp 可能な任意の型（float, Vec2, Vec3, Vec4, Color など）にテンプレート化。start() を呼ぶと events().update で毎フレーム自動更新。チェイン可能なセッターで設定する"
    description_ko: "T 타입 값을 이징과 함께 애니메이션. lerp 가능한 임의 타입(float, Vec2, Vec3, Vec4, Color 등)으로 템플릿화. start() 호출 시 events().update로 매 프레임 자동 갱신. 체이닝 가능한 세터로 설정"
    constructor:
      signatures:
        - params: ""
        - params: "T start, T end, float duration, EaseType type = EaseType::Cubic, EaseMode mode = EaseMode::InOut"
    methods:
      - name: from
        self: Tween
        return: "Tween &"
        signatures:
          - params: "T value"
        description: "Set the start value (chainable)"
        description_ja: "開始値を設定（チェイン可能）"
        description_ko: "시작 값을 설정(체이닝 가능)"
      - name: to
        self: Tween
        return: "Tween &"
        signatures:
          - params: "T value"
        description: "Set the end value (chainable)"
        description_ja: "終了値を設定（チェイン可能）"
        description_ko: "종료 값을 설정(체이닝 가능)"
      - name: duration
        self: Tween
        return: "Tween &"
        signatures:
          - params: "float seconds"
        description: "Set the animation duration in seconds (chainable)"
        description_ja: "アニメーションの長さを秒で設定（チェイン可能）"
        description_ko: "애니메이션 길이를 초 단위로 설정(체이닝 가능)"
      - name: ease
        self: Tween
        return: "Tween &"
        signatures:
          - params: "EaseType type, EaseMode mode = EaseMode::InOut"
          - params: "EaseType inType, EaseType outType"
        description: "Set the easing curve; the two-type overload uses an asymmetric ease (one curve in, another out)"
        description_ja: "イージングカーブを設定。2 型のオーバーロードは非対称イージング（in と out で別カーブ）を使う"
        description_ko: "이징 커브를 설정. 2개 타입 오버로드는 비대칭 이징(in과 out에 다른 커브) 사용"
      - name: loop
        self: Tween
        return: "Tween &"
        signatures:
          - params: "int count = -1"
        description: "Repeat the animation: -1 = infinite, 0 = no loop, N = repeat N times (chainable)"
        description_ja: "アニメーションを繰り返す: -1 = 無限、0 = ループなし、N = N 回繰り返し（チェイン可能）"
        description_ko: "애니메이션을 반복: -1 = 무한, 0 = 루프 없음, N = N회 반복(체이닝 가능)"
      - name: yoyo
        self: Tween
        return: "Tween &"
        signatures:
          - params: "bool enable = true"
        description: "Reverse direction on each loop iteration (chainable)"
        description_ja: "ループのたびに方向を反転（チェイン可能）"
        description_ko: "루프 반복마다 방향을 반전(체이닝 가능)"
      - name: delay
        self: Tween
        return: "Tween &"
        signatures:
          - params: "float seconds"
        description: "Delay before the animation starts, in seconds (chainable)"
        description_ja: "アニメーション開始前の遅延を秒で設定（チェイン可能）"
        description_ko: "애니메이션 시작 전 지연을 초 단위로 설정(체이닝 가능)"
      - name: start
        self: Tween
        return: "Tween &"
        signatures:
          - params: ""
        description: "Start (or restart) the animation and begin auto-updating each frame"
        description_ja: "アニメーションを開始（または再開）し毎フレームの自動更新を始める"
        description_ko: "애니메이션을 시작(또는 재시작)하고 매 프레임 자동 갱신 시작"
      - name: pause
        self: Tween
        return: "Tween &"
        signatures:
          - params: ""
        description: "Pause the animation, keeping its current progress"
        description_ja: "現在の進行状況を保ったままアニメーションを一時停止"
        description_ko: "현재 진행 상태를 유지한 채 애니메이션 일시정지"
      - name: resume
        self: Tween
        return: "Tween &"
        signatures:
          - params: ""
        description: "Resume a paused animation"
        description_ja: "一時停止したアニメーションを再開"
        description_ko: "일시정지된 애니메이션을 재개"
      - name: reset
        self: Tween
        return: "Tween &"
        signatures:
          - params: ""
        description: "Stop the animation and reset progress to the start"
        description_ja: "アニメーションを停止し進行を最初にリセット"
        description_ko: "애니메이션을 정지하고 진행을 처음으로 리셋"
      - name: finish
        self: Tween
        return: "Tween &"
        signatures:
          - params: ""
        description: "Jump immediately to the end value and fire the complete event"
        description_ja: "即座に終了値へジャンプし complete イベントを発火"
        description_ko: "즉시 종료 값으로 점프하고 complete 이벤트 발생"
      - name: getValue
        self: Tween
        return: "T"
        signatures:
          - params: ""
        description: "Return the current eased value"
        description_ja: "現在のイージング後の値を返す"
        description_ko: "현재 이징이 적용된 값을 반환"
      - name: getProgress
        self: Tween
        return: "float"
        signatures:
          - params: ""
        description: "Return normalized progress through the current iteration (0.0-1.0)"
        description_ja: "現在の反復における正規化された進行度を返す（0.0-1.0）"
        description_ko: "현재 반복의 정규화된 진행도를 반환(0.0-1.0)"
      - name: getElapsed
        self: Tween
        return: "float"
        signatures:
          - params: ""
        description: "Return elapsed time in seconds within the current iteration"
        description_ja: "現在の反復における経過時間を秒で返す"
        description_ko: "현재 반복의 경과 시간을 초 단위로 반환"
      - name: getDuration
        self: Tween
        return: "float"
        signatures:
          - params: ""
        description: "Return the configured duration in seconds"
        description_ja: "設定された長さを秒で返す"
        description_ko: "설정된 길이를 초 단위로 반환"
      - name: isPlaying
        self: Tween
        return: "bool"
        signatures:
          - params: ""
        description: "Return true while the animation is actively playing"
        description_ja: "アニメーションが再生中の間 true を返す"
        description_ko: "애니메이션이 재생 중인 동안 true 반환"
      - name: isComplete
        self: Tween
        return: "bool"
        signatures:
          - params: ""
        description: "Return true once the animation (all loops) has finished"
        description_ja: "アニメーション（全ループ）が完了したら true を返す"
        description_ko: "애니메이션(모든 루프)이 완료되면 true 반환"
      - name: getStart
        self: Tween
        return: "T"
        signatures:
          - params: ""
        description: "Return the start value"
        description_ja: "開始値を返す"
        description_ko: "시작 값을 반환"
      - name: getEnd
        self: Tween
        return: "T"
        signatures:
          - params: ""
        description: "Return the end value"
        description_ja: "終了値を返す"
        description_ko: "종료 값을 반환"
      - name: getLoopCount
        self: Tween
        return: "int"
        signatures:
          - params: ""
        description: "Return how many loop iterations have completed so far"
        description_ja: "これまでに完了したループ反復数を返す"
        description_ko: "지금까지 완료된 루프 반복 횟수를 반환"
    properties:
      - name: complete
        self: Tween
        lua: false
        type: "std::unique_ptr<Event<void>>"
        description: "Event fired once the tween finishes; subscribe with complete->listen(...)"
        description_ja: "トゥイーン完了時に一度発火するイベント。complete->listen(...) で購読する"
        description_ko: "트윈이 완료될 때 한 번 발생하는 이벤트. complete->listen(...) 으로 구독"

  - name: VideoDeviceInfo
