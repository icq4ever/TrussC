        signatures:
          - params: "WindowType type, int i, int n"
        description: "Return the window coefficient for sample i of n for the given window type"
        description_ja: "指定した窓タイプにおける n 個中 i 番目サンプルの窓係数を返す"
        description_ko: "지정한 윈도우 타입에서 n개 중 i번째 샘플의 윈도우 계수를 반환"
  - id: math_geometry
    name: "Math - Geometry"
    name_ja: "数学 - 幾何"
    name_ko: "수학 - 기하학"
    functions:
      - name: dist
        related:
          - distSquared
          - sqrt
        keywords: ["distance","length","between","hypotenuse","gap"]
        return: "float"
        signatures:
          - params: "float x1, float y1, float x2, float y2"
        description: "Distance between points"
        description_ja: "2点間の距離"
        description_ko: "두 점 사이의 거리"
        of_equivalent: "ofDist"

      - name: distSquared
        related:
          - dist
          - sq
        keywords: ["distance","squared","length","fast","compare"]
        return: "float"
        signatures:
          - params: "float x1, float y1, float x2, float y2"
        description: "Squared distance"
        description_ja: "距離の二乗"
        description_ko: "거리의 제곱"
        of_equivalent: "ofDistSquared"

  # ==========================================================================
  # Window & System
  # ==========================================================================
  - id: window_system
    name: "Window & System"
    name_ja: "ウィンドウとシステム"
    name_ko: "윈도우 & 시스템"
    functions:
      - name: setWindowTitle
        related:
          - setWindowSize
          - setWindowPosition
        keywords: ["caption","name","titlebar","label"]
        return: "void"
        signatures:
          - params: "const string& title"
        description: "Set window title"
        description_ja: "ウィンドウのタイトルを設定"
        description_ko: "윈도우 제목을 설정"

      - name: setWindowSize
        related:
          - getWindowSize
          - setWindowSizeLogical
          - setWindowPosition
        keywords: ["resize","dimensions","width height","resolution"]
        return: "void"
        signatures:
          - params: "int width, int height"
        description: "Set window size"
        description_ja: "ウィンドウのサイズを設定"
        description_ko: "윈도우 크기를 설정"

      - name: getWindowPosition
        related:
          - setWindowPosition
          - getDisplayScaleFactor
        keywords: ["location","screen","coordinates","offset","x y"]
        platforms: [macos, windows]
        platformNote: "Stub returning (-1,-1) on Linux (not yet implemented), iOS, Android and Web."
        platformNote_ja: "Linux（未実装）/ iOS / Android / Web ではスタブで (-1,-1) を返す。"
        return: "IVec2"
        signatures:
          - params: ""
        description: "Get window position in screen coordinates (top-left origin). macOS/Windows only; other platforms return (-1, -1)"
        description_ja: "スクリーン座標でのウィンドウ位置を取得（左上原点）。macOS/Windowsのみ対応、他は(-1, -1)を返す"
        description_ko: "윈도우 위치를 스크린 좌표(좌상단 원점)로 얻음. macOS/Windows만 지원, 그 외 플랫폼은 (-1, -1) 반환"

      - name: setWindowPosition
        related:
          - getWindowPosition
          - bringWindowToFront
        keywords: ["move","location","screen","coordinates","place"]
        platforms: [macos, windows]
        platformNote: "No-op (warns) on Linux (not yet implemented), iOS, Android and Web."
        platformNote_ja: "Linux（未実装）/ iOS / Android / Web では警告のみで no-op。"
        return: "void"
        signatures:
          - params: "int x, int y"
        description: "Set window position in screen coordinates (top-left origin). macOS/Windows only; no-op on other platforms"
        description_ja: "スクリーン座標でウィンドウ位置を設定（左上原点）。macOS/Windowsのみ対応、他はno-op"
        description_ko: "윈도우 위치를 스크린 좌표(좌상단 원점)로 설정. macOS/Windows만 지원, 그 외 플랫폼은 동작하지 않음"

      - name: toggleFullscreen
        related:
          - setFullscreen
          - isFullscreen
          - setImmersiveMode
        keywords: ["fullscreen","maximize","borderless","screen"]
        return: "void"
        signatures:
          - params: ""
        description: "Toggle fullscreen mode"
        description_ja: "フルスクリーンを切り替え"
        description_ko: "전체 화면 모드 토글"

      - name: setClipboardString
        related:
          - getClipboardString
        keywords: ["copy","paste","clipboard","pasteboard"]
        return: "void"
        signatures:
          - params: "const string& text"
        description: "Copy text to clipboard"
        description_ja: "クリップボードにコピー"
        description_ko: "텍스트를 클립보드에 복사"

      - name: getClipboardString
        related:
          - setClipboardString
        keywords: ["paste","clipboard","copy","pasteboard"]
        return: "string"
        signatures:
          - params: ""
        description: "Get text from clipboard"
        description_ja: "クリップボードから取得"
        description_ko: "클립보드에서 텍스트를 얻음"

      - name: getDpiScale
        related:
          - getFramebufferWidth
          - getDisplayScaleFactor
        keywords: ["retina","hidpi","density","pixel ratio","scale"]
        return: "float"
        signatures:
          - params: ""
        description: "Get display DPI scale factor (e.g. 2.0 for Retina)"
        description_ja: "ディスプレイのDPIスケール係数を取得（Retinaなら2.0等）"
        description_ko: "디스플레이 DPI 스케일 계수를 얻음 (Retina는 2.0 등)"

      - name: getFramebufferWidth
        related:
          - getFramebufferHeight
          - getWindowWidth
          - getDpiScale
        keywords: ["pixels","retina","resolution","backbuffer","drawable"]
        return: "int"
        signatures:
          - params: ""
        description: "Get framebuffer width in pixels (window width * DPI scale)"
        description_ja: "フレームバッファ幅をピクセルで取得（ウィンドウ幅 × DPIスケール）"
        description_ko: "프레임버퍼 너비를 픽셀로 얻음 (윈도우 너비 × DPI 스케일)"

      - name: getFramebufferHeight
        related:
          - getFramebufferWidth
          - getWindowHeight
          - getDpiScale
        keywords: ["pixels","retina","resolution","backbuffer","drawable"]
        return: "int"
        signatures:
          - params: ""
        description: "Get framebuffer height in pixels (window height * DPI scale)"
        description_ja: "フレームバッファ高さをピクセルで取得（ウィンドウ高さ × DPIスケール）"
        description_ko: "프레임버퍼 높이를 픽셀로 얻음 (윈도우 높이 × DPI 스케일)"

      - name: getAspectRatio
        related:
          - getWindowSize
          - getWindowWidth
        keywords: ["ratio","proportion","widescreen","16:9"]
        return: "float"
        signatures:
          - params: ""
        description: "Get window aspect ratio (width / height)"
        description_ja: "ウィンドウのアスペクト比を取得（幅 / 高さ）"
        description_ko: "윈도우 종횡비를 얻음 (너비 / 높이)"

      - name: setOrientation
        related:
          - Orientation
          - setImmersiveMode
          - getDeviceOrientation
        keywords: ["portrait","landscape","rotation","mobile","screen"]
        platforms: [ios, android]
        platformNote: "Mobile-only. No-op on macOS, Windows, Linux and Web."
        platformNote_ja: "モバイル専用。デスクトップ / Web では no-op。"
        return: "void"
        signatures:
          - params: "Orientation mask"
        description: "Set allowed screen orientations (mobile). Values: Orientation::Portrait, Landscape, All"
        description_ja: "画面の向きを設定（モバイル用）。Orientation::Portrait, Landscape, All"
        description_ko: "허용되는 화면 방향을 설정 (모바일). 값: Orientation::Portrait, Landscape, All"

      - name: setKeepScreenOn
        related:
          - getKeepScreenOn
          - setImmersiveMode
        keywords: ["wake lock","no sleep","stay awake","prevent lock","screensaver"]
        platforms: [macos, windows, ios, android]
        platformNote: "No-op on Linux and Web (TODO: xdg-screensaver / Wake Lock API)."
        platformNote_ja: "Linux / Web では no-op（xdg-screensaver / Wake Lock API は未実装）。"
        return: "void"
        signatures:
          - params: "bool enabled"
        description: "Prevent display sleep / auto-lock while the app is running. Supported: Android, iOS, macOS, Windows. Linux / Web: no-op"
        description_ja: "アプリ実行中に画面スリープ/自動ロックを抑止。対応: Android, iOS, macOS, Windows。Linux / Web は no-op"
        description_ko: "앱 실행 중 화면 절전/자동 잠금을 방지. 지원: Android, iOS, macOS, Windows. Linux / Web는 동작하지 않음"

      - name: getKeepScreenOn
        related:
          - setKeepScreenOn
        keywords: ["wake lock","no sleep","stay awake","awake"]
        platforms: [macos, windows, ios, android]
        platformNote: "Always false on Linux and Web (setter is a no-op there)."
        platformNote_ja: "Linux / Web では常に false（setter が no-op のため）。"
        return: "bool"
        signatures:
          - params: ""
        description: "Check whether keep-screen-on is currently enabled"
        description_ja: "現在 keep-screen-on が有効かどうかを取得"
        description_ko: "현재 keep-screen-on이 활성화되어 있는지 확인"

      - name: setIndependentFps
        related:
          - setFps
          - getFpsSettings
        keywords: ["framerate","update rate","decouple","tick rate"]
        return: "void"
        signatures:
          - params: "float updateFps, float drawFps"
        description: "Set independent update and draw frame rates"
        description_ja: "updateとdrawのフレームレートを個別に設定"
        description_ko: "update와 draw의 프레임레이트를 독립적으로 설정"

      - name: grabScreen
        related:
          - Pixels
          - saveScreenshot
          - captureWindow
        keywords: ["screenshot","capture","snapshot","pixels","readback"]
        return: "bool"
        signatures:
          - params: "Pixels& outPixels"
        description: "Capture current screen to Pixels"
        description_ja: "現在の画面をPixelsにキャプチャ"
        description_ko: "현재 화면을 Pixels에 캡처"

      - name: saveScreenshot
        related:
          - grabScreen
          - startRecording
          - captureWindow
        keywords: ["screenshot","capture","png","export","save image"]
        return: "bool"
        signatures:
          - params: "const std::filesystem::path& path"
        description: "Save a screenshot of the rendered frame (png/jpg/bmp). Safe to call from anywhere; capture is deferred to after present(). Returns true when the destination was prepared and the capture queued (parent dir created/writable), not that the file is already written."
        description_ja: "描画済みフレームのスクショを保存（png/jpg/bmp）。どこから呼んでもよく、キャプチャはpresent()後に遅延実行。戻り値trueは「保存先を準備しキューに積めた（親フォルダ生成・書き込み可）」の意味で、ファイル書き込み完了ではない"
        description_ko: "렌더링된 프레임의 스크린샷 저장(png/jpg/bmp). 어디서든 호출 가능하며 캡처는 present() 이후로 지연. 반환값 true는 '대상 준비 및 캡처 큐 등록 성공(상위 폴더 생성·쓰기 가능)'을 의미하며 파일 기록 완료가 아님"

      - name: startRecording
        related:
          - VideoRecordSettings
          - stopRecording
          - isRecording
          - saveScreenshot
        keywords: ["record","video","capture","movie","mp4"]
        platforms: [macos, windows, linux, ios, android]
        platformNote: "Global convenience over the singleton ScreenRecorder; non-functional on web for the same reason (VideoWriter stub returns false)."
        platformNote_ja: "シングルトン ScreenRecorder への薄いラッパ。同じ理由で web では機能しない（VideoWriter スタブが false）。"
        return: "bool"
        signatures:
          - params: "const string& path, const VideoRecordSettings& settings = {}"
        description: "Start recording the window to a video file (native encoder, no ffmpeg)"
        description_ja: "ウィンドウを動画ファイルに録画開始（ネイティブエンコーダ、ffmpeg不要）"
        description_ko: "윈도우를 동영상 파일로 녹화 시작 (네이티브 인코더, ffmpeg 불필요)"

      - name: stopRecording
        related:
          - startRecording
          - isRecording
          - recordingPath
        keywords: ["record","video","finish","movie","stop"]
        return: "void"
        signatures:
          - params: ""
        description: "Stop the current recording and finalize the file"
        description_ja: "録画を停止してファイルを確定"
        description_ko: "녹화를 중지하고 파일을 마무리"

      - name: isRecording
        related:
          - startRecording
          - recordingFrameCount
          - recordingPath
        keywords: ["record","video","capturing","status"]
        return: "bool"
        signatures:
          - params: ""
        description: "Check whether a recording is in progress"
        description_ja: "録画中かどうか確認"
        description_ko: "녹화 중인지 확인"

      - name: recordingFrameCount
        related:
          - isRecording
          - recordingPath
          - getFrameCount
        keywords: ["record","frames","video","count"]
        return: "int"
        signatures:
          - params: ""
        description: "Number of frames captured so far in the current recording"
        description_ja: "現在の録画でこれまでにキャプチャしたフレーム数"
        description_ko: "현재 녹화에서 지금까지 캡처한 프레임 수"

      - name: recordingPath
        related:
          - isRecording
          - recordingFrameCount
        keywords: ["record","file","video","output","path"]
        return: "const string&"
        signatures:
          - params: ""
        description: "Output file path of the current recording"
        description_ja: "現在の録画の出力ファイルパス"
        description_ko: "현재 녹화의 출력 파일 경로"

      - name: isFullscreen
        related:
          - setFullscreen
          - toggleFullscreen
        keywords: ["fullscreen","maximized","borderless","status"]
        return: "bool"
        signatures:
          - params: ""
        description: "Check if window is fullscreen"
        description_ja: "フルスクリーンかどうか確認"
        description_ko: "윈도우가 전체 화면인지 확인"
        of_equivalent: "ofGetWindowMode"

      - name: setFullscreen
        related:
          - isFullscreen
          - toggleFullscreen
        keywords: ["fullscreen","maximize","borderless","windowed"]
        return: "void"
        signatures:
          - params: "bool fullscreen"
        description: "Set fullscreen mode"
        description_ja: "フルスクリーンを設定"
        description_ko: "전체 화면 모드를 설정"
        of_equivalent: "ofSetFullscreen"

      - name: redraw
        related:
          - setFps
        keywords: ["repaint","refresh","invalidate","render","update"]
        return: "void"
        signatures:
          - params: "int count = 1"
        description: "Request extra redraws (useful for event-driven rendering)"
        description_ja: "追加の再描画を要求（イベント駆動レンダリング用）"
        description_ko: "추가 다시그리기를 요청 (이벤트 기반 렌더링에 유용)"

  # ==========================================================================
  # Utility
  # ==========================================================================
      - name: getBackendName
        related:
          - GraphicsBackend::name
          - Platform::name
        keywords: ["renderer","graphics","metal","d3d11","opengl"]
        return: "string"
        signatures:
          - params: ""
        description: "Get the active graphics backend name (e.g. \"Metal (macOS)\", \"D3D11\", \"OpenGL\", \"WebGPU\")"
        description_ja: "現在のグラフィックスバックエンド名を取得（例: \"Metal (macOS)\", \"D3D11\", \"OpenGL\", \"WebGPU\"）"
        description_ko: "현재 그래픽스 백엔드 이름을 얻음 (예: \"Metal (macOS)\", \"D3D11\", \"OpenGL\", \"WebGPU\")"
      - name: bringWindowToFront
        related:
          - setWindowPosition
          - setFullscreen
        keywords: ["focus","raise","activate","foreground","topmost"]
        platforms: [macos, windows, linux]
        platformNote: "Desktop-only. No-op on iOS, Android and Web (always foreground / no window mgmt)."
        platformNote_ja: "デスクトップ専用。iOS / Android / Web では no-op（常に前面 / ウィンドウ管理なし）。"
        return: "void"
        signatures:
          - params: ""
        description: "Activate and raise the application window, giving it focus. Desktop only; no-op on mobile/web"
        description_ja: "アプリケーションウィンドウをアクティブにして前面に出しフォーカスを与える。デスクトップのみ、モバイル/web では no-op"
        description_ko: "애플리케이션 윈도우를 활성화하고 앞으로 올려 포커스를 줌. 데스크톱 전용, 모바일/web에서는 no-op"
      - name: getDisplayScaleFactor
        related:
          - getDpiScale
          - getWindowPosition
        keywords: ["retina","hidpi","density","scale","monitor"]
        return: "float"
        signatures:
          - params: ""
        description: "Get the DPI scale of the main display (available before window creation). macOS: 1.0 or 2.0 (Retina); other platforms: 1.0"
        description_ja: "メインディスプレイのDPIスケールを取得（ウィンドウ生成前に利用可能）。macOS: 1.0 または 2.0（Retina）、他のプラットフォーム: 1.0"
        description_ko: "메인 디스플레이의 DPI 스케일을 얻음 (윈도우 생성 전에 사용 가능). macOS: 1.0 또는 2.0 (Retina), 다른 플랫폼: 1.0"
      - name: setWindowDecorated
        related:
          - setFullscreen
          - setWindowSize
        keywords: ["borderless","titlebar","chrome","frame","decoration"]
        platforms: [macos, windows, linux]
        platformNote: "Desktop-only (toggles WM frame). No-op on iOS, Android and Web."
        platformNote_ja: "デスクトップ専用（WM フレーム切替）。iOS / Android / Web では no-op。"
        return: "void"
        signatures:
          - params: "bool decorated"
        description: "Toggle the window's standard decorations (title bar, borders, buttons). false = borderless but still focusable and closable. Desktop only"
        description_ja: "ウィンドウの標準装飾（タイトルバー、枠、ボタン）を切り替え。false = ボーダーレスだがフォーカス・クローズは可能。デスクトップのみ"
        description_ko: "윈도우의 표준 장식(타이틀 바, 테두리, 버튼)을 토글. false = 테두리 없음이지만 포커스와 닫기는 가능. 데스크톱 전용"
      - name: setWindowSizeLogical
        related:
          - setWindowSize
          - getDpiScale
        keywords: ["resize","logical pixels","points","dimensions"]
        platforms: [macos, windows, wasm]
        platformNote: "No-op on Linux (not yet implemented), iOS and Android (fixed fullscreen). Web resizes the canvas."
        platformNote_ja: "Linux（未実装）/ iOS / Android（全画面固定）では no-op。Web は canvas をリサイズ。"
        return: "void"
        signatures:
          - params: "int width, int height"
        description: "Resize the window to the given logical size (logical pixels)"
        description_ja: "ウィンドウを指定した論理サイズ（論理ピクセル）にリサイズ"
        description_ko: "윈도우를 지정한 논리 크기(논리 픽셀)로 리사이즈"
      - name: runHeadlessApp
        template: true
        related:
          - HeadlessSettings
          - runApp
        keywords: ["headless","no window","offscreen","cli","server"]
        return: "int"
        signatures:
          - params: "const HeadlessSettings& settings = HeadlessSettings()"
        description: "Run an app class without a window or graphics context (update loop only). Template on the app type; returns the process exit code"
        description_ja: "ウィンドウやグラフィックスコンテキストなしでアプリクラスを実行（update ループのみ）。アプリ型をテンプレート引数に取り、プロセスの終了コードを返す"
        description_ko: "윈도우나 그래픽스 컨텍스트 없이 앱 클래스를 실행 (update 루프만). 앱 타입을 템플릿 인자로 받고 프로세스 종료 코드를 반환"
  - id: utility
    name: "Utility"
    name_ja: "ユーティリティ"
    name_ko: "유틸리티"
    functions:
      - name: logNotice
        related:
          - logWarning
          - logError
          - setConsoleLogLevel
        keywords: ["log","print","console","debug","output"]
        return: LogStream
        signatures:
          - params: "const std::string & module = \"\""
        description: "Print to console"
        description_ja: "コンソールに出力"
        description_ko: "콘솔에 출력"
        of_equivalent: "ofLog"

      - name: compress
        related:
          - Codec
          - compressBound
          - decompress
          - toBase64
        keywords: ["zip","lz4","deflate","pack","shrink"]
        return: "bool"
        signatures:
          - params: "const void* src, size_t nbytes, vector<uint8_t>& out, Codec codec"
        description: "Compress a byte buffer with the given codec (Codec::None or Codec::LZ4). Resizes out and returns true on success."
        description_ja: "バイト列を指定コーデック（Codec::None / Codec::LZ4）で圧縮する。out をリサイズして成功時 true を返す"
        description_ko: "지정한 코덱(Codec::None / Codec::LZ4)으로 바이트 버퍼를 압축. out을 리사이즈하고 성공 시 true 반환"

      - name: decompress
        related:
          - Codec
          - compress
          - compressBound
        keywords: ["unzip","lz4","inflate","unpack","extract"]
        return: "bool"
        signatures:
          - params: "const void* src, size_t nbytes, vector<uint8_t>& out, size_t decompressedSize, Codec codec"
