        return: "string"
        signatures:
          - params: "const string& dir, const string& file"
        description: "Join directory and filename"
        description_ja: "ディレクトリとファイル名を結合"
        description_ko: "디렉토리와 파일명을 결합"
        of_equivalent: "ofFilePath::join"

      # File system operations
      - name: fileExists
        related:
          - directoryExists
          - getFileSize
          - removeFile
        keywords: ["exists","check","found","file"]
        return: "bool"
        signatures:
          - params: "const string& path"
        description: "Check if file exists"
        description_ja: "ファイルが存在するか確認"
        description_ko: "파일 존재 여부를 확인"
        of_equivalent: "ofFile::doesFileExist"

      - name: directoryExists
        related:
          - fileExists
          - createDirectory
          - listDirectory
        keywords: ["exists","folder","dir","check","directory"]
        return: "bool"
        signatures:
          - params: "const string& path"
        description: "Check if directory exists"
        description_ja: "ディレクトリが存在するか確認"
        description_ko: "디렉토리 존재 여부를 확인"
        of_equivalent: "ofDirectory::doesDirectoryExist"

      - name: createDirectory
        related:
          - directoryExists
          - listDirectory
        keywords: ["mkdir","make folder","create","directory"]
        return: "bool"
        signatures:
          - params: "const string& path"
        description: "Create directory (and parents)"
        description_ja: "ディレクトリを作成（親も含む）"
        description_ko: "디렉토리를 생성 (상위 포함)"
        of_equivalent: "ofDirectory::createDirectory"

      - name: listDirectory
        related:
          - directoryExists
          - getFileName
        keywords: ["ls","readdir","files","scan","browse"]
        return: "vector<string>"
        signatures:
          - params: "const string& path"
        description: "List files in directory"
        description_ja: "ディレクトリ内のファイル一覧"
        description_ko: "디렉토리 내 파일 목록"
        of_equivalent: "ofDirectory::listDir"

      - name: removeFile
        related:
          - fileExists
        keywords: ["delete","rm","unlink","erase","file"]
        return: "bool"
        signatures:
          - params: "const string& path"
        description: "Remove file"
        description_ja: "ファイルを削除"
        description_ko: "파일을 삭제"
        of_equivalent: "ofFile::removeFile"

      - name: getFileSize
        related:
          - fileExists
          - loadTextFile
        keywords: ["size","bytes","length","file"]
        return: "int64_t"
        signatures:
          - params: "const string& path"
        description: "Get file size in bytes"
        description_ja: "ファイルサイズを取得（バイト）"
        description_ko: "파일 크기를 바이트로 얻음"

      # Simple file I/O
      - name: loadTextFile
        related:
          - saveTextFile
          - loadJson
          - getFileSize
        keywords: ["read","open","text","file","load"]
        return: "string"
        signatures:
          - params: "const string& path"
        description: "Load entire text file"
        description_ja: "テキストファイルを読み込む"
        description_ko: "텍스트 파일 전체를 로드"
        of_equivalent: "ofBufferFromFile"

      - name: saveTextFile
        related:
          - loadTextFile
          - appendToFile
          - saveJson
        keywords: ["write","save","text","file","store"]
        return: "bool"
        signatures:
          - params: "const string& path, const string& content"
        description: "Save string to text file"
        description_ja: "文字列をファイルに保存"
        description_ko: "문자열을 텍스트 파일로 저장"
        of_equivalent: "ofBufferToFile"

      - name: appendToFile
        related:
          - saveTextFile
        keywords: ["append","write","add","file","concat"]
        return: "bool"
        signatures:
          - params: "const string& path, const string& content"
        description: "Append string to file"
        description_ja: "ファイルに追記"
        description_ko: "파일에 문자열을 추가"

