  # ==========================================================================
  # Lighting & PBR
  # ==========================================================================
      - name: getCameraPosition
        related:
          - setCameraPosition
          - setMaterial
        keywords: ["camera position","eye","view vector","specular","viewpoint","query"]
        return: "const Vec3&"
        signatures:
          - params: ""
        description: "Current camera position used for specular/PBR view vector"
        description_ja: "specular/PBRの視線ベクトルに使う現在のカメラ位置"
        description_ko: "specular/PBR 시선 벡터에 사용하는 현재 카메라 위치"
  - id: graphics_lighting
    name: "Lighting & PBR"
    name_ja: "照明・PBR"
    name_ko: "조명 및 PBR"
    functions:
      - name: addLight
        related:
          - Light
          - LightType
          - setMaterial
          - setEnvironment
        keywords: ["light","lamp","illuminate","directional","point light","ofLight"]
        return: "void"
        signatures:
          - params: "Light& light"
        description: "Add a light to the scene"
        description_ja: "シーンにlightを追加"
        description_ko: "씬에 조명을 추가"

      - name: removeLight
        related:
          - Light
        keywords: ["light","delete light","remove","unlight","lamp"]
        return: "void"
        signatures:
          - params: "Light& light"
        description: "Remove a light from the scene"
        description_ja: "シーンからlightを削除"
        description_ko: "씬에서 조명을 제거"

      - name: clearLights
        keywords: ["lights","remove all","reset","delete","dark"]
        return: "void"
        signatures:
          - params: ""
        description: "Remove all lights from the scene"
        description_ja: "全てのlightを削除"
        description_ko: "모든 조명을 제거"

      - name: setMaterial
        related:
          - Material
          - addLight
          - drawMesh
          - setEnvironment
        keywords: ["material","pbr","surface","shading","ofMaterial","roughness"]
        return: "void"
        signatures:
          - params: "Material& material"
        description: "Set material for subsequent mesh draws (activates PBR)"
        description_ja: "以降のmesh描画に使うmaterialを設定（PBR有効化）"
        description_ko: "이후 메쉬 렌더링에 사용할 재질을 설정 (PBR 활성화)"

      - name: clearMaterial
        related:
          - setMaterial
        keywords: ["material","reset","default","unset","no material"]
        return: "void"
        signatures:
          - params: ""
        description: "Clear material (return to default rendering)"
        description_ja: "materialをクリア（デフォルトに戻す）"
        description_ko: "재질을 해제 (기본 렌더링으로 복귀)"

      - name: setCameraPosition
        related:
          - getCameraPosition
          - getPosition
        keywords: ["camera position","eye","specular","view vector","viewpoint"]
        return: "void"
        signatures:
          - params: "const Vec3& pos"
          - params: "float x, float y, float z"
        description: "Set camera position for specular calculation"
        description_ja: "specular計算用のcamera位置を設定"
        description_ko: "스페큘러 계산을 위한 카메라 위치를 설정"

      - name: setEnvironment
        related:
          - Environment
          - getEnvironment
          - addLight
          - setMaterial
        keywords: ["ibl","environment","skybox","hdri","ambient","image based lighting"]
        return: "void"
        signatures:
          - params: "Environment& env"
        description: "Set IBL environment for PBR ambient lighting"
        description_ja: "PBR ambient用のIBL environment mapを設定"
        description_ko: "PBR 앰비언트용 IBL 환경맵을 설정"

      - name: clearEnvironment
        keywords: ["ibl","environment","skybox","reset","remove env"]
        return: "void"
        signatures:
          - params: ""
        description: "Clear IBL environment"
        description_ja: "IBL environment mapをクリア"
        description_ko: "IBL 환경맵을 해제"

      - name: beginShadowPass
        related:
          - Light
          - endShadowPass
          - shadowDraw
          - addLight
        keywords: ["shadow","depth pass","shadow map","begin","light view"]
        return: "void"
        signatures:
          - params: "Light& light"
        description: "Begin shadow depth pass from the light's point of view"
        description_ja: "light視点のshadow depth passを開始"
        description_ko: "조명 시점의 섀도우 뎁스 패스를 시작"

      - name: endShadowPass
        related:
          - beginShadowPass
        keywords: ["shadow","depth pass","shadow map","end","finish"]
        return: "void"
        signatures:
          - params: ""
        description: "End shadow depth pass"
        description_ja: "shadow depth passを終了"
        description_ko: "섀도우 뎁스 패스를 종료"

      - name: shadowDraw
