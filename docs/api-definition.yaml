          replacement: getScale
        related:
          - getScale
        keywords: ["transform","scale","deprecated"]
        return: "float"
        signatures:
          - params: ""
        details: "Kept as a backward-compatible alias; new code should call `getScale()` (same behavior). Scheduled for removal in v1.0.0."
        description: "Deprecated alias for getScale()"
        description_ja: "getScale() の非推奨エイリアス"
        description_ko: "getScale()의 deprecated 별칭"

