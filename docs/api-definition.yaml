        description: "Get all vertices"
        description_ja: "全頂点を取得"
        description_ko: "모든 정점을 얻음"
      - name: size
        self: Path
        const: true
        return: int
        signatures:
          - params: ""
        description: "Get vertex count"
        description_ja: "頂点数を取得"
        description_ko: "정점 개수를 얻음"
      - name: empty
        self: Path
        const: true
        return: bool
        signatures:
          - params: ""
        description: "Check if polyline is empty"
        description_ja: "ポリラインが空か確認"
        description_ko: "폴리라인이 비어있는지 확인"
      - name: clear
        self: Path
        return: "void"
        signatures:
          - params: ""
        description: "Clear all vertices"
        description_ja: "全頂点をクリア"
        description_ko: "모든 정점을 지움"
      - name: moveTo
        self: Path
        return: void
        signatures:
          - params: "float x, float y, float z = 0"
          - params: "float x, float y, float z"
          - params: "float x, float y, float z = 0"
          - params: "const Vec3& p"
        description: "Start a new subpath at (x, y). A single Path can hold multiple disjoint contours (think SVG `<path>` with `M ... M ...`) — used by Font::getGlyphPath to keep an outer ring and its holes in one Path so drawFill can detect holes."
        description_ja: "(x, y) で新しい subpath 開始。1 個の Path に複数の独立した contour を持てる (SVG の `M ... M ...` 相当)。Font::getGlyphPath が外枠と穴を 1 つの Path にまとめて drawFill が穴を検出できるようにする用途。"
        description_ko: "(x, y)에서 새 subpath 시작. 한 Path에 여러 분리된 contour 보관 가능 (SVG의 M ... M ...). Font::getGlyphPath가 외곽선과 구멍을 한 Path로 묶어 drawFill이 구멍을 검출."
      - name: lineTo
        self: Path
        return: void
        signatures:
          - params: "float x, float y, float z = 0"
          - params: "float x, float y, float z"
          - params: "float x, float y, float z = 0"
          - params: "const Vec3& p"
        description: "Add line segment to point"
        description_ja: "点まで線を追加"
        description_ko: "특정 점까지 선분을 추가"
      - name: bezierTo
        self: Path
        return: void
        signatures:
          - params: "float cx1, float cy1, float cx2, float cy2, float x, float y, int resolution = -1"
          - params: "float cx1, float cy1, float cx2, float cy2, float x, float y, int resolution = -1"
          - params: "const Vec3& cp1, const Vec3& cp2, const Vec3& to, int resolution = -1"
        description: "Add cubic bezier curve (resolution=-1 uses current curve style)"
        description_ja: "3次ベジェ曲線を追加（resolution=-1で現在のcurve styleを使用）"
        description_ko: "3차 베지어 곡선을 추가 (resolution=-1은 현재 곡선 스타일 사용)"
      - name: quadBezierTo
        self: Path
        return: void
        signatures:
          - params: "float cx, float cy, float x, float y, int resolution = -1"
          - params: "float cx, float cy, float x, float y, int resolution = -1"
          - params: "const Vec3& cp, const Vec3& to, int resolution = -1"
        description: "Add quadratic bezier curve (resolution=-1 uses current curve style)"
        description_ja: "2次ベジェ曲線を追加（resolution=-1で現在のcurve styleを使用）"
        description_ko: "2차 베지어 곡선을 추가 (resolution=-1은 현재 곡선 스타일 사용)"
      - name: curveTo
        self: Path
        return: void
        signatures:
          - params: "float x, float y, float z = 0, int resolution = -1"
          - params: "const Vec2& to, int resolution = -1"
          - params: "float x, float y, float z = 0, int resolution = -1"
        description: "Add Catmull-Rom curve segment (needs >=4 consecutive calls; resolution=-1 uses current curve style)"
        description_ja: "Catmull-Rom曲線を追加（4回以上の連続呼び出しが必要、resolution=-1で現在のcurve styleを使用）"
        description_ko: "Catmull-Rom 곡선 구간을 추가 (4회 이상의 연속 호출 필요, resolution=-1은 현재 곡선 스타일 사용)"
      - name: arc
        self: Path
        return: void
        signatures:
          - params: "float x, float y, float radius, float angleBegin, float angleEnd, bool clockwise = true"
          - params: "float x, float y, float radius, float angleBegin, float angleEnd, bool clockwise = true"
          - params: "const Vec3& center, float radius, float angleBegin, float angleEnd, bool clockwise = true"
        description: "Add an arc (angles in radians)"
        description_ja: "円弧を追加（角度はradian）"
        description_ko: "호를 추가 (각도는 radian)"
      - name: close
        self: Path
        return: "void"
        signatures:
          - params: ""
        description: "Close the path"
        description_ja: "パスを閉じる"
        description_ko: "경로를 닫음"
      - name: setClosed
        self: Path
        return: "void"
        signatures:
          - params: "bool closed"
        description: "Set closed state"
        description_ja: "閉じた状態を設定"
        description_ko: "닫힌 상태를 설정"
      - name: isClosed
        self: Path
        const: true
        return: bool
        signatures:
          - params: ""
        description: "Check if path is closed"
        description_ja: "パスが閉じているか確認"
        description_ko: "경로가 닫혀 있는지 확인"
      - name: reverseWinding
        self: Path
        return: "Path&"
        signatures:
          - params: ""
          - params: "size_t subpath"
        description: "Reverse the winding direction (vertex order) of all subpaths, or of one subpath. Under drawFill's non-zero winding rule, reversing a subpath toggles it between filling and cutting — e.g. build a circle contour, then reverseWinding(i) it into a hole punch. Reversing ALL subpaths leaves the render unchanged (only relative direction matters) — handy for imported outlines using the opposite convention."
        description_ja: "subpath の巻き方向 (頂点順) を反転。引数なしで全 subpath、index 指定で 1 つだけ。drawFill の non-zero winding rule では反転で塗り ↔ 穴が切り替わる — 円の contour を作って reverseWinding(i) すれば穴パンチになる。全部反転しても描画結果は不変 (相対方向のみ意味を持つ) なので、逆巻き慣習のインポートデータの修正にも使える。"
        description_ko: "subpath의 감김 방향 (정점 순서)을 반전. 인수 없이 전체, index 지정으로 하나만. drawFill의 non-zero winding rule에서는 반전으로 채움 ↔ 구멍이 전환됨. 전체 반전은 렌더 결과 불변 (상대 방향만 의미) — 반대 규약의 임포트 데이터 수정에도 사용."
      - name: draw
        self: Path
        const: true
        return: "void"
        signatures:
          - params: ""
        description: "Draw the polyline (fill + 1px stroke based on current style — fill uses triangle fan, convex only). For concave shapes / holes use drawFill."
        description_ja: "ポリラインを描画 (現在の style で fill + 1px stroke。fill は triangle fan = 凸形状のみ)。凹形状や穴は drawFill を使う。"
        description_ko: "폴리라인 그리기 (현재 스타일로 fill + 1px stroke, fill은 triangle fan = 볼록한 형태만). 오목한 형태나 구멍은 drawFill 사용."
      - name: drawFill
        self: Path
        const: true
        return: "void"
        signatures:
          - params: ""
        description: "Fill the path as a concave polygon with holes (earcut tessellation). Subpaths follow the non-zero winding rule (SVG / PostScript default): a subpath wound opposite to its enclosing ring becomes a hole; same-direction subpaths union (never punch holes). Handles glyphs with holes (e, a, O, 日 ...), overlapping contours, and both TrueType / CFF winding conventions. To cut a hole in a hand-built Path, wind the inner subpath opposite (see reverseWinding)."
        description_ja: "穴付き凹多角形として塗りつぶし (earcut)。subpath は non-zero winding rule (SVG / PostScript のデフォルト) に従う — 外側のリングと逆巻きの subpath が穴になり、同方向は union (穴を開けない)。穴付きグリフ (e, a, O, 日 等)、重なった contour、TrueType / CFF 両方の巻き方向慣習に対応。手書き Path で穴を開けるには内側を逆巻きにする (reverseWinding 参照)。"
        description_ko: "구멍 있는 오목 다각형 채우기 (earcut). subpath는 non-zero winding rule (SVG / PostScript 기본값)을 따름 — 바깥 링과 반대로 감긴 subpath가 구멍이 되고, 같은 방향은 union. 구멍 있는 글리프 (e, a, O, 日 등), 겹친 contour, TrueType / CFF 양쪽 규약 지원. 수제 Path에 구멍을 내려면 안쪽을 반대로 감음 (reverseWinding 참조)."
      - name: drawStroke
        self: Path
        const: true
        return: "void"
        signatures:
          - params: ""
        description: "Thick stroke via StrokeMesh (respects strokeWeight / strokeCap / strokeJoin), per-subpath. Use draw() for 1-pixel lines."
        description_ja: "StrokeMesh による太いストローク (strokeWeight / Cap / Join 反映)、subpath 毎。1 ピクセル線は draw()。"
        description_ko: "StrokeMesh로 두꺼운 stroke (strokeWeight / Cap / Join 적용), subpath 별. 1 픽셀 선은 draw()."
      - name: getBounds
        self: Path
        const: true
        return: "Rect"
        signatures:
