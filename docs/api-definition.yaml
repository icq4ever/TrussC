      - name: getBitmapStringWidth
        keywords: ["text width","measure","extent","pixels"]
        return: "float"
        signatures:
          - params: "const string& text"
        description: "Get text width"
        description_ja: "テキストの幅を取得"
        description_ko: "비트맵 텍스트 너비를 얻음"

      - name: getBitmapStringHeight
        keywords: ["text height","measure","extent","pixels"]
        return: "float"
        signatures:
          - params: "const string& text"
        description: "Get text height"
        description_ja: "テキストの高さを取得"
        description_ko: "비트맵 텍스트 높이를 얻음"

      - name: getBitmapStringBBox
        keywords: ["bounding box","extent","measure","rect"]
        return: Rect
        signatures:
          - params: "const std::string & text"
        description: "Get text bounding box"
        description_ja: "テキストのバウンディングボックスを取得"
        description_ko: "비트맵 텍스트 바운딩 박스를 얻음"

      # ---------------------------------------------------------------------
      # Bitmap font extension API (tc::bitmapfont:: namespace)
      # ---------------------------------------------------------------------
      # Addons / app code can register their own glyphs for any Unicode
      # codepoint. drawBitmapString picks them up automatically. ASCII
      # (U+0020-U+007E) is built in; codepoints with no glyph registered
      # fall back to a TOFU □ marker.

      - name: bitmapfont::registerGlyph
        cppName: "bitmapfont::registerGlyph"
        related:
          - Glyph
        keywords: ["glyph","character","custom font","unicode","codepoint"]
        return: "void"
        signatures:
          - params: "const bitmapfont::Glyph& g"
        description: "Register a bitmap glyph for a Unicode codepoint (extends drawBitmapString)"
        description_ja: "Unicode コードポイントにビットマップグリフを登録 (drawBitmapString を拡張)"
        description_ko: "유니코드 코드포인트에 비트맵 글리프 등록 (drawBitmapString 확장)"

      - name: bitmapfont::registerGlyphs
        template: true
        cppName: "bitmapfont::registerGlyphs"
        related:
          - Glyph
        keywords: ["glyphs","characters","batch","custom font"]
        return: "void"
        signatures:
          - params: "const bitmapfont::Glyph (&glyphs)[N] glyphs[]"
        description: "Register a batch of bitmap glyphs at once"
        description_ja: "複数のビットマップグリフを一括登録"
        description_ko: "여러 비트맵 글리프를 한 번에 등록"

      - name: bitmapfont::updateGlyph
        cppName: "bitmapfont::updateGlyph"
        keywords: ["glyph","animate","swap","pixel data"]
        return: "void"
        signatures:
          - params: "uint32_t cp, const uint8_t* newData"
        description: "Swap an already-registered glyph's pixel data (atlas cell unchanged). Useful for per-frame animation."
        description_ja: "登録済みグリフのピクセルデータだけ差し替え（アトラス位置は維持）。フレームごとのアニメーションに便利"
        description_ko: "이미 등록된 글리프의 픽셀 데이터만 교체 (아틀라스 위치 유지). 프레임 애니메이션에 유용"

      - name: bitmapfont::compile8x13
        cppName: "bitmapfont::compile8x13"
        keywords: ["ascii art","glyph","halfwidth","pixel font","8x13"]
        return: "std::array<uint8_t, 13>"
        signatures:
          - params: "const char* const (&rows)[13] rows"
        description: "Compile-time ASCII art -> packed halfwidth (8x13) glyph bytes. '#' = lit, '.' = empty."
        description_ja: "ASCII アートをコンパイル時に半角 (8x13) パックバイトに変換。'#' = 描画、'.' = 透明"
        description_ko: "ASCII 아트를 컴파일 타임에 반각 (8x13) 패킹된 바이트로 변환. '#' = 채움, '.' = 빈 칸"

      - name: bitmapfont::compile16x13
        cppName: "bitmapfont::compile16x13"
        keywords: ["ascii art","glyph","fullwidth","pixel font","16x13"]
        return: "std::array<uint8_t, 26>"
        signatures:
          - params: "const char* const (&rows)[13] rows"
        description: "Compile-time ASCII art -> packed fullwidth (16x13) glyph bytes. '#' = lit, '.' = empty."
        description_ja: "ASCII アートをコンパイル時に全角 (16x13) パックバイトに変換。'#' = 描画、'.' = 透明"
        description_ko: "ASCII 아트를 컴파일 타임에 전각 (16x13) 패킹된 바이트로 변환. '#' = 채움, '.' = 빈 칸"

      - name: setBitmapLineHeight
        related:
          - getBitmapLineHeight
        keywords: ["line spacing","leading","newline","text"]
        return: "void"
        signatures:
          - params: "float height"
        description: "Set line height for bitmap string newlines (default: 16)"
        description_ja: "ビットマップ文字列の改行時の行の高さを設定（デフォルト: 16）"
        description_ko: "비트맵 문자열 개행 시의 줄 높이를 설정 (기본값: 16)"

      - name: getBitmapLineHeight
        related:
          - setBitmapLineHeight
        keywords: ["line spacing","leading","newline","text"]
        return: "float"
        signatures:
          - params: ""
        description: "Get line height for bitmap string newlines"
        description_ja: "ビットマップ文字列の改行時の行の高さを取得"
        description_ko: "비트맵 문자열 개행 시의 줄 높이를 얻음"

      - name: setFps
        related:
          - getFps
        keywords: ["frame rate","framerate","vsync","speed","ofsetframerate"]
        return: "void"
        signatures:
          - params: "float fps"
        description: "Set target frame rate (VSYNC = -1.0)"
        description_ja: "ターゲットフレームレートを設定 (VSYNC = -1.0)"
        description_ko: "목표 프레임레이트를 설정 (VSYNC = -1.0)"
        of_equivalent: "ofSetFrameRate"

  # ==========================================================================
  # Graphics - Style
  # ==========================================================================
  - id: graphics_style
    name: "Graphics - Style"
    name_ja: "グラフィックス - スタイル"
    name_ko: "그래픽 - 스타일"
    functions:
      - name: fill
        related:
          - setColor
          - endShape
        keywords: ["solid","filled","ofFill"]
        return: "void"
        signatures:
          - params: ""
        description: "Enable fill mode (shapes are solid, no outline)"
        description_ja: "塗りつぶしモードを有効化（シェイプは塗りつぶし、輪郭なし）"
        description_ko: "채우기 모드 활성화 (도형이 채워지고 외곽선 없음)"
        of_equivalent: "ofFill"

      - name: noFill
        related:
          - setStrokeWeight
        keywords: ["outline","stroke only","hollow","wireframe","ofnofill"]
        examples:
          - graphicsExample
        return: "void"
        signatures:
          - params: ""
        description: "Enable stroke mode (shapes show outline only)"
        description_ja: "ストロークモードを有効化（シェイプは輪郭のみ）"
        description_ko: "stroke 모드 활성화 (도형은 외곽선만 표시)"
        of_equivalent: "ofNoFill"

      - name: setStrokeWeight
        related:
          - getStrokeWeight
          - fill
          - drawLine
        keywords: ["line width","thickness","weight","ofsetlinewidth"]
        return: "void"
        signatures:
          - params: "float weight"
        description: "Set stroke width"
        description_ja: "ストロークの太さを設定"
        description_ko: "stroke 두께를 설정"
        of_equivalent: "ofSetLineWidth"

      - name: getStrokeWeight
        related:
          - setStrokeWeight
        keywords: ["line width","thickness","weight"]
        return: "float"
        signatures:
          - params: ""
        description: "Get current stroke width"
        description_ja: "現在のストロークの太さを取得"
        description_ko: "현재 storke 두께를 얻음"

      - name: setStrokeCap
        related:
          - StrokeCap
          - getStrokeCap
          - beginStroke
          - drawStroke
        keywords: ["line cap","end cap","butt","round","square"]
        return: "void"
        signatures:
          - params: "StrokeCap cap"
        description: "Set stroke cap style (Butt, Round, Square)"
        description_ja: "ストローク端点のスタイルを設定"
        description_ko: "stroke 끝점 스타일을 설정 (Butt, Round, Square)"

      - name: getStrokeCap
        related:
          - StrokeCap
          - setStrokeCap
        keywords: ["line cap","end cap","ending"]
        return: "StrokeCap"
        signatures:
          - params: ""
        description: "Get current stroke cap style"
        description_ja: "現在のストローク端点スタイルを取得"
        description_ko: "현재 stroke 끝점 스타일을 얻음"

      - name: setStrokeJoin
        related:
          - StrokeJoin
          - getStrokeJoin
          - beginStroke
          - drawStroke
          - setMiterLimit
        keywords: ["line join","corner","miter","bevel","round"]
        return: "void"
        signatures:
          - params: "StrokeJoin join"
        description: "Set stroke join style (Miter, Round, Bevel)"
        description_ja: "ストローク結合部のスタイルを設定"
        description_ko: "stroke 결합부 스타일을 설정 (Miter, Round, Bevel)"

      - name: getStrokeJoin
        related:
          - StrokeJoin
          - setStrokeJoin
        keywords: ["line join","corner","miter"]
        return: "StrokeJoin"
        signatures:
          - params: ""
        description: "Get current stroke join style"
        description_ja: "現在のストローク結合部スタイルを取得"
        description_ko: "현재 stroke 결합부 스타일을 얻음"

      - name: isFillEnabled
        const: true
