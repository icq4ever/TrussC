        description_ko: "현재 곡선 tessellation 모드 (고정 세그먼트 수 vs. 적응형 허용오차)"
  - id: transform
    name: "Transform"
    name_ja: "変換"
    name_ko: "변환"
    functions:
      - name: translate
        related:
          - rotate
          - scale
          - pushMatrix
        keywords: ["move","offset","position","shift","oftranslate"]
        examples:
          - easyCamExample
          - meshAppendExample
          - 3DPrimitivesExample
        return: "void"
        signatures:
          - params: "float x, float y"
          - params: "float x, float y, float z"
        description: "Move origin"
        description_ja: "原点を移動"
        description_ko: "원점을 이동"
        of_equivalent: "ofTranslate"

      - name: rotate
        related:
          - Quaternion
          - rotateDeg
          - rotateX
          - rotateY
          - rotateZ
          - rotateXDeg
          - rotateYDeg
          - rotateZDeg
        keywords: ["spin","turn","rotation","ofrotate"]
        return: void
        signatures:
          - params: "float radians"
          - params: "float x, float y, float z"
          - params: "float x, float y, float z"
          - params: "const Quaternion& quat"
        description: "Rotate by radians (single axis, euler angles, or quaternion)"
        description_ja: "ラジアンで回転（単軸、オイラー角、またはクォータニオン）"
        description_ko: "라디안으로 회전 (단일 축, 오일러 각도 또는 쿼터니언)"
        of_equivalent: "ofRotateRad"
        of_notes: "Always radians (not degrees like oF default)"

      - name: rotateDeg
        keywords: ["spin","turn","degrees","rotation"]
        return: void
        signatures:
          - params: "float degrees"
          - params: "float x, float y, float z"
          - params: "float x, float y, float z"
        description: "Rotate by degrees"
        description_ja: "度で回転"
        description_ko: "도(degree)로 회전"
        of_equivalent: "ofRotateDeg"

      - name: rotateX
        related:
          - rotateXDeg
        keywords: ["spin","pitch","x axis","rotation"]
        return: "void"
        signatures:
          - params: "float radians"
        description: "Rotate around X axis"
        description_ja: "X軸周りに回転"
        description_ko: "X축을 중심으로 회전"

      - name: rotateY
        related:
          - rotateYDeg
        keywords: ["spin","yaw","y axis","rotation"]
        return: "void"
        signatures:
          - params: "float radians"
        description: "Rotate around Y axis"
        description_ja: "Y軸周りに回転"
        description_ko: "Y축을 중심으로 회전"

      - name: rotateZ
        related:
          - rotateZDeg
        keywords: ["spin","roll","z axis","rotation"]
        return: "void"
        signatures:
          - params: "float radians"
        description: "Rotate around Z axis"
        description_ja: "Z軸周りに回転"
        description_ko: "Z축을 중심으로 회전"

      - name: rotateXDeg
        keywords: ["spin","pitch","x axis","degrees"]
        return: "void"
        signatures:
          - params: "float degrees"
        description: "Rotate around X axis (degrees)"
        description_ja: "X軸周りに回転（度）"
        description_ko: "X축을 중심으로 회전 (도)"

      - name: rotateYDeg
        keywords: ["spin","yaw","y axis","degrees"]
        return: "void"
        signatures:
          - params: "float degrees"
        description: "Rotate around Y axis (degrees)"
        description_ja: "Y軸周りに回転（度）"
        description_ko: "Y축을 중심으로 회전 (도)"

      - name: rotateZDeg
        keywords: ["spin","roll","z axis","degrees"]
        return: "void"
        signatures:
          - params: "float degrees"
        description: "Rotate around Z axis (degrees)"
        description_ja: "Z軸周りに回転（度）"
        description_ko: "Z축을 중심으로 회전 (도)"

