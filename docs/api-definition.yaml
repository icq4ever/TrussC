  - name: PlayingSound
    related:
      - play
      - AudioEngine
      - SoundSource
      - MixMode
    keywords: ["voice","playback handle","mixer voice","instance","sound instance"]
    description: "A single live mixer voice returned by AudioEngine::play(). Its fields are the real-time playback state the audio thread reads each callback (volume / pan / speed / loop / playing / paused / mixMode / position) plus the channel routing snapshots. Most fields are atomics so the UI thread can mutate them while the audio thread plays; set them directly."
    description_ja: "AudioEngine::play() が返す 1 本のライブミキサーボイス。フィールドは audio thread が各コールバックで読む再生状態 (volume / pan / speed / loop / playing / paused / mixMode / 位置) とチャンネルルーティングのスナップショット。大半は atomic なので UI thread から再生中に書き換えられる。直接設定する"
    description_ko: "AudioEngine::play()가 반환하는 하나의 라이브 믹서 보이스. 필드는 오디오 스레드가 콜백마다 읽는 재생 상태 (volume / pan / speed / loop / playing / paused / mixMode / 위치) 와 채널 라우팅 스냅샷. 대부분 atomic이라 UI 스레드에서 재생 중에 변경 가능. 직접 설정한다"
    properties:
      - name: volume
        self: PlayingSound
        type: "float"
        description: "Playback volume (0.0-1.0). Stored as an atomic; safe to set from the UI thread while playing."
        description_ja: "再生音量 (0.0-1.0)。atomic 格納で、再生中に UI thread から設定して安全"
        description_ko: "재생 음량 (0.0-1.0). atomic 저장이라 재생 중 UI 스레드에서 설정해도 안전"
      - name: pan
        self: PlayingSound
        type: "float"
        description: "Stereo pan (-1.0 left, 0.0 center, 1.0 right). Atomic."
        description_ja: "ステレオパン (-1.0 左, 0.0 中央, 1.0 右)。atomic"
        description_ko: "스테레오 팬 (-1.0 왼쪽, 0.0 중앙, 1.0 오른쪽). atomic"
      - name: speed
        self: PlayingSound
        type: "float"
        description: "Playback speed (0.5 half, 1.0 normal, 2.0 double). Atomic."
        description_ja: "再生速度 (0.5 半分, 1.0 標準, 2.0 倍)。atomic"
        description_ko: "재생 속도 (0.5 절반, 1.0 일반, 2.0 두 배). atomic"
      - name: loop
        self: PlayingSound
        type: "bool"
        description: "Loop the voice when it reaches the end. Atomic."
        description_ja: "末尾に達したらループ再生する。atomic"
        description_ko: "끝에 도달하면 반복 재생. atomic"
      - name: playing
        self: PlayingSound
        type: "bool"
        description: "True while this voice is active in the mixer. Atomic."
        description_ja: "ミキサーでこのボイスがアクティブな間 true。atomic"
        description_ko: "믹서에서 이 보이스가 활성인 동안 true. atomic"
      - name: paused
        self: PlayingSound
        type: "bool"
        description: "True while paused (still a live voice, but not advancing). Atomic."
        description_ja: "一時停止中 true (ボイスは生きているが進まない)。atomic"
        description_ko: "일시정지 중 true (보이스는 살아있지만 진행하지 않음). atomic"
      - name: mixMode
        self: PlayingSound
        type: "MixMode"
        description: "Channel mix policy when no explicit channelMap is set (Auto / DownmixMono). Stored as an atomic int holding the MixMode value."
        description_ja: "明示的な channelMap が無いときのチャンネルミックス方針 (Auto / DownmixMono)。MixMode 値を保持する atomic int で格納"
        description_ko: "명시적 channelMap이 없을 때의 채널 믹스 정책 (Auto / DownmixMono). MixMode 값을 가지는 atomic int로 저장"
      - name: positionF
        self: PlayingSound
        type: "double"
        description: "Floating-point playback cursor in source samples; advances by speed * rateRatio each output frame."
        description_ja: "ソースサンプル単位の浮動小数点再生カーソル。各出力フレームで speed * rateRatio ずつ進む"
        description_ko: "소스 샘플 단위의 부동소수점 재생 커서. 각 출력 프레임마다 speed * rateRatio 만큼 진행"
      - name: rateRatio
        self: PlayingSound
        type: "float"
        description: "Source-to-engine sample-rate ratio (buffer sampleRate / engine sampleRate), set when queued so the voice plays at correct pitch regardless of engine rate."
        description_ja: "ソース対エンジンのサンプルレート比 (buffer sampleRate / engine sampleRate)。キュー時に設定され、エンジンレートに依らず正しいピッチで再生される"
        description_ko: "소스 대 엔진 샘플레이트 비율 (buffer sampleRate / engine sampleRate). 큐 등록 시 설정되어 엔진 레이트와 무관하게 올바른 피치로 재생"
      - name: channelMap
        self: PlayingSound
        type: "internal::AtomicSharedPtr<const std::vector<std::vector<int>>>"
        lua: false
        description: "Atomically-swappable per-output-channel source routing. Null means follow mixMode; non-null map is the source of truth. UI thread installs new versions, audio thread reads each callback."
        description_ja: "出力チャンネルごとのソースルーティング (atomic 差し替え可)。null なら mixMode に従い、非 null のマップが真実。UI thread が新版を入れ、audio thread が各コールバックで読む"
        description_ko: "출력 채널별 소스 라우팅 (atomic 교체 가능). null이면 mixMode를 따르고, non-null 맵이 기준. UI 스레드가 새 버전을 넣고 오디오 스레드가 콜백마다 읽음"
      - name: channelGains
        self: PlayingSound
        type: "internal::AtomicSharedPtr<const std::vector<float>>"
        lua: false
        description: "Atomically-swappable per-output-channel gain multipliers. Entries beyond .size() default to 1.0. Orthogonal to channelMap / mixMode."
        description_ja: "出力チャンネルごとのゲイン乗数 (atomic 差し替え可)。.size() を超える要素は 1.0。channelMap / mixMode と直交"
        description_ko: "출력 채널별 게인 배수 (atomic 교체 가능). .size()를 넘는 항목은 1.0. channelMap / mixMode와 직교"

  - name: SoundSource
    related:
      - SoundBuffer
      - SoundStream
      - Sound
    keywords: ["audio source","pcm","sample data","playable","base sound"]
    description: "Abstract base for anything Sound::play() can consume. Two concrete subclasses: SoundBuffer (eager, full PCM in RAM) and SoundStream (decoded on demand from disk). Holds the shared channels / sampleRate fields and the kind() / getDuration() interface."
    description_ja: "Sound::play()が扱えるものの抽象基底。具象サブクラスは2つ: SoundBuffer(eager、全PCMをRAMに保持)とSoundStream(ディスクからオンデマンドにデコード)。共有のchannels / sampleRateフィールドとkind() / getDuration()インターフェースを保持"
    description_ko: "Sound::play()가 다룰 수 있는 것의 추상 기반. 구체 서브클래스 2개: SoundBuffer(eager, 전체 PCM을 RAM에 보유)와 SoundStream(디스크에서 on-demand 디코딩). 공유 channels / sampleRate 필드와 kind() / getDuration() 인터페이스를 보유"
    properties:
      - name: channels
        self: SoundSource
        type: int
        description: "Channel count of the source (1 = mono, 2 = stereo, ...)"
        description_ja: "ソースのチャンネル数(1 = mono、2 = stereo、...)"
        description_ko: "소스의 채널 수(1 = mono, 2 = stereo, ...)"
      - name: sampleRate
        self: SoundSource
        type: int
        description: "Source sample rate in Hz"
        description_ja: "ソースのサンプルレート(Hz)"
        description_ko: "소스의 샘플레이트(Hz)"
    methods:
      - name: kind
        self: SoundSource
        const: true
        return: "SoundSource::Kind"
        signatures:
          - params: ""
        description: "Source kind (Eager for SoundBuffer, Stream for SoundStream). Lets the mixer dispatch without a virtual call per frame."
        description_ja: "ソースの種別(SoundBufferはEager、SoundStreamはStream)。ミキサーがフレームごとの仮想呼び出しなしにディスパッチできる"
        description_ko: "소스 종류(SoundBuffer는 Eager, SoundStream은 Stream). 믹서가 프레임마다의 가상 호출 없이 디스패치 가능"
      - name: getDuration
        self: SoundSource
        const: true
        return: "float"
        signatures:
          - params: ""
        description: "Duration in seconds. numSamples/sampleRate for buffers; the decoded file's duration for streams."
        description_ja: "秒単位の長さ。バッファはnumSamples/sampleRate、ストリームはデコードしたファイルの長さ"
        description_ko: "초 단위 길이. 버퍼는 numSamples/sampleRate, 스트림은 디코딩된 파일의 길이"

  - name: SoundBuffer
    related:
      - SoundStream
      - SoundSource
      - Sound
      - Wave
    keywords: ["audio buffer","pcm ram","sfx","waveform","procedural audio"]
    description: "Eager sound source: the full file decoded into interleaved float PCM held in RAM. Derives from SoundSource (inherits channels / sampleRate / kind() / getDuration()). Also provides waveform generators, an ADSR envelope, and mixing helpers, so it doubles as a procedural-audio scratch buffer. Best for short SFX and zero-latency play / seek / multi-instance."
    description_ja: "Eagerなサウンドソース: ファイル全体をinterleaved float PCMにデコードしRAMに保持。SoundSourceから派生(channels / sampleRate / kind() / getDuration()を継承)。波形ジェネレータ、ADSRエンベロープ、ミキシングヘルパーも備え、procedural-audioのスクラッチバッファも兼ねる。短いSFXやゼロレイテンシなplay / seek / マルチインスタンスに最適"
    description_ko: "Eager 사운드 소스: 파일 전체를 interleaved float PCM으로 디코딩해 RAM에 보유. SoundSource에서 파생(channels / sampleRate / kind() / getDuration() 상속). 파형 제너레이터, ADSR 엔벨로프, 믹싱 헬퍼도 제공해 procedural-audio 스크래치 버퍼 역할도 겸함. 짧은 SFX와 zero-latency play / seek / 다중 인스턴스에 최적"
    constructor:
      signatures:
        - params: ""
    properties:
      - name: samples
        self: SoundBuffer
        type: "vector<float>"
        description: "Interleaved PCM samples (channels interleaved per frame)"
        description_ja: "interleavedなPCMサンプル(フレームごとにチャンネルがinterleave)"
        description_ko: "interleaved PCM 샘플(프레임마다 채널이 interleave됨)"
      - name: numSamples
        self: SoundBuffer
        type: size_t
        description: "Number of samples per channel (frame count)"
        description_ja: "チャンネルあたりのサンプル数(フレーム数)"
        description_ko: "채널당 샘플 수(프레임 수)"
    methods:
      - name: load
        self: SoundBuffer
        return: "bool"
        signatures:
          - params: "const string& path"
        description: "Decode a file into PCM, auto-detecting format from the extension (.wav .mp3 .ogg .flac .aac .m4a, case-insensitive). Returns false on failure."
        description_ja: "拡張子から形式を自動判別してファイルをPCMにデコード(.wav .mp3 .ogg .flac .aac .m4a、大文字小文字を区別しない)。失敗時falseを返す"
        description_ko: "확장자로 형식을 자동 판별해 파일을 PCM으로 디코딩(.wav .mp3 .ogg .flac .aac .m4a, 대소문자 무시). 실패 시 false 반환"
      - name: loadWav
        self: SoundBuffer
        return: "bool"
        signatures:
          - params: "const string& path"
        description: "Decode a WAV file into PCM."
        description_ja: "WAVファイルをPCMにデコード"
        description_ko: "WAV 파일을 PCM으로 디코딩"
      - name: loadMp3
        self: SoundBuffer
        return: "bool"
        signatures:
          - params: "const string& path"
        description: "Decode an MP3 file into PCM."
        description_ja: "MP3ファイルをPCMにデコード"
        description_ko: "MP3 파일을 PCM으로 디코딩"
      - name: loadOgg
        self: SoundBuffer
        return: "bool"
        signatures:
          - params: "const string& path"
        description: "Decode an OGG Vorbis file into PCM (via stb_vorbis)."
        description_ja: "OGG VorbisファイルをPCMにデコード(stb_vorbis経由)"
        description_ko: "OGG Vorbis 파일을 PCM으로 디코딩(stb_vorbis 사용)"
      - name: loadFlac
        self: SoundBuffer
        return: "bool"
        signatures:
          - params: "const string& path"
        description: "Decode a FLAC file into PCM."
        description_ja: "FLACファイルをPCMにデコード"
        description_ko: "FLAC 파일을 PCM으로 디코딩"
      - name: loadAac
        self: SoundBuffer
        platforms: [macos, ios, windows, linux, wasm]
        platformNote: "AAC/M4A decoding (reached via Sound::load() on .aac/.m4a, or SoundBuffer::loadAac). macOS/iOS use AVFoundation (AVAssetReader), Windows uses Media Foundation, Linux uses GStreamer, wasm uses Web Audio decodeAudioData (deferred until play(), placeholder samples until then). STUBBED on Android: logs 'AAC loading not yet implemented' and returns false (TODO MediaCodec). All other audio formats (WAV/MP3/FLAC via miniaudio, OGG via stb_vorbis) work on all 6 platforms."
        platformNote_ja: "AAC/M4A デコード (.aac/.m4a を Sound::load()、または SoundBuffer::loadAac で到達)。macOS/iOS は AVFoundation (AVAssetReader)、Windows は Media Foundation、Linux は GStreamer、wasm は Web Audio decodeAudioData (play() まで遅延、それまではプレースホルダ)。Android のみスタブで 'AAC loading not yet implemented' を出して false を返す (TODO MediaCodec)。他フォーマット (WAV/MP3/FLAC=miniaudio、OGG=stb_vorbis) は全6プラットフォームで動作。"
        return: "bool"
        signatures:
          - params: "const string& path"
        description: "Decode an AAC / M4A file into PCM (platform-specific; returns false on unsupported platforms)."
        description_ja: "AAC / M4AファイルをPCMにデコード(プラットフォーム依存。非対応プラットフォームではfalseを返す)"
        description_ko: "AAC / M4A 파일을 PCM으로 디코딩(플랫폼 의존. 미지원 플랫폼에서는 false 반환)"
      - name: loadWavFromMemory
        self: SoundBuffer
        return: "bool"
        signatures:
          - params: "const void* data, size_t dataSize"
        description: "Decode WAV data from a memory buffer."
        description_ja: "メモリバッファからWAVデータをデコード"
        description_ko: "메모리 버퍼에서 WAV 데이터를 디코딩"
      - name: loadMp3FromMemory
        self: SoundBuffer
        return: "bool"
        signatures:
          - params: "const void* data, size_t dataSize"
        description: "Decode MP3 data from a memory buffer."
        description_ja: "メモリバッファからMP3データをデコード"
        description_ko: "메모리 버퍼에서 MP3 데이터를 디코딩"
      - name: loadOggFromMemory
        self: SoundBuffer
        return: "bool"
        signatures:
          - params: "const void* data, size_t dataSize"
        description: "Decode OGG Vorbis data from a memory buffer."
        description_ja: "メモリバッファからOGG Vorbisデータをデコード"
        description_ko: "메모리 버퍼에서 OGG Vorbis 데이터를 디코딩"
      - name: loadFlacFromMemory
        self: SoundBuffer
        return: "bool"
        signatures:
          - params: "const void* data, size_t dataSize"
        description: "Decode FLAC data from a memory buffer."
        description_ja: "メモリバッファからFLACデータをデコード"
        description_ko: "메모리 버퍼에서 FLAC 데이터를 디코딩"
      - name: loadAacFromMemory
        self: SoundBuffer
        platforms: [macos, ios, windows, linux]
        platformNote: "Memory-based AAC decode. Real impls on macOS/iOS (AVFoundation), Windows (Media Foundation), Linux (GStreamer). STUBBED on Android (returns false) and on wasm (logs 'loadAacFromMemory() not yet implemented for Web (use file path instead)' and returns false). Not documented in api-definition.yaml."
        platformNote_ja: "メモリからの AAC デコード。macOS/iOS (AVFoundation)、Windows (Media Foundation)、Linux (GStreamer) は実装あり。Android はスタブで false、wasm も 'loadAacFromMemory() not yet implemented for Web' を出して false。api-definition.yaml には未記載。"
        return: "bool"
        signatures:
          - params: "const void* data, size_t dataSize"
        description: "Decode AAC data from a memory buffer (platform-specific; returns false on unsupported platforms)."
        description_ja: "メモリバッファからAACデータをデコード(プラットフォーム依存。非対応プラットフォームではfalseを返す)"
        description_ko: "메모리 버퍼에서 AAC 데이터를 디코딩(플랫폼 의존. 미지원 플랫폼에서는 false 반환)"
      - name: loadPcmFromMemory
        self: SoundBuffer
        return: "bool"
        signatures:
          - params: "const void* data, size_t dataSize, int numChannels, int rate, int bitsPerSample = 16, bool bigEndian = false"
        description: "Load raw interleaved PCM (16-bit signed or 32-bit float) from memory with explicit format. Returns false for unsupported bit depths."
        description_ja: "形式を明示してメモリから生のinterleaved PCM(16-bit signedまたは32-bit float)を読み込む。非対応のビット深度ではfalseを返す"
        description_ko: "형식을 명시해 메모리에서 raw interleaved PCM(16-bit signed 또는 32-bit float)을 로드. 미지원 비트 심도에서는 false 반환"
      - name: getDuration
        self: SoundBuffer
        const: true
        return: "float"
        signatures:
          - params: ""
        description: "Duration in seconds (numSamples / sampleRate)."
        description_ja: "秒単位の長さ(numSamples / sampleRate)"
        description_ko: "초 단위 길이(numSamples / sampleRate)"
      - name: generateSineWave
        self: SoundBuffer
        return: "void"
        signatures:
          - params: "float frequency, float duration, float volume = 0.5f, int sr = 44100"
        description: "Fill the buffer with a mono sine wave of the given frequency (Hz) and duration (seconds)."
        description_ja: "指定した周波数(Hz)と長さ(秒)のモノsine波でバッファを埋める"
        description_ko: "지정한 주파수(Hz)와 길이(초)의 모노 sine 파형으로 버퍼를 채움"
      - name: generateSquareWave
        self: SoundBuffer
        return: "void"
        signatures:
          - params: "float frequency, float duration, float volume = 0.5f, int sr = 44100"
        description: "Fill the buffer with a mono square wave."
        description_ja: "モノsquare波でバッファを埋める"
        description_ko: "모노 square 파형으로 버퍼를 채움"
      - name: generateTriangleWave
        self: SoundBuffer
        return: "void"
        signatures:
          - params: "float frequency, float duration, float volume = 0.5f, int sr = 44100"
        description: "Fill the buffer with a mono triangle wave."
        description_ja: "モノtriangle波でバッファを埋める"
        description_ko: "모노 triangle 파형으로 버퍼를 채움"
      - name: generateSawtoothWave
        self: SoundBuffer
        return: "void"
        signatures:
          - params: "float frequency, float duration, float volume = 0.5f, int sr = 44100"
        description: "Fill the buffer with a mono sawtooth wave."
        description_ja: "モノsawtooth波でバッファを埋める"
        description_ko: "모노 sawtooth 파형으로 버퍼를 채움"
      - name: generateNoise
        self: SoundBuffer
        return: "void"
        signatures:
          - params: "float duration, float volume = 0.5f, int sr = 44100"
        description: "Fill the buffer with mono white noise."
        description_ja: "モノwhite noiseでバッファを埋める"
        description_ko: "모노 white noise로 버퍼를 채움"
      - name: generatePinkNoise
        self: SoundBuffer
        return: "void"
        signatures:
          - params: "float duration, float volume = 0.5f, int sr = 44100"
        description: "Fill the buffer with mono pink noise (1/f spectrum, Paul Kellet's method)."
        description_ja: "モノpink noise(1/fスペクトル、Paul Kelletの手法)でバッファを埋める"
        description_ko: "모노 pink noise(1/f 스펙트럼, Paul Kellet 방식)로 버퍼를 채움"
      - name: generateSilence
        self: SoundBuffer
        return: "void"
        signatures:
          - params: "float duration, int sr = 44100"
        description: "Fill the buffer with silence of the given duration (useful as a base for mixFrom)."
        description_ja: "指定した長さの無音でバッファを埋める(mixFromのベースとして便利)"
        description_ko: "지정한 길이의 무음으로 버퍼를 채움(mixFrom의 베이스로 유용)"
      - name: applyADSR
        self: SoundBuffer
        return: "void"
        signatures:
          - params: "float attack, float decay, float sustainLevel, float release"
        description: "Apply an ADSR amplitude envelope to the buffer in place (attack / decay / release in seconds, sustainLevel 0-1)."
        description_ja: "バッファにADSR振幅エンベロープをin-placeで適用(attack / decay / releaseは秒、sustainLevelは0-1)"
        description_ko: "버퍼에 ADSR 진폭 엔벨로프를 in-place로 적용(attack / decay / release는 초, sustainLevel은 0-1)"
      - name: mixFrom
        self: SoundBuffer
        return: "void"
        signatures:
          - params: "const SoundBuffer& other, size_t offsetSamples, float volume = 1.0f"
        description: "Additively mix another buffer into this one starting at offsetSamples, growing this buffer if needed."
        description_ja: "別のバッファをoffsetSamplesから加算ミックスし、必要ならこのバッファを拡張する"
        description_ko: "다른 버퍼를 offsetSamples부터 가산 믹스하고, 필요하면 이 버퍼를 확장"
      - name: clip
        self: SoundBuffer
        return: "void"
        signatures:
          - params: ""
        description: "Hard-clip all samples into the -1.0 .. 1.0 range."
        description_ja: "全サンプルを-1.0 .. 1.0の範囲にhard-clipする"
        description_ko: "모든 샘플을 -1.0 .. 1.0 범위로 hard-clip"
    static_methods:
      - name: getAdtsSampleRateIndex
        self: SoundBuffer
        return: "int"
        signatures:
          - params: "int sampleRate"
        description: "ADTS sample-rate index for the given rate (AAC-in-MOV container helper)."
        description_ja: "指定レートに対するADTSサンプルレートインデックス(AAC-in-MOVコンテナ用ヘルパー)"
        description_ko: "지정 레이트에 대한 ADTS 샘플레이트 인덱스(AAC-in-MOV 컨테이너 헬퍼)"
      - name: createAdtsHeader
        self: SoundBuffer
        return: "void"
        signatures:
          - params: "uint8_t* header, int frameLength, int sampleRate, int channels, int profile = 2"
        description: "Write a 7-byte ADTS header for one raw AAC frame into header (AAC-in-MOV container helper)."
        description_ja: "1つの生AACフレーム用に7バイトのADTSヘッダをheaderに書き込む(AAC-in-MOVコンテナ用ヘルパー)"
        description_ko: "하나의 raw AAC 프레임용 7바이트 ADTS 헤더를 header에 기록(AAC-in-MOV 컨테이너 헬퍼)"

  - name: SoundStream
    related:
      - SoundBuffer
      - SoundSource
      - loadStream
    keywords: ["streaming audio","bgm","music stream","disk audio","on demand"]
    description: "Streaming sound source: the file stays open and is decoded on demand into a small per-voice ring buffer instead of full PCM in RAM. Derives from SoundSource (inherits channels / sampleRate / kind() / getDuration()). Best for long files (BGM, podcasts). Trade-offs vs SoundBuffer: setSpeed() is treated as 1.0, setPosition() seeks with a ~10 ms refill, and each polyphony slot costs one open file handle + decoder + ring buffer."
    description_ja: "ストリーミングなサウンドソース: ファイルを開いたままにし、全PCMをRAMに置く代わりにvoiceごとの小さなring bufferへオンデマンドにデコードする。SoundSourceから派生(channels / sampleRate / kind() / getDuration()を継承)。長尺ファイル(BGM、ポッドキャスト)に最適。SoundBufferとのトレードオフ: setSpeed()は1.0として扱われ、setPosition()は約10 msのrefillでseekし、polyphonyスロットごとにopenファイルハンドル+デコーダ+ring bufferのコストがかかる"
    description_ko: "스트리밍 사운드 소스: 파일을 열어둔 채로, 전체 PCM을 RAM에 두는 대신 voice별 작은 ring buffer로 on-demand 디코딩. SoundSource에서 파생(channels / sampleRate / kind() / getDuration() 상속). 긴 파일(BGM, 팟캐스트)에 최적. SoundBuffer 대비 트레이드오프: setSpeed()는 1.0으로 처리되고, setPosition()은 약 10 ms의 refill로 seek하며, polyphony 슬롯마다 open 파일 핸들 + 디코더 + ring buffer 비용이 듦"
    constructor:
      signatures:
        - params: ""
    methods:
      - name: loadStream
        self: SoundStream
        platforms: [windows, macos, linux, ios, android]
        platformNote: "Streaming audio (Sound::loadStream / SoundStream). On wasm it is unsupported (needs std::thread + on-disk file I/O, neither available in the default browser build); Sound::loadStream() logs a warning and silently falls back to eager load(). So you always get a Sound, but it is never actually streamed on web — branch on isStreaming() / __EMSCRIPTEN__ if it matters."
        platformNote_ja: "ストリーミング再生 (Sound::loadStream / SoundStream)。wasm では非対応 (std::thread + ディスクI/O が必要、ブラウザの既定ビルドにはどちらも無い)。Sound::loadStream() は警告を出して eager load() に静かにフォールバックする。Sound 自体は得られるが web では決してストリームされない — 必要なら isStreaming() / __EMSCRIPTEN__ で分岐する。"
        return: "bool"
        signatures:
          - params: "const string& path, int maxPolyphony = 1"
        description: "Open the file, validate format (.wav .mp3 .flac .ogg), and populate channels / sampleRate / duration. maxPolyphony reserves that many concurrent decoder slots. Returns false if the file can't be opened or the format is unsupported."
        description_ja: "ファイルを開き、形式(.wav .mp3 .flac .ogg)を検証し、channels / sampleRate / durationを埋める。maxPolyphonyはその数だけ同時デコーダスロットを予約。ファイルが開けないか形式が非対応の場合falseを返す"
        description_ko: "파일을 열어 형식(.wav .mp3 .flac .ogg)을 검증하고 channels / sampleRate / duration을 채움. maxPolyphony는 그 수만큼 동시 디코더 슬롯을 예약. 파일을 열 수 없거나 형식이 미지원이면 false 반환"
      - name: getDuration
        self: SoundStream
        const: true
        return: "float"
        signatures:
          - params: ""
        description: "Decoded file duration in seconds."
        description_ja: "デコードしたファイルの秒単位の長さ"
        description_ko: "디코딩된 파일의 초 단위 길이"
      - name: getPath
        self: SoundStream
        const: true
        return: "const string&"
        signatures:
          - params: ""
        description: "Path the stream was opened from."
        description_ja: "ストリームを開いた元のパス"
        description_ko: "스트림을 연 원본 경로"
      - name: getMaxPolyphony
        self: SoundStream
        const: true
        return: "int"
        signatures:
          - params: ""
        description: "Number of concurrent decoder slots reserved at loadStream()."
        description_ja: "loadStream() 時に予約される同時デコーダースロット数"
        description_ko: "loadStream() 시 예약되는 동시 디코더 슬롯 수"

  - name: AudioEngine
    related:
      - getInstance
      - Sound
      - MicInput
      - AudioSettings
      - initAudio
    keywords: ["mixer","audio device","miniaudio","sound engine","output"]
    description: "Singleton miniaudio-based mixer engine. Owns the output device, mixes all playing Sound voices, exposes real-time audioOut / audioIn / audioDeviceChanged events, and an FFT analysis ring buffer. Access via AudioEngine::getInstance(); most apps drive it indirectly through the Sound class and the global initAudio() / shutdownAudio() helpers."
    description_ja: "miniaudio ベースのシングルトンミキサーエンジン。出力デバイスを所有し、再生中の全 Sound ボイスをミックスし、リアルタイムの audioOut / audioIn / audioDeviceChanged イベントと FFT 解析リングバッファを公開する。AudioEngine::getInstance() でアクセス。多くのアプリは Sound クラスとグローバルの initAudio() / shutdownAudio() ヘルパー経由で間接的に利用する"
    description_ko: "miniaudio 기반 싱글톤 믹서 엔진. 출력 디바이스를 소유하고, 재생 중인 모든 Sound 보이스를 믹스하며, 실시간 audioOut / audioIn / audioDeviceChanged 이벤트와 FFT 분석 링 버퍼를 노출한다. AudioEngine::getInstance() 로 접근. 대부분의 앱은 Sound 클래스와 전역 initAudio() / shutdownAudio() 헬퍼를 통해 간접적으로 사용한다"
    properties:
      - name: audioOut
        self: AudioEngine
        type: "Event<AudioOutBuffer>"
        description: "Real-time playback callback event. listen() to add a synthesis / processing listener. Fires per audio buffer on the audio thread; keep RT-safe."
        description_ja: "リアルタイム再生コールバック event。listen() でシンセ / 処理用 listener を追加。各バッファごとに audio thread で発火、RT-safe を維持"
        description_ko: "실시간 재생 콜백 이벤트. listen()으로 신스 / 처리 리스너 추가. 버퍼별로 오디오 스레드에서 발화, RT-safe 유지"
      - name: audioIn
        self: AudioEngine
        type: "Event<AudioInBuffer>"
        description: "Real-time capture callback event (microphone input). listen() to add an input-processing listener. Fires per audio buffer on the audio thread; keep RT-safe."
        description_ja: "リアルタイム入力コールバック event (マイク入力)。listen() で入力処理用 listener を追加。各バッファごとに audio thread で発火、RT-safe を維持"
        description_ko: "실시간 입력 콜백 이벤트 (마이크 입력). listen()으로 입력 처리 리스너 추가. 버퍼별로 오디오 스레드에서 발화, RT-safe 유지"
      - name: audioDeviceChanged
        self: AudioEngine
        type: "Event<AudioDeviceChangedArgs>"
        description: "Fires after every successful init() (initial AND re-init). Args carry the resolved device's real name, isDefaultDevice flag, sampleRate, channels, bufferSize, maxPolyphony. Listener runs on the thread that called init() (main), not the audio thread."
        description_ja: "成功した init() (初回 / 再 init) 後に発火。args は解決済みデバイス名、isDefaultDevice、sampleRate、channels、bufferSize、maxPolyphony。listener は init() を呼んだスレッド (通常 main) で実行"
        description_ko: "성공한 init() (초기 / 재 init) 후 발화. args는 해결된 장치명, isDefaultDevice, sampleRate, channels, bufferSize, maxPolyphony. listener는 init()을 호출한 스레드 (보통 main)에서 실행"
    methods:
      - name: init
        self: AudioEngine
        return: "bool"
        signatures:
          - params: ""
          - params: "const AudioSettings& settings"
        description: "Initialize the engine with defaults, or with an AudioSettings override. Re-init on a running engine migrates active voices to the new settings. Returns true on success."
        description_ja: "デフォルト、または AudioSettings の上書きでエンジンを初期化。動作中のエンジンで再初期化するとアクティブなボイスを新設定へ移行する。成功時 true を返す"
        description_ko: "기본값 또는 AudioSettings 오버라이드로 엔진을 초기화. 동작 중인 엔진에서 재초기화하면 활성 보이스를 새 설정으로 이전한다. 성공 시 true 반환"
      - name: shutdown
        self: AudioEngine
        return: "void"
        signatures:
          - params: ""
        description: "Stop and close the audio device."
        description_ja: "オーディオデバイスを停止して閉じる"
        description_ko: "오디오 디바이스를 정지하고 닫음"
      - name: getSampleRate
        self: AudioEngine
        const: true
        return: "int"
        signatures:
          - params: ""
        description: "Current engine output sample rate (Hz). Returns the default (48000) before init()."
        description_ja: "現在のエンジン出力サンプルレート (Hz)。init() 前はデフォルト (48000) を返す"
        description_ko: "현재 엔진 출력 샘플레이트 (Hz). init() 전에는 기본값 (48000) 반환"
      - name: getChannels
        self: AudioEngine
        const: true
        return: "int"
        signatures:
          - params: ""
        description: "Current engine output channel count."
        description_ja: "現在のエンジン出力チャンネル数"
        description_ko: "현재 엔진 출력 채널 수"
      - name: getMaxPolyphony
        self: AudioEngine
        const: true
        return: "int"
        signatures:
          - params: ""
        description: "Maximum number of simultaneously-playing Sound voices."
        description_ja: "同時再生可能な Sound ボイスの最大数"
        description_ko: "동시 재생 가능한 Sound 보이스 최대 수"
      - name: getBufferSize
        self: AudioEngine
        const: true
        return: "int"
        signatures:
          - params: ""
        description: "Current device buffer size in frames (0 = miniaudio default)."
        description_ja: "現在のデバイスバッファサイズ (フレーム単位、0 = miniaudio デフォルト)"
        description_ko: "현재 디바이스 버퍼 크기 (프레임 단위, 0 = miniaudio 기본값)"
      - name: isInitialized
        self: AudioEngine
        const: true
        return: "bool"
        signatures:
          - params: ""
        description: "True after a successful init()."
        description_ja: "init() 成功後に true"
        description_ko: "init() 성공 후 true"
      - name: getAnalysisBuffer
        self: AudioEngine
        return: "size_t"
        signatures:
          - params: "float* outBuffer, size_t numSamples"
        description: "Copy the latest mixed output samples (mono, L+R average) into outBuffer. numSamples is capped at 4096. Returns the number of samples written. (Global wrapper: getAudioAnalysisBuffer.)"
        description_ja: "最新のミックス出力サンプル (モノラル、L+R 平均) を outBuffer にコピー。numSamples は 4096 に制限される。書き込んだサンプル数を返す (グローバルラッパー: getAudioAnalysisBuffer)"
        description_ko: "최신 믹스 출력 샘플 (모노, L+R 평균) 을 outBuffer 에 복사. numSamples 는 4096 으로 제한됨. 기록한 샘플 수를 반환 (전역 래퍼: getAudioAnalysisBuffer)"
      - name: play
        self: AudioEngine
        return: "std::shared_ptr<PlayingSound>"
        signatures:
          - params: "std::shared_ptr<SoundSource> source"
          - params: "std::shared_ptr<SoundBuffer> buffer"
        lua: false
        description: "Start a new mixer voice for the given source (eager SoundBuffer or streaming SoundStream) and return its live PlayingSound handle. Usually called indirectly via Sound::play()."
        description_ja: "指定ソース (eager SoundBuffer か streaming SoundStream) の新しいミキサーボイスを開始し、ライブな PlayingSound ハンドルを返す。通常は Sound::play() 経由で間接的に呼ばれる"
        description_ko: "지정 소스 (eager SoundBuffer 또는 streaming SoundStream) 의 새 믹서 보이스를 시작하고 라이브 PlayingSound 핸들을 반환. 보통 Sound::play()를 통해 간접 호출됨"
    static_methods:
      - name: getInstance
        self: AudioEngine
        related:
          - AudioEngine
          - initAudio
          - listDevices
        keywords: ["singleton","global","engine","instance","access"]
        return: "AudioEngine&"
        signatures:
          - params: ""
        description: "Get the global AudioEngine singleton."
        description_ja: "グローバルな AudioEngine シングルトンを取得"
        description_ko: "전역 AudioEngine 싱글톤을 얻음"
      - name: listDevices
        self: AudioEngine
        related:
          - AudioDeviceInfo
        keywords: ["enumerate","devices","outputs","playback","available"]
        return: "vector<AudioDeviceInfo>"
        signatures:
          - params: ""
        description: "Enumerate available playback devices (name + isDefault). Empty if unsupported on the platform."
        description_ja: "利用可能な再生デバイスを列挙 (name + isDefault)。プラットフォームが非対応の場合は空"
        description_ko: "사용 가능한 재생 디바이스를 열거 (name + isDefault). 플랫폼이 미지원이면 비어 있음"

  - name: MicInput
    related:
      - getMicInput
      - AudioEngine
      - getMicAnalysisBuffer
    keywords: ["microphone","mic","audio input","capture","recording input"]
    description: "Microphone capture (miniaudio). Opens an input device and exposes the latest samples through a ring buffer. Use the global getMicInput() to access the shared instance, then start() it; getMicAnalysisBuffer() is a convenience wrapper over getBuffer()."
    description_ja: "マイク入力 (miniaudio)。入力デバイスを開き、最新サンプルをリングバッファ経由で公開する。共有インスタンスはグローバルの getMicInput() で取得し、start() する。getMicAnalysisBuffer() は getBuffer() の簡易ラッパー"
    description_ko: "마이크 입력 (miniaudio). 입력 디바이스를 열고 최신 샘플을 링 버퍼를 통해 노출한다. 공유 인스턴스는 전역 getMicInput() 으로 접근한 뒤 start() 한다. getMicAnalysisBuffer() 는 getBuffer() 의 편의 래퍼"
    constructor:
      signatures:
        - params: ""
    methods:
      - name: start
        self: MicInput
        return: "bool"
        signatures:
          - params: "int sampleRate = 44100"
        description: "Open the microphone device at the given sample rate and begin capturing. Returns false on failure."
        description_ja: "指定サンプルレートでマイクデバイスを開き、キャプチャを開始。失敗時 false を返す"
        description_ko: "지정한 샘플레이트로 마이크 디바이스를 열고 캡처를 시작. 실패 시 false 반환"
      - name: stop
        self: MicInput
        return: "void"
        signatures:
          - params: ""
        description: "Stop capture and close the microphone device."
        description_ja: "キャプチャを停止してマイクデバイスを閉じる"
        description_ko: "캡처를 정지하고 마이크 디바이스를 닫음"
      - name: getBuffer
        self: MicInput
        return: "size_t"
        signatures:
          - params: "float* outBuffer, size_t numSamples"
        description: "Copy the latest captured samples into outBuffer. numSamples is capped at the ring buffer size (4096). Returns the number of samples written."
        description_ja: "最新のキャプチャサンプルを outBuffer にコピー。numSamples はリングバッファサイズ (4096) に制限される。書き込んだサンプル数を返す"
        description_ko: "최신 캡처 샘플을 outBuffer 에 복사. numSamples 는 링 버퍼 크기 (4096) 로 제한됨. 기록한 샘플 수를 반환"
      - name: isRunning
        self: MicInput
        const: true
        return: "bool"
        signatures:
          - params: ""
        description: "True while the microphone device is open and capturing."
        description_ja: "マイクデバイスが開いてキャプチャ中の間 true"
        description_ko: "마이크 디바이스가 열려 캡처 중일 때 true"
      - name: getSampleRate
        self: MicInput
        const: true
        return: "int"
        signatures:
          - params: ""
        description: "Sample rate the microphone was opened at."
        description_ja: "マイクを開いたときのサンプルレート"
        description_ko: "마이크를 연 샘플레이트"

  - name: AudioSettings
    related:
      - init
      - AudioEngine
      - AudioDeviceInfo
    keywords: ["audio config","sample rate","buffer size","channels","init options"]
    description: "Configuration passed to AudioEngine::init() to override engine defaults (sample rate, channels, buffer size, polyphony, device). Empty deviceName selects the system default playback device."
    description_ja: "AudioEngine::init() に渡してエンジンのデフォルト (サンプルレート、チャンネル、バッファサイズ、ポリフォニー、デバイス) を上書きする設定。deviceName が空ならシステム既定の再生デバイスを選択する"
    description_ko: "AudioEngine::init() 에 전달하여 엔진 기본값 (샘플레이트, 채널, 버퍼 크기, 폴리포니, 디바이스) 을 오버라이드하는 설정. deviceName 이 비어 있으면 시스템 기본 재생 디바이스를 선택"
    properties:
      - name: sampleRate
        self: AudioSettings
        type: int
        description: "Engine output sample rate in Hz (default 96000)"
        description_ja: "エンジン出力サンプルレート (Hz、デフォルト 96000)"
        description_ko: "엔진 출력 샘플레이트 (Hz, 기본값 96000)"
      - name: channels
        self: AudioSettings
        type: int
        description: "Output channel count (1 = mono, 2 = stereo; default 2)"
        description_ja: "出力チャンネル数 (1 = モノラル、2 = ステレオ、デフォルト 2)"
        description_ko: "출력 채널 수 (1 = 모노, 2 = 스테레오, 기본값 2)"
      - name: bufferSize
        self: AudioSettings
        type: int
        description: "Requested device buffer size in frames; 0 = let miniaudio choose"
        description_ja: "要求するデバイスバッファサイズ (フレーム単位)、0 = miniaudio に任せる"
        description_ko: "요청하는 디바이스 버퍼 크기 (프레임 단위), 0 = miniaudio 가 선택"
      - name: maxPolyphony
        self: AudioSettings
        type: int
        description: "Max simultaneously-playing Sound voices (default 32)"
        description_ja: "同時再生可能な Sound ボイスの最大数 (デフォルト 32)"
        description_ko: "동시 재생 가능한 Sound 보이스 최대 수 (기본값 32)"
      - name: deviceName
        self: AudioSettings
        type: string
        description: "Playback device name; empty = system default. Use AudioEngine::listDevices() to enumerate."
        description_ja: "再生デバイス名、空 = システム既定。列挙には AudioEngine::listDevices() を使う"
        description_ko: "재생 디바이스 이름, 비어 있으면 시스템 기본값. 열거에는 AudioEngine::listDevices() 사용"

  - name: AudioDeviceInfo
    related:
      - listDevices
      - AudioEngine
      - AudioSettings
    keywords: ["audio","device","soundcard","output","playback"]
    description: "One entry in the list returned by AudioEngine::listDevices()."
    description_ja: "AudioEngine::listDevices() が返すリストの 1 エントリ"
    description_ko: "AudioEngine::listDevices() 가 반환하는 목록의 한 항목"
    properties:
      - name: name
