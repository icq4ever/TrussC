        self: VideoDeviceInfo
        const: true
        keywords: ["device","name","camera","label"]
        return: "const std::string &"
        signatures:
          - params: ""
        description: "Get the human-readable device name"
        description_ja: "人間が読めるデバイス名を取得"
        description_ko: "사람이 읽을 수 있는 디바이스 이름을 얻음"
      - name: getUniqueId
        self: VideoDeviceInfo
        const: true
        keywords: ["device","unique","id","camera"]
        return: "const std::string &"
        signatures:
          - params: ""
        description: "Get the stable unique identifier for the device"
        description_ja: "デバイスの安定した一意識別子を取得"
        description_ko: "디바이스의 안정적인 고유 식별자를 얻음"

  - name: VideoRecordSettings
    related:
      - startRecording
      - start
      - open
      - VideoCodec
      - ScreenRecorder
    keywords: ["video","record","encoder","settings","codec","export"]
    description: "Encoder settings passed to VideoWriter::open(), ScreenRecorder::start(), and startRecording()"
    description_ja: "VideoWriter::open()、ScreenRecorder::start()、startRecording() に渡すエンコーダ設定"
    description_ko: "VideoWriter::open(), ScreenRecorder::start(), startRecording()에 전달하는 인코더 설정"
    properties:
      - name: codec
        self: VideoRecordSettings
        type: VideoCodec
        description: "Output codec (default H264)"
        description_ja: "出力コーデック（デフォルト H264）"
        description_ko: "출력 코덱(기본값 H264)"
      - name: fps
        self: VideoRecordSettings
        type: float
        description: "Capture/output frame rate. For ScreenRecorder this is the capture ceiling; for VideoWriter it is the exact output rate (default 60)"
        description_ja: "キャプチャ/出力フレームレート。ScreenRecorder ではキャプチャの上限、VideoWriter では正確な出力レート（デフォルト 60）"
        description_ko: "캡처/출력 프레임레이트. ScreenRecorder에서는 캡처 상한, VideoWriter에서는 정확한 출력 레이트(기본값 60)"
      - name: bitrate
        self: VideoRecordSettings
        type: int
        description: "Target bits/sec for H.264/HEVC; 0 = auto. Ignored by ProRes"
        description_ja: "H.264/HEVC の目標ビットレート（bits/sec）。0 = 自動。ProRes では無視される"
        description_ko: "H.264/HEVC의 목표 비트레이트(bits/sec). 0 = 자동. ProRes에서는 무시됨"
      - name: keyframeInterval
        self: VideoRecordSettings
        type: int
        description: "Frames between keyframes; 0 = encoder default"
        description_ja: "キーフレーム間のフレーム数。0 = エンコーダのデフォルト"
        description_ko: "키프레임 사이의 프레임 수. 0 = 인코더 기본값"

  - name: Glyph
    related:
      - bitmapfont::registerGlyph
      - bitmapfont::registerGlyphs
      - registerGlyph
      - registerGlyphs
      - Font
      - PlacedGlyph
    keywords: ["glyph","bitmap","font","character","pixels","codepoint"]
    description: "A bitmap glyph to register via registerGlyph(): a codepoint plus packed 1-bit pixel rows. The data pointer must outlive every drawBitmapString call"
    description_ja: "registerGlyph() で登録するビットマップグリフ。codepoint とパックされた 1-bit ピクセル行。data ポインタはすべての drawBitmapString 呼び出しより長く生存する必要がある"
    description_ko: "registerGlyph()로 등록하는 비트맵 글리프. codepoint와 패킹된 1-bit 픽셀 행. data 포인터는 모든 drawBitmapString 호출보다 오래 살아 있어야 함"
    properties:
      - name: codepoint
        self: Glyph
        type: uint32_t
        description: "Unicode codepoint this glyph renders"
        description_ja: "このグリフが描画する Unicode codepoint"
        description_ko: "이 글리프가 렌더링하는 Unicode codepoint"
      - name: data
        self: Glyph
        type: const uint8_t *
        description: "Packed bitmap rows (MSB first); must outlive all draw calls"
        description_ja: "パックされたビットマップ行（MSB 先頭）。すべての draw 呼び出しより長く生存する必要がある"
        description_ko: "패킹된 비트맵 행(MSB 우선). 모든 draw 호출보다 오래 살아 있어야 함"
      - name: width
        self: Glyph
        type: Width
        description: "Glyph width: Halfwidth (8x13) or Fullwidth (16x13)"
        description_ja: "グリフ幅: Halfwidth（8x13）または Fullwidth（16x13）"
        description_ko: "글리프 너비: Halfwidth(8x13) 또는 Fullwidth(16x13)"

  - name: PlacedGlyph
    related:
      - GlyphVisitor
      - Font
      - getStringPath
    keywords: ["glyph","layout","font","position","character","typeset"]
    description: "One laid-out glyph emitted by Font::forEachGlyph (nested as Font::PlacedGlyph). Carries the final codepoint and pen position so visitors can render quads, build vector paths, or hit-test independently of the layout pass"
    description_ja: "Font::forEachGlyph が出力するレイアウト済みグリフ 1 個（Font::PlacedGlyph としてネスト）。最終的な codepoint とペン位置を持ち、ビジターがレイアウトパスとは独立に quad 描画・ベクターパス生成・ヒットテストを行える"
    description_ko: "Font::forEachGlyph가 출력하는 배치 완료된 글리프 하나(Font::PlacedGlyph로 중첩). 최종 codepoint와 펜 위치를 담아, 비지터가 레이아웃 패스와 독립적으로 quad 렌더링, 벡터 경로 생성, 히트 테스트를 수행 가능"
    properties:
      - name: codepoint
        self: PlacedGlyph
        type: uint32_t
        description: "Final codepoint after vertical-form mapping"
        description_ja: "縦書きフォームマッピング後の最終 codepoint"
        description_ko: "세로쓰기 폼 매핑 후의 최종 codepoint"
      - name: drawX
        self: PlacedGlyph
        type: float
        description: "Pen X position; the glyph's own xoffset is added on top"
        description_ja: "ペンの X 位置。グリフ自身の xoffset がさらに加算される"
        description_ko: "펜의 X 위치. 글리프 자체의 xoffset이 추가로 더해짐"
      - name: baselineY
        self: PlacedGlyph
        type: float
        description: "Baseline Y position; the glyph's own yoffset is added on top"
        description_ja: "ベースラインの Y 位置。グリフ自身の yoffset がさらに加算される"
        description_ko: "베이스라인의 Y 위치. 글리프 자체의 yoffset이 추가로 더해짐"
      - name: rotationCw
        self: PlacedGlyph
        type: float
        description: "Clockwise rotation in radians: 0 (upright) or TAU/4 (90 degrees, vertical text)"
        description_ja: "時計回りの回転（ラジアン）: 0（正立）または TAU/4（90 度、縦書き）"
        description_ko: "시계 방향 회전(라디안): 0(정립) 또는 TAU/4(90도, 세로쓰기)"
      - name: pivotX
        self: PlacedGlyph
        type: float
        description: "Rotation center X (used only when rotationCw is non-zero)"
        description_ja: "回転中心 X（rotationCw が 0 でない場合のみ使用）"
        description_ko: "회전 중심 X(rotationCw가 0이 아닐 때만 사용)"
      - name: pivotY
        self: PlacedGlyph
        type: float
        description: "Rotation center Y (used only when rotationCw is non-zero)"
        description_ja: "回転中心 Y（rotationCw が 0 でない場合のみ使用）"
        description_ko: "회전 중심 Y(rotationCw가 0이 아닐 때만 사용)"
      - name: scaleX
        self: PlacedGlyph
        type: float
        description: "Horizontal scale (1.0 normally, less than 1 for TCY combine)"
        description_ja: "水平スケール（通常 1.0、TCY 合成では 1 未満）"
        description_ko: "수평 스케일(보통 1.0, TCY 합성 시 1 미만)"

  - name: GlyphVisitor
    related:
      - PlacedGlyph
      - Font
    keywords: ["glyph","callback","visitor","font","iterate"]
    description: "Alias for function<void(const Font::PlacedGlyph&)> (nested as Font::GlyphVisitor). The per-glyph callback type accepted by Font::forEachGlyph"
    description_ja: "function<void(const Font::PlacedGlyph&)> のエイリアス（Font::GlyphVisitor としてネスト）。Font::forEachGlyph が受け取るグリフごとのコールバック型"
    description_ko: "function<void(const Font::PlacedGlyph&)>의 별칭(Font::GlyphVisitor로 중첩). Font::forEachGlyph가 받는 글리프별 콜백 타입"

  - name: StrokeMesh
    related:
      - clear
      - setColor
      - addVertex
      - createStrokeMesh
      - setWidth
      - setCapType
      - setJoinType
      - setMiterLimit
    keywords: ["stroke","polyline","line","thick","caps","joins"]
    description: "Variable-width polyline stroke geometry with caps, joins and miter limit; build it from points or a Path, then update() and draw()"
    description_ja: "キャップ・ジョイン・マイターリミットを持つ可変幅ポリラインのストロークジオメトリ。点列または Path から構築し、update() と draw() を行う"
    description_ko: "캡, 조인, 마이터 리미트를 가진 가변 폭 폴리라인 스트로크 지오메트리. 점들 또는 Path로 구축한 뒤 update()와 draw() 수행"
    constructor:
      signatures:
        - params: ""
        - params: "const Path& polyline"
    methods:
      - name: setWidth
        self: StrokeMesh
        return: "StrokeMesh&"
        signatures:
          - params: "float w"
        description: "Set the stroke width"
        description_ja: "ストローク幅を設定"
        description_ko: "스트로크 너비를 설정"
      - name: setColor
        self: StrokeMesh
        return: "StrokeMesh&"
        signatures:
          - params: "const Color& c"
        description: "Set the stroke color"
        description_ja: "ストロークの色を設定"
        description_ko: "스트로크 색상을 설정"
      - name: setCapType
        self: StrokeMesh
        return: "StrokeMesh&"
        signatures:
          - params: "StrokeMesh::CapType type"
        description: "Set the line cap shape (StrokeMesh::CapType: Butt, Round, Square)"
        description_ja: "ラインキャップ形状を設定（StrokeMesh::CapType: Butt, Round, Square）"
        description_ko: "라인 캡 모양을 설정(StrokeMesh::CapType: Butt, Round, Square)"
      - name: setJoinType
        self: StrokeMesh
        return: "StrokeMesh&"
        signatures:
          - params: "StrokeMesh::JoinType type"
        description: "Set the line join shape (StrokeMesh::JoinType: Miter, Round, Bevel)"
        description_ja: "ラインジョイン形状を設定（StrokeMesh::JoinType: Miter, Round, Bevel）"
        description_ko: "라인 조인 모양을 설정(StrokeMesh::JoinType: Miter, Round, Bevel)"
      - name: setMiterLimit
        self: StrokeMesh
        return: "StrokeMesh&"
        signatures:
          - params: "float limit"
        description: "Set the miter limit for sharp corners"
        description_ja: "鋭角コーナーのマイターリミットを設定"
        description_ko: "날카로운 모서리의 마이터 리미트를 설정"
      - name: addVertex
        self: StrokeMesh
        return: "StrokeMesh&"
        signatures:
          - params: "float x, float y, float z = 0"
          - params: "const Vec2& v"
          - params: "const Vec3& v"
        description: "Append a vertex to the stroke path"
        description_ja: "ストロークパスに頂点を追加"
        description_ko: "스트로크 경로에 정점을 추가"
      - name: addVertexWithWidth
        self: StrokeMesh
        return: "StrokeMesh&"
        signatures:
          - params: "float x, float y, float width"
          - params: "const Vec3& p, float width"
        description: "Append a vertex with a per-vertex width"
        description_ja: "頂点ごとの幅付きで頂点を追加"
        description_ko: "정점별 너비와 함께 정점을 추가"
      - name: setWidths
        self: StrokeMesh
        return: "StrokeMesh&"
        signatures:
          - params: "const vector<float>& w"
        description: "Set per-vertex widths from a list"
        description_ja: "リストから頂点ごとの幅を設定"
        description_ko: "리스트로부터 정점별 너비를 설정"
      - name: setShape
        self: StrokeMesh
        return: "StrokeMesh&"
        signatures:
          - params: "const Path& polyline"
        description: "Set the stroke shape from a Path"
        description_ja: "Path からストローク形状を設定"
        description_ko: "Path로부터 스트로크 모양을 설정"
      - name: setClosed
        self: StrokeMesh
        return: "StrokeMesh&"
        signatures:
          - params: "bool closed"
        description: "Set whether the stroke forms a closed loop"
        description_ja: "ストロークが閉ループを形成するかを設定"
        description_ko: "스트로크가 닫힌 루프를 형성하는지 설정"
      - name: clear
        self: StrokeMesh
        return: "StrokeMesh&"
        signatures:
          - params: ""
        description: "Remove all vertices"
        description_ja: "すべての頂点を削除"
        description_ko: "모든 정점을 삭제"
      - name: update
        self: StrokeMesh
        return: "void"
        signatures:
          - params: ""
        description: "Rebuild the internal triangle mesh (call before draw after edits)"
        description_ja: "内部の三角形メッシュを再構築（編集後、draw の前に呼ぶ）"
        description_ko: "내부 삼각형 메시를 재구축(편집 후 draw 전에 호출)"
      - name: draw
        self: StrokeMesh
        return: "void"
        signatures:
          - params: ""
        description: "Draw the stroke mesh"
        description_ja: "ストロークメッシュを描画"
        description_ko: "스트로크 메시 그리기"
      - name: getMesh
        self: StrokeMesh
        lua: false
        return: "Mesh&"
        signatures:
          - params: ""
        description: "Get a reference to the underlying generated triangle Mesh"
        description_ja: "生成された内部の三角形 Mesh への参照を取得"
        description_ko: "생성된 내부 삼각형 Mesh에 대한 참조를 얻음"
      - name: getPolylines
        self: StrokeMesh
        lua: false
        return: "vector<Path>&"
        signatures:
          - params: ""
        description: "Get a reference to the stroke's source polylines"
        description_ja: "ストロークのソースポリラインへの参照を取得"
        description_ko: "스트로크의 소스 폴리라인에 대한 참조를 얻음"

  # ---------------------------------------------------------------------------
  # RectNode / TweenMod — type entries carry only the subscribable Event<>
  # member fields here (the constructor + methods are documented as flat
  # self:-bearing entries in the scene_graph category above). Listeners are
  # registered via .listen(callback). Not Lua-bindable (raw Event members).
  # ---------------------------------------------------------------------------
  - name: RectNode
    properties:
      - name: mousePressed
        self: RectNode
        type: "Event<MouseEventArgs>"
        lua: false
        description: "Fired when a mouse button is pressed over this node (localized args)"
        description_ja: "このノード上でマウスボタンが押されたときに発火（ローカル座標の引数）"
        description_ko: "이 노드 위에서 마우스 버튼이 눌렸을 때 발생 (로컬 좌표 인자)"
      - name: mouseReleased
        self: RectNode
        type: "Event<MouseEventArgs>"
        lua: false
        description: "Fired when a mouse button is released over this node (localized args)"
        description_ja: "このノード上でマウスボタンが離されたときに発火（ローカル座標の引数）"
        description_ko: "이 노드 위에서 마우스 버튼이 떼어졌을 때 발생 (로컬 좌표 인자)"
      - name: mouseDragged
        self: RectNode
        type: "Event<MouseDragEventArgs>"
        lua: false
        description: "Fired when the mouse is dragged on this node (localized args)"
        description_ja: "このノード上でマウスがドラッグされたときに発火（ローカル座標の引数）"
        description_ko: "이 노드 위에서 마우스가 드래그될 때 발생 (로컬 좌표 인자)"
      - name: mouseScrolled
        self: RectNode
        type: "Event<ScrollEventArgs>"
        lua: false
        description: "Fired when the mouse wheel / trackpad scrolls over this node (localized args)"
        description_ja: "このノード上でホイール/トラックパッドがスクロールしたときに発火（ローカル座標の引数）"
        description_ko: "이 노드 위에서 휠/트랙패드가 스크롤될 때 발생 (로컬 좌표 인자)"
    description: "2D UI rectangle node: size, clipping and ray-based hit testing, plus subscribable mouse Event members"
    description_ja: "2D UI矩形ノード。サイズ、クリッピング、レイベースのヒットテスト、購読可能なマウスイベントメンバーを持つ"
    description_ko: "2D UI 사각형 노드: 크기, 클리핑, 레이 기반 히트 테스트와 구독 가능한 마우스 이벤트 멤버"

  - name: TweenMod
    properties:
      - name: complete
        self: TweenMod
        type: "Event<void>"
        lua: false
        description: "Fired once when all tweens finish; subscribe with complete.listen(callback)"
        description_ja: "全アニメーション完了時に一度だけ発火。complete.listen(callback) で購読"
        description_ko: "모든 애니메이션이 끝나면 한 번 발생. complete.listen(callback)으로 구독"
    description: "Animation modifier (Mod) that tweens a Node's position, scale and rotation with easing; exposes a complete Event"
    description_ja: "Nodeの位置・スケール・回転をイージングでアニメーションするMod。complete イベントを公開"
    description_ko: "Node의 위치・스케일・회전을 이징으로 애니메이션하는 Mod. complete 이벤트를 노출"

  # ---------------------------------------------------------------------------
  # LayoutMod / ScrollContainer / ScrollBar — these UI types document their
  # constructor + methods as flat self:-bearing entries in the scene_graph
  # category above. They have no member fields, so the type entry here exists
  # only to register the type itself (no methods/properties duplicated).
  # ---------------------------------------------------------------------------
  - name: LayoutMod
    description: "Layout modifier (Mod) that auto-arranges child RectNodes in a vertical or horizontal stack with spacing, padding and axis sizing"
    description_ja: "子RectNodeを縦/横スタックに自動配置するMod。間隔・パディング・軸サイズモードを持つ"
    description_ko: "자식 RectNode를 수직/수평 스택으로 자동 배치하는 Mod. 간격・패딩・축 크기 모드를 가짐"

  - name: ScrollContainer
    description: "Scrollable RectNode that clips and scrolls a single content node when it overflows the container bounds"
    description_ja: "コンテンツがコンテナ境界を超えたときにクリップしてスクロールするRectNode"
    description_ko: "콘텐츠가 컨테이너 경계를 넘으면 클리핑하고 스크롤하는 RectNode"

  - name: ScrollBar
    description: "Visual scroll indicator RectNode that syncs with a ScrollContainer and supports drag scrolling"
    description_ja: "ScrollContainerと同期しドラッグスクロールに対応するスクロールバー表示用RectNode"
    description_ko: "ScrollContainer와 동기화되고 드래그 스크롤을 지원하는 스크롤바 표시용 RectNode"

  # ---------------------------------------------------------------------------
  # Type registrations — the methods/constructor of these types are documented
  # as flat category entries (self: <Type>); these entries register the type
  # name itself so the coverage audit credits the type.
  # ---------------------------------------------------------------------------
  - name: Node
    description: "Base scene-graph node: transform hierarchy with parent/children, update/draw, input events and attachable Mods (C++ only, managed via shared_ptr / NodePtr)"
    description_ja: "シーングラフの基底ノード。親子の変換階層、update/draw、入力イベント、アタッチ可能な Mod を持つ（C++専用、shared_ptr / NodePtr で管理）"
    description_ko: "씬 그래프 기반 노드: 부모/자식 변환 계층, update/draw, 입력 이벤트, 부착 가능한 Mod를 가짐(C++ 전용, shared_ptr / NodePtr로 관리)"

  - name: NodePtr
    description: "Shared pointer to a Node (std::shared_ptr<Node>); the standard way to hold and pass scene nodes"
    description_ja: "Node への共有ポインタ（std::shared_ptr<Node>）。シーンノードを保持・受け渡しする標準的な方法"
    description_ko: "Node에 대한 공유 포인터(std::shared_ptr<Node>); 씬 노드를 보유하고 전달하는 표준 방법"

  - name: App
    description: "Base application class: subclass it and override setup/update/draw and the input callbacks (mousePressed, keyPressed, etc.) to build a TrussC app"
    description_ja: "アプリケーションの基底クラス。サブクラス化して setup/update/draw や入力コールバック（mousePressed, keyPressed など）をオーバーライドして TrussC アプリを作る"
    description_ko: "기반 애플리케이션 클래스: 서브클래싱하여 setup/update/draw와 입력 콜백(mousePressed, keyPressed 등)을 오버라이드하여 TrussC 앱을 만듦"

  - name: Shader
    description: "GPU shader program (vertex + fragment) with a begin/end/setUniform API for custom-shaded drawing"
    description_ja: "GPU シェーダープログラム（頂点＋フラグメント）。begin/end/setUniform API でカスタムシェーダー描画を行う"
    description_ko: "GPU 셰이더 프로그램(버텍스 + 프래그먼트); begin/end/setUniform API로 커스텀 셰이딩 그리기를 수행"

  - name: VideoPlayer
    description: "Plays a video file: load/play/stop, per-frame update, and a texture you can draw each frame"
    description_ja: "動画ファイルを再生する。load/play/stop、フレームごとの update、毎フレーム描画できるテクスチャを提供"
    description_ko: "비디오 파일을 재생: load/play/stop, 프레임별 update, 매 프레임 그릴 수 있는 텍스처를 제공"
    static_methods:
      - name: extractFrame
        self: VideoPlayer
        related:
          - Pixels
          - VideoPlayer
        keywords: ["thumbnail","snapshot","grab","single frame","poster"]
        platforms: [macos]
        platformNote: "Static single-frame extraction is fully implemented only on macOS (AVAssetImageGenerator). Windows/Linux/Android stub it (`return false`, TODO); iOS and web have no extractFramePlatform() definition at all."
        platformNote_ja: "静止フレーム抽出が実装されているのは macOS のみ（AVAssetImageGenerator）。win/linux/android は false を返すスタブ、ios/web は extractFramePlatform() の定義自体が存在しない。"
        return: bool
        signatures:
          - params: "const std::string & path, Pixels & outPixels, float timeSec = 1.0f, float * outDuration = nullptr"
        description: "Extract a single frame from a video file without loading the full video. Useful for thumbnails"
        description_ja: "ビデオファイルから1フレームを抽出（全体を読み込まずに）。サムネイル生成に便利"
        description_ko: "비디오 파일에서 전체를 로드하지 않고 단일 프레임을 추출. 썸네일 생성에 유용"

  - name: VideoWriter
    description: "Encodes frames to a video file: open a path, write frames, then close to finalize the file"
    description_ja: "フレームを動画ファイルにエンコードする。パスを開いてフレームを書き込み、close でファイルを確定する"
    description_ko: "프레임을 비디오 파일로 인코딩: 경로를 열어 프레임을 기록한 뒤 close로 파일을 확정"

  - name: ScreenRecorder
    description: "Captures the rendered output to a video file (start/stop recording of the on-screen frames)"
    description_ja: "描画結果を動画ファイルにキャプチャする（画面フレームの録画開始/停止）"
    description_ko: "렌더링 출력을 비디오 파일로 캡처(화면 프레임의 녹화 시작/정지)"

  - name: CurveStyle
    description: "Curve tessellation settings: Mode (Tolerance or Resolution), the pixel tolerance, and the fixed resolution fallback"
    description_ja: "曲線テッセレーション設定: Mode（Tolerance か Resolution）、ピクセルトレランス、固定解像度のフォールバック"
    description_ko: "곡선 테셀레이션 설정: Mode(Tolerance 또는 Resolution), 픽셀 톨러런스, 고정 해상도 폴백"
    properties:
      - name: mode
        self: CurveStyle
        type: "CurveStyle::Mode"
        description: "Tessellation mode: adaptive Tolerance or fixed Resolution"
        description_ja: "テッセレーションモード: 適応 Tolerance か固定 Resolution"
        description_ko: "테셀레이션 모드: 적응형 Tolerance 또는 고정 Resolution"
      - name: tolerance
        self: CurveStyle
        type: float
        description: "Maximum chord-to-curve error in screen pixels (Tolerance mode)"
        description_ja: "画面ピクセルでの弦-曲線の最大誤差（Tolerance モード）"
        description_ko: "화면 픽셀 단위 현-곡선 최대 오차(Tolerance 모드)"
      - name: resolution
        self: CurveStyle
        type: int
        description: "Fixed segment count used in Resolution mode (and as a fallback)"
        description_ja: "Resolution モードで使う固定セグメント数（フォールバックにも使用）"
        description_ko: "Resolution 모드에서 사용하는 고정 세그먼트 수(폴백으로도 사용)"
