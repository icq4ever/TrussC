        signatures:
          - params: "const Mat4& mat"
        details: "Kept as a backward-compatible alias; new code should call `setMatrix()` (same behavior — it replaces the current matrix). Scheduled for removal in v1.0.0."
        description: "Deprecated alias for setMatrix()"
        description_ja: "setMatrix() の非推奨エイリアス"
        description_ko: "setMatrix()의 deprecated 별칭"

      - name: getCurrentScale
        deprecated:
