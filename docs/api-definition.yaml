      - name: applyWindow
        related:
          - WindowType
        keywords: ["windowing","hann","hamming","fft","taper","leakage"]
        return: "void"
        signatures:
          - params: "vector<float>& signal, WindowType type"
          - params: "vector<complex<float>>& signal, WindowType type"
        description: "Apply a window function (in place) to a signal to reduce spectral leakage before FFT"
        description_ja: "FFT 前のスペクトル漏れを抑えるため信号に窓関数を適用（インプレース）"
        description_ko: "FFT 전 스펙트럼 누설을 줄이기 위해 신호에 윈도우 함수를 적용 (in-place)"

      - name: isPowerOfTwo
        keywords: ["power of two","pow2","binary","bit"]
        return: "bool"
        signatures:
          - params: "int n"
        description: "Return true if n is a positive power of two"
        description_ja: "n が正の2のべき乗なら true を返す"
        description_ko: "n이 양의 2의 거듭제곱이면 true 반환"

      - name: nextPowerOfTwo
        keywords: ["power of two","pow2","round up","binary"]
        return: "int"
        signatures:
          - params: "int n"
        description: "Return the smallest power of two greater than or equal to n"
        description_ja: "n 以上で最小の2のべき乗を返す"
        description_ko: "n 이상인 가장 작은 2의 거듭제곱을 반환"

      - name: fft
        keywords: ["fourier","frequency","spectrum","transform","dft"]
        return: "void"
        signatures:
          - params: "vector<complex<float>>& data"
        description: "In-place forward FFT (Cooley-Tukey radix-2); the data size must be a power of two"
        description_ja: "インプレースの順方向FFT（Cooley-Tukey radix-2）。データサイズは2のべき乗でなければならない"
        description_ko: "in-place 정방향 FFT (Cooley-Tukey radix-2). 데이터 크기는 2의 거듭제곱이어야 함"

      - name: ifft
        keywords: ["inverse fourier","frequency","spectrum","transform"]
        return: "void"
        signatures:
          - params: "vector<complex<float>>& data"
        description: "In-place inverse FFT; the data size must be a power of two"
        description_ja: "インプレースの逆FFT。データサイズは2のべき乗でなければならない"
        description_ko: "in-place 역 FFT. 데이터 크기는 2의 거듭제곱이어야 함"

