          - getBitmapStringBounds
        keywords: ["alignment","justify","center","anchor"]
        return: void
        signatures:
          - params: "Direction h, Direction v"
        description: "Set text alignment"
        description_ja: "テキストの配置を設定"
        description_ko: "텍스트 정렬을 설정"

      - name: getTextAlignH
        keywords: ["horizontal","alignment","justify","left right"]
        return: "Direction"
        signatures:
          - params: ""
        description: "Get horizontal text alignment"
        description_ja: "水平方向のテキスト配置を取得"
        description_ko: "수평 텍스트 정렬을 얻음"

      - name: getTextAlignV
        keywords: ["vertical","alignment","top bottom","baseline"]
        return: "Direction"
        signatures:
          - params: ""
        description: "Get vertical text alignment"
