  - name: UdpSocket
    related:
      - TcpClient
      - TcpServer
      - UdpReceiveEventArgs
    keywords: ["udp","datagram","broadcast","multicast","socket"]
    platforms: [windows, macos, linux, ios, android]
    platformNote: "UDP via raw BSD/Winsock sockets — full support on the 5 native platforms (send/recv, broadcast, multicast join/leave/TTL/loopback/interface, reuse-addr/port). The .cpp DOES compile for wasm and the API exists, but raw UDP is not functional in a browser: Emscripten only emulates sockets tunneled over a WebSocket proxy server, and there is no native UDP datagram path. Additionally on wasm threading is disabled (useThread_ forced false; the receive loop must run via processNetwork() on the update event, and setUseThread(true) warns + no-ops). Treat UdpSocket as native-only in practice."
    platformNote_ja: "生 BSD/Winsock ソケットによる UDP — ネイティブ5プラットフォームで完全対応 (送受信、ブロードキャスト、マルチキャスト join/leave/TTL/loopback/interface、reuse-addr/port)。.cpp は wasm でもコンパイルされ API も存在するが、ブラウザでは生 UDP は機能しない: Emscripten はソケットを WebSocket プロキシ経由でしかエミュレートせず、ネイティブ UDP データグラム経路が無い。さらに wasm ではスレッド無効 (useThread_ は強制 false、受信は update イベントの processNetwork() で回す、setUseThread(true) は警告して no-op)。実用上はネイティブ専用とみなす。"
    description: "UDP socket (send/receive datagrams, broadcast, multicast)"
    description_ja: "UDPソケット（データグラム送受信・ブロードキャスト・マルチキャスト）"
    description_ko: "UDP 소켓 (데이터그램 송수신, 브로드캐스트, 멀티캐스트)"
    of_equivalent: "ofxUDPManager"
    of_type_category: "network-types"
    constructor:
      signatures:
        - params: ""
    properties:
      - name: onReceive
        self: UdpSocket
        type: "Event<UdpReceiveEventArgs>"
        description: "Fired when data is received"
        description_ja: "データ受信時に発火"
        description_ko: "데이터 수신 시 발생"
      - name: onError
        self: UdpSocket
        type: "Event<UdpErrorEventArgs>"
        description: "Fired on error"
        description_ja: "エラー時に発火"
        description_ko: "오류 시 발생"
    methods:
      - name: create
        self: UdpSocket
        return: "bool"
        signatures:
          - params: ""
        description: "Create the socket explicitly (usually auto-created by bind/connect)"
        description_ja: "ソケットを明示的に作成（通常はbind/connectが自動作成）"
        description_ko: "소켓을 명시적으로 생성 (보통 bind/connect가 자동 생성)"
      - name: bind
        self: UdpSocket
        return: "bool"
        signatures:
          - params: "int port, bool startReceiving = true"
        description: "Bind a port for receiving (startReceiving auto-starts the receive thread)"
        description_ja: "受信用にポートをbind（startReceivingで受信スレッド自動開始）"
        description_ko: "수신용 포트를 바인드 (startReceiving이 수신 스레드를 자동 시작)"
      - name: connect
        self: UdpSocket
        return: "bool"
        signatures:
          - params: "const std::string& host, int port"
        description: "Set the destination for send()"
        description_ja: "send()の宛先を設定"
        description_ko: "send()의 대상을 설정"
      - name: close
        self: UdpSocket
        return: "void"
        signatures:
          - params: ""
        description: "Close the socket"
        description_ja: "ソケットを閉じる"
        description_ko: "소켓을 닫음"
      - name: sendTo
        self: UdpSocket
        return: "bool"
        signatures:
          - params: "const std::string& host, int port, const void* data, size_t size"
          - params: "const std::string& host, int port, const std::string& message"
        description: "Send data to a specific host and port"
        description_ja: "指定ホスト・ポートへ送信"
        description_ko: "지정 호스트·포트로 전송"
      - name: send
        self: UdpSocket
        return: "bool"
        signatures:
          - params: "const void* data, size_t size"
          - params: "const std::string& message"
        description: "Send to the destination set by connect()"
        description_ja: "connect()で設定した宛先へ送信"
        description_ko: "connect()로 설정한 대상으로 전송"
      - name: receive
        self: UdpSocket
        return: "int"
        signatures:
          - params: "void* buffer, size_t bufferSize"
