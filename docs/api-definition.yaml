  # ==========================================================================
  # Timers (Node methods)
  # ==========================================================================
  - id: timers
    name: "Timers"
    name_ja: "タイマー"
    name_ko: "타이머"
    functions:
      - name: callAfter
        self: Node
        related:
          - callAfterAsync
          - callEvery
          - cancelTimer
        keywords: ["timer","delay","timeout","schedule","later"]
        return: "uint64_t"
        signatures:
          - params: "double delay, std::function<void()> callback"
        description: "Run callback once after delay seconds. Fired from the update loop (frame-quantized). Returns a timer id."
        description_ja: "delay秒後にcallbackを1回実行。更新ループから発火（フレーム単位）。タイマーidを返す"
        description_ko: "delay초 후 callback을 한 번 실행. 업데이트 루프에서 발생(프레임 단위). 타이머 id를 반환"

      - name: callEvery
        self: Node
        related:
          - callEveryAsync
          - callAfter
          - cancelTimer
        keywords: ["timer","interval","repeat","schedule","periodic"]
        return: "uint64_t"
        signatures:
          - params: "double interval, std::function<void()> callback"
        description: "Run callback repeatedly every interval seconds. Fired from the update loop (frame-quantized). Returns a timer id."
        description_ja: "interval秒ごとにcallbackを繰り返し実行。更新ループから発火（フレーム単位）。タイマーidを返す"
        description_ko: "interval초마다 callback을 반복 실행. 업데이트 루프에서 발생(프레임 단위). 타이머 id를 반환"

      - name: callAfterAsync
        self: Node
        related:
          - callEveryAsync
          - cancelAsyncTimer
          - callAfter
        keywords: ["timer","delay","thread","precise","background"]
        return: "uint64_t"
        signatures:
          - params: "double delay, std::function<void()> callback"
        description: "Like callAfter, but fired by a precise background scheduler thread (no frame jitter). The callback runs OFF the main thread: guard shared state with a mutex, never draw from it, and don't cancel while holding that mutex. Native only (uses a real thread). Returns a timer id."
        description_ja: "callAfterの精密版。バックグラウンドのスケジューラスレッドが正確な時刻に発火（フレームジッタなし）。コールバックはメインスレッド外で走る：共有状態はmutexで保護、描画は禁止、そのmutexを保持したままcancelしない。ネイティブ専用（実スレッド使用）。タイマーidを返す"
        description_ko: "callAfter의 정밀 버전. 백그라운드 스케줄러 스레드가 정확한 시각에 실행(프레임 지터 없음). 콜백은 메인 스레드 밖에서 실행됨: 공유 상태는 mutex로 보호, 그리기 금지, 해당 mutex를 들고 cancel하지 말 것. 네이티브 전용(실제 스레드 사용). 타이머 id를 반환"

      - name: callEveryAsync
        self: Node
        related:
          - callAfterAsync
          - cancelAsyncTimer
          - callEvery
        keywords: ["timer","interval","clock","scheduler","background"]
        return: "uint64_t"
        signatures:
          - params: "double interval, std::function<void()> callback"
        description: "Like callEvery, but fired by a precise background scheduler thread with no drift (reschedules at absolute times). Ideal for sequencer clocks and LED/MIDI output timing. Same threading rules as callAfterAsync. Native only. Returns a timer id."
        description_ja: "callEveryの精密版。バックグラウンドのスケジューラスレッドがドリフトなく発火（絶対時刻で再スケジュール）。シーケンサのクロックやLED/MIDI出力のタイミングに最適。スレッドの注意点はcallAfterAsyncと同じ。ネイティブ専用。タイマーidを返す"
        description_ko: "callEvery의 정밀 버전. 백그라운드 스케줄러 스레드가 드리프트 없이 실행(절대 시각으로 재예약). 시퀀서 클럭이나 LED/MIDI 출력 타이밍에 적합. 스레드 주의사항은 callAfterAsync와 동일. 네이티브 전용. 타이머 id를 반환"

      - name: cancelTimer
        self: Node
        related:
          - cancelAllTimers
          - callAfter
          - callEvery
        keywords: ["timer","stop","clear","remove","cancel"]
        return: "void"
        signatures:
          - params: "uint64_t id"
        description: "Cancel a frame timer (callAfter/callEvery) by id."
        description_ja: "id指定でフレームタイマー（callAfter/callEvery）をキャンセル"
        description_ko: "id로 프레임 타이머(callAfter/callEvery)를 취소"

      - name: cancelAllTimers
        self: Node
        related:
          - cancelTimer
          - cancelAllAsyncTimers
        keywords: ["timer","stop","clear","remove","cancel"]
        return: "void"
        signatures:
          - params: ""
        description: "Cancel all frame timers on this node."
        description_ja: "このノードのフレームタイマーを全てキャンセル"
        description_ko: "이 노드의 모든 프레임 타이머를 취소"

      - name: cancelAsyncTimer
        self: Node
        related:
          - cancelAllAsyncTimers
          - callAfterAsync
          - callEveryAsync
        keywords: ["timer","stop","async","clear","cancel"]
        return: "void"
        signatures:
          - params: "uint64_t id"
        description: "Cancel an async timer by id. Blocks until its callback finishes if it is running now (unless called from inside the callback). Do not call while holding the mutex the callback uses."
        description_ja: "id指定で非同期タイマーをキャンセル。実行中なら完了を待つ（コールバック内から呼ぶ場合を除く）。コールバックが使うmutexを保持したまま呼ばないこと"
        description_ko: "id로 비동기 타이머를 취소. 실행 중이면 완료를 기다림(콜백 내부에서 호출하는 경우 제외). 콜백이 쓰는 mutex를 들고 호출하지 말 것"

      - name: cancelAllAsyncTimers
        self: Node
        related:
          - cancelAsyncTimer
          - cancelAllTimers
        keywords: ["timer","stop","async","clear","cancel"]
        return: "void"
        signatures:
          - params: ""
        description: "Cancel all async timers on this node (e.g. on mode change). Waits out any in-flight callback. Call it WITHOUT holding the callback's mutex to avoid a deadlock."
        description_ja: "このノードの非同期タイマーを全てキャンセル（モード変更時など）。実行中のコールバックの完了を待つ。デッドロック回避のため、コールバックのmutexを保持せずに呼ぶこと"
        description_ko: "이 노드의 모든 비동기 타이머를 취소(모드 전환 등). 실행 중인 콜백의 완료를 기다림. 데드락 방지를 위해 콜백의 mutex를 들지 않고 호출할 것"

  # ==========================================================================
  # Network (free functions; socket classes are in the types section)
  # ==========================================================================
  - id: network
    name: "Network"
    name_ja: "ネットワーク"
    name_ko: "네트워크"
    functions:
      - name: listNetworkInterfaces
        related:
          - NetworkInterface
          - printNetworkInterfaces
          - getLocalIp
          - getLocalIps
        keywords: ["network","interface","ip","adapter","nic"]
        platforms: [windows, macos, linux, ios, android]
        platformNote: "Enumerate NICs (IP/MAC/netmask/up/loopback). Windows uses GetAdaptersAddresses; macOS/iOS/Linux/Android use getifaddrs (+ AF_LINK on Apple, AF_PACKET elsewhere). On wasm it is an explicit stub: logs 'listNetworkInterfaces() is not available on the web backend' and returns {}. Its consumers getLocalIp() / getLocalIps() / printNetworkInterfaces() therefore also yield nothing on wasm."
        platformNote_ja: "NIC 列挙 (IP/MAC/netmask/up/loopback)。Windows は GetAdaptersAddresses、macOS/iOS/Linux/Android は getifaddrs (Apple は AF_LINK、他は AF_PACKET)。wasm は明示スタブで 'listNetworkInterfaces() is not available on the web backend' を出して {} を返す。よって getLocalIp() / getLocalIps() / printNetworkInterfaces() も wasm では何も返さない。"
        return: "std::vector<NetworkInterface>"
        signatures:
          - params: ""
        description: "List all network interface address entries (IPv4/IPv6, loopback, up or down)"
        description_ja: "全ネットワークインターフェースのアドレスを列挙（IPv4/IPv6・ループバック・up/down含む）"
        description_ko: "모든 네트워크 인터페이스 주소를 나열 (IPv4/IPv6, 루프백, up/down 포함)"

      - name: printNetworkInterfaces
        related:
          - listNetworkInterfaces
          - getLocalIps
        keywords: ["network","interface","log","print","ip"]
        return: "void"
        signatures:
          - params: ""
        description: "Log the interface list (one line per entry)"
        description_ja: "インターフェース一覧をログ出力（1エントリ1行）"
        description_ko: "인터페이스 목록을 로그로 출력 (항목당 한 줄)"

      - name: getLocalIp
        related:
          - getLocalIps
          - listNetworkInterfaces
          - isPrivate
        keywords: ["ip","address","lan","local","host"]
        return: "std::string"
        signatures:
          - params: ""
        description: "The most likely LAN address (skips loopback/down, IPv4 preferred). \"\" if none"
        description_ja: "一番それっぽいLANアドレス（ループバック/downを除外、IPv4優先）。無ければ\"\""
        description_ko: "가장 적합한 LAN 주소 (루프백/down 제외, IPv4 우선). 없으면 \"\""

      - name: getLocalIps
        related:
          - getLocalIp
          - listNetworkInterfaces
        keywords: ["ip","address","lan","local","list"]
        return: "std::vector<std::string>"
        signatures:
          - params: ""
        description: "Every non-loopback address (one per interface entry)"
        description_ja: "ループバック以外の全アドレス（インターフェースごと）"
        description_ko: "루프백이 아닌 모든 주소 (인터페이스 항목별)"

      - name: isLoopback
        related:
          - isPrivate
          - isLinkLocal
        keywords: ["loopback","localhost","127.0.0.1","ip"]
        return: "bool"
        signatures:
          - params: "const std::string& addr"
        description: "True if addr is a loopback address (127.0.0.0/8 or ::1)"
        description_ja: "addrがループバックアドレスならtrue（127.0.0.0/8 または ::1）"
        description_ko: "addr이 루프백 주소이면 true (127.0.0.0/8 또는 ::1)"

      - name: isPrivate
        related:
          - isLoopback
          - isLinkLocal
          - sameSubnet
        keywords: ["private","lan","rfc1918","internal","ip"]
        return: "bool"
        signatures:
          - params: "const std::string& addr"
        description: "True if addr is a private IPv4 (10/8, 172.16/12, 192.168/16)"
        description_ja: "addrがプライベートIPv4ならtrue（10/8, 172.16/12, 192.168/16）"
        description_ko: "addr이 사설 IPv4이면 true (10/8, 172.16/12, 192.168/16)"

      - name: isLinkLocal
        related:
          - isLoopback
          - isPrivate
        keywords: ["link local","apipa","169.254","ip"]
        return: "bool"
        signatures:
          - params: "const std::string& addr"
        description: "True if addr is link-local (169.254/16 or fe80::/10)"
        description_ja: "addrがリンクローカルならtrue（169.254/16 または fe80::/10）"
        description_ko: "addr이 링크-로컬이면 true (169.254/16 또는 fe80::/10)"

      - name: sameSubnet
        related:
          - isPrivate
          - getLocalIp
        keywords: ["subnet","netmask","network","same lan","match"]
        return: "bool"
        signatures:
          - params: "const std::string& a, const std::string& b, const std::string& netmask"
        description: "True if IPv4 a and b are on the same subnet under netmask"
        description_ja: "IPv4のaとbがnetmask下で同じサブネットならtrue"
        description_ko: "IPv4 a와 b가 netmask 하에서 같은 서브넷이면 true"

      - name: getOui
        related:
          - isLocallyAdministered
        keywords: ["mac","oui","vendor","manufacturer","address"]
        return: "std::string"
        signatures:
          - params: "const std::string& mac"
        description: "The OUI (first 3 bytes) of a MAC, uppercase \"A4:83:E7\". \"\" if unparseable"
        description_ja: "MACのOUI（先頭3バイト）を大文字で返す \"A4:83:E7\"。解析不能なら\"\""
        description_ko: "MAC의 OUI(앞 3바이트)를 대문자로 \"A4:83:E7\". 해석 불가 시 \"\""

      - name: isLocallyAdministered
        related:
          - getOui
        keywords: ["mac","random","virtual","laa","address"]
        return: "bool"
        signatures:
          - params: "const std::string& mac"
        description: "True if the MAC's locally-administered bit is set (randomized/virtual MAC)"
        description_ja: "MACのlocally-administeredビットが立っていればtrue（ランダム化/仮想MAC）"
        description_ko: "MAC의 locally-administered 비트가 설정되어 있으면 true (랜덤/가상 MAC)"

