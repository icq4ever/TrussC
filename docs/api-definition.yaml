        return: "void"
        signatures:
          - params: "bool close = false"
        description: "End drawing a stroke"
        description_ja: "ストローク描画を終了"
        description_ko: "stroke 그리기 종료"

      - name: beginLines
        related:
          - endLines
          - drawLine
          - setColor
        keywords: ["batch","segments","line list","multiple lines"]
        return: "void"
        signatures:
          - params: ""
        description: "Begin batch line drawing. Add vertex pairs with vertex(), then call endLines(). Each pair of vertices draws one independent line segment. Use setColor() between vertices for per-line colors."
        description_ja: "バッチ線描画を開始。vertex()で頂点ペアを追加し、endLines()で描画。2頂点で1本の独立した線分。setColor()で頂点ごとに色を変更可能"
        description_ko: "배치 선 그리기 시작. vertex()로 정점 쌍을 추가한 뒤 endLines()를 호출. 각 정점 쌍이 독립적인 선분 하나를 그림. 정점 사이에 setColor()로 선마다 색상 지정 가능"

      - name: endLines
        related:
          - beginLines
        keywords: ["batch","segments","render lines","flush"]
        return: "void"
        signatures:
          - params: ""
        description: "End batch line drawing and render all accumulated line segments"
        description_ja: "バッチ線描画を終了し、蓄積された全線分を描画"
        description_ko: "배치 선 그리기 종료. 누적된 모든 선을 렌더링"

      - name: drawStroke
