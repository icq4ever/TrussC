  - name: VideoGrabber
    related:
      - VideoDeviceInfo
      - Texture
      - createVideoPlayer
      - getTexture
    keywords: ["webcam","camera","capture","video","grabber","live"]
    platforms: [macos, windows, linux, ios, wasm]
    platformNote: "Webcam capture is a stub on Android: setupPlatform() logs \"Not yet implemented on Android\" and returns false (Camera2 NDK TODO). Real backends: macOS/iOS AVFoundation, Windows Media Foundation, Linux V4L2, web getUserMedia."
    platformNote_ja: "Android はスタブ。setupPlatform() が「Not yet implemented」を出して false を返す（Camera2 NDK 未実装）。他は実装あり（mac/ios AVFoundation, win MediaFoundation, linux V4L2, web getUserMedia）。"
    description: "Webcam capture source. Call setup() once, then update() every frame; getTexture() (via HasTexture) gives the live frame. Move-only. Camera permission is requested automatically on macOS"
    description_ja: "Webカメラのキャプチャソース。setup() を一度呼び、毎フレーム update()。getTexture() (HasTexture 経由) でライブフレームを取得。ムーブのみ。macOS ではカメラ権限を自動でリクエスト"
    description_ko: "웹캠 캡처 소스. setup()을 한 번 호출하고 매 프레임 update(). getTexture() (HasTexture 경유)로 라이브 프레임을 얻음. 이동 전용. macOS에서는 카메라 권한을 자동으로 요청"
    constructor:
      signatures:
        - params: ""
    methods:
      - name: listDevices
        self: VideoGrabber
        return: "vector<VideoDeviceInfo>"
        signatures:
          - params: ""
        description: "Return the list of available camera devices"
        description_ja: "利用可能なカメラデバイスのリストを返す"
        description_ko: "사용 가능한 카메라 디바이스 목록을 반환"
      - name: setDeviceID
        self: VideoGrabber
        return: "void"
        signatures:
          - params: "int deviceId"
        description: "Select which camera to use; call before setup()"
        description_ja: "使用するカメラを選択。setup() の前に呼ぶ"
        description_ko: "사용할 카메라를 선택. setup() 이전에 호출"
      - name: getDeviceID
        self: VideoGrabber
        const: true
        return: "int"
        signatures:
          - params: ""
        description: "Return the selected device ID"
        description_ja: "選択されたデバイス ID を返す"
        description_ko: "선택된 디바이스 ID를 반환"
      - name: setDesiredFrameRate
        self: VideoGrabber
        return: "void"
        signatures:
          - params: "int fps"
        description: "Request a capture frame rate; call before setup()"
        description_ja: "キャプチャのフレームレートをリクエスト。setup() の前に呼ぶ"
        description_ko: "캡처 프레임 레이트를 요청. setup() 이전에 호출"
      - name: getDesiredFrameRate
        self: VideoGrabber
        const: true
        return: "int"
        signatures:
          - params: ""
        description: "Return the requested frame rate (-1 if unspecified)"
        description_ja: "リクエストされたフレームレートを返す (未指定なら -1)"
        description_ko: "요청된 프레임 레이트를 반환 (지정 안 하면 -1)"
      - name: setVerbose
        self: VideoGrabber
        return: "void"
        signatures:
          - params: "bool verbose"
        description: "Enable or disable verbose logging"
        description_ja: "詳細ログを有効/無効化"
        description_ko: "상세 로깅을 활성화/비활성화"
      - name: isVerbose
        self: VideoGrabber
        const: true
        return: "bool"
        signatures:
          - params: ""
        description: "Return whether verbose logging is enabled"
        description_ja: "verbose ログが有効かどうかを返す"
        description_ko: "verbose 로깅이 활성화되어 있는지 반환"
      - name: setup
        self: VideoGrabber
        return: "bool"
        signatures:
          - params: "int width = 640, int height = 480"
        description: "Start the camera at the requested size. Returns false if permission is not yet granted (it is requested asynchronously); keep calling update() and capture begins once granted"
        description_ja: "指定サイズでカメラを開始。許可がまだ得られていない場合は false を返す（許可は非同期で要求される）。update() を呼び続け、許可されるとキャプチャが始まる"
        description_ko: "지정한 크기로 카메라 시작. 권한이 아직 부여되지 않으면 false 반환(권한은 비동기로 요청됨). update()를 계속 호출하면 권한 부여 시 캡처 시작"
      - name: close
        self: VideoGrabber
        return: "void"
        signatures:
          - params: ""
        description: "Stop the camera and release its resources"
        description_ja: "カメラを停止しリソースを解放"
        description_ko: "카메라를 정지하고 리소스 해제"
      - name: update
        self: VideoGrabber
        return: "void"
        signatures:
          - params: ""
        description: "Poll for a new frame and upload it to the texture. Call every frame; also completes a setup() that was waiting on permission"
        description_ja: "新しいフレームをポーリングしテクスチャにアップロード。毎フレーム呼ぶ。許可待ちだった setup() もここで完了する"
        description_ko: "새 프레임을 폴링하여 텍스처에 업로드. 매 프레임 호출. 권한 대기 중이던 setup()도 여기서 완료됨"
      - name: isFrameNew
        self: VideoGrabber
        const: true
        return: "bool"
        signatures:
          - params: ""
        description: "Return true if a new frame arrived during the most recent update()"
        description_ja: "直近の update() で新しいフレームが届いた場合 true を返す"
        description_ko: "가장 최근 update()에서 새 프레임이 도착했으면 true 반환"
      - name: isInitialized
        self: VideoGrabber
        const: true
        return: "bool"
        signatures:
          - params: ""
        description: "Return true once the camera is set up and capturing"
        description_ja: "カメラのセットアップが完了しキャプチャ中なら true を返す"
        description_ko: "카메라 설정이 완료되어 캡처 중이면 true 반환"
      - name: isPendingPermission
        self: VideoGrabber
        const: true
        return: "bool"
        signatures:
          - params: ""
        description: "Return true while waiting for camera permission to be granted"
        description_ja: "カメラ許可の付与を待っている間 true を返す"
        description_ko: "카메라 권한 부여를 대기하는 동안 true 반환"
      - name: getWidth
        self: VideoGrabber
        const: true
        return: "int"
        signatures:
          - params: ""
        description: "Return the captured frame width in pixels"
        description_ja: "キャプチャしたフレームの幅をピクセルで返す"
        description_ko: "캡처된 프레임의 너비를 픽셀로 반환"
      - name: getHeight
        self: VideoGrabber
        const: true
        return: "int"
        signatures:
          - params: ""
        description: "Return the captured frame height in pixels"
        description_ja: "キャプチャしたフレームの高さをピクセルで返す"
        description_ko: "캡처된 프레임의 높이를 픽셀로 반환"
      - name: getDeviceName
        self: VideoGrabber
        const: true
        return: "const string &"
        signatures:
          - params: ""
        description: "Return the name of the active capture device"
        description_ja: "アクティブなキャプチャデバイスの名前を返す"
        description_ko: "활성 캡처 디바이스의 이름을 반환"
      - name: getPixels
        self: VideoGrabber
        return: "unsigned char *"
        signatures:
          - params: ""
        description: "Return a pointer to the current RGBA pixel buffer"
        description_ja: "現在の RGBA ピクセルバッファへのポインタを返す"
        description_ko: "현재 RGBA 픽셀 버퍼에 대한 포인터를 반환"
      - name: copyToImage
