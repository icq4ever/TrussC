        return: "void"
        signatures:
          - params: "const vector<Vec3>& points"
          - params: "const vector<Vec3>& points, bool closed"
        description: "Append Catmull-Rom curve vertices to the current shape (use between beginShape/endShape; needs >=4 points, closed=true wraps around)"
        description_ja: "現在の図形にCatmull-Rom曲線の頂点を追加（beginShape/endShape間で使用、4点以上必要、closed=trueで閉曲線）"
        description_ko: "현재 도형에 Catmull-Rom 곡선 정점을 추가 (beginShape/endShape 사이에서 사용, 4점 이상 필요, closed=true는 닫힌 곡선)"

      - name: beginStroke
