        description_ko: "현재 장치 경로"
      - name: available
        self: Serial
        const: true
        return: "int"
        signatures:
          - params: ""
        description: "Number of bytes available to read"
        description_ja: "読み取り可能なバイト数"
        description_ko: "읽을 수 있는 바이트 수"
      - name: readBytes
        self: Serial
        return: "int"
        signatures:
          - params: "void* buffer, int length"
          - params: "std::string& buffer, int length"
        description: "Read bytes; returns actual count (>=0) or -1 on error"
        description_ja: "バイトを読む。実際の読み取り数(>=0)、エラー時-1を返す"
        description_ko: "바이트를 읽음. 실제 읽은 수(>=0) 또는 오류 시 -1 반환"
      - name: readByte
        self: Serial
        return: "int"
        signatures:
          - params: ""
        description: "Read a single byte; 0-255 on success, -1 no data, -2 error"
        description_ja: "1バイト読む。成功時0-255、データ無し-1、エラー-2"
        description_ko: "1바이트를 읽음. 성공 0-255, 데이터 없음 -1, 오류 -2"
      - name: writeBytes
        self: Serial
        return: "int"
        signatures:
          - params: "const void* buffer, int length"
          - params: "const std::string& buffer"
        description: "Write bytes; returns actual count or -1 on error"
        description_ja: "バイトを書く。実際の書き込み数、エラー時-1を返す"
        description_ko: "바이트를 씀. 실제 쓴 수 또는 오류 시 -1 반환"
      - name: writeByte
        self: Serial
        return: "bool"
        signatures:
          - params: "unsigned char byte"
        description: "Write a single byte; true on success"
        description_ja: "1バイト書く。成功でtrue"
        description_ko: "1바이트를 씀. 성공 시 true"
      - name: flushInput
        self: Serial
        return: "void"
        signatures:
          - params: ""
        description: "Clear the input buffer"
        description_ja: "入力バッファをクリア"
        description_ko: "입력 버퍼를 비움"
      - name: flushOutput
        self: Serial
        return: "void"
        signatures:
          - params: ""
        description: "Clear the output buffer"
        description_ja: "出力バッファをクリア"
        description_ko: "출력 버퍼를 비움"
      - name: flush
        self: Serial
        return: "void"
        signatures:
          - params: ""
        description: "Clear both input and output buffers"
        description_ja: "入力・出力バッファを両方クリア"
        description_ko: "입력·출력 버퍼를 모두 비움"
      - name: drain
        self: Serial
        return: "void"
        signatures:
          - params: ""
        description: "Wait until output transmission completes"
        description_ja: "出力送信の完了を待つ"
        description_ko: "출력 전송이 완료될 때까지 대기"
    static_methods:
