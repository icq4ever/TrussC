  - name: Serial
    related:
      - SerialDeviceInfo
      - listDevices
      - TcpClient
    keywords: ["com port","uart","usb serial","rs232","arduino","tty"]
    platforms: [windows, macos, linux, android]
    platformNote: "Real backends only on Windows (Win32 COM), macOS/Linux (POSIX termios), and Android (USB Host CDC-ACM via JNI+usbfs, CDC-ACM class devices only, first connect needs an async USB permission dialog). No serial on iOS (sandbox has no /dev/tty access — the macOS __APPLE__ enumeration branch compiles but never lists/opens a device) or wasm (Emscripten has no serial device; setup() falls into the POSIX open()/termios path against the virtual FS and fails)."
    platformNote_ja: "実バックエンドは Windows (Win32 COM)、macOS/Linux (POSIX termios)、Android (USB Host CDC-ACM、JNI+usbfs、CDC-ACMクラス機器のみ、初回接続は非同期のUSB許可ダイアログが必要) のみ。iOS はサンドボックスで /dev/tty にアクセスできず実質不可 (__APPLE__ の列挙分岐はコンパイルされるが機器を列挙/オープンできない)、wasm はシリアルデバイスが存在せず setup() が POSIX open()/termios 経路に落ちて失敗。"
    description: "Cross-platform serial port (USB/COM): connect, read/write bytes"
    description_ja: "クロスプラットフォームのシリアルポート（USB/COM）：接続・バイト読み書き"
    description_ko: "크로스플랫폼 시리얼 포트 (USB/COM): 연결, 바이트 읽기/쓰기"
    of_equivalent: "ofSerial"
    of_type_category: "serial-types"
    constructor:
      signatures:
        - params: ""
    methods:
      - name: setup
        self: Serial
        return: "bool"
        signatures:
          - params: "const std::string& portName, int baudRate"
          - params: "int deviceIndex, int baudRate"
        description: "Connect to a port by path or by index from listDevices()"
        description_ja: "パス指定、またはlistDevices()のインデックスでポートに接続"
        description_ko: "경로 또는 listDevices()의 인덱스로 포트에 연결"
      - name: close
        self: Serial
        return: "void"
        signatures:
          - params: ""
        description: "Disconnect and release resources"
        description_ja: "切断してリソースを解放"
        description_ko: "연결을 끊고 리소스를 해제"
      - name: isInitialized
        self: Serial
        const: true
        return: "bool"
        signatures:
          - params: ""
        description: "Whether currently connected"
        description_ja: "接続中か"
        description_ko: "현재 연결 중인지"
      - name: getDevicePath
        self: Serial
        const: true
        return: "const std::string&"
        signatures:
          - params: ""
        description: "Current device path"
