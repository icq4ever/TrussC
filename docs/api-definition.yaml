        return: "Node::Ptr"
        signatures:
          - params: ""
        description: "Get the parent node (null if none) (C++ only)"
        description_ja: "親ノードを取得（なければnull）（C++のみ）"
        description_ko: "부모 노드를 얻음 (없으면 null) (C++ 전용)"

      - name: getChildren
