        return: "string"
        signatures:
          - params: "const string& path"
        description: "Get absolute path"
        description_ja: "絶対パスを取得"
        description_ko: "절대 경로를 얻음"
        of_equivalent: "ofFilePath::getAbsolutePath"

      # Path utilities
      - name: getFileName
