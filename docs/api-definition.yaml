macros:
  - name: TC_RUN_APP
    signature: "TC_RUN_APP(AppClass, settings)"
    description: "Application entry-point macro. Expands to main() and runs AppClass. Required to enable hot reload."
    description_ja: "アプリのエントリポイントマクロ。main() を展開し AppClass を実行する。ホットリロードを使うには必須。"
  - name: TC_HOT_RELOAD
    signature: "TC_HOT_RELOAD(AppClass)"
    description: "Opt the app into hot reload. Place in the app's .cpp; triggers a CMake reconfigure on next build."
    description_ja: "アプリをホットリロード対応にする。アプリの .cpp に置く。次回ビルドで CMake が再構成される。"
  - name: TC_REFLECT
    signature: "TC_REFLECT(Self, ...Bases) { TC_VALUE(...) ... }"
    description: "Declare reflected members inside a class (exposed to the inspector, serialization, and MCP). Bases are the direct base classes."
    description_ja: "クラス内で反映メンバーを宣言する（インスペクタ・シリアライズ・MCP に公開）。Bases は直接の基底クラス。"
  - name: TC_REFLECT_ROOT
    signature: "TC_REFLECT_ROOT(Self) { TC_VALUE(...) ... }"
    description: "Like TC_REFLECT but for a root type with no reflected base classes."
    description_ja: "TC_REFLECT と同じだが、反映する基底クラスを持たないルート型向け。"
  - name: TC_REFLECT_FREE
    signature: "TC_REFLECT_FREE(Type) { TC_VALUE(...) ... }"
    description: "Reflect a non-member / external type at namespace scope (for types you can't add TC_REFLECT inside)."
    description_ja: "メンバー外・外部の型を名前空間スコープで反映する（TC_REFLECT をクラス内に書けない型向け）。"
  - name: TC_VALUE
    signature: "TC_VALUE(member) | TC_VALUE(name, getter) | TC_VALUE(name, getter, setter)"
    description: "Declare one reflected member inside a TC_REFLECT body. 1 arg = in-place, 2 = read-only, 3 = getter/setter."
    description_ja: "TC_REFLECT 本体内で反映メンバーを1つ宣言する。引数1=直接、2=読み取り専用、3=getter/setter。"
  - name: TC_ENUM_LABELS
    signature: "TC_ENUM_LABELS(EnumType, \"Label0\", \"Label1\", ...)"
    description: "Declare string labels for an enum (labels[(int)value] == name), used by the inspector and serialization."
    description_ja: "enum の文字列ラベルを宣言する（labels[(int)value] == name）。インスペクタやシリアライズで使われる。"

