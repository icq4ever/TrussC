        return: "void"
        signatures:
          - params: ""
        description: "Point the data path root at the macOS app bundle's Contents/Resources/data folder for distribution. No-op on non-macOS platforms."
        description_ja: "配布用にデータパスルートをmacOSアプリバンドルのContents/Resources/dataフォルダに向ける。macOS以外のプラットフォームでは何もしない"
        description_ko: "배포용으로 데이터 경로 루트를 macOS 앱 번들의 Contents/Resources/data 폴더로 지정. macOS 외 플랫폼에서는 동작하지 않음"
      - name: getExecutablePath
        related:
          - getExecutableDir
          - getAbsolutePath
        keywords: ["exe","executable","binary","app path","self"]
        platforms: [macos, windows, linux, ios]
        platformNote: "Android returns \"\" (assets via AAssetManager); Web returns hardcoded \"/\"."
        platformNote_ja: "Android は \"\" を返す（アセットは AAssetManager 経由）。Web はハードコードの \"/\"。"
        return: "string"
        signatures:
          - params: ""
        description: "Get the absolute path of the running executable."
        description_ja: "実行中の実行ファイルの絶対パスを取得"
        description_ko: "실행 중인 실행 파일의 절대 경로를 얻음"
      - name: getExecutableDir
        related:
          - getExecutablePath
          - setDataPathToResources
        keywords: ["exe","executable","binary","app folder","directory"]
        platforms: [macos, windows, linux, ios, android]
        platformNote: "Real directory on all native platforms (android = internalDataPath). Web returns hardcoded \"/\"."
        platformNote_ja: "ネイティブは全て実ディレクトリを返す（android は internalDataPath）。Web はハードコードの \"/\"。"
        return: "string"
        signatures:
          - params: ""
        description: "Get the directory containing the running executable (with trailing slash)."
        description_ja: "実行中の実行ファイルを含むディレクトリを取得(末尾スラッシュ付き)"
        description_ko: "실행 중인 실행 파일이 있는 디렉터리를 얻음(끝 슬래시 포함)"
