        description: "Load TTF font file"
        description_ja: "TTFフォントを読み込む"
        description_ko: "TTF 폰트 파일을 로드"

      - name: isLoaded
        self: Font
        const: true
        keywords: ["ready","loaded","available","valid"]
        return: "bool"
        signatures:
          - params: ""
        description: "Check if font is loaded"
        description_ja: "フォントが読み込まれているか"
        description_ko: "폰트가 로드되었는지 확인"

      - name: drawString
        self: Font
        const: true
        related:
          - drawBitmapString
          - getStringPath
          - getWidth
        keywords: ["text","render","print","label","write","type"]
        return: "void"
        signatures:
          - params: "const string& text, float x, float y"
        description: "Draw text at position"
        description_ja: "テキストを描画"
        description_ko: "지정한 위치에 텍스트를 그림"

      - name: getStringPath
        self: Font
        const: true
        related:
          - Path
          - drawStroke
          - drawString
        keywords: ["outline","vector","contour","path","shape","glyph"]
        return: "Path"
        signatures:
          - params: "const string& text, float x, float y"
        description: "Get text outline as a Path (one subpath per contour). Stays crisp under scale / rotation; use drawStroke / drawFill (holes auto-detected for e, a, O, 日, etc.)."
        description_ja: "テキストの輪郭を Path で取得 (1 contour = 1 subpath)。拡大・回転に強く、drawStroke / drawFill (e, a, O, 日 等の穴は自動検出) で描画。"
        description_ko: "텍스트 윤곽을 Path로 가져오기 (1 contour = 1 subpath). 확대 / 회전에 강함. drawStroke / drawFill (구멍 자동 검출)."

      - name: getWidth
        self: Font
        const: true
        related:
          - setWidth
          - getStringPath
          - getLineHeight
        keywords: ["resolution","size","pixels","dimension"]
        return: "float"
        signatures:
          - params: "const string& text"
        description: "Get text width in pixels"
        description_ja: "テキストの幅を取得"
        description_ko: "텍스트 너비를 픽셀로 얻음"

      - name: getHeight
        self: Font
        const: true
        keywords: ["resolution","size","pixels","dimension"]
        return: "float"
        signatures:
          - params: "const string& text"
        description: "Get text height in pixels"
        description_ja: "テキストの高さを取得"
        description_ko: "텍스트 높이를 픽셀로 얻음"

      - name: getLineHeight
        self: Font
        const: true
        keywords: ["leading","spacing","line","vertical"]
        return: "float"
        signatures:
          - params: ""
        description: "Get line height"
        description_ja: "行の高さを取得"
        description_ko: "줄 높이를 얻음"

      - name: getSize
        self: Font
        const: true
        related:
          - setSize
        keywords: ["pointsize","scale","font size","px"]
        return: "int"
        signatures:
          - params: ""
        description: "Get font size"
        description_ja: "フォントサイズを取得"
        description_ko: "폰트 크기를 얻음"

      - name: systemFontPath
        related:
          - listSystemFonts
          - createFont
        keywords: ["resolve","lookup","find","os font","path"]
        platforms: [macos, windows, linux, ios]
        platformNote: "Resolve a font name to a file path. Stub on Android and Web/WASM (always returns \"\")."
        platformNote_ja: "フォント名をファイルパスに解決する。Android と Web/WASM ではスタブで常に \"\" を返す。"
        return: "string"
        signatures:
          - params: "const string& name"
        description: "Resolve a system font name (PostScript / family) to a file path. Returns empty string if not found. macOS uses CoreText; Linux/Windows currently stub."
        description_ja: "システムフォント名（PostScript 名や family 名）をファイルパスに解決。見つからなければ空文字を返す。macOS は CoreText、Linux/Win は現状スタブ"
        description_ko: "시스템 폰트 이름을 파일 경로로 변환"

      - name: listSystemFonts
        related:
          - systemFontPath
        keywords: ["enumerate","available","os fonts","installed","list"]
        platforms: [macos, windows, linux, ios]
        platformNote: "Enumerate installed font names. Stub on Android and Web/WASM (always returns empty vector)."
        platformNote_ja: "インストール済みフォント名を列挙する。Android と Web/WASM ではスタブで常に空ベクタを返す。"
        return: "vector<string>"
        signatures:
          - params: ""
        description: "Enumerate names of all fonts known to the OS"
        description_ja: "OS が認識している全フォント名を取得"
        description_ko: "시스템에 설치된 모든 폰트 이름을 나열"

