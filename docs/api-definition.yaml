        description_ja: "XML 文字列を Xml オブジェクトにパース"
        description_ko: "XML 문자열을 Xml 객체로 파싱"

      - name: reflectToJson
        template: true
        related:
          - Json
          - reflectFromJson
          - toJsonString
        keywords: ["serialize","reflection","dump","members","json"]
        return: "Json"
        signatures:
          - params: "T& obj"
        description: "Return all reflected (TC_REFLECT) members of obj as a Json object. Works on any reflected type such as a Node or Mod."
        description_ja: "objのreflect済み(TC_REFLECT)メンバをすべてJsonオブジェクトとして返す。NodeやModなど任意のreflected型で動作"
        description_ko: "obj의 reflect된(TC_REFLECT) 멤버를 모두 Json 객체로 반환. Node나 Mod 등 임의의 reflected 타입에서 동작"
      - name: reflectFromJson
        template: true
        related:
          - Json
          - reflectToJson
          - parseJson
        keywords: ["deserialize","reflection","apply","load","json"]
        return: "JsonReadReflector"
        signatures:
          - params: "T& obj, const Json& j"
        description: "Apply the keys of a Json object onto obj's reflected (TC_REFLECT) members. Returns the reflector so callers can inspect which members were applied, skipped, read-only, or unknown."
        description_ja: "Jsonオブジェクトのキーをobjのreflect済み(TC_REFLECT)メンバに適用する。reflectorを返すので、どのメンバがapplied/skipped/read-only/unknownだったか確認できる"
        description_ko: "Json 객체의 키를 obj의 reflect된(TC_REFLECT) 멤버에 적용. reflector를 반환하므로 어떤 멤버가 applied/skipped/read-only/unknown이었는지 확인 가능"
      - name: isMainThread
        related:
          - getMainThreadId
        keywords: ["thread","main","concurrency","ui thread"]
        return: "bool"
        signatures:
          - params: ""
        description: "Whether the calling thread is the main (scene) thread. The main thread ID is recorded on the first call to getMainThreadId()."
        description_ja: "呼び出しスレッドがメイン(シーン)スレッドかどうか。メインスレッドIDはgetMainThreadId()の初回呼び出しで記録される"
        description_ko: "호출 스레드가 메인(scene) 스레드인지 여부. 메인 스레드 ID는 getMainThreadId()의 첫 호출 시 기록됨"
      - name: getMainThreadId
        related:
          - isMainThread
        keywords: ["thread","main","id","concurrency"]
        return: "thread::id"
        signatures:
          - params: ""
        description: "Get the main thread ID. Records the current thread's ID on the first call, so it must first be called from the main thread."
        description_ja: "メインスレッドIDを取得。初回呼び出しで現在のスレッドIDを記録するため、最初はメインスレッドから呼ぶ必要がある"
        description_ko: "메인 스레드 ID를 얻음. 첫 호출 시 현재 스레드 ID를 기록하므로 처음에는 반드시 메인 스레드에서 호출해야 함"
  - id: file
    name: "File"
    name_ja: "ファイル"
    name_ko: "파일"
    functions:
      - name: getDataPath
        related:
          - getDataPathRoot
          - getAbsolutePath
          - joinPath
        keywords: ["data","resource","asset","resolve","path"]
        return: "string"
        signatures:
          - params: "const string& path"
        description: "Get full path relative to data directory"
        description_ja: "データディレクトリからの相対パスを取得"
        description_ko: "데이터 디렉토리 기준의 전체 경로를 얻음"
