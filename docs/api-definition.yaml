# TrussC API Definition
# Single source of truth for all TrussC API documentation
#
# Used to generate:
#   - trussc-api.js + trussc-api.{en,ja,ko}.js (web reference data, per-language)
#   - trusssketch-api.js (autocomplete/reference)
#   - FOR_AI_ASSISTANT.md (API-INDEX + ADDON-LIST marker sections, injected)
#   - TrussC_vs_openFrameworks.md mapping (Section 5, injected)
#   - trusssketch-knowledge.md (Gemini RAG knowledge base)
#
# Optional per-symbol fields:
#   keywords: [..]   # search aliases for fuzzy/keyword lookup on the web reference
#   index: false     # exclude this symbol from the FOR_AI_ASSISTANT.md C++ API index

categories:
  # ==========================================================================
  # Lifecycle
  # ==========================================================================
  - id: lifecycle
    name: "Lifecycle"
    name_ja: "ライフサイクル"
    name_ko: "라이프사이클"
    functions:
      - name: setup
        return: "void"
        signatures:
          - params: ""
            params_simple: ""
        description: "Called once at start"
        description_ja: "開始時に一度呼ばれる"
        description_ko: "시작 시 한 번 호출됨"
        sketch: true
        snippet: "void setup() {\n\t$0\n}"

      - name: update
        return: "void"
        signatures:
          - params: ""
            params_simple: ""
        description: "Called every frame before draw"
        description_ja: "毎フレーム、drawの前に呼ばれる"
        description_ko: "매 프레임 draw 이전에 호출됨"
        sketch: true
        snippet: "void update() {\n\t$0\n}"

      - name: draw
        return: "void"
        signatures:
          - params: ""
            params_simple: ""
        description: "Called every frame after update"
        description_ja: "毎フレーム、updateの後に呼ばれる"
        description_ko: "매 프레임 update 이후에 호출됨"
        sketch: true
        snippet: "void draw() {\n\t$0\n}"

      - name: cleanup
        return: "void"
        signatures:
          - params: ""
            params_simple: ""
        description: "Called once before exit (optional user callback for cleanup)"
        description_ja: "終了前に一度呼ばれる（オプショナルなクリーンアップコールバック）"
        description_ko: "종료 직전 한 번 호출됨 (선택적 정리용 콜백)"
        sketch: false
        snippet: "void cleanup() {\n\t$0\n}"

      - name: runApp
        return: "int"
        signatures:
          - params: "const WindowSettings& settings = WindowSettings()"
            params_simple: "settings"
        description: "Start the application main loop. Called from main()"
        description_ja: "アプリケーションのメインループを開始。main()から呼ぶ"
        description_ko: "어플리케이션 메인 루프 시작. main()에서 호출"
        sketch: false
        snippet: "runApp(${1:settings})"

  # ==========================================================================
  # Events
  # ==========================================================================
  - id: events
    name: "Events"
    name_ja: "イベント"
    name_ko: "이벤트"
    functions:
      - name: mousePressed
        examples:
          - mouseExample
        return: "void"
        signatures:
          - params: "float x, float y, int button"
            params_simple: "x, y, button"
        description: "Mouse button pressed"
        description_ja: "マウスボタンが押された"
        description_ko: "마우스 버튼이 눌렸을 때"
        sketch: true
        snippet: "void mousePressed(float x, float y, int button) {\n\t$0\n}"

      - name: mouseReleased
        examples:
          - mouseExample
        return: "void"
        signatures:
          - params: "float x, float y, int button"
            params_simple: "x, y, button"
        description: "Mouse button released"
        description_ja: "マウスボタンが離された"
        description_ko: "마우스 버튼이 떼졌을 때"
        sketch: true
        snippet: "void mouseReleased(float x, float y, int button) {\n\t$0\n}"

      - name: mouseMoved
        examples:
          - mouseExample
        return: "void"
        signatures:
          - params: "float x, float y"
            params_simple: "x, y"
        description: "Mouse moved"
        description_ja: "マウスが移動した"
        description_ko: "마우스가 움직였을 때"
        sketch: true
        snippet: "void mouseMoved(float x, float y) {\n\t$0\n}"

      - name: mouseDragged
        examples:
          - mouseExample
        return: "void"
        signatures:
          - params: "float x, float y, int button"
            params_simple: "x, y, button"
        description: "Mouse dragged"
        description_ja: "マウスがドラッグされた"
        description_ko: "마우스가 드래그되었을 때"
        sketch: true
        snippet: "void mouseDragged(float x, float y, int button) {\n\t$0\n}"

      - name: keyPressed
        examples:
          - keyboardExample
        return: "void"
        signatures:
          - params: "int key"
            params_simple: "key"
        description: "Key pressed. Use KEY_* constants for special keys, or uppercase char literals for printable keys (e.g. key == 'A', key == '1')"
        description_ja: "キーが押された。特殊キーはKEY_*定数、印字可能キーは大文字リテラル（例: key == 'A', key == '1'）で比較"
        description_ko: "키가 눌렸을 때. 특수 키는 KEY_* 상수, 출력 가능한 키는 대문자 리터럴(예: key == 'A', key == '1')로 비교"
        sketch: true
        snippet: "void keyPressed(int key) {\n\t$0\n}"

      - name: keyReleased
        examples:
          - keyboardExample
        return: "void"
        signatures:
          - params: "int key"
            params_simple: "key"
        description: "Key released"
        description_ja: "キーが離された"
        description_ko: "키가 떼졌을 때"
        sketch: true
        snippet: "void keyReleased(int key) {\n\t$0\n}"

      - name: windowResized
        return: "void"
        signatures:
          - params: "int width, int height"
            params_simple: "width, height"
        description: "Window resized"
        description_ja: "ウィンドウがリサイズされた"
        description_ko: "윈도우 크기가 변경되었을 때"
        sketch: true
        snippet: "void windowResized(int width, int height) {\n\t$0\n}"

  # ==========================================================================
  # Graphics - Color
  # ==========================================================================
  - id: graphics_color
    name: "Graphics - Color"
    name_ja: "グラフィックス - 色"
    name_ko: "그래픽 - 색상"
    functions:
      - name: clear
        return: "void"
        signatures:
          - params: ""
            params_simple: ""
          - params: "float gray"
            params_simple: "gray"
          - params: "float r, float g, float b"
            params_simple: "r, g, b"
        description: "Clear screen. No args = transparent black (0,0,0,0)"
        description_ja: "画面をクリア。引数なし = 透明黒 (0,0,0,0)"
        description_ko: "화면을 지움. 인자 없음 = 투명한 검정 (0,0,0,0)"
        of_equivalent: "ofClear / ofBackground"
        of_signature_index: 1
        sketch: true
        snippet: "clear(${1:0.0})"

      - name: setColor
        examples:
          - graphicsExample
          - 3DPrimitivesExample
        return: "void"
        signatures:
          - params: "float gray"
            params_simple: "gray"
          - params: "float r, float g, float b"
            params_simple: "r, g, b"
          - params: "float r, float g, float b, float a"
            params_simple: "r, g, b, a"
        description: "Set drawing color (0.0-1.0)"
        description_ja: "描画色を設定 (0.0-1.0)"
        description_ko: "그리기 색상을 설정 (0.0-1.0)"
        of_equivalent: "ofSetColor"
        of_notes: "Range 0-1 instead of 0-255"
        sketch: true
        snippet: "setColor(${1:1.0}, ${2:1.0}, ${3:1.0})"

      - name: setColorHSB
        keywords: ["hsb", "hsv", "hue", "saturation", "brightness", "color"]
        return: "void"
        signatures:
          - params: "float h, float s, float b"
            params_simple: "h, s, b"
        description: "Set color from HSB (H: 0-1)"
        description_ja: "HSBで色を設定 (H: 0-1)"
        description_ko: "HSB로 색상을 설정 (H: 0-1)"
        sketch: true
        snippet: "setColorHSB(${1:0.0}, ${2:1.0}, ${3:1.0})"

      - name: setColorOKLCH
        return: "void"
        signatures:
          - params: "float L, float C, float H"
            params_simple: "L, C, H"
        description: "Set color from OKLCH"
        description_ja: "OKLCHで色を設定"
        description_ko: "OKLCH로 색상을 설정"
        sketch: true
        snippet: "setColorOKLCH(${1:0.7}, ${2:0.15}, ${3:0.0})"

      - name: setColorOKLab
        return: "void"
        signatures:
          - params: "float L, float a, float b"
            params_simple: "L, a, b"
        description: "Set color from OKLab"
        description_ja: "OKLabで色を設定"
        description_ko: "OKLab으로 색상을 설정"
        sketch: true
        snippet: "setColorOKLab(${1:0.7}, ${2:0.0}, ${3:0.0})"

  # ==========================================================================
  # Graphics - Shapes
  # ==========================================================================
      - name: srgbToLinear
        return: "float"
        signatures:
          - params: "float x"
            params_simple: "x"
        description: "Convert a single sRGB channel value to linear RGB"
        description_ja: ""
        description_ko: ""
        sketch: false
        snippet: "srgbToLinear(${1:x})"
      - name: linearToSrgb
        return: "float"
        signatures:
          - params: "float x"
            params_simple: "x"
        description: "Convert a single linear RGB channel value to sRGB"
        description_ja: ""
        description_ko: ""
        sketch: false
        snippet: "linearToSrgb(${1:x})"
  - id: graphics_shapes
    name: "Graphics - Shapes"
    name_ja: "グラフィックス - 図形"
    name_ko: "그래픽 - 도형"
    functions:
      - name: drawRect
        examples:
          - graphicsExample
        return: "void"
        signatures:
          - params: "float x, float y, float w, float h"
            params_simple: "x, y, w, h"
          - params: "Vec3 pos, float w, float h"
            params_simple: "pos, w, h"
          - params: "Vec3 pos, Vec2 size"
            params_simple: "pos, size"
            description: "Size given as a Vec2 (width, height)."
            description_ja: "サイズを Vec2（幅・高さ）で指定。"
        description: "Draw rectangle"
        description_ja: "矩形を描画"
        description_ko: "사각형 그리기"
        details: |
          Draws an axis-aligned rectangle from the top-left corner.
          Respects the current fill / noFill mode and draw color.
          With a Vec3 position, z is used for placement in 3D mode.
          For rounded corners, see drawRectRounded and drawRectSquircle.
        details_ja: |
          左上を原点に軸並行の矩形を描画する。
          現在の fill / noFill モードと描画色に従う。
          Vec3 で位置を渡すと 3D モードで z が使われる。
          角を丸くしたい場合は drawRectRounded, drawRectSquircle を参照。
        related:
          - drawRectRounded
          - drawRectSquircle
        of_equivalent: "ofDrawRectangle"
        sketch: true
        snippet: "drawRect(${1:x}, ${2:y}, ${3:w}, ${4:h})"

      - name: drawRectRounded
        return: "void"
        signatures:
          - params: "float x, float y, float w, float h, float radius"
            params_simple: "x, y, w, h, radius"
          - params: "Vec3 pos, Vec2 size, float radius"
            params_simple: "pos, size, radius"
        description: "Draw rounded rectangle (circular arc corners)"
        description_ja: "角丸矩形を描画（円弧コーナー）"
        description_ko: "둥근 모서리 사각형 그리기 (원호 모서리)"
        of_equivalent: "ofDrawRectRounded"
        sketch: true
        snippet: "drawRectRounded(${1:x}, ${2:y}, ${3:w}, ${4:h}, ${5:radius})"

      - name: drawRectSquircle
        keywords: ["squircle", "rounded", "ios", "superellipse", "smooth corner"]
        return: "void"
        signatures:
          - params: "float x, float y, float w, float h, float radius"
            params_simple: "x, y, w, h, radius"
          - params: "Vec3 pos, Vec2 size, float radius"
            params_simple: "pos, size, radius"
        description: "Draw squircle rectangle (curvature-continuous corners, iOS-style)"
        description_ja: "スクワークル矩形を描画（曲率連続コーナー、iOS風）"
        description_ko: "스쿼클 사각형 그리기 (곡률 연속 모서리, iOS 스타일)"
        sketch: true
        snippet: "drawRectSquircle(${1:x}, ${2:y}, ${3:w}, ${4:h}, ${5:radius})"

      - name: drawCircle
        examples:
          - graphicsExample
        keywords: ["circle", "round", "ellipse", "ball", "dot"]
        return: "void"
        signatures:
          - params: "float x, float y, float radius"
            params_simple: "x, y, radius"
          - params: "Vec3 center, float radius"
            params_simple: "center, radius"
        description: "Draw circle"
        description_ja: "円を描画"
        description_ko: "원 그리기"
        of_equivalent: "ofDrawCircle"
        sketch: true
        snippet: "drawCircle(${1:x}, ${2:y}, ${3:radius})"

      - name: drawArc
        return: "void"
        signatures:
          - params: "float x, float y, float radius, float angleBegin, float angleEnd"
            params_simple: "x, y, radius, angleBegin, angleEnd"
          - params: "Vec3 center, float radius, float angleBegin, float angleEnd"
            params_simple: "center, radius, angleBegin, angleEnd"
        description: "Draw arc (partial circle, angles in radians)"
        description_ja: "円弧を描画（角度はradian）"
        description_ko: "호 그리기 (각도는 radian)"
        sketch: true
        snippet: "drawArc(${1:x}, ${2:y}, ${3:radius}, ${4:0}, ${5:TAU})"

      - name: drawEllipse
        return: "void"
        signatures:
          - params: "float x, float y, float w, float h"
            params_simple: "x, y, w, h"
          - params: "Vec3 center, float rx, float ry"
            params_simple: "center, rx, ry"
          - params: "Vec3 center, Vec2 radii"
            params_simple: "center, radii"
        description: "Draw ellipse"
        description_ja: "楕円を描画"
        description_ko: "타원 그리기"
        of_equivalent: "ofDrawEllipse"
        sketch: true
        snippet: "drawEllipse(${1:x}, ${2:y}, ${3:w}, ${4:h})"

      - name: drawPoint
        return: "void"
        signatures:
          - params: "float x, float y"
            params_simple: "x, y"
          - params: "Vec3 pos"
            params_simple: "pos"
        description: "Draw a single point"
        description_ja: "点を描画"
        description_ko: "점 그리기"
        sketch: true
        snippet: "drawPoint(${1:x}, ${2:y})"

      - name: drawLine
        examples:
          - graphicsExample
        return: "void"
        signatures:
          - params: "float x1, float y1, float x2, float y2"
            params_simple: "x1, y1, x2, y2"
          - params: "float x1, float y1, float z1, float x2, float y2, float z2"
            params_simple: "x1, y1, z1, x2, y2, z2"
          - params: "Vec3 p1, Vec3 p2"
            params_simple: "p1, p2"
        description: "Draw line (2D or 3D)"
        description_ja: "線を描画（2Dまたは3D）"
        description_ko: "선 그리기 (2D 또는 3D)"
        of_equivalent: "ofDrawLine"
        sketch: true
        snippet: "drawLine(${1:x1}, ${2:y1}, ${3:x2}, ${4:y2})"

      - name: drawBezier
        return: "void"
        signatures:
          - params: "Vec3 p0, Vec3 p1, Vec3 p2, Vec3 p3"
            params_simple: "p0, p1, p2, p3"
          - params: "Vec3 p0, Vec3 p1, Vec3 p2"
            params_simple: "p0, p1, p2"
          - params: "const vector<Vec3>& controlPoints"
            params_simple: "controlPoints"
        description: "Draw bezier curve (cubic with 4 points, quadratic with 3, or N-th order via vector)"
        description_ja: "ベジェ曲線を描画（4点で3次、3点で2次、vectorでN次）"
        description_ko: "베지어 곡선 그리기 (4점은 3차, 3점은 2차, vector는 N차)"
        sketch: true
        snippet: "drawBezier(${1:p0}, ${2:p1}, ${3:p2}, ${4:p3})"

      - name: drawCurve
        return: "void"
        signatures:
          - params: "Vec3 p0, Vec3 p1, Vec3 p2, Vec3 p3"
            params_simple: "p0, p1, p2, p3"
          - params: "const vector<Vec3>& points"
            params_simple: "points"
          - params: "const vector<Vec3>& points, bool closed"
            params_simple: "points, closed"
        description: "Draw Catmull-Rom curve (4 control points draw p1->p2; vector chains segments passing through interior points; closed=true wraps around)"
        description_ja: "Catmull-Rom曲線を描画（4点でp1→p2を描画、vectorで内部点を通る連結、closed=trueで閉曲線）"
        description_ko: "Catmull-Rom 곡선 그리기 (4점은 p1→p2 그리기, vector는 내부 점들을 통과하는 연결, closed=true는 닫힌 곡선)"
        sketch: true
        snippet: "drawCurve(${1:p0}, ${2:p1}, ${3:p2}, ${4:p3})"

      - name: drawTriangle
        return: "void"
        signatures:
          - params: "float x1, float y1, float x2, float y2, float x3, float y3"
            params_simple: "x1, y1, x2, y2, x3, y3"
          - params: "Vec3 p1, Vec3 p2, Vec3 p3"
            params_simple: "p1, p2, p3"
        description: "Draw triangle"
        description_ja: "三角形を描画"
        description_ko: "삼각형 그리기"
        of_equivalent: "ofDrawTriangle"
        sketch: true
        snippet: "drawTriangle(${1:x1}, ${2:y1}, ${3:x2}, ${4:y2}, ${5:x3}, ${6:y3})"

      - name: drawBox
        keywords: ["cube", "box", "rectangle", "cuboid", "3d"]
        return: "void"
        signatures:
          - params: "float size"
            params_simple: "size"
          - params: "float w, float h, float d"
            params_simple: "w, h, d"
          - params: "float x, float y, float z, float size"
            params_simple: "x, y, z, size"
          - params: "float x, float y, float z, float w, float h, float d"
            params_simple: "x, y, z, w, h, d"
          - params: "Vec3 pos, float size"
            params_simple: "pos, size"
          - params: "Vec3 pos, float w, float h, float d"
            params_simple: "pos, w, h, d"
        description: "Draw 3D box (respects fill/noFill)"
        description_ja: "3Dボックスを描画（fill/noFillに対応）"
        description_ko: "3D 박스 그리기 (fill/noFill 적용됨)"
        of_equivalent: "ofDrawBox"
        sketch: true
        snippet: "drawBox(${1:size})"

      - name: drawSphere
        return: "void"
        signatures:
          - params: "float radius"
            params_simple: "radius"
          - params: "float x, float y, float z, float radius"
            params_simple: "x, y, z, radius"
          - params: "Vec3 pos, float radius"
            params_simple: "pos, radius"
        description: "Draw 3D sphere (respects fill/noFill)"
        description_ja: "3D球体を描画（fill/noFillに対応）"
        description_ko: "3D 구 그리기 (fill/noFill 적용됨)"
        of_equivalent: "ofDrawSphere"
        sketch: true
        snippet: "drawSphere(${1:radius})"

      - name: drawCone
        return: "void"
        signatures:
          - params: "float radius, float height"
            params_simple: "radius, height"
          - params: "float x, float y, float z, float radius, float height"
            params_simple: "x, y, z, radius, height"
          - params: "Vec3 pos, float radius, float height"
            params_simple: "pos, radius, height"
        description: "Draw 3D cone (respects fill/noFill)"
        description_ja: "3D円錐を描画（fill/noFillに対応）"
        description_ko: "3D 원뿔 그리기 (fill/noFill 적용됨)"
        of_equivalent: "ofDrawCone"
        sketch: true
        snippet: "drawCone(${1:radius}, ${2:height})"

      - name: beginShape
        return: "void"
        signatures:
          - params: ""
            params_simple: ""
        description: "Begin drawing a shape"
        description_ja: "図形の描画を開始"
        description_ko: "도형 그리기 시작"
        of_equivalent: "ofBeginShape"
        sketch: true
        snippet: "beginShape()"

      - name: vertex
        return: "void"
        signatures:
          - params: "float x, float y"
            params_simple: "x, y"
          - params: "float x, float y, float z"
            params_simple: "x, y, z"
          - params: "const Vec2& v"
            params_simple: "v"
          - params: "const Vec3& v"
            params_simple: "v"
        description: "Add a vertex"
        description_ja: "頂点を追加"
        description_ko: "정점 추가"
        of_equivalent: "ofVertex"
        sketch: true
        snippet: "vertex(${1:x}, ${2:y})"

      - name: endShape
        return: "void"
        signatures:
          - params: "bool close = false"
            params_simple: "close"
        description: "End drawing a shape"
        description_ja: "図形の描画を終了"
        description_ko: "도형 그리기 종료"
        of_equivalent: "ofEndShape"
        sketch: true
        snippet: "endShape()"

      - name: appendArc
        return: "void"
        signatures:
          - params: "float cx, float cy, float radius, float angleBegin, float angleEnd"
            params_simple: "cx, cy, radius, angleBegin, angleEnd"
          - params: "const Vec2& center, float radius, float angleBegin, float angleEnd"
            params_simple: "center, radius, angleBegin, angleEnd"
        description: "Append arc vertices to the current shape (use between beginShape/endShape)"
        description_ja: "現在の図形に円弧の頂点を追加（beginShape/endShape間で使用）"
        description_ko: "현재 도형에 호 정점을 추가 (beginShape/endShape 사이에서 사용)"
        sketch: true
        snippet: "appendArc(${1:cx}, ${2:cy}, ${3:radius}, ${4:0}, ${5:TAU})"

      - name: appendCurve
        return: "void"
        signatures:
          - params: "const vector<Vec3>& points"
