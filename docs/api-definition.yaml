          - toJsonString
          - loadJson
        keywords: ["json","parse","deserialize","decode"]
        return: "Json"
        signatures:
          - params: "const string& str"
        description: "Parse a JSON string into a Json object; returns an empty Json on parse error."
        description_ja: "JSON 文字列を Json オブジェクトにパース。パースエラー時は空の Json を返す"
        description_ko: "JSON 문자열을 Json 객체로 파싱. 파싱 오류 시 빈 Json 반환"
      - name: toJsonString
        related:
