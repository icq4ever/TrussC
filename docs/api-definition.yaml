        self: Ray
        const: true
        lua: false
        return: "bool"
        signatures:
          - params: "float radius, float& outT"
        description: "Intersect a sphere centered at the origin; writes distance, returns whether it hit"
        description_ja: "原点中心の球と交差。距離を書き込み、ヒットしたかを返す"
        description_ko: "원점 중심의 구와 교차. 거리를 기록하고 교차 여부를 반환"
      - name: intersectAABB
        self: Ray
        const: true
        lua: false
        return: "bool"
        signatures:
          - params: "const Vec3& boxMin, const Vec3& boxMax, float& outT"
        description: "Intersect an axis-aligned bounding box; writes distance, returns whether it hit"
        description_ja: "軸並行バウンディングボックスと交差。距離を書き込み、ヒットしたかを返す"
        description_ko: "축 정렬 경계 상자와 교차. 거리를 기록하고 교차 여부를 반환"
    static_methods:
