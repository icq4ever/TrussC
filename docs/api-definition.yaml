        related:
          - setupScreenPerspective
          - setupScreenFov
        keywords: ["3d","perspective","fov","deprecated"]
        return: void
        signatures:
          - params: "float fovY = 0.785f, float nearZ = 0.1f, float farZ = 1000.0f"
        details: "Use `setupScreenPerspective(fovDeg)` or `setupScreenFov(fovDeg)`. WARNING: the FOV unit changed from radians to degrees, so a literal value must be converted (e.g. 0.785 rad ≈ 45 deg). Scheduled for removal in v1.0.0."
        description: "Deprecated alias for setupScreenPerspective()"
        description_ja: "setupScreenPerspective() の非推奨エイリアス"
        description_ko: "setupScreenPerspective()의 deprecated 별칭"

      - name: disable3D
        deprecated:
          reason: "Use setupScreenOrtho() instead."
          replacement: setupScreenOrtho
        related:
          - setupScreenOrtho
        keywords: ["2d","ortho","disable","deprecated"]
        return: void
        signatures:
          - params: ""
        details: "Kept as a backward-compatible alias; new code should call `setupScreenOrtho()` (same behavior). Scheduled for removal in v1.0.0."
        description: "Deprecated alias for setupScreenOrtho()"
        description_ja: "setupScreenOrtho() の非推奨エイリアス"
        description_ko: "setupScreenOrtho()의 deprecated 별칭"

      - name: setDefaultScreenFov
        related:
          - getDefaultScreenFov
        keywords: ["fov","field of view","default","projection","perspective"]
        return: "void"
        signatures:
          - params: "float fovDeg"
        description: "Set default screen FOV (applied at frame start)"
        description_ja: "デフォルトのスクリーンFOVを設定（フレーム開始時に適用）"
        description_ko: "기본 스크린 FOV를 설정 (프레임 시작 시 적용)"

      - name: getDefaultScreenFov
        related:
          - setDefaultScreenFov
        keywords: ["fov","field of view","default","projection","query"]
        return: "float"
        signatures:
          - params: ""
        description: "Get current default screen FOV"
        description_ja: "現在のデフォルトスクリーンFOVを取得"
        description_ko: "현재 기본 스크린 FOV를 얻음"

      - name: worldToScreen
        self: CameraContext
        const: true
        related:
          - getCurrentMatrix
          - perspective
        keywords: ["project","world to screen","unproject","depth","coordinate","ofWorldToScreen"]
        return: "Vec3"
        signatures:
          - params: "const Vec3& worldPos"
        description: "Convert world coordinate to screen coordinate (x, y = screen pos, z = depth 0-1)"
        description_ja: "ワールド座標をスクリーン座標に変換（x, y = 画面位置, z = 深度 0-1）"
        description_ko: "월드 좌표를 스크린 좌표로 변환 (x, y = 스크린 위치, z = 깊이 0-1)"

      - name: screenToWorld
