        description: "Device name (pass to AudioSettings::deviceName)"
        description_ja: "デバイス名 (AudioSettings::deviceName へ渡す)"
        description_ko: "디바이스 이름 (AudioSettings::deviceName 에 전달)"
      - name: isDefault
        self: AudioDeviceInfo
        type: bool
        description: "True if this is the system default playback device"
        description_ja: "システム既定の再生デバイスなら true"
        description_ko: "시스템 기본 재생 디바이스이면 true"

  - name: AudioDeviceChangedArgs
    related:
      - audioDeviceChanged
      - AudioEngine
    keywords: ["audio","device","changed","switch","reinit"]
    description: "Argument type for the AudioEngine::audioDeviceChanged event, fired after every successful init() (initial and re-init). Reports the resolved device's real name (never empty)."
    description_ja: "AudioEngine::audioDeviceChanged イベントの引数型。init() 成功ごと (初回・再初期化とも) に発火する。解決されたデバイスの実名を報告する (空にはならない)"
    description_ko: "AudioEngine::audioDeviceChanged 이벤트의 인자 타입. init() 성공 시마다 (최초·재초기화 모두) 발생. 해석된 디바이스의 실제 이름을 보고 (비지 않음)"
    properties:
      - name: deviceName
        self: AudioDeviceChangedArgs
        type: string
        description: "Actual device name now active (resolved, never empty)"
        description_ja: "現在アクティブな実デバイス名 (解決済み、空にならない)"
        description_ko: "현재 활성화된 실제 디바이스 이름 (해석됨, 비지 않음)"
      - name: isDefaultDevice
        self: AudioDeviceChangedArgs
        type: bool
        description: "True when the opened device is the OS's current default playback device"
        description_ja: "開いたデバイスが OS の現在の既定再生デバイスのとき true"
        description_ko: "연 디바이스가 OS 의 현재 기본 재생 디바이스일 때 true"
      - name: sampleRate
        self: AudioDeviceChangedArgs
        type: int
        description: "Active engine sample rate in Hz"
        description_ja: "アクティブなエンジンのサンプルレート (Hz)"
        description_ko: "활성 엔진 샘플레이트 (Hz)"
      - name: channels
        self: AudioDeviceChangedArgs
        type: int
        description: "Active output channel count"
        description_ja: "アクティブな出力チャンネル数"
        description_ko: "활성 출력 채널 수"
      - name: bufferSize
        self: AudioDeviceChangedArgs
        type: int
        description: "Active device buffer size in frames"
        description_ja: "アクティブなデバイスバッファサイズ (フレーム単位)"
        description_ko: "활성 디바이스 버퍼 크기 (프레임 단위)"
      - name: maxPolyphony
        self: AudioDeviceChangedArgs
        type: int
        description: "Active max polyphony"
        description_ja: "アクティブな最大ポリフォニー"
        description_ko: "활성 최대 폴리포니"

  - name: AudioOutBuffer
    related:
      - audioOut
      - AudioEngine
      - AudioInBuffer
    keywords: ["audio","output","synthesis","buffer","dsp","callback"]
    description: "Argument type for the AudioEngine::audioOut event. Holds the interleaved mutable output buffer for a single audio callback. Listeners should ADD their contribution to data (voices are already mixed in); do not call engine APIs from here."
    description_ja: "AudioEngine::audioOut イベントの引数型。1 回のオーディオコールバック分のインターリーブされた可変出力バッファを保持する。リスナーは data に自分の寄与を加算すること (ボイスは既にミックス済み)。ここからエンジン API を呼ばないこと"
    description_ko: "AudioEngine::audioOut 이벤트의 인자 타입. 한 번의 오디오 콜백 분량의 인터리브된 가변 출력 버퍼를 보유. 리스너는 data 에 자신의 기여분을 더해야 함 (보이스는 이미 믹스됨). 여기서 엔진 API 를 호출하지 말 것"
    properties:
      - name: data
        self: AudioOutBuffer
        type: "float*"
        description: "Interleaved mutable output, frameCount * channels samples"
        description_ja: "インターリーブされた可変出力、frameCount * channels サンプル"
        description_ko: "인터리브된 가변 출력, frameCount * channels 샘플"
      - name: frameCount
        self: AudioOutBuffer
        type: int
        description: "Number of frames in this callback"
        description_ja: "このコールバックのフレーム数"
        description_ko: "이 콜백의 프레임 수"
      - name: channels
        self: AudioOutBuffer
        type: int
        description: "Channel count (floats per frame)"
        description_ja: "チャンネル数 (フレームあたりの float 数)"
        description_ko: "채널 수 (프레임당 float 수)"
      - name: sampleRate
        self: AudioOutBuffer
        type: int
        description: "Engine output sample rate in Hz"
        description_ja: "エンジン出力サンプルレート (Hz)"
        description_ko: "엔진 출력 샘플레이트 (Hz)"
      - name: framePosition
        self: AudioOutBuffer
        type: uint64_t
        description: "Monotonic count of output frames emitted since engine init (sample-accurate time/phase reference)"
        description_ja: "エンジン初期化以降に出力したフレームの単調カウント (サンプル精度の時間/位相基準)"
        description_ko: "엔진 초기화 이후 출력한 프레임의 단조 카운트 (샘플 정밀도의 시간/위상 기준)"

  - name: AudioInBuffer
    related:
      - audioIn
      - MicInput
      - AudioOutBuffer
    keywords: ["audio","microphone","mic","input","capture","buffer"]
    description: "Argument type for the AudioEngine::audioIn event. Holds the interleaved read-only microphone input for a single capture callback. Process and return quickly; do not call engine APIs from here."
    description_ja: "AudioEngine::audioIn イベントの引数型。1 回のキャプチャコールバック分のインターリーブされた読み取り専用マイク入力を保持する。処理は素早く済ませて返すこと。ここからエンジン API を呼ばないこと"
    description_ko: "AudioEngine::audioIn 이벤트의 인자 타입. 한 번의 캡처 콜백 분량의 인터리브된 읽기 전용 마이크 입력을 보유. 처리를 빠르게 끝내고 반환할 것. 여기서 엔진 API 를 호출하지 말 것"
    properties:
      - name: data
        self: AudioInBuffer
        type: "const float*"
        description: "Interleaved read-only mic input, frameCount * channels samples"
        description_ja: "インターリーブされた読み取り専用マイク入力、frameCount * channels サンプル"
        description_ko: "인터리브된 읽기 전용 마이크 입력, frameCount * channels 샘플"
      - name: frameCount
        self: AudioInBuffer
        type: int
        description: "Number of frames in this callback"
        description_ja: "このコールバックのフレーム数"
        description_ko: "이 콜백의 프레임 수"
      - name: channels
        self: AudioInBuffer
        type: int
        description: "Channel count (floats per frame)"
        description_ja: "チャンネル数 (フレームあたりの float 数)"
        description_ko: "채널 수 (프레임당 float 수)"
      - name: sampleRate
        self: AudioInBuffer
        type: int
        description: "Input sample rate in Hz"
        description_ja: "入力サンプルレート (Hz)"
        description_ko: "입력 샘플레이트 (Hz)"
      - name: framePosition
        self: AudioInBuffer
        type: uint64_t
        description: "Monotonic count of input frames received since capture start"
        description_ja: "キャプチャ開始以降に受信した入力フレームの単調カウント"
        description_ko: "캡처 시작 이후 수신한 입력 프레임의 단조 카운트"

  - name: ChipSoundNote
    related:
      - ChipSoundBundle
      - Sound
      - Wave
      - createChipBundle
    keywords: ["chiptune","8bit","synth","note","retro","tone","adsr","envelope"]
    description: "One 8-bit-style note: a plain aggregate of public fields (wave, hz, volume, duration, and the ADSR envelope attack/decay/sustain/release). Set fields directly via designated initializers ({ .wave = Wave::Square, .hz = 440, .duration = 0.2f }) or the constructor, then build() it into a Sound (or add() it to a ChipSoundBundle)."
    description_ja: "8bit スタイルの 1 音。public フィールド (wave, hz, volume, duration, ADSR の attack/decay/sustain/release) の素の集約体。指定初期化子 ({ .wave = Wave::Square, .hz = 440, .duration = 0.2f }) かコンストラクタで直接設定し、build() で Sound 化 (または ChipSoundBundle に add())"
    description_ko: "8비트 스타일 한 음. public 필드(wave, hz, volume, duration, ADSR의 attack/decay/sustain/release)의 단순 집합체. 지정 초기화자({ .wave = Wave::Square, .hz = 440, .duration = 0.2f })나 생성자로 직접 설정한 뒤 build()로 Sound화(또는 ChipSoundBundle에 add())"
    constructor:
      signatures:
        - params: ""
        - params: "Wave w, float freq, float dur, float vol = 0.5f"
    properties:
      - name: wave
        self: ChipSoundNote
        type: "Wave"
        description: "Waveform (Sin, Square, Triangle, Sawtooth, Noise, PinkNoise, Silent)"
        description_ja: "波形 (Sin, Square, Triangle, Sawtooth, Noise, PinkNoise, Silent)"
        description_ko: "파형 (Sin, Square, Triangle, Sawtooth, Noise, PinkNoise, Silent)"
      - name: hz
        self: ChipSoundNote
        type: "float"
        description: "Frequency in Hz (ignored for Noise / Silent)"
        description_ja: "周波数 (Hz)。Noise / Silent では無視"
        description_ko: "주파수 (Hz). Noise / Silent에서는 무시"
      - name: volume
        self: ChipSoundNote
        type: "float"
        description: "Volume (0.0-1.0)"
        description_ja: "音量 (0.0-1.0)"
        description_ko: "음량 (0.0-1.0)"
      - name: duration
        self: ChipSoundNote
        type: "float"
        description: "Note duration in seconds"
        description_ja: "ノートの長さ (秒)"
        description_ko: "노트 길이 (초)"
      - name: attack
        self: ChipSoundNote
        type: "float"
        description: "ADSR attack time in seconds"
        description_ja: "ADSR アタック時間 (秒)"
        description_ko: "ADSR 어택 시간 (초)"
      - name: decay
        self: ChipSoundNote
        type: "float"
        description: "ADSR decay time in seconds"
        description_ja: "ADSR ディケイ時間 (秒)"
        description_ko: "ADSR 디케이 시간 (초)"
      - name: sustain
        self: ChipSoundNote
        type: "float"
        description: "ADSR sustain level (0.0-1.0)"
        description_ja: "ADSR サスティンレベル (0.0-1.0)"
        description_ko: "ADSR 서스테인 레벨 (0.0-1.0)"
      - name: release
        self: ChipSoundNote
        type: "float"
        description: "ADSR release time in seconds"
        description_ja: "ADSR リリース時間 (秒)"
        description_ko: "ADSR 릴리스 시간 (초)"
    methods:
      - name: build
        self: ChipSoundNote
        const: true
        return: "Sound"
        signatures:
          - params: ""
        description: "Render this note (with its ADSR envelope) into a playable Sound"
        description_ja: "この音 (ADSR エンベロープ込み) を再生可能な Sound にレンダリング"
        description_ko: "이 음(ADSR 엔벨로프 포함)을 재생 가능한 Sound로 렌더링"
      - name: generateBuffer
        self: ChipSoundNote
        const: true
        return: "void"
        signatures:
          - params: "SoundBuffer& buf"
        lua: false
        description: "Write this note's raw waveform (without the ADSR envelope) into buf. Used internally by build() and by ChipSoundBundle mixing."
        description_ja: "この音の素の波形 (ADSR エンベロープなし) を buf に書き込む。build() と ChipSoundBundle のミックスで内部的に使われる"
        description_ko: "이 음의 원시 파형 (ADSR 엔벨로프 없이) 을 buf에 기록. build()와 ChipSoundBundle 믹싱에서 내부적으로 사용"
      - name: getTotalDuration
        self: ChipSoundNote
        const: true
        return: "float"
        signatures:
          - params: ""
        description: "Total note duration in seconds (used by ChipSoundBundle to lay out note timing)."
        description_ja: "ノートの総再生時間 (秒)。ChipSoundBundle がノートの配置時間に使う"
        description_ko: "노트의 총 길이 (초). ChipSoundBundle이 노트 배치 타이밍에 사용"

  - name: ChipSoundBundle
    related:
      - clear
      - createChipBundle
      - add
      - ChipSoundNote
      - ChipSound
      - build
    keywords: ["chiptune","8bit","sequence","timeline","notes","chip"]
    description: "A timeline of chiptune notes (ChipSoundNote + start time) that builds into a single mixed Sound. Add notes at times, then call build() to render the mix with ADSR and clipping applied."
    description_ja: "チップチューンノート (ChipSoundNote + 開始時刻) のタイムラインで、1 つのミックス済み Sound にビルドする。時刻ごとにノートを追加し、build() を呼んで ADSR とクリッピングを適用したミックスをレンダリングする"
    description_ko: "칩튠 노트 (ChipSoundNote + 시작 시각) 의 타임라인으로, 하나의 믹스된 Sound 로 빌드한다. 시각마다 노트를 추가한 뒤 build() 를 호출해 ADSR 과 클리핑을 적용한 믹스를 렌더링한다"
    constructor:
      signatures:
        - params: ""
    properties:
      - name: entries
        self: ChipSoundBundle
        type: "vector<ChipSoundBundle::Entry>"
        description: "The scheduled notes (each Entry pairs a ChipSoundNote with its start time in seconds)"
        description_ja: "スケジュールされたノート (各 Entry は ChipSoundNote と開始時刻 (秒) を組にする)"
        description_ko: "스케줄된 노트 (각 Entry 는 ChipSoundNote 와 시작 시각 (초) 을 짝지음)"
      - name: volume
        self: ChipSoundBundle
        type: float
        description: "Master volume multiplier applied when mixing (default 1.0)"
        description_ja: "ミックス時に適用されるマスターボリューム倍率 (デフォルト 1.0)"
        description_ko: "믹스 시 적용되는 마스터 볼륨 배율 (기본값 1.0)"
    methods:
      - name: add
        self: ChipSoundBundle
        return: "ChipSoundBundle&"
        signatures:
          - params: "const ChipSoundNote& note, float time"
          - params: "ChipSoundNote::Wave wave, float hz, float duration, float time, float vol = 0.5f"
        description: "Schedule a note to start at the given time (seconds). The second overload constructs the note inline from wave / frequency / duration."
        description_ja: "指定時刻 (秒) に開始するノートをスケジュール。2 番目のオーバーロードは wave / frequency / duration からノートをインラインで構築する"
        description_ko: "지정한 시각 (초) 에 시작하는 노트를 스케줄. 두 번째 오버로드는 wave / frequency / duration 으로 노트를 인라인 생성한다"
      - name: clear
        self: ChipSoundBundle
        return: "ChipSoundBundle&"
        signatures:
          - params: ""
        description: "Remove all scheduled notes."
        description_ja: "スケジュールされた全ノートを削除"
        description_ko: "스케줄된 모든 노트를 삭제"
      - name: getDuration
        self: ChipSoundBundle
        const: true
        return: "float"
        signatures:
          - params: ""
        description: "Total duration in seconds, auto-computed from the last note's end."
        description_ja: "総再生時間 (秒)、最後のノートの終端から自動計算される"
        description_ko: "총 길이 (초), 마지막 노트의 끝에서 자동 계산됨"
      - name: build
        self: ChipSoundBundle
        const: true
        return: "Sound"
        signatures:
          - params: ""
        description: "Render all scheduled notes into a single mixed, clipped Sound ready to play."
        description_ja: "スケジュールされた全ノートを、再生可能なミックス・クリップ済みの単一 Sound にレンダリング"
        description_ko: "스케줄된 모든 노트를 재생 가능한 믹스·클리핑된 단일 Sound 로 렌더링"

  - name: Logger
    related:
      - getLogger
      - LogLevel
      - LogEventArgs
      - logNotice
    keywords: ["log","logging","console","debug","output","trace"]
    description: "Logging core with console and file output and an onLog event; access the global instance via getLogger()"
    description_ja: "コンソール・ファイル出力と onLog イベントを備えたロギングコア。グローバルインスタンスは getLogger() でアクセス"
    description_ko: "콘솔·파일 출력과 onLog 이벤트를 갖춘 로깅 코어. 전역 인스턴스는 getLogger() 로 접근"
    methods:
      - name: log
        self: Logger
        return: "void"
        signatures:
          - params: "LogLevel level, const string& message"
        description: "Emit a log message at the given level"
        description_ja: "指定レベルでログメッセージを出力"
        description_ko: "지정한 레벨로 로그 메시지를 출력"
      - name: setConsoleLogLevel
        self: Logger
        return: "void"
        signatures:
          - params: "LogLevel level"
        description: "Set the minimum console log level"
        description_ja: "コンソールの最小ログレベルを設定"
        description_ko: "콘솔 최소 로그 레벨을 설정"
      - name: getConsoleLogLevel
        self: Logger
        const: true
        return: "LogLevel"
        signatures:
          - params: ""
        description: "Get the current console log level"
        description_ja: "現在のコンソールログレベルを取得"
        description_ko: "현재 콘솔 로그 레벨을 얻음"
      - name: setLogFile
        self: Logger
        return: "bool"
        signatures:
          - params: "const string& path"
        description: "Open a file to receive log output"
        description_ja: "ログ出力を受けるファイルを開く"
        description_ko: "로그 출력을 받을 파일을 엶"
      - name: closeFile
        self: Logger
        return: "void"
        signatures:
          - params: ""
        description: "Close the current log file"
        description_ja: "現在のログファイルを閉じる"
        description_ko: "현재 로그 파일을 닫음"
      - name: setFileLogLevel
        self: Logger
        return: "void"
        signatures:
          - params: "LogLevel level"
        description: "Set the minimum file log level"
        description_ja: "ファイルの最小ログレベルを設定"
        description_ko: "파일 최소 로그 레벨을 설정"
      - name: getFileLogLevel
        self: Logger
        const: true
        return: "LogLevel"
        signatures:
          - params: ""
        description: "Get the current file log level"
        description_ja: "現在のファイルログレベルを取得"
        description_ko: "현재 파일 로그 레벨을 얻음"
      - name: getLogFilePath
        self: Logger
        const: true
        return: "const string&"
        signatures:
          - params: ""
        description: "Get the path of the current log file"
        description_ja: "現在のログファイルのパスを取得"
        description_ko: "현재 로그 파일의 경로를 얻음"
      - name: isFileOpen
        self: Logger
        const: true
        return: "bool"
        signatures:
          - params: ""
        description: "Check whether a log file is currently open"
        description_ja: "ログファイルが現在開いているか確認"
        description_ko: "로그 파일이 현재 열려 있는지 확인"
    properties:
      - name: onLog
        self: Logger
        lua: false
        type: "Event<LogEventArgs>"
        description: "Event fired for every log message; listen to it to route logs (console/file/custom sink)"
        description_ja: "全ログメッセージで発火するイベント。ログの転送先(コンソール/ファイル/独自シンク)を購読する"
        description_ko: "모든 로그 메시지에서 발생하는 이벤트. 로그 전송 대상(콘솔/파일/커스텀 싱크)을 구독"

  - name: CoreEvents
    related:
      - events
      - Event
      - EventListener
    keywords: ["events","callbacks","hub","listeners","signals"]
    description: "Hub of all framework core events. Each member is an Event you subscribe to with .listen(callback); access the global instance via events()"
    description_ja: "フレームワークの全コアイベントのハブ。各メンバーは .listen(callback) で購読する Event。グローバルインスタンスは events() でアクセス"
    description_ko: "프레임워크의 모든 코어 이벤트 허브. 각 멤버는 .listen(callback) 으로 구독하는 Event. 전역 인스턴스는 events() 로 접근"
    properties:
      - name: setup
        self: CoreEvents
        type: "Event<void>"
        description: "Fired after app setup completes"
        description_ja: "アプリの setup 完了後に発火"
        description_ko: "앱 setup 완료 후 발생"
      - name: update
        self: CoreEvents
        type: "Event<void>"
        description: "Fired before update each frame"
        description_ja: "毎フレーム update の前に発火"
        description_ko: "매 프레임 update 전에 발생"
      - name: draw
        self: CoreEvents
        type: "Event<void>"
        description: "Fired before draw each frame"
        description_ja: "毎フレーム draw の前に発火"
        description_ko: "매 프레임 draw 전에 발생"
      - name: onRender
        self: CoreEvents
        type: "Event<void>"
        description: "Fired after sokol_gl flush, while the render pass is still active"
        description_ja: "sokol_gl flush 後、レンダーパスがまだアクティブな間に発火"
        description_ko: "sokol_gl flush 후, 렌더 패스가 아직 활성인 동안 발생"
      - name: afterFrame
        self: CoreEvents
        type: "Event<void>"
        description: "Fired after present() (swapchain committed, outside any pass)"
        description_ja: "present() 後に発火 (スワップチェーンコミット済み、いかなるパスの外)"
        description_ko: "present() 후에 발생 (스왑체인 커밋됨, 어떤 패스 밖)"
      - name: exit
        self: CoreEvents
        type: "Event<void>"
        description: "Fired on app exit"
        description_ja: "アプリ終了時に発火"
        description_ko: "앱 종료 시 발생"
      - name: exitRequested
        self: CoreEvents
        type: "Event<ExitRequestEventArgs>"
        description: "Fired when an exit is requested; set args.cancel = true to cancel it"
        description_ja: "終了が要求されたときに発火。args.cancel = true でキャンセルする"
        description_ko: "종료가 요청될 때 발생. args.cancel = true 로 취소"
      - name: keyPressed
        self: CoreEvents
        type: "Event<KeyEventArgs>"
        description: "Fired when a key is pressed"
        description_ja: "キーが押されたときに発火"
        description_ko: "키가 눌렸을 때 발생"
      - name: keyReleased
        self: CoreEvents
        type: "Event<KeyEventArgs>"
        description: "Fired when a key is released"
        description_ja: "キーが離されたときに発火"
        description_ko: "키가 떼어졌을 때 발생"
      - name: mousePressed
        self: CoreEvents
        type: "Event<MouseEventArgs>"
        description: "Fired when a mouse button is pressed"
        description_ja: "マウスボタンが押されたときに発火"
        description_ko: "마우스 버튼이 눌렸을 때 발생"
      - name: mouseReleased
        self: CoreEvents
        type: "Event<MouseEventArgs>"
        description: "Fired when a mouse button is released"
        description_ja: "マウスボタンが離されたときに発火"
        description_ko: "마우스 버튼이 떼어졌을 때 발생"
      - name: mouseMoved
        self: CoreEvents
        type: "Event<MouseMoveEventArgs>"
        description: "Fired when the mouse moves with no button held"
        description_ja: "ボタンを押さずにマウスが動いたときに発火"
        description_ko: "버튼을 누르지 않고 마우스가 움직일 때 발생"
      - name: mouseDragged
        self: CoreEvents
        type: "Event<MouseDragEventArgs>"
        description: "Fired when the mouse moves with a button held"
        description_ja: "ボタンを押したままマウスが動いたときに発火"
        description_ko: "버튼을 누른 채 마우스가 움직일 때 발생"
      - name: mouseScrolled
        self: CoreEvents
        type: "Event<ScrollEventArgs>"
        description: "Fired when the mouse wheel / trackpad scrolls"
        description_ja: "マウスホイール / トラックパッドがスクロールしたときに発火"
        description_ko: "마우스 휠 / 트랙패드가 스크롤될 때 발생"
      - name: windowResized
        self: CoreEvents
        type: "Event<ResizeEventArgs>"
        description: "Fired when the window is resized"
        description_ja: "ウィンドウがリサイズされたときに発火"
        description_ko: "윈도우가 리사이즈될 때 발생"
      - name: filesDropped
        self: CoreEvents
        type: "Event<DragDropEventArgs>"
        description: "Fired when files are dropped onto the window"
        description_ja: "ウィンドウにファイルがドロップされたときに発火"
        description_ko: "윈도우에 파일이 드롭될 때 발생"
      - name: clipboardPasted
        self: CoreEvents
        type: "Event<ClipboardPastedEventArgs>"
        description: "Fired on a paste gesture (Cmd+V / Ctrl+V / browser paste); args.text holds the content"
        description_ja: "ペースト操作(Cmd+V / Ctrl+V / ブラウザのペースト)で発火。args.text に内容が入る"
        description_ko: "붙여넣기 동작(Cmd+V / Ctrl+V / 브라우저 붙여넣기)에서 발생. args.text에 내용이 담김"
      - name: console
        self: CoreEvents
        type: "Event<ConsoleEventArgs>"
        description: "Fired when a command line is received from stdin"
        description_ja: "stdin からコマンドラインを受け取ったときに発火"
        description_ko: "stdin에서 명령줄을 수신했을 때 발생"
      - name: touchPressed
        self: CoreEvents
        type: "Event<TouchEventArgs>"
        description: "Fired when a touch begins (Android/iOS, multi-touch)"
        description_ja: "タッチが開始したときに発火(Android/iOS、マルチタッチ)"
        description_ko: "터치가 시작될 때 발생(Android/iOS, 멀티터치)"
      - name: touchMoved
        self: CoreEvents
        type: "Event<TouchEventArgs>"
        description: "Fired when a touch moves (Android/iOS, multi-touch)"
        description_ja: "タッチが移動したときに発火(Android/iOS、マルチタッチ)"
        description_ko: "터치가 이동할 때 발생(Android/iOS, 멀티터치)"
      - name: touchReleased
        self: CoreEvents
        type: "Event<TouchEventArgs>"
        description: "Fired when a touch ends or is cancelled (check args.cancelled)"
        description_ja: "タッチが終了またはキャンセルされたときに発火(args.cancelled を確認)"
        description_ko: "터치가 끝나거나 취소될 때 발생(args.cancelled 확인)"
      - name: rawEvent
        self: CoreEvents
        type: "Event<const sapp_event>"
        description: "Fired for every raw sokol_app event (for addons needing the full sapp_event)"
        description_ja: "すべての生の sokol_app イベントで発火(完全な sapp_event が必要なアドオン向け)"
        description_ko: "모든 원시 sokol_app 이벤트에서 발생(전체 sapp_event가 필요한 애드온용)"

  - name: Event
    related:
      - audioOut
      - audioIn
      - audioDeviceChanged
      - EventListener
      - CoreEvents
      - Deliver
    keywords: ["signal","callback","listener","subscribe","notify","delegate"]
    description: "Generic event you subscribe to with listen(callback) and fire with notify(arg). The template parameter is the argument type passed to listeners by reference; Event<void> is the no-argument specialization (callbacks and notify take no argument). listen() returns an EventListener RAII token that disconnects when destroyed"
    description_ja: "listen(callback) で購読し notify(arg) で発火する汎用イベント。テンプレートパラメータはリスナーに参照で渡される引数の型。Event<void> は引数なしの特殊化(callback も notify も引数なし)。listen() は破棄時に切断する EventListener RAII トークンを返す"
    description_ko: "listen(callback)으로 구독하고 notify(arg)로 발생시키는 범용 이벤트. 템플릿 파라미터는 리스너에 참조로 전달되는 인자 타입. Event<void>는 인자 없는 특수화(callback과 notify 모두 인자 없음). listen()은 파괴 시 연결을 끊는 EventListener RAII 토큰을 반환"
    methods:
      - name: listen
        self: Event
        return: "EventListener"
        signatures:
          - params: "Callback callback, int priority = EventPriority::App"
          - params: "Callback callback, Deliver deliver, int priority = EventPriority::App"
        description: "Register a listener callback and return an EventListener token; lower priority runs first, and Deliver::Main runs the callback on the main thread"
        description_ja: "リスナーコールバックを登録し EventListener トークンを返す。priority が低いものが先に実行され、Deliver::Main はコールバックをメインスレッドで実行"
        description_ko: "리스너 콜백을 등록하고 EventListener 토큰을 반환. priority가 낮은 것이 먼저 실행되며, Deliver::Main은 콜백을 메인 스레드에서 실행"
      - name: notify
        self: Event
        return: "void"
        signatures:
          - params: "T& arg"
        description: "Fire the event, calling all listeners in priority order (no argument for Event<void>); stops early if a listener marks an input arg consumed"
        description_ja: "イベントを発火し、全リスナーを priority 順に呼び出す(Event<void> は引数なし)。リスナーが入力 arg を consumed にすると早期終了"
        description_ko: "이벤트를 발생시켜 모든 리스너를 priority 순으로 호출(Event<void>는 인자 없음). 리스너가 입력 arg를 consumed로 표시하면 조기 종료"
      - name: listenerCount
        self: Event
        return: "size_t"
        signatures:
          - params: ""
        description: "Number of currently registered listeners"
        description_ja: "現在登録されているリスナーの数"
        description_ko: "현재 등록된 리스너 수"
      - name: clear
        self: Event
        return: "void"
        signatures:
          - params: ""
        description: "Remove all listeners"
        description_ja: "すべてのリスナーを削除"
        description_ko: "모든 리스너 제거"

  - name: EventListener
    related:
      - Event
      - CoreEvents
    keywords: ["listener","subscription","raii","token","disconnect","handle"]
    description: "RAII token returned by Event::listen(); the listener is automatically disconnected when this token is destroyed or reassigned. Move-only"
    description_ja: "Event::listen() が返す RAII トークン。このトークンが破棄または再代入されるとリスナーは自動的に切断される。ムーブのみ可"
    description_ko: "Event::listen()이 반환하는 RAII 토큰. 이 토큰이 파괴되거나 재할당되면 리스너는 자동으로 연결이 끊김. 이동 전용"
    methods:
      - name: disconnect
        self: EventListener
        return: "void"
        signatures:
          - params: ""
        description: "Explicitly disconnect the listener now (otherwise happens automatically on destruction)"
        description_ja: "リスナーを今すぐ明示的に切断(そうしなければ破棄時に自動で行われる)"
        description_ko: "리스너를 지금 명시적으로 연결 해제(그렇지 않으면 파괴 시 자동으로 수행됨)"
      - name: isConnected
        self: EventListener
        const: true
        return: "bool"
        signatures:
          - params: ""
        description: "True while the listener is still connected to its event"
        description_ja: "リスナーがイベントに接続されている間 true"
        description_ko: "리스너가 이벤트에 연결되어 있는 동안 true"

  - name: KeyEventArgs
    related:
      - keyPressed
      - keyReleased
      - MouseEventArgs
    keywords: ["keyboard","key","keypress","input","args"]
    description: "Arguments for keyPressed / keyReleased events"
    description_ja: "keyPressed / keyReleased イベントの引数"
    description_ko: "keyPressed / keyReleased 이벤트의 인자"
    properties:
      - name: key
        self: KeyEventArgs
        type: int
        description: "Key code (KEY_* / SAPP_KEYCODE_*)"
        description_ja: "キーコード(KEY_* / SAPP_KEYCODE_*)"
        description_ko: "키 코드(KEY_* / SAPP_KEYCODE_*)"
      - name: isRepeat
        self: KeyEventArgs
        type: bool
        description: "True if this is a repeat from holding the key"
        description_ja: "キー長押しによるリピートの場合 true"
