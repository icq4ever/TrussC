  # Scene Graph (not available in TrussSketch - uses shared_ptr which is complex)
  # ==========================================================================
  - id: scene_graph
    name: "Scene Graph"
    name_ja: "シーングラフ"
    name_ko: "씬 그래프"
    functions:
      - name: Node
        self: Node
        related:
          - addChild
          - RectNode
          - getRootNode
          - Mod
        keywords: ["scene graph","object","entity","transform","hierarchy"]
        return: ""
        signatures:
          - params: ""
        description: "Create a base scene node (C++ only - uses shared_ptr)"
        description_ja: "ベースノードを作成（C++のみ - shared_ptr使用）"
        description_ko: "기본 씬 노드를 생성 (C++ 전용 - shared_ptr 사용)"

      - name: addChild
        self: Node
        related:
          - moveToFront
          - moveToBack
          - updateLayout
          - LayoutMod
        keywords: ["parent","attach","append","hierarchy","tree"]
        return: void
        signatures:
          - params: "Node::Ptr child, bool keepGlobalPosition = false"
        description: "Add a child node (C++ only)"
        description_ja: "子ノードを追加（C++のみ）"
        description_ko: "자식 노드를 추가 (C++ 전용)"

      - name: moveToFront
        self: Node
        keywords: ["bring to front","top","raise","z order","above"]
        return: "void"
        signatures:
          - params: ""
        description: "Move this node to the end of its parent's child list — drawn last, on top of siblings. No-op if no parent or already last (C++ only)"
        description_ja: "親の子リストの末尾へ移動。最後に描画され、兄弟の最前面に表示される。親がない / すでに末尾の場合は何もしない（C++のみ）"
        description_ko: "이 노드를 부모의 자식 리스트 끝으로 이동 — 마지막에 그려지므로 형제들 위에 표시됨. 부모가 없거나 이미 마지막이면 동작 안 함 (C++ 전용)"

      - name: moveToBack
        self: Node
        keywords: ["send to back","bottom","lower","z order","behind"]
        return: "void"
        signatures:
          - params: ""
        description: "Move this node to the beginning of its parent's child list — drawn first, beneath siblings. No-op if no parent or already first (C++ only)"
        description_ja: "親の子リストの先頭へ移動。最初に描画され、兄弟の最背面に表示される。親がない / すでに先頭の場合は何もしない（C++のみ）"
        description_ko: "이 노드를 부모의 자식 리스트 처음으로 이동 — 먼저 그려지므로 형제들 아래에 표시됨. 부모가 없거나 이미 처음이면 동작 안 함 (C++ 전용)"

      - name: destroy
