  - name: Font
    description: "TrueType font for text rendering"
    description_ja: "テキストレンダリング用TrueTypeフォント"
    description_ko: "텍스트 렌더링용 트루타입 폰트"
    of_equivalent: "ofTrueTypeFont"
    of_type_category: "text-types"
    sketch: true
    constructor:
      signatures:
        - params: ""
      snippet: "Font()"
    methods:
      - name: load
        return: bool
        signatures:
          - params: "string path, int size"
        description: "Load font file"
        description_ja: "フォントファイルを読み込む"
        description_ko: "폰트 파일을 로드"
        snippet: "load(${1:\"path\"}, ${2:24})"
      - name: isLoaded
        return: bool
        signatures:
          - params: ""
        description: "Check if loaded"
        description_ja: "読み込み済みか確認"
        description_ko: "로드되었는지 확인"
        snippet: "isLoaded()"
      - name: drawString
        return: "void"
        signatures:
          - params: "string text, float x, float y"
        description: "Draw text"
        description_ja: "テキストを描画"
        description_ko: "텍스트를 그림"
        snippet: "drawString(${1:\"text\"}, ${2:x}, ${3:y})"
      - name: getGlyphPath
        return: "Path"
        signatures:
          - params: "uint32_t codepoint"
        description: "Vector outline of a single glyph as one Path with one subpath per contour. Em-normalized (1.0 = em), screen Y-down, baseline at y=0, pen at x=0. Use Path::drawFill() for filled rendering — holes (e, a, O, 日 ...) are auto-detected via earcut."
        description_ja: "単一グリフの輪郭を Path として取得 (1 contour = 1 subpath)。em 正規化 (1.0 = em)、画面 Y-down、ベースライン y=0、ペン位置 x=0。drawFill() で塗り — 穴 (e, a, O, 日 等) は earcut で自動検出。"
        description_ko: "단일 글리프 윤곽선 (1 contour = 1 subpath의 Path). em 정규화 (1.0 = em), 화면 Y-down, 기준선 y=0, 펜 위치 x=0. drawFill()로 채움 — 구멍 자동 검출."
        snippet: "getGlyphPath(${1:codepoint})"
      - name: getStringPath
        return: "Path"
        signatures:
          - params: "string text, float x, float y"
          - params: "string text, float x, float y, Direction h, Direction v"
        description: "Vector outline of the whole string at (x, y) as one Path containing every glyph's contours (one subpath each). Uses the same layout pipeline as drawString (writing mode, alignment, wrap, kinsoku, TCY). Logical pixels — drawStroke / drawFill / transform freely."
        description_ja: "文字列全体の輪郭を 1 個の Path として返す (全グリフの contour が subpath として連結)。drawString と同じレイアウトパイプライン (書字方向 / 揃え / 折返し / 禁則 / 縦中横) 経由。座標は論理ピクセル — drawStroke / drawFill / 変形自由。"
        description_ko: "(x, y) 위치의 전체 문자열 윤곽선을 단일 Path로 (모든 글리프 contour가 subpath로 연결). drawString과 동일한 레이아웃 파이프라인 사용. 좌표는 논리 픽셀."
        snippet: "getStringPath(${1:\"text\"}, ${2:x}, ${3:y})"
      - name: getWidth
        return: float
        signatures:
          - params: "string text"
        description: "Get text width"
        description_ja: "テキストの幅を取得"
        description_ko: "텍스트 너비를 얻음"
        snippet: "getWidth(${1:\"text\"})"
      - name: getHeight
        return: float
        signatures:
          - params: "string text"
        description: "Get text height"
        description_ja: "テキストの高さを取得"
        description_ko: "텍스트 높이를 얻음"
        snippet: "getHeight(${1:\"text\"})"
      - name: getLineHeight
        return: float
        signatures:
          - params: ""
        description: "Get line height"
        description_ja: "行の高さを取得"
        description_ko: "줄 높이를 얻음"
        snippet: "getLineHeight()"
      - name: getSize
        return: int
        signatures:
          - params: ""
        description: "Get font size"
        description_ja: "フォントサイズを取得"
        description_ko: "폰트 크기를 얻음"
        snippet: "getSize()"
      - name: clearAtlas
        return: void
        signatures:
          - params: ""
        description: "Clear font atlas (GPU memory freed, glyphs re-rasterized on next draw)"
        description_ja: "フォントアトラスをクリア（GPU解放、次の描画時に再ラスタライズ）"
        description_ko: "폰트 아틀라스를 지움 (GPU 메모리 해제, 다음 그리기에서 글리프 재래스터화)"
        sketch: true
        snippet: "clearAtlas()"
      - name: getMemoryUsage
        return: size_t
        signatures:
          - params: ""
        description: "Get atlas memory usage in bytes"
        description_ja: "アトラスのメモリ使用量（バイト）を取得"
        description_ko: "아틀라스 메모리 사용량을 바이트로 얻음"
        sketch: true
        snippet: "getMemoryUsage()"
      - name: getLoadedGlyphCount
        return: size_t
        signatures:
          - params: ""
        description: "Get number of loaded glyphs"
        description_ja: "読み込み済みグリフ数を取得"
        description_ko: "로드된 글리프 수를 얻음"
        sketch: true
        snippet: "getLoadedGlyphCount()"
      - name: getAtlasCount
        return: size_t
        signatures:
          - params: ""
        description: "Get number of atlas pages"
        description_ja: "アトラスページ数を取得"
        description_ko: "아틀라스 페이지 수를 얻음"
        sketch: true
        snippet: "getAtlasCount()"
      - name: setWritingMode
        return: void
        signatures:
          - params: "WritingMode mode"
        description: "Switch between horizontal and vertical (tategaki) writing. Default is Horizontal (existing behavior unchanged)."
        description_ja: "横書き / 縦書きを切り替え。デフォルトは Horizontal (既存挙動と同じ)"
        description_ko: "가로쓰기 / 세로쓰기 전환. 기본값은 Horizontal"
        sketch: true
        snippet: "setWritingMode(${1:WritingMode::VerticalRL})"
      - name: getWritingMode
        return: WritingMode
        signatures:
          - params: ""
        description: "Current writing mode"
        description_ja: "現在の書字方向を取得"
        description_ko: "현재 쓰기 방향을 얻음"
        sketch: true
        snippet: "getWritingMode()"
      - name: setTcyDigits
        return: void
        signatures:
          - params: "int maxDigits, TcyMode inMode, TcyMode overflowMode"
        description: "Tate-chu-yoko config for ASCII digit runs in vertical text. Runs with <= maxDigits use inMode (typically Combine — squeezed into one cell); longer runs fall back to overflowMode (typically Rotate)."
        description_ja: "縦書きで連続する ASCII 数字の縦中横設定。maxDigits 桁以内なら inMode (通常 Combine = 1セルに圧縮)、超えたら overflowMode (通常 Rotate)"
        description_ko: "세로쓰기에서 연속된 ASCII 숫자의 다테추요코 설정"
        sketch: true
        snippet: "setTcyDigits(${1:2}, ${2:TcyMode::Combine}, ${3:TcyMode::Rotate})"
      - name: setTcyLatin
        return: void
        signatures:
          - params: "TcyMode mode"
        description: "Tate-chu-yoko mode for Latin letter runs in vertical text. Default is Rotate (whole run rotated 90 CW)."
        description_ja: "縦書きで連続する Latin 文字の表示方式。デフォルトは Rotate (連続を 90度 CW 回転)"
        description_ko: "세로쓰기에서 연속된 라틴 문자의 표시 방식"
        sketch: true
        snippet: "setTcyLatin(${1:TcyMode::Rotate})"

