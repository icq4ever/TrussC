        self: Platform
        related:
          - isMacOS
          - isIOS
        keywords: ["mac","ios","macos","iphone","darwin"]
        return: bool
        signatures:
          - params: ""
        description: "True on any Apple platform (macOS or iOS)"
        description_ja: "Apple系 (macOS または iOS) で true"
        description_ko: "Apple 플랫폼 (macOS 또는 iOS)에서 true"
      - name: isMobile
