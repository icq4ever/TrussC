# ==========================================================================
# Keywords (for TrussSketch syntax highlighting - AngelScript)
# ==========================================================================
keywords:
  # Types
  - "void"
  - "int"
  - "float"
  - "bool"
  - "string"
  # Control flow
  - "if"
  - "else"
  - "for"
  - "while"
  - "return"
  - "break"
  - "continue"
  # Literals
  - "true"
  - "false"
  - "null"
  # Modifiers
  - "const"

# ==========================================================================
# Types (class definitions with properties and methods)
# ==========================================================================
# This section defines class types for context-aware autocomplete.
# - properties: member variables (shown after "instance.")
# - methods: instance methods (shown after "instance.")
# - static_methods: static methods (shown after "ClassName.")
# - constructor: constructor signatures (shown as global)
#
# Note: The "Types - X" categories above are kept for backward compatibility
# but will be deprecated in favor of this section.
# ==========================================================================
types:
  - name: Vec2
    operators:
      - symbol: "[]"
        rhs: "int"
        result: "float&"
        description: "Component access by index"
        description_ja: "インデックスで成分アクセス"
        description_ko: "인덱스로 성분 접근"
      - symbol: "+"
        rhs: "const Vec2&"
        result: "Vec2"
        description: "Component-wise addition"
        description_ja: "成分ごとの加算"
        description_ko: "성분별 덧셈"
      - symbol: "-"
        rhs: "const Vec2&"
        result: "Vec2"
        description: "Component-wise subtraction"
        description_ja: "成分ごとの減算"
        description_ko: "성분별 뺄셈"
      - symbol: "*"
        rhs: "float"
        result: "Vec2"
        description: "Scalar multiplication"
        description_ja: "スカラー倍"
        description_ko: "스칼라 곱"
      - symbol: "/"
        rhs: "float"
        result: "Vec2"
        description: "Scalar division"
        description_ja: "スカラー除算"
        description_ko: "스칼라 나눗셈"
      - symbol: "*"
        rhs: "const Vec2&"
        result: "Vec2"
        description: "Component-wise multiplication"
        description_ja: "成分ごとの乗算"
        description_ko: "성분별 곱셈"
      - symbol: "/"
        rhs: "const Vec2&"
        result: "Vec2"
        description: "Component-wise division"
        description_ja: "成分ごとの除算"
        description_ko: "성분별 나눗셈"
      - symbol: "-"
        unary: true
        result: "Vec2"
        description: "Negation"
        description_ja: "符号反転"
        description_ko: "부호 반전"
      - symbol: "+="
        rhs: "const Vec2&"
        result: "Vec2&"
        description: "In-place addition"
        description_ja: "加算代入"
        description_ko: "덧셈 대입"
      - symbol: "-="
        rhs: "const Vec2&"
        result: "Vec2&"
        description: "In-place subtraction"
        description_ja: "減算代入"
