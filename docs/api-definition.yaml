        description_ja: "拡張子なしのファイル名を取得"
        description_ko: "확장자를 제외한 파일명을 얻음"
        of_equivalent: "ofFilePath::getBaseName"

      - name: getFileExtension
        related:
          - getBaseName
          - getFileName
        keywords: ["extension","ext","suffix","type","format"]
        return: "string"
        signatures:
          - params: "const string& path"
        description: "Get file extension without dot"
        description_ja: "拡張子を取得（ドットなし）"
        description_ko: "파일 확장자를 얻음 (점 제외)"
        of_equivalent: "ofFilePath::getFileExt"

      - name: getParentDirectory
