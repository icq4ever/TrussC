  - id: graphics_3d_setup
    name: "3D Setup"
    name_ja: "3Dセットアップ"
    name_ko: "3D 셋업"
    functions:
      - name: setupScreenPerspective
        related:
          - createEasyCam
          - setupScreenFov
          - perspective
        keywords: ["perspective","projection","3d mode","frustum","ofSetupScreenPerspective","fov"]
        return: void
        signatures:
          - params: "float fovDeg = 45.0f, float nearDist = 0.0f, float farDist = 0.0f"
          - params: "float fovDeg = 45.0f, float nearDist = 0.0f, float farDist = 0.0f"
          - params: "float fovDeg, float nearDist, float farDist"
        description: "Set up perspective projection (oF-style default 3D)"
        description_ja: "パースペクティブ投影を設定（oF風デフォルト3D）"
        description_ko: "원근 투영을 설정 (oF 스타일 기본 3D)"
        of_equivalent: "ofSetupScreenPerspective"

      - name: setupScreenOrtho
        related:
          - setupScreenFov
          - ortho
        keywords: ["orthographic","projection","2d mode","flat","ofSetupScreenOrtho","no perspective"]
        return: "void"
        signatures:
          - params: ""
        description: "Set up orthographic projection (2D mode)"
        description_ja: "正投影を設定（2Dモード）"
        description_ko: "정사영 투영을 설정 (2D 모드)"
        of_equivalent: "ofSetupScreenOrtho"

      - name: setupScreenFov
        related:
          - setDefaultScreenFov
          - setFov
        keywords: ["fov","field of view","projection","perspective","ortho","screen setup"]
        return: void
        signatures:
          - params: "float fovDeg, float nearDist = 0.0f, float farDist = 0.0f"
          - params: "float fovDeg, float nearDist, float farDist"
        description: "Set up screen projection with specified FOV (0 = ortho, >0 = perspective)"
        description_ja: "指定したFOVで画面投影を設定（0 = 正投影、0より大 = パースペクティブ）"
        description_ko: "지정한 FOV로 화면 투영을 설정 (0 = 정사영, 0보다 크면 원근)"

      - name: setNearClip
        related:
          - setFarClip
          - getNearClip
          - setupScreenPerspective
        keywords: ["near plane","clipping","frustum","near","z near","default screen"]
        return: "void"
        signatures:
          - params: "float nearDist"
        description: "Set the default-screen near clipping plane (0 = auto-calculate)"
        description_ja: "デフォルト画面の近クリップ面を設定（0 = 自動計算）"
        description_ko: "기본 화면의 근평면(near clip)을 설정 (0 = 자동 계산)"

      - name: setFarClip
        related:
          - setNearClip
          - getFarClip
          - setupScreenPerspective
        keywords: ["far plane","clipping","frustum","far","z far","default screen"]
        return: "void"
        signatures:
          - params: "float farDist"
        description: "Set the default-screen far clipping plane (0 = auto-calculate)"
        description_ja: "デフォルト画面の遠クリップ面を設定（0 = 自動計算）"
        description_ko: "기본 화면의 원평면(far clip)을 설정 (0 = 자동 계산)"

      - name: worldToScreen
        related:
          - screenToWorld
          - screenPointToRay
        keywords: ["project","world to screen","unproject","depth","coordinate","ofWorldToScreen"]
        return: "Vec3"
        signatures:
          - params: "const Vec3& worldPos"
        description: "Convert a world coordinate to screen coordinate (x, y = screen pixels, z = depth 0-1)"
        description_ja: "ワールド座標をスクリーン座標に変換（x, y = 画面ピクセル, z = 深度 0-1）"
        description_ko: "월드 좌표를 스크린 좌표로 변환 (x, y = 스크린 픽셀, z = 깊이 0-1)"
        of_equivalent: "ofWorldToScreen"

      - name: enable3D
        deprecated:
          reason: "3D is now enabled by default. Use setupScreenPerspective() to change FOV."
          replacement: setupScreenPerspective
        related:
          - setupScreenPerspective
        keywords: ["3d","perspective","enable","deprecated"]
        return: void
        signatures:
          - params: ""
        details: "No longer needed: 3D is enabled by default. Just delete the call, or use `setupScreenPerspective()` to change the FOV. Scheduled for removal in v1.0.0."
        description: "Deprecated alias for setupScreenPerspective()"
        description_ja: "setupScreenPerspective() の非推奨エイリアス"
        description_ko: "setupScreenPerspective()의 deprecated 별칭"

      - name: enable3DPerspective
        deprecated:
          reason: "Use setupScreenPerspective(fovDeg) or setupScreenFov(fovDeg) instead. Note: FOV is now in degrees, not radians."
