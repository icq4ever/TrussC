        keywords: ["json","serialize","stringify","encode","dump"]
        return: "string"
        signatures:
          - params: "const Json& j, int indent = 2"
        description: "Serialize a Json object to a string. indent sets the pretty-print width (negative for compact)."
        description_ja: "Json オブジェクトを文字列にシリアライズ。indent は整形出力の幅を指定（負値でコンパクト）"
        description_ko: "Json 객체를 문자열로 직렬화. indent는 pretty-print 폭을 지정 (음수면 compact)"
      - name: parseXml
        related:
