        description_ko: "현재 FPS 설정(update/draw 목표 레이트, 실제 VSync 레이트, sync 플래그)을 얻음"
  - id: memory
    name: "Memory"
    name_ja: "メモリ"
    name_ko: "메모리"
    functions:
      - name: getSokolMemoryBytes
        related:
          - getSokolMemoryAllocs
          - getMemoryUsage
        keywords: ["ram","allocation","heap","usage","footprint"]
        return: "int"
        signatures:
          - params: ""
        description: "Total bytes allocated by sokol libraries"
        description_ja: "sokolライブラリの総メモリ使用量（バイト）"
        description_ko: "sokol 라이브러리로부터 할단된 총 바이트"

      - name: getSokolMemoryAllocs
        related:
          - getSokolMemoryBytes
          - getMemoryUsage
        keywords: ["allocation","count","ram","heap","objects"]
        return: "int"
        signatures:
          - params: ""
        description: "Number of active allocations in sokol libraries"
        description_ja: "sokolライブラリのアクティブなアロケーション数"
        description_ko: "sokol 라이브러리의 활성 할당 개수"

      - name: releaseSglBuffers
        related:
          - getSokolMemoryBytes
        keywords: ["free","vertex buffer","gpu","cleanup","reclaim"]
        return: "void"
        signatures:
          - params: ""
        description: "Release sokol_gl vertex/command buffers (auto re-allocated on next draw)"
        description_ja: "sokol_glのバッファを解放（次の描画時に自動再確保）"
        description_ko: "sokol_gl의 정점/커맨드 버퍼를 해제 (다음 드로우 시 자동 재할당)"

      - name: getMemoryUsage
        related:
          - getSokolMemoryBytes
          - getThermalState
        keywords: ["ram","rss","footprint","heap","process"]
        return: "size_t"
        signatures:
          - params: ""
        description: "Get process memory usage in bytes (platform-specific)"
        description_ja: "プロセスのメモリ使用量をバイトで取得（プラットフォーム固有）"
        description_ko: "프로세스의 메모리 사용량을 바이트로 얻음 (플랫폼-고유)"

      - name: getFboCount
        related:
          - getTextureCount
          - getNodeCount
        keywords: ["framebuffer","render target","count","leak","resources"]
        return: "size_t"
        signatures:
          - params: ""
        description: "Get number of active FBO objects"
        description_ja: "アクティブなFBOオブジェクト数を取得"
        description_ko: "활성 FBO 객체 개수를 얻음"

      - name: getTextureCount
        related:
          - getFboCount
          - getNodeCount
        keywords: ["texture","image","count","leak","gpu"]
        return: "size_t"
        signatures:
          - params: ""
        description: "Get number of active Texture objects"
        description_ja: "アクティブなTextureオブジェクト数を取得"
        description_ko: "활성 Texture 객체 개수를 얻음"

      - name: getNodeCount
        related:
          - getFboCount
          - getTextureCount
        keywords: ["scene graph","objects","count","tree","entities"]
        return: "size_t"
        signatures:
          - params: ""
        description: "Get number of active Node objects in scene graph"
        description_ja: "シーングラフ内のアクティブなNodeオブジェクト数を取得"
        description_ko: "씬 그래프의 활성 Node 객체 개수를 얻음"

  # ==========================================================================
  # Platform
  # ==========================================================================
  - id: platform
    name: "Platform"
    name_ja: "プラットフォーム"
    name_ko: "플랫폼"
    functions:

  # ==========================================================================
  # Graphics Backend
  # ==========================================================================
      - name: setImmersiveMode
        related:
          - getImmersiveMode
          - setKeepScreenOn
          - toggleFullscreen
        keywords: ["fullscreen","hide ui","status bar","kiosk","edge to edge"]
        platforms: [ios, android]
        platformNote: "Mobile-only. No-op on macOS, Windows, Linux and Web."
        platformNote_ja: "モバイル専用。macOS / Windows / Linux / Web では no-op。"
        return: "void"
        signatures:
          - params: "bool enabled"
        description: "Hide system UI for immersive fullscreen. Android: sticky immersive (status + navigation bars). iOS: hides status bar + home indicator. Desktop: no-op"
        description_ja: "没入型フルスクリーンのためシステムUIを非表示。Android: sticky immersive（ステータス＋ナビゲーションバー）。iOS: ステータスバー＋ホームインジケータを非表示。Desktop: no-op"
        description_ko: "몰입형 전체화면을 위해 시스템 UI를 숨김. Android: sticky immersive (상태 + 내비게이션 바). iOS: 상태 바 + 홈 인디케이터 숨김. Desktop: no-op"
      - name: getImmersiveMode
        related:
          - setImmersiveMode
        keywords: ["fullscreen","hide ui","kiosk","status bar"]
        platforms: [ios, android]
        platformNote: "Mobile-only. Returns false on macOS, Windows, Linux and Web."
        platformNote_ja: "モバイル専用。macOS / Windows / Linux / Web では false を返す。"
        return: "bool"
        signatures:
          - params: ""
        description: "Return whether immersive mode is currently enabled"
        description_ja: "没入モードが現在有効かどうかを返す"
        description_ko: "몰입 모드가 현재 활성화되어 있는지 반환"
      - name: captureWindow
        related:
          - Pixels
          - grabScreen
          - saveScreenshot
        keywords: ["screenshot","grab","snapshot","pixels","framebuffer"]
        platforms: [macos, windows, linux, ios, android]
        platformNote: "Web is unimplemented (logs warning, returns false). All native backends read back the framebuffer."
        platformNote_ja: "Web は未実装（警告を出して false）。ネイティブは全てフレームバッファを読み戻す。"
        return: "bool"
        signatures:
          - params: "Pixels& outPixels"
        description: "Capture the current window contents into a Pixels object. Returns true on success"
        description_ja: "現在のウィンドウ内容を Pixels オブジェクトにキャプチャ。成功時 true を返す"
        description_ko: "현재 윈도우 내용을 Pixels 객체로 캡처. 성공 시 true 반환"
      - name: getSystemVolume
        related:
          - setSystemVolume
          - setBeepVolume
        keywords: ["sound","audio","loudness","speaker"]
        platforms: [macos, ios, android]
        platformNote: "Returns -1 on Windows, Linux and Web (no implementation)."
        platformNote_ja: "Windows / Linux / Web では未実装で -1 を返す。"
        return: "float"
        signatures:
          - params: ""
        description: "Get system output volume (0.0-1.0)"
        description_ja: "システム出力音量を取得（0.0-1.0）"
        description_ko: "시스템 출력 볼륨을 얻음 (0.0-1.0)"
      - name: setSystemVolume
        related:
          - getSystemVolume
        keywords: ["sound","audio","loudness","speaker","mute"]
        platforms: [macos, android]
        platformNote: "No-op on iOS (explicitly unsupported), Windows, Linux and Web."
        platformNote_ja: "iOS（明示的に非対応）/ Windows / Linux / Web では no-op。"
        return: "void"
        signatures:
          - params: "float volume"
        description: "Set system output volume (0.0-1.0). iOS: not supported by the OS (logs a warning)"
        description_ja: "システム出力音量を設定（0.0-1.0）。iOS: OSが非対応（警告をログ出力）"
        description_ko: "시스템 출력 볼륨을 설정 (0.0-1.0). iOS: OS가 미지원 (경고 로그 출력)"
      - name: getSystemBrightness
        related:
          - setSystemBrightness
          - setKeepScreenOn
        keywords: ["screen","display","backlight","luminance"]
        platforms: [macos, ios, android]
        platformNote: "Returns -1 on Windows, Linux and Web. macOS uses a private CoreDisplay API."
        platformNote_ja: "Windows / Linux / Web では -1。macOS は非公開 CoreDisplay API 使用。"
        return: "float"
        signatures:
          - params: ""
        description: "Get screen brightness (0.0-1.0). iOS: linear. Android: gamma-corrected (perceptual). Desktop: returns -1 (not supported)"
        description_ja: "画面の明るさを取得（0.0-1.0）。iOS: リニア。Android: ガンマ補正済み（知覚的）。Desktop: -1 を返す（非対応）"
        description_ko: "화면 밝기를 얻음 (0.0-1.0). iOS: 선형. Android: 감마 보정됨 (지각적). Desktop: -1 반환 (미지원)"
      - name: setSystemBrightness
        related:
          - getSystemBrightness
        keywords: ["screen","display","backlight","dim","luminance"]
        platforms: [macos, ios]
        platformNote: "No-op on Android (needs WRITE_SETTINGS, TODO), Windows, Linux and Web."
        platformNote_ja: "Android（WRITE_SETTINGS 必要、TODO）/ Windows / Linux / Web では no-op。"
        return: "void"
        signatures:
          - params: "float brightness"
        description: "Set screen brightness (0.0-1.0). Meaning of the value differs by platform (iOS linear, Android perceptual). Desktop: not supported"
        description_ja: "画面の明るさを設定（0.0-1.0）。値の意味はプラットフォームで異なる（iOS リニア、Android 知覚的）。Desktop: 非対応"
        description_ko: "화면 밝기를 설정 (0.0-1.0). 값의 의미는 플랫폼마다 다름 (iOS 선형, Android 지각적). Desktop: 미지원"
      - name: getThermalState
        related:
          - ThermalState
          - getThermalTemperature
          - getBatteryLevel
        keywords: ["heat","temperature","overheat","throttle"]
        platforms: [macos, ios, android]
        platformNote: "Returns ThermalState::Nominal stub on Windows, Linux and Web; Android needs NDK API 30+."
        platformNote_ja: "Windows / Linux / Web では Nominal スタブ。Android は NDK API 30+ が必要。"
        return: "ThermalState"
        signatures:
          - params: ""
        description: "Get the coarse-grained device thermal state (Nominal / Fair / Serious / Critical)"
        description_ja: "デバイスの粗い熱状態を取得（Nominal / Fair / Serious / Critical）"
        description_ko: "디바이스의 대략적인 열 상태를 얻음 (Nominal / Fair / Serious / Critical)"
      - name: getThermalTemperature
        related:
          - getThermalState
        keywords: ["heat","celsius","degrees","overheat","sensor"]
        platforms: []
        platformNote: "Stub on ALL platforms — always returns -1 (no OS exposes a raw temperature value)."
        platformNote_ja: "全プラットフォームでスタブ。常に -1 を返す（OS が生温度値を公開しない）。"
        return: "float"
        signatures:
          - params: ""
        description: "Get device temperature in Celsius, or -1 if unavailable"
        description_ja: "デバイス温度を摂氏で取得、取得不可なら -1"
        description_ko: "디바이스 온도를 섭씨로 얻음, 불가하면 -1"
      - name: getBatteryLevel
        related:
          - isBatteryCharging
          - getThermalState
        keywords: ["battery","power","charge","energy","percent"]
        platforms: [macos, ios, android]
        platformNote: "Returns -1 on Windows, Linux and Web (no implementation)."
        platformNote_ja: "Windows / Linux / Web では未実装で -1 を返す。"
        return: "float"
        signatures:
          - params: ""
        description: "Get battery charge level (0.0-1.0), or -1 if unavailable (e.g. desktop without a battery)"
        description_ja: "バッテリー残量を取得（0.0-1.0）、取得不可なら -1（例: バッテリーのないデスクトップ）"
        description_ko: "배터리 충전 레벨을 얻음 (0.0-1.0), 불가하면 -1 (예: 배터리 없는 데스크톱)"
      - name: isBatteryCharging
        related:
          - getBatteryLevel
        keywords: ["battery","power","charging","plugged","ac"]
        platforms: [macos, ios, android]
        platformNote: "Returns false on Windows, Linux and Web (no implementation)."
        platformNote_ja: "Windows / Linux / Web では未実装で false を返す。"
        return: "bool"
        signatures:
          - params: ""
        description: "Return true if the battery is currently charging"
        description_ja: "バッテリーが現在充電中なら true を返す"
        description_ko: "배터리가 현재 충전 중이면 true 반환"
      - name: getAccelerometer
        related:
          - getGyroscope
          - getDeviceOrientation
        keywords: ["motion","gravity","tilt","imu","gforce"]
        platforms: [ios, android]
        platformNote: "Mobile-only. Returns Vec3(0,0,0) on macOS, Windows, Linux and Web."
        platformNote_ja: "モバイル専用。macOS / Windows / Linux / Web では Vec3(0,0,0)。"
        return: "Vec3"
        signatures:
          - params: ""
        description: "Get accelerometer reading in g-force (1.0 = Earth gravity). Mobile only; desktop returns zero"
        description_ja: "加速度センサーの値をG単位で取得（1.0 = 地球重力）。モバイルのみ、デスクトップは 0 を返す"
        description_ko: "가속도계 값을 G 단위로 얻음 (1.0 = 지구 중력). 모바일 전용, 데스크톱은 0 반환"
      - name: getGyroscope
        related:
          - getAccelerometer
          - getDeviceOrientation
        keywords: ["rotation","angular","spin","imu","motion"]
        platforms: [ios, android]
        platformNote: "Mobile-only. Returns Vec3(0,0,0) on macOS, Windows, Linux and Web."
        platformNote_ja: "モバイル専用。macOS / Windows / Linux / Web では Vec3(0,0,0)。"
        return: "Vec3"
        signatures:
          - params: ""
        description: "Get gyroscope angular velocity in rad/s. Mobile only; desktop returns zero"
        description_ja: "ジャイロの角速度を rad/s で取得。モバイルのみ、デスクトップは 0 を返す"
        description_ko: "자이로스코프 각속도를 rad/s로 얻음. 모바일 전용, 데스크톱은 0 반환"
      - name: getDeviceOrientation
        related:
          - Quaternion
          - getAccelerometer
          - getGyroscope
          - getCompassHeading
        keywords: ["attitude","tilt","imu","quaternion","pose"]
        platforms: [ios, android]
        platformNote: "Mobile-only. Returns identity Quaternion(1,0,0,0) on macOS, Windows, Linux and Web."
        platformNote_ja: "モバイル専用。macOS / Windows / Linux / Web では単位 Quaternion(1,0,0,0)。"
        return: "Quaternion"
        signatures:
          - params: ""
        description: "Get the fused device attitude (accelerometer + gyroscope + magnetometer) as a quaternion. Mobile only"
        description_ja: "融合されたデバイス姿勢（加速度＋ジャイロ＋磁気センサー）をクォータニオンで取得。モバイルのみ"
        description_ko: "융합된 디바이스 자세(가속도계 + 자이로스코프 + 자력계)를 quaternion으로 얻음. 모바일 전용"
      - name: getCompassHeading
        related:
          - getDeviceOrientation
          - getLocation
        keywords: ["magnetometer","north","bearing","direction","azimuth"]
        platforms: [ios, android]
        platformNote: "Mobile-only. Returns 0 on macOS, Windows, Linux and Web."
        platformNote_ja: "モバイル専用。macOS / Windows / Linux / Web では 0。"
        return: "float"
        signatures:
          - params: ""
        description: "Get compass heading in radians (0 = north, clockwise). Mobile only"
        description_ja: "コンパス方位をラジアンで取得（0 = 北、時計回り）。モバイルのみ"
        description_ko: "나침반 방위를 라디안으로 얻음 (0 = 북쪽, 시계 방향). 모바일 전용"
      - name: isProximityClose
        related:
          - getAccelerometer
        keywords: ["proximity","near","sensor","ear","distance"]
        platforms: [ios, android]
        platformNote: "Mobile-only. Returns false on macOS, Windows, Linux and Web."
        platformNote_ja: "モバイル専用。macOS / Windows / Linux / Web では false。"
        return: "bool"
        signatures:
          - params: ""
        description: "Return true when the proximity sensor detects a nearby object (e.g. phone held to the ear)"
        description_ja: "近接センサーが近くの物体を検知したとき true を返す（例: 耳に当てた電話）"
        description_ko: "근접 센서가 가까운 물체를 감지하면 true 반환 (예: 귀에 댄 전화)"
      - name: getLocation
        related:
          - Location
          - getCompassHeading
        keywords: ["gps","geolocation","coordinates","position","latitude"]
        platforms: [macos, ios]
        platformNote: "CoreLocation only. Android is a stub (returns empty Location, needs runtime permission); Windows, Linux and Web return empty."
        platformNote_ja: "CoreLocation のみ。Android はスタブ（空の Location、ランタイム権限が必要）。Windows / Linux / Web も空を返す。"
        return: "Location"
        signatures:
          - params: ""
        description: "Get the most recent GPS / WiFi location fix. Starts location updates on the first call"
        description_ja: "最新の GPS / WiFi 位置情報を取得。初回呼び出しで位置更新を開始"
        description_ko: "가장 최근의 GPS / WiFi 위치 정보를 얻음. 첫 호출 시 위치 업데이트 시작"
  - id: graphics_backend
    name: "Graphics Backend"
    name_ja: "グラフィックスバックエンド"
    name_ko: "그래픽스 백엔드"
    functions:

      # Low-level graphics init/shutdown. The framework calls these for you in the
      # app loop; documented for embedders driving sokol directly. Same bare name
      # as the Node setup()/cleanup() callbacks, so kept out of the C++ index.
      - name: setup
        index: false
        related:
          - cleanup
          - runApp
        keywords: ["init","sokol","gfx","backend","initialize","low-level"]
        return: "void"
        signatures:
          - params: ""
        description: "Initialize sokol_gfx + sokol_gl (called for you by the app loop)"
        description_ja: "sokol_gfx + sokol_gl を初期化（通常はアプリループが自動で呼ぶ）"
        description_ko: "sokol_gfx + sokol_gl 초기화 (보통 앱 루프가 자동으로 호출)"

      - name: cleanup
        index: false
        related:
          - setup
          - requestExitApp
        keywords: ["shutdown","sokol","gfx","backend","teardown","low-level"]
        return: "void"
        signatures:
          - params: ""
        description: "Shut down sokol_gfx + sokol_gl (called for you by the app loop)"
        description_ja: "sokol_gfx + sokol_gl をシャットダウン（通常はアプリループが自動で呼ぶ）"
        description_ko: "sokol_gfx + sokol_gl 종료 (보통 앱 루프가 자동으로 호출)"

  # ==========================================================================
  # Time - Elapsed
  # ==========================================================================
  - id: time_elapsed
    name: "Time - Elapsed"
    name_ja: "時間 - 経過"
    name_ko: "시간 - 경과"
    functions:
      - name: getElapsedTimef
        keywords: ["elapsed","time","seconds","uptime","runtime","clock"]
        return: "float"
        signatures:
          - params: ""
        description: "Elapsed seconds (float)"
        description_ja: "経過秒数（float）"
        description_ko: "경과 시간(초, float)"
        of_equivalent: "ofGetElapsedTimef"

      - name: getElapsedTime
        related:
          - getElapsedTimeMillis
          - getElapsedTimeMicros
        keywords: ["elapsed","time","seconds","uptime","runtime","clock"]
        return: double
        signatures:
          - params: ""
        description: "Elapsed seconds (alias for getElapsedTimef)"
        description_ja: "経過秒数（getElapsedTimefのエイリアス）"
        description_ko: "경과 시간(초, getElapsedTimef의 별칭)"

      - name: getElapsedTimeMillis
        keywords: ["elapsed","time","milliseconds","uptime","runtime","clock"]
        return: "uint64_t"
        signatures:
          - params: ""
        description: "Elapsed milliseconds (int64)"
        description_ja: "経過ミリ秒（int64）"
        description_ko: "경과 시간(밀리초, int64)"
        of_equivalent: "ofGetElapsedTimeMillis"

      - name: getElapsedTimeMicros
        keywords: ["elapsed","time","microseconds","uptime","runtime","clock"]
        return: "uint64_t"
        signatures:
          - params: ""
        description: "Elapsed microseconds (int64)"
        description_ja: "経過マイクロ秒（int64）"
        description_ko: "경과 시간(마이크로초, int64)"
        of_equivalent: "ofGetElapsedTimeMicros"

      - name: resetElapsedTimeCounter
        keywords: ["reset","elapsed","time","clear","restart","zero"]
        return: "void"
        signatures:
          - params: ""
        description: "Reset elapsed time"
        description_ja: "経過時間をリセット"
        description_ko: "경과 시간을 초기화"
        of_equivalent: "ofResetElapsedTimeCounter"

  # ==========================================================================
  # Time - System
  # ==========================================================================
  - id: time_system
    name: "Time - System"
    name_ja: "時間 - システム"
    name_ko: "시간 - 시스템"
    functions:
      - name: getSystemTimeMillis
        keywords: ["unix","epoch","time","milliseconds","wallclock","timestamp"]
        return: "uint64_t"
        signatures:
          - params: ""
        description: "Unix time in milliseconds"
        description_ja: "Unix時間（ミリ秒）"
        description_ko: "Unix 시간(밀리초)"
        of_equivalent: "ofGetSystemTimeMillis"

      - name: getSystemTimeMicros
        keywords: ["unix","epoch","time","microseconds","wallclock","timestamp"]
        return: "uint64_t"
        signatures:
          - params: ""
        description: "Unix time in microseconds"
        description_ja: "Unix時間（マイクロ秒）"
        description_ko: "Unix 시간(마이크로초)"

      - name: getUnixTime
        keywords: ["unix","epoch","time","seconds","timestamp","wallclock"]
        return: "uint64_t"
        signatures:
          - params: ""
        description: "Current Unix timestamp in seconds"
        description_ja: "現在のUnixタイムスタンプ（秒）"
        description_ko: "현재 Unix 타임스탬프(초)"

      - name: getTimestampString
        keywords: ["timestamp","datetime","formatted","string","date","clock"]
        return: "string"
        signatures:
          - params: ""
