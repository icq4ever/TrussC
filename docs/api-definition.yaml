        description: "Create a chip sound note (8-bit style sound)"
        description_ja: "チップサウンドノートを作成（8bitスタイルのサウンド）"
        description_ko: "칩 사운드 노트를 생성 (8비트 스타일 사운드)"

      - name: build
        self: ChipSoundNote
