  - name: Platform
    related:
      - GraphicsBackend
      - BuildInfo
    keywords: ["os","operating system","target","compile time","device check"]
    description: "Compile-time OS detection. All methods are constexpr and resolve at compile time based on the target platform."
    description_ja: "コンパイル時のOS判定。全メソッドはconstexprで、ターゲットプラットフォームに応じてコンパイル時に解決される"
    description_ko: "컴파일 타임 OS 감지. 모든 메서드는 constexpr이며 대상 플랫폼에 따라 컴파일 타임에 결정됨"
    static_methods:
      - name: isWeb
        self: Platform
        related:
          - name
          - isWebGPU
        keywords: ["browser","wasm","emscripten","html5","webgl"]
        return: bool
        signatures:
          - params: ""
        description: "True on Web (Emscripten / WASM)"
        description_ja: "Web (Emscripten / WASM) で true"
        description_ko: "Web (Emscripten / WASM)에서 true"
      - name: isMacOS
        self: Platform
        related:
          - isApple
          - isDesktop
        keywords: ["mac","osx","apple","darwin","desktop"]
        return: bool
        signatures:
          - params: ""
        description: "True on macOS"
        description_ja: "macOSで true"
        description_ko: "macOS에서 true"
      - name: isIOS
        self: Platform
        related:
          - isApple
          - isMobile
        keywords: ["iphone","ipad","apple","mobile","tablet"]
        return: bool
        signatures:
          - params: ""
        description: "True on iOS"
        description_ja: "iOSで true"
        description_ko: "iOS에서 true"
      - name: isWindows
        self: Platform
        related:
          - isDesktop
          - name
        keywords: ["pc","win32","microsoft","desktop"]
        return: bool
        signatures:
          - params: ""
        description: "True on Windows"
        description_ja: "Windowsで true"
        description_ko: "Windows에서 true"
      - name: isAndroid
        self: Platform
        related:
          - isMobile
          - name
        keywords: ["mobile","phone","google","tablet","apk"]
        return: bool
        signatures:
          - params: ""
        description: "True on Android"
        description_ja: "Androidで true"
        description_ko: "Android에서 true"
      - name: isLinux
        self: Platform
        related:
          - isDesktop
          - name
        keywords: ["desktop","unix","gnu","ubuntu"]
        return: bool
        signatures:
          - params: ""
        description: "True on Linux (desktop, excludes Android)"
        description_ja: "Linux (デスクトップ、Android除く) で true"
        description_ko: "Linux (데스크톱, Android 제외)에서 true"
