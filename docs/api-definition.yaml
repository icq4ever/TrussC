        related:
          - isDead
          - getNodeCount
        keywords: ["delete","remove","kill","free","dispose"]
        return: "void"
        signatures:
          - params: ""
        description: "Mark node for deferred removal from scene graph (C++ only)"
        description_ja: "ノードを削除予約する（次のupdate時にツリーから除去、C++のみ）"
        description_ko: "노드를 지연 제거 대상으로 표시 (다음 update에서 트리에서 제거, C++ 전용)"

