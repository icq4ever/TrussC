        examples:
          - fontExample
          - bitmapStringExtendedExample
        return: "void"
        signatures:
          - params: "const string& text, float x, float y, bool screenFixed = true"
        description: "Draw text"
        description_ja: "テキストを描画"
        description_ko: "비트맵 텍스트 그리기"
        of_equivalent: "ofDrawBitmapString"

      - name: drawBitmapStringHighlight
        keywords: ["text","label","background","highlight box"]
        return: "void"
        signatures:
          - params: "const string& text, float x, float y, const Color& background = Color(0,0,0), const Color& foreground = Color(1,1,1)"
        description: "Draw text with background highlight"
        description_ja: "背景ハイライト付きでテキストを描画"
        description_ko: "배경 하이라이트와 함께 비트맵 텍스트 그리기"
        of_equivalent: "ofDrawBitmapStringHighlight"

      - name: getBitmapStringBounds
        keywords: ["text size","bounding box","measure","extent"]
        return: "void"
        signatures:
          - params: "const string& text, float& width, float& height"
        description: "Get bitmap string bounding box size"
        description_ja: "ビットマップ文字列のバウンディングボックスサイズを取得"
        description_ko: "비트맵 문자열의 바운딩 박스 크기를 얻음"

      - name: setTextAlign
