        platformNote_ja: "web はスタブ。openPlatform() が「not implemented」を出して false を返す（WebGPU が同期 pixel readback 不可）。他は実装あり（mac/ios AVAssetWriter, win IMFSinkWriter, linux GStreamer, android MediaCodec）。"
