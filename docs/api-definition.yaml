        description: "Blocking receive (for non-event use); returns byte count or -1"
        description_ja: "ブロッキング受信（イベント不使用時）。バイト数または-1を返す"
        description_ko: "블로킹 수신 (이벤트 미사용 시). 바이트 수 또는 -1 반환"
