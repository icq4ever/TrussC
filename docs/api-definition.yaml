      - name: registerGlyph
        cppName: "bitmapfont::registerGlyph"
        related:
          - Glyph
          - drawBitmapString
          - registerGlyphs
          - updateGlyph
        keywords: ["bitmap","glyph","codepoint","custom char","atlas"]
        return: void
        signatures:
          - params: "const bitmapfont::Glyph & g"
        description: "Register one bitmap glyph so drawBitmapString can render its codepoint. Replaces any glyph already registered at the same codepoint and marks the atlas dirty for re-upload"
        description_ja: "drawBitmapStringがそのcodepointを描画できるようビットマップグリフを1つ登録。同じcodepointに既存のグリフがあれば置き換え、atlasをdirtyにして再アップロードを促す"
        description_ko: "drawBitmapString이 해당 codepoint를 그릴 수 있도록 비트맵 글리프 하나를 등록. 같은 codepoint에 이미 등록된 글리프가 있으면 교체하고 atlas를 dirty로 표시해 재업로드를 유발"
      - name: registerGlyphs
        cppName: "bitmapfont::registerGlyphs"
        template: true
        lua: false   # const Glyph(&)[N] array-ref + template N — not Lua-bindable
        related:
          - Glyph
        keywords: ["bitmap","glyphs","batch","atlas","custom chars"]
        return: "void"
        signatures:
          - params: "const Glyph (&glyphs)[N] glyphs"
        description: "Register a fixed-size array of bitmap glyphs in one call (template over the array size)"
        description_ja: "固定長配列のビットマップグリフを一度に登録(配列サイズをテンプレート化)"
        description_ko: "고정 크기 배열의 비트맵 글리프를 한 번에 등록(배열 크기를 템플릿화)"
      - name: updateGlyph
        cppName: "bitmapfont::updateGlyph"
        keywords: ["bitmap","glyph","animate","swap","pixels"]
        return: "void"
        signatures:
          - params: "uint32_t cp, const uint8_t *newData"
        description: "Swap the pixel data of an already-registered glyph without changing its atlas position. Useful for animating a glyph by updating its data each frame"
        description_ja: "登録済みグリフのatlas位置を変えずにピクセルデータを差し替える。毎フレームデータを更新してグリフをアニメーションさせるのに便利"
        description_ko: "이미 등록된 글리프의 atlas 위치를 바꾸지 않고 픽셀 데이터를 교체. 매 프레임 데이터를 갱신해 글리프를 애니메이션할 때 유용"
  - id: animation
    name: "Animation"
    name_ja: "アニメーション"
    name_ko: "애니메이션"
    functions:
      # Easing functions
      - name: ease
        related:
          - EaseType
          - EaseMode
          - Tween
          - lerp
          - remap
          - createTween
        keywords: ["easing","interpolation","tween","smooth","curve"]
        return: "float"
        signatures:
          - params: "float t, EaseType type, EaseMode mode"
        description: "Apply easing to value (0-1)"
        description_ja: "イージングを適用 (0-1)"
        description_ko: "값에 easing 적용 (0-1)"

      - name: easeIn
        related:
          - EaseType
          - easeInOut
          - easeOut
          - ease
        keywords: ["easing","accelerate","ramp up","interpolation","smooth"]
        return: "float"
        signatures:
          - params: "float t, EaseType type"
        description: "Apply ease-in to value (0-1)"
        description_ja: "イーズインを適用 (0-1)"
        description_ko: "값에 ease-in 적용 (0-1)"

      - name: easeOut
        related:
          - EaseType
          - easeIn
          - easeInOut
          - ease
        keywords: ["easing","decelerate","ramp down","interpolation","smooth"]
        return: "float"
        signatures:
          - params: "float t, EaseType type"
        description: "Apply ease-out to value (0-1)"
        description_ja: "イーズアウトを適用 (0-1)"
        description_ko: "값에 ease-out 적용 (0-1)"

      - name: easeInOut
        related:
          - EaseType
          - easeIn
          - easeOut
          - ease
        keywords: ["easing","smoothstep","accelerate decelerate","interpolation"]
        return: "float"
        signatures:
          - params: "float t, EaseType type"
        description: "Apply ease-in-out to value (0-1)"
        description_ja: "イーズインアウトを適用 (0-1)"
        description_ko: "값에 ease-in-out 적용 (0-1)"

      # Tween class
      - name: from
        self: Tween
        related:
          - Tween
          - to
          - duration
          - start
        keywords: ["start","begin","origin","source","initial"]
        return: "Tween@"
        signatures:
          - params: "float value"
        description: "Set start value"
        description_ja: "開始値を設定"
        description_ko: "시작 값을 설정"

      - name: to
        self: Tween
        related:
          - Tween
          - from
          - duration
          - start
        keywords: ["end","target","destination","final","goal"]
        return: "Tween@"
        signatures:
          - params: "float value"
        description: "Set end value"
        description_ja: "終了値を設定"
        description_ko: "끝 값을 설정"

      - name: duration
        self: Tween
        keywords: ["length","time","seconds","span"]
        return: "Tween@"
        signatures:
          - params: "float seconds"
        description: "Set animation duration"
        description_ja: "再生時間を設定"
        description_ko: "애니메이션 길이를 설정"

      - name: ease
        self: Tween
        keywords: ["easing","interpolation","tween","smooth","curve"]
        return: "Tween@"
        signatures:
          - params: "EaseType type"
        description: "Set easing type"
        description_ja: "イージングタイプを設定"
        description_ko: "easing 타입을 설정"

      - name: start
        self: Tween
        related:
          - Tween
          - VideoRecordSettings
          - Fbo
        keywords: ["begin","record","capture","go"]
        return: "Tween@"
        signatures:
          - params: ""
        description: "Start animation (chainable)"
        description_ja: "開始（チェーン可能）"
        description_ko: "애니메이션 시작 (체이닝 가능)"

      - name: pause
        self: Tween
        keywords: ["hold","suspend","freeze"]
        return: "Tween@"
        signatures:
          - params: ""
        description: "Pause animation (chainable)"
        description_ja: "一時停止（チェーン可能）"
        description_ko: "애니메이션 일시정지 (체이닝 가능)"

      - name: resume
        self: Tween
        keywords: ["continue","unpause","restart"]
        return: "Tween@"
        signatures:
          - params: ""
        description: "Resume animation (chainable)"
        description_ja: "再開（チェーン可能）"
        description_ko: "애니메이션 재개 (체이닝 가능)"

      - name: reset
        self: Tween
        related:
          - Tween
        keywords: ["restart","rewind","clear","zero"]
        return: "Tween@"
        signatures:
          - params: ""
        description: "Reset animation (chainable)"
        description_ja: "リセット（チェーン可能）"
        description_ko: "애니메이션 리셋 (체이닝 가능)"

      - name: finish
        self: Tween
        related:
          - Tween
        keywords: ["complete","end","skip","jump","done"]
        return: "Tween@"
        signatures:
          - params: ""
        description: "Jump to end (chainable)"
        description_ja: "終了位置にジャンプ（チェーン可能）"
        description_ko: "끝 위치로 점프 (체이닝 가능)"

      - name: loop
        self: Tween
        related:
          - Tween
          - yoyo
          - getLoopCount
        keywords: ["repeat","cycle","iterate","infinite","again"]
        return: "Tween@"
        signatures:
          - params: "int count = -1"
        description: "Set loop count (-1=infinite, 0=none, N=repeat N times)"
        description_ja: "ループ回数を設定 (-1=無限, 0=なし, N=N回繰り返し)"
        description_ko: "반복 횟수 설정 (-1=무한, 0=없음, N=N번 반복)"

      - name: yoyo
        self: Tween
        related:
          - Tween
          - loop
        keywords: ["reverse","pingpong","bounce","back forth","alternate"]
        return: "Tween@"
        signatures:
          - params: "bool enable = true"
        description: "Enable yoyo (reverse direction each loop)"
        description_ja: "ヨーヨー（ループごとに方向反転）を有効化"
        description_ko: "요요 활성화 (반복마다 방향 반전)"

      - name: getValue
        self: Tween
        const: true
        related:
          - getProgress
          - lerp
        keywords: ["current","output","result","tween value"]
        return: "float"
        signatures:
          - params: ""
        description: "Get current tween value"
        description_ja: "現在の値を取得"
        description_ko: "현재 트윈 값을 얻음"

      - name: getProgress
        self: Tween
        const: true
        related:
          - getValue
          - getElapsed
        keywords: ["percent","fraction","ratio","completion","normalized"]
        return: "float"
        signatures:
          - params: ""
        description: "Get progress (0-1)"
        description_ja: "進行度を取得 (0-1)"
        description_ko: "진행도를 얻음 (0-1)"

      - name: getElapsed
        self: Tween
        const: true
        related:
          - getElapsedTimef
          - getElapsedTime
          - getElapsedTimeMillis
          - getElapsedTimeMicros
        keywords: ["time","passed","duration so far","running time"]
        return: "float"
        signatures:
          - params: ""
        description: "Get elapsed time"
        description_ja: "経過時間を取得"
        description_ko: "경과 시간을 얻음"

      - name: getDuration
        self: Tween
        const: true
        keywords: ["length","total time","seconds","runtime"]
        return: "float"
        signatures:
          - params: ""
        description: "Get duration"
        description_ja: "再生時間を取得"
        description_ko: "재생 시간을 얻음"

      - name: isPlaying
        self: Tween
        const: true
        keywords: ["playing","active","running","status"]
        return: "bool"
        signatures:
          - params: ""
        description: "Check if playing"
        description_ja: "再生中か確認"
        description_ko: "재생 중인지 확인"

      - name: isComplete
        self: Tween
        const: true
        keywords: ["finished","done","ended","over"]
        return: "bool"
        signatures:
          - params: ""
        description: "Check if complete"
        description_ja: "完了したか確認"
        description_ko: "완료되었는지 확인"

      - name: getStart
        self: Tween
        const: true
        keywords: ["from","begin","origin","initial","source"]
        return: "float"
        signatures:
          - params: ""
        description: "Get start value"
        description_ja: "開始値を取得"
        description_ko: "시작 값을 얻음"

      - name: getEnd
        self: Tween
        const: true
        keywords: ["to","target","destination","final"]
        return: "float"
        signatures:
          - params: ""
        description: "Get end value"
        description_ja: "終了値を取得"
        description_ko: "끝 값을 얻음"

      - name: getLoopCount
        self: Tween
        const: true
        keywords: ["repeats","iterations","cycles","count"]
        return: "int"
        signatures:
          - params: ""
        description: "Get number of completed loop iterations"
        description_ja: "完了したループ回数を取得"
        description_ko: "완료된 반복 횟수를 얻음"

